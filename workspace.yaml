# ─────────────────────────────────────────────────────────────────────────────
# dev-workspace — tmuxp 레이아웃
# ─────────────────────────────────────────────────────────────────────────────
# 실행:  tmuxp load workspace.yaml
# 또는:  ./start-workspace.sh
# 종료:  tmux kill-session -t dev-workspace
#
# 레이아웃:
#   ┌─────────────────────────────────────────┐
#   │          TOP: 🌐 DEPLOY (40%)           │
#   ├──────────────────┬──────────────────────┤
#   │ 📋 PLANNING      │  🧠 PLANNER          │
#   │  (50% × 60%)     │  🎨 FRONTEND         │
#   │                  │  ⚙️  BACKEND         │
#   │                  │  🧪 QA               │
#   │                  │  💰 MONETIZE         │
#   └──────────────────┴──────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

session_name: dev-workspace
start_directory: ./
# pane-title 표시 활성화
options:
  pane-border-status: top
  pane-border-format: " #{pane_title} "
  mouse: on

windows:
  - window_name: main
    layout: main-horizontal
    options:
      main-pane-height: 40%
    shell_command_before:
      # pane 진입 시 공통 환경 (선택)
      - export CLICOLOR=1
    panes:

      # ── [0] TOP: 배포 미리보기 서버 ─────────────────────────────────────
      - shell_command:
          - printf '\033]2;🌐 DEPLOY\033\\'
          - clear
          - echo "🌐 DEPLOY — 웹 배포 미리보기"
          # npm run dev 가 있으면 실행, 없으면 안내
          - '[ -f package.json ] && grep -q "\"dev\"" package.json && npm run dev || echo "서버 명령어를 여기에 입력하세요 (예: npm run dev / vercel dev / next dev)"'

      # ── [1] BOTTOM-LEFT: 기획/대화 로그 + git 히스토리 ──────────────────
      - shell_command:
          - printf '\033]2;📋 PLANNING\033\\'
          - clear
          - echo "📋 PLANNING — 기획 로그 / 커밋 히스토리"
          - mkdir -p logs
          - touch logs/planning.log
          - '(tail -f ./logs/planning.log 2>/dev/null & git log --oneline --all --color --decorate | head -40; wait)'

      # ── [2] BOTTOM-RIGHT: 5개 에이전트는 tmux split 로 이어서 ──────────
      #    main-horizontal 레이아웃에서는 세로 패널이 하단에 수평 배치되므로,
      #    start-workspace.sh 가 load 이후 추가 split 으로 수직 5분할을 만든다.
      - shell_command:
          - printf '\033]2;🧠 PLANNER\033\\'
          - clear
          - echo "🧠 PLANNER — Max 계정 (기획/판단)"
          - cd agents/planner
          - '# claude  (준비되면 수동 실행: claude)'
