# ─────────────────────────────────────────────────────────────────────────────
# 로컬 기동 시 함께 올릴 프로세스
# (start-workspace.sh 가 이 섹션을 읽어 선택적으로 기동)
# ─────────────────────────────────────────────────────────────────────────────
processes:
  server:
    enabled: true
    cmd: node server.js
    health: http://localhost:4747/health

  daemon:
    enabled: false            # 로컬 개발 중에는 기본 OFF (PC 키로거)
    cmd: node daemon/personal-agent.js
    env:
      ORBIT_SERVER_URL: http://localhost:4747

  vision_worker:
    enabled: false            # 관리자 맥에서만 ON (Claude Vision 분석)
    cmd: node bin/vision-worker.js

  tunnel:
    enabled: false            # cloudflared 공유 URL 필요 시 ON
    cmd: cloudflared tunnel --url http://localhost:4747
