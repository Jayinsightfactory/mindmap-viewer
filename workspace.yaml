# ─────────────────────────────────────────────────────────────────────────────
# Orbit AI — Workspace 선언 파일
# ─────────────────────────────────────────────────────────────────────────────
# 용도:
#   - 로컬/개발 환경에서 워크스페이스 + 팀 + 멤버 구조를 선언적으로 정의
#   - `start-workspace.sh` 실행 시 이 파일을 읽어 서버/데몬/Vision 워커 기동
#   - (선택) 서버 시드 스크립트에서 DB에 반영 가능
#
# 용어 주의 (CLAUDE.md 기준):
#   - "팀뷰"가 아니라 "워크스페이스" — 워크스페이스 = 회사, 그 안에서 팀 배분
#   - 개인 화면엔 본인 데이터만. 팀원 구체는 워크스페이스 뷰에서만.
# ─────────────────────────────────────────────────────────────────────────────

workspace:
  id: MMONWUCHC96FB6029B
  name: nenova
  display_name: 네노바
  owner_email: dlaww584@gmail.com

  # 서버/프론트 런타임 설정
  runtime:
    server_url: http://localhost:4747
    production_url: https://mindmap-viewer-production-adb2.up.railway.app
    port: 4747
    admin_dashboard: /admin-analysis.html

  # 3D 뷰(태양계 방식) 설정 — CLAUDE.md "3D UI 구조" 참고
  view:
    layout: solar_system         # 회사 중심 + 팀 클러스터 궤도 공전
    team_center_sphere: false    # 팀 중심 구체 없음, 팀명은 텍스트만
    default_spacing: 1.5         # 기본 간격 150%
    show_cooperation_lines: true # 협업 있을 때만 연결선 표시
    personal_view_isolated: true # 개인 화면에는 본인 데이터만

  # 그래프 노이즈 필터 (graph-engine.js NOISE_TYPES와 동기화)
  noise_types:
    - install.progress
    - daemon.update
    - daemon.error
    - screen.capture

