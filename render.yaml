services:
  - type: web
    name: mindmap-viewer
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "4747"
    disk:
      name: mindmap-data
      mountPath: /app/data
      sizeGB: 1
