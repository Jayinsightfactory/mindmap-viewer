<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; background: #0d1117; color: #e6edf3; }
  .header { padding: 12px 14px 10px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
  .logo { font-size: 15px; font-weight: 700; color: #58a6ff; }
  .sub  { font-size: 10px; color: #8b949e; margin-top: 1px; }

  .stats { display: flex; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #21262d; }
  .stat-card { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .stat-num  { font-size: 20px; font-weight: 700; color: #58a6ff; }
  .stat-lbl  { font-size: 10px; color: #6e7681; margin-top: 2px; }

  .site-row { display: flex; align-items: center; gap: 6px; padding: 4px 14px; }
  .site-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .site-name { font-size: 11px; color: #cdd9e5; flex: 1; }
  .site-cnt  { font-size: 11px; color: #6e7681; }

  .section-title { padding: 8px 14px 4px; font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: .5px; border-top: 1px solid #21262d; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; }
  .toggle-label { font-size: 12px; color: #cdd9e5; }
  .toggle-sub   { font-size: 10px; color: #6e7681; }
  .switch { width: 34px; height: 18px; background: #30363d; border-radius: 9px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .switch.on { background: #3fb950; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: left .2s; }
  .switch.on::after { left: 18px; }

  .conv-list { max-height: 160px; overflow-y: auto; padding: 4px 0; }
  .conv-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; border-bottom: 1px solid #1c2128; cursor: pointer; }
  .conv-item:hover { background: #161b22; }
  .conv-site { font-size: 10px; color: #8b949e; width: 52px; flex-shrink: 0; }
  .conv-title { font-size: 11px; color: #cdd9e5; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-msgs { font-size: 10px; color: #6e7681; }
  .conv-shared { font-size: 9px; padding: 1px 5px; border-radius: 4px; cursor: pointer; }
  .conv-shared.private { background: #1c2128; color: #6e7681; border: 1px solid #30363d; }
  .conv-shared.public  { background: rgba(35,134,54,.15); color: #3fb950; border: 1px solid #238636; }

  .footer { padding: 8px 14px 10px; border-top: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
  .server-status { font-size: 10px; color: #8b949e; display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: #3fb950; box-shadow: 0 0 4px #3fb950; }
  .dot-gray  { background: #6e7681; }
  a { color: #58a6ff; text-decoration: none; font-size: 11px; }

  .empty { padding: 16px 14px; text-align: center; font-size: 11px; color: #6e7681; }

  /* 서버 설정 */
  .url-input { width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 5px; color: #cdd9e5; font-size: 11px; padding: 5px 8px; box-sizing: border-box; }
  .url-input::placeholder { color: #484f58; }
  .token-input { width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 5px; color: #cdd9e5; font-size: 11px; padding: 5px 8px; box-sizing: border-box; }
  .token-input::placeholder { color: #484f58; }
  .test-btn { background: #1f6feb; border: none; border-radius: 5px; color: #fff; font-size: 10px; padding: 4px 10px; cursor: pointer; margin-top: 4px; }
  .test-btn:hover { background: #388bfd; }
  .test-result { font-size: 10px; margin-top: 3px; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div>
    <div class="logo">⬡ Orbit</div>
    <div class="sub">AI 대화 수집기</div>
  </div>
</div>

<!-- 통계 -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="st-total">–</div>
    <div class="stat-lbl">총 대화</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="st-msgs">–</div>
    <div class="stat-lbl">총 메시지</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="st-synced">–</div>
    <div class="stat-lbl">로컬 저장</div>
  </div>
</div>

<!-- 사이트별 -->
<div id="site-section"></div>

<!-- 설정 -->
<div class="section-title">설정</div>
<div class="toggle-row">
  <div>
    <div class="toggle-label">수집 활성화</div>
    <div class="toggle-sub">AI 대화 자동 캡처</div>
  </div>
  <div class="switch" id="enabled-toggle"></div>
</div>
<div class="toggle-row">
  <div>
    <div class="toggle-label">프라이버시 모드</div>
    <div class="toggle-sub">방문 URL 비공개 전송</div>
  </div>
  <div class="switch" id="private-toggle"></div>
</div>
<div style="padding:7px 14px">
  <div class="toggle-label" style="margin-bottom:4px">서버 URL</div>
  <input class="url-input" id="server-url-input" type="text" placeholder="https://mindmap-viewer-production.up.railway.app">
  <div class="toggle-label" style="margin-top:8px;margin-bottom:4px">인증 토큰</div>
  <input class="token-input" id="token-input" type="password" placeholder="orbit_xxxxx...">
  <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
    <button class="test-btn" id="test-conn-btn">연결 테스트</button>
    <span class="test-result" id="test-result"></span>
  </div>
</div>

<!-- 최근 대화 -->
<div class="section-title">최근 대화</div>
<div class="conv-list" id="conv-list">
  <div class="empty">대화 없음 — ChatGPT·Claude 사용 시 자동 수집됩니다</div>
</div>

<!-- 푸터 -->
<div class="footer">
  <div class="server-status">
    <div class="dot dot-gray" id="server-dot"></div>
    <span id="server-label">서버 확인 중</span>
  </div>
  <a href="#" id="dash-link" target="_blank">대시보드 ↗</a>
</div>

<script>
const SITE_COLORS = {
  ChatGPT:    '#10b981',
  Claude:     '#d97706',
  Gemini:     '#3b82f6',
  Perplexity: '#8b5cf6',
  Copilot:    '#06b6d4',
};

async function loadAll() {
  const { orbit_server_url, orbit_token, enabled, private_mode } = await chrome.storage.local.get(['orbit_server_url', 'orbit_token', 'enabled', 'private_mode']);
  const serverUrl = (orbit_server_url || 'https://mindmap-viewer-production.up.railway.app').replace(/\/+$/, '');

  // 서버 URL / 토큰 입력
  document.getElementById('server-url-input').value = orbit_server_url || '';
  document.getElementById('token-input').value = orbit_token || '';
  document.getElementById('dash-link').href = `${serverUrl}/orbit3d.html`;

  // 활성화 토글
  const isEnabled = enabled !== false;
  document.getElementById('enabled-toggle').classList.toggle('on', isEnabled);

  // 프라이버시 토글
  const isPrivate = private_mode === true;
  document.getElementById('private-toggle').classList.toggle('on', isPrivate);

  // 통계 + 대화 목록
  const [stats, convs] = await Promise.all([
    chrome.runtime.sendMessage({ type: 'get_stats' }),
    chrome.runtime.sendMessage({ type: 'get_conversations' }),
  ]);

  // 통계 카드
  let totalMsgs = 0;
  if (stats?.bySite) {
    for (const s of Object.values(stats.bySite)) totalMsgs += s.msgs;
  }
  document.getElementById('st-total').textContent  = stats?.total   ?? '–';
  document.getElementById('st-msgs').textContent   = totalMsgs      || '–';
  document.getElementById('st-synced').textContent = stats?.synced  ?? '–';

  // 사이트별 분포
  if (stats?.bySite && Object.keys(stats.bySite).length > 0) {
    const html = Object.entries(stats.bySite).map(([site, d]) => `
      <div class="site-row">
        <div class="site-dot" style="background:${SITE_COLORS[site]||'#6e7681'}"></div>
        <div class="site-name">${site}</div>
        <div class="site-cnt">${d.count}개 · ${d.msgs}메시지</div>
      </div>
    `).join('');
    document.getElementById('site-section').innerHTML = html;
  }

  // 최근 대화 목록
  renderConvList(convs || []);

  // 서버 상태
  checkServer(serverUrl, orbit_token);
}

function renderConvList(convs) {
  const list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = `<div class="empty">대화 없음 — ChatGPT·Claude 사용 시 자동 수집됩니다</div>`;
    return;
  }
  list.innerHTML = convs.slice(0, 20).map(c => `
    <div class="conv-item">
      <div class="conv-site">${c.site}</div>
      <div class="conv-title" title="${c.title}">${c.title}</div>
      <div class="conv-msgs">${c.msgCount || '?'}</div>
      <span class="conv-shared ${c.shared ? 'public' : 'private'}"
        onclick="toggleShared('${c.id}', ${!c.shared})" title="${c.shared ? '공개중 (클릭=비공개)' : '비공개 (클릭=공개)'}">
        ${c.shared ? '공개' : '비공개'}
      </span>
    </div>
  `).join('');
}

async function toggleShared(id, shared) {
  await chrome.runtime.sendMessage({ type: 'toggle_shared', id, shared });
  loadAll();
}

async function checkServer(serverUrl, token) {
  try {
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(`${serverUrl}/health`, { signal: AbortSignal.timeout(3000), headers });
    if (r.ok) {
      const isCloud = !serverUrl.includes('localhost') && !serverUrl.includes('127.0.0.1');
      document.getElementById('server-dot').className   = 'dot dot-green';
      document.getElementById('server-label').textContent = isCloud ? '클라우드 연결됨' : `로컬 연결됨`;
    } else {
      document.getElementById('server-dot').className   = 'dot dot-gray';
      document.getElementById('server-label').textContent = '연결 실패';
    }
  } catch {
    document.getElementById('server-dot').className   = 'dot dot-gray';
    document.getElementById('server-label').textContent = '서버 미실행';
  }
}

// 활성화 토글
document.getElementById('enabled-toggle').onclick = async () => {
  const { enabled } = await chrome.storage.local.get('enabled');
  const newVal = enabled === false ? true : false;
  await chrome.storage.local.set({ enabled: newVal });
  document.getElementById('enabled-toggle').classList.toggle('on', newVal);
};

// 프라이버시 토글
document.getElementById('private-toggle').onclick = async () => {
  const { private_mode } = await chrome.storage.local.get('private_mode');
  const newVal = private_mode === true ? false : true;
  await chrome.storage.local.set({ private_mode: newVal });
  document.getElementById('private-toggle').classList.toggle('on', newVal);
};

// 서버 URL 변경
document.getElementById('server-url-input').onchange = async (e) => {
  const url = (e.target.value || '').trim();
  await chrome.storage.local.set({ orbit_server_url: url || null });
  const serverUrl = (url || 'https://mindmap-viewer-production.up.railway.app').replace(/\/+$/, '');
  document.getElementById('dash-link').href = `${serverUrl}/orbit3d.html`;
};

// 토큰 변경
document.getElementById('token-input').onchange = async (e) => {
  const token = (e.target.value || '').trim();
  await chrome.storage.local.set({ orbit_token: token || null });
};

// 연결 테스트
document.getElementById('test-conn-btn').onclick = async () => {
  const resultEl = document.getElementById('test-result');
  resultEl.textContent = '테스트 중...';
  resultEl.style.color = '#8b949e';
  const url = (document.getElementById('server-url-input').value || 'https://mindmap-viewer-production.up.railway.app').replace(/\/+$/, '');
  const token = document.getElementById('token-input').value.trim();
  try {
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(5000), headers });
    if (r.ok) {
      resultEl.textContent = '연결 성공!';
      resultEl.style.color = '#3fb950';
      checkServer(url, token);
    } else {
      resultEl.textContent = `실패 (${r.status})`;
      resultEl.style.color = '#f85149';
    }
  } catch (e) {
    resultEl.textContent = '연결 불가';
    resultEl.style.color = '#f85149';
  }
};

loadAll();
</script>
</body>
</html>
