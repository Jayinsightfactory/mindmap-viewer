<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="planet" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Orbit ring -->
  <ellipse cx="64" cy="64" rx="48" ry="16" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.4" transform="rotate(-20 64 64)"/>
  <!-- Main planet -->
  <circle cx="64" cy="64" r="20" fill="url(#planet)"/>
  <!-- Planet highlight -->
  <circle cx="56" cy="56" r="6" fill="white" fill-opacity="0.2"/>
  <!-- Satellite nodes -->
  <circle cx="28" cy="48" r="5" fill="#f0883e" opacity="0.9"/>
  <circle cx="100" cy="76" r="4" fill="#3fb950" opacity="0.9"/>
  <circle cx="88" cy="36" r="3.5" fill="#d2a8ff" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="15" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="108" cy="18" r="1" fill="white" opacity="0.5"/>
  <circle cx="22" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="105" cy="105" r="1" fill="white" opacity="0.6"/>
  <circle cx="48" cy="14" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="80" cy="110" r="0.8" fill="white" opacity="0.5"/>
</svg>
