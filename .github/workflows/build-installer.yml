name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'src/**'
      - 'setup/**'
      - 'package.json'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:  # 수동 트리거

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm 의존성 설치
        run: npm install --production
        working-directory: .

      - name: Inno Setup 설치
        run: choco install innosetup --yes --no-progress
        shell: powershell

      - name: ISCC 경로 탐색
        id: find-iscc
        run: |
          # Inno Setup 경로 자동 탐색
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          )
          $iscc = $null
          foreach ($p in $candidates) {
            if ($p -and (Test-Path $p)) { $iscc = $p; break }
          }
          if (-not $iscc) {
            # 와일드카드 검색
            $found = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $iscc = $found.FullName }
          }
          if (-not $iscc) { throw "ISCC.exe를 찾을 수 없습니다" }
          Write-Host "Found ISCC: $iscc"
          "ISCC_PATH=$iscc" | Out-File -Append $env:GITHUB_OUTPUT
          & $iscc /? 2>&1 | Select-Object -First 3
          $langDir = Split-Path $iscc -Parent | Join-Path -ChildPath "Languages"
          if (Test-Path $langDir) { Get-ChildItem $langDir -Name | Select-Object -First 5 } else { Write-Host "Languages not found at: $langDir" }
        shell: powershell

      - name: EXE 빌드
        run: |
          $iscc = "${{ steps.find-iscc.outputs.ISCC_PATH }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Write-Host "=== ISCC: $iscc ==="
          & $iscc /O"dist" setup\orbit-setup.iss 2>&1
          $exitCode = $LASTEXITCODE
          Write-Host "=== Exit code: $exitCode ==="
          if ($exitCode -ne 0) { throw "Inno Setup 빌드 실패 (exit code: $exitCode)" }
          Copy-Item dist\OrbitAI-Setup-*.exe dist\OrbitAI-Setup.exe -Force
          Write-Host "✅ 빌드 완료"
          Get-ChildItem dist
        shell: powershell

      - name: GitHub Release에 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Orbit AI 최신 버전"
          body: |
            ## Orbit AI 에이전트 설치 프로그램

            ### 설치 방법
            1. **OrbitAI-Setup.exe** 다운로드
            2. 실행 후 관리자로부터 받은 설치 코드 입력
            3. 설치 완료 → 우측 하단 트레이 아이콘 확인

            ### 개인정보 보호
            - 개인 사생활 정보는 수집·학습하지 않습니다
            - 업무 관련 앱 활동 데이터만 수집합니다
            - 언제든 트레이 아이콘 → 종료로 중단 가능

            ### 시스템 요구사항
            - Windows 10 / 11 (64bit)
            - 인터넷 연결 (최초 설치 시 Node.js 자동 다운로드)
          files: dist/OrbitAI-Setup.exe
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
