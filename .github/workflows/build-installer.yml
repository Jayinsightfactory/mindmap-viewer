name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'daemon/**'
      - 'src/**'
      - 'setup/**'
      - 'package.json'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:  # 수동 트리거

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Inno Setup 설치
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          $installer = "$env:TEMP\innosetup.exe"
          Write-Host "Downloading Inno Setup..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing Inno Setup silently..."
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\InnoSetup" -Wait -NoNewWindow
          if (-not (Test-Path "C:\InnoSetup\ISCC.exe")) { throw "ISCC.exe not found" }
          Write-Host "✅ ISCC.exe ready"
        shell: powershell

      - name: EXE 빌드
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Write-Host "=== Building installer ==="
          $proc = Start-Process -FilePath "C:\InnoSetup\ISCC.exe" `
            -ArgumentList "/O`"dist`"", "setup\orbit-setup.iss" `
            -Wait -NoNewWindow -PassThru -RedirectStandardOutput "dist\iscc-stdout.txt" -RedirectStandardError "dist\iscc-stderr.txt"

          $stdout = if (Test-Path "dist\iscc-stdout.txt") { Get-Content "dist\iscc-stdout.txt" -Raw } else { "" }
          $stderr = if (Test-Path "dist\iscc-stderr.txt") { Get-Content "dist\iscc-stderr.txt" -Raw } else { "" }
          Write-Host "ISCC stdout:" $stdout
          Write-Host "ISCC stderr:" $stderr
          Write-Host "ISCC exit code:" $proc.ExitCode

          if ($proc.ExitCode -ne 0) {
            throw "ISCC failed with exit code $($proc.ExitCode)"
          }

          # 빌드된 exe 확인
          $exe = Get-ChildItem "dist\OrbitAI-Setup-*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "No OrbitAI-Setup-*.exe found in dist/" }

          Write-Host "Built: $($exe.Name) ($([math]::Round($exe.Length/1KB)) KB)"

          if ($exe.Length -lt 50000) {
            throw "EXE too small ($($exe.Length) bytes) - likely corrupt"
          }

          # OrbitAI-Setup.exe로 복사
          Copy-Item $exe.FullName "dist\OrbitAI-Setup.exe" -Force
          Write-Host "✅ dist\OrbitAI-Setup.exe ready ($([math]::Round((Get-Item 'dist\OrbitAI-Setup.exe').Length/1KB)) KB)"
          Get-ChildItem dist
        shell: powershell

      - name: ISCC 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            dist/iscc-stdout.txt
            dist/iscc-stderr.txt

      - name: GitHub Release에 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: "Orbit AI v2.0.0"
          body: |
            ## Orbit AI 에이전트 설치 프로그램

            ### 설치 방법
            1. **OrbitAI-Setup.exe** 다운로드
            2. 실행 후 관리자로부터 받은 설치 코드 입력
            3. 설치 완료 → 우측 하단 트레이 아이콘 확인

            ### 개인정보 보호
            - 개인 사생활 정보는 수집·학습하지 않습니다
            - 업무 관련 앱 활동 데이터만 수집합니다
            - 언제든 트레이 아이콘 → 종료로 중단 가능

            ### 시스템 요구사항
            - Windows 10 / 11 (64bit)
            - 인터넷 연결 (최초 설치 시 Node.js 자동 다운로드)
          files: dist/OrbitAI-Setup.exe
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
