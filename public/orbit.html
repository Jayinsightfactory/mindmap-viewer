<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit — AI 행성계</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a10; --bg2: #0d1117; --bg3: #161b22;
      --text: #f0f6fc; --text2: #c9d1d9; --text3: #8b949e;
      --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
      --orange: #ffa657; --cyan: #39d2c0; --pink: #f778ba;
      --accent: #8957e5;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden; width: 100vw; height: 100vh;
    }

    /* ── CANVAS ── */
    #orbit-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      cursor: grab;
    }
    #orbit-canvas:active { cursor: grabbing; }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px; padding: 0 16px; height: 48px;
      background: rgba(13,17,23,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(48,54,61,0.5); z-index: 100;
    }
    .logo { font-size: 13px; font-weight: 700; color: var(--text); }
    .logo span { color: var(--accent); }

    .zoom-badge {
      font-size: 11px; color: var(--text3); background: rgba(33,38,45,0.9);
      padding: 3px 8px; border-radius: 12px; border: 1px solid rgba(48,54,61,0.6);
      min-width: 80px; text-align: center;
    }
    .zoom-badge b { color: var(--text); }

    .level-badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 12px;
      border: 1px solid; transition: all 0.3s;
    }

    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.7);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .hud-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .hud-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(48,54,61,0.8);
      background: rgba(33,38,45,0.9); color: var(--text2); font-size: 11px;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .hud-btn:hover { border-color: var(--accent); color: var(--text); }
    .hud-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(137,87,229,0.12); }

    /* ── NODE TOOLTIP ── */
    #tooltip {
      position: fixed; padding: 8px 12px; border-radius: 8px;
      background: rgba(22,27,34,0.95); border: 1px solid rgba(48,54,61,0.8);
      backdrop-filter: blur(8px); font-size: 12px; pointer-events: none;
      opacity: 0; transition: opacity 0.15s; z-index: 200;
      max-width: 240px;
    }
    #tooltip.show { opacity: 1; }
    #tooltip .tt-type { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    #tooltip .tt-label { font-weight: 600; color: var(--text); }
    #tooltip .tt-meta { font-size: 10px; color: var(--text3); margin-top: 4px; }

    /* ── MINIMAP ── */
    #minimap {
      position: fixed; bottom: 16px; right: 16px;
      width: 140px; height: 90px; border-radius: 8px;
      background: rgba(13,17,23,0.9); border: 1px solid rgba(48,54,61,0.6);
      overflow: hidden;
    }
    #minimap canvas { width: 100%; height: 100%; }

    /* ── ZOOM HINT ── */
    #zoom-hint {
      position: fixed; bottom: 120px; right: 16px;
      font-size: 10px; color: var(--text3); text-align: right;
      line-height: 1.8;
    }
    #zoom-hint span { display: block; }
    #zoom-hint span.active { color: var(--accent); font-weight: 600; }

    /* ── BACK BTN ── */
    #back-btn {
      position: fixed; top: 60px; left: 16px;
      padding: 6px 12px; border-radius: 6px;
      background: rgba(22,27,34,0.95); border: 1px solid rgba(48,54,61,0.8);
      color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit;
      display: none; z-index: 100; transition: all 0.15s;
    }
    #back-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── CHANNEL SELECT ── */
    #channel-select {
      background: rgba(33,38,45,0.9); border: 1px solid rgba(48,54,61,0.8);
      color: var(--text2); font-size: 11px; padding: 3px 8px;
      border-radius: 6px; cursor: pointer; font-family: inherit;
      outline: none;
    }
    #channel-select:hover { border-color: var(--accent); }

    /* ── SIDE PANEL ── */
    #side-panel {
      position: fixed; top: 48px; right: 0; bottom: 0;
      width: 280px; background: rgba(13,17,23,0.97);
      border-left: 1px solid rgba(48,54,61,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(100%); transition: transform 0.25s ease;
      z-index: 150; overflow-y: auto; padding: 16px;
    }
    #side-panel.open { transform: translateX(0); }
    .sp-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 16px; line-height: 1;
    }
    .sp-close:hover { color: var(--text); }
    .sp-type {
      font-size: 10px; color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .sp-label {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; line-height: 1.4;
    }
    .sp-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px; margin-right: 4px; margin-bottom: 8px;
    }
    .sp-row {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text3); margin-bottom: 4px;
    }
    .sp-row span:last-child { color: var(--text2); }
    .sp-divider {
      border: none; border-top: 1px solid rgba(48,54,61,0.5);
      margin: 12px 0;
    }
    .sp-content {
      font-size: 12px; color: var(--text2); line-height: 1.6;
      background: rgba(22,27,34,0.6); padding: 10px; border-radius: 6px;
      white-space: pre-wrap; word-break: break-word; max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <span class="logo">🌌 <span>Orbit</span></span>
  <div class="live-dot" id="live-dot"></div>
  <div class="zoom-badge">Scale: <b id="scale-val">1.0x</b></div>
  <div class="level-badge" id="level-badge" style="color:var(--cyan);border-color:var(--cyan)">
    🌍 개인 세션
  </div>
  <div class="hud-right">
    <select id="channel-select" onchange="changeChannel(this.value)">
      <option value="">전체</option>
    </select>
    <button class="hud-btn" onclick="autoFit()">자동 맞춤</button>
    <button class="hud-btn" id="orbit-toggle" onclick="toggleOrbit()">🔄 Orbit 모드</button>
    <a href="/dashboard.html" style="text-decoration:none"><button class="hud-btn">📊 대시보드</button></a>
    <a href="/history.html" style="text-decoration:none"><button class="hud-btn">⏳ 히스토리</button></a>
    <a href="/settings.html" style="text-decoration:none"><button class="hud-btn">⚙️ 설정</button></a>
    <a href="/" style="text-decoration:none"><button class="hud-btn">← 기존 맵</button></a>
  </div>
</div>

<!-- SIDE PANEL -->
<div id="side-panel">
  <button class="sp-close" onclick="closeSidePanel()">✕</button>
  <div id="sp-type" class="sp-type"></div>
  <div id="sp-label" class="sp-label"></div>
  <div id="sp-badges"></div>
  <div id="sp-rows"></div>
  <hr class="sp-divider" id="sp-div" style="display:none">
  <div id="sp-content" class="sp-content" style="display:none"></div>
</div>

<!-- CANVAS -->
<canvas id="orbit-canvas"></canvas>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<!-- BACK -->
<button id="back-btn" onclick="zoomOut()">← 뒤로</button>

<!-- MINIMAP -->
<div id="minimap"><canvas id="mini-canvas"></canvas></div>

<!-- ZOOM HINT -->
<div id="zoom-hint">
  <span id="hint-6">🌌 연합 (Federation)</span>
  <span id="hint-5">🏢 조직 (Org)</span>
  <span id="hint-4">👥 팀 (Team)</span>
  <span id="hint-3">🧑 멤버 (Member)</span>
  <span id="hint-2">📁 프로젝트 (Project)</span>
  <span id="hint-1">💬 세션 (Session)</span>
  <span id="hint-0" class="active">🌍 개인 작업</span>
</div>

<script>
// ═══════════════════════════════════════════════════
// ORBIT CANVAS ENGINE
// 행성계 메타포: 줌 레벨 0-6
// 0: 개인 작업 (task/tool), 1: 세션, 2: 프로젝트
// 3: 멤버, 4: 팀, 5: 조직, 6: 연합
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('orbit-canvas');
const ctx    = canvas.getContext('2d');

// ── 월드 상태 ──
let world = {
  x: 0, y: 0,       // 카메라 위치 (월드 좌표)
  scale: 1.0,        // 줌
  targetX: 0, targetY: 0, targetScale: 1.0,  // 부드러운 애니메이션 타겟
};

let nodes   = [];   // 렌더링할 노드 목록
let orbitOn = true; // 공전 애니메이션
let raf     = null;
let hoverId = null;
let t       = 0;    // 시간 (공전용)

// ── 레벨 정의 ──
const LEVELS = [
  { id: 0, name: '개인 작업', emoji: '🌍', color: '#39d2c0', scaleMin: 0.8 },
  { id: 1, name: '세션',     emoji: '💬', color: '#58a6ff', scaleMin: 0.3 },
  { id: 2, name: '프로젝트', emoji: '📁', color: '#3fb950', scaleMin: 0.1 },
  { id: 3, name: '멤버',     emoji: '🧑', color: '#bc8cff', scaleMin: 0.04 },
  { id: 4, name: '팀',       emoji: '👥', color: '#ffa657', scaleMin: 0.015 },
  { id: 5, name: '조직',     emoji: '🏢', color: '#f778ba', scaleMin: 0.005 },
  { id: 6, name: '연합',     emoji: '🌌', color: '#8957e5', scaleMin: 0 },
];

function getCurrentLevel() {
  const s = world.scale;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (s >= LEVELS[i].scaleMin) return LEVELS[i];
  }
  return LEVELS[0];
}

// ── 노드 색상 ──
const TYPE_COLORS = {
  'user.message':      '#58a6ff',
  'assistant.message': '#3fb950',
  'tool.end':          '#bc8cff',
  'tool.start':        '#8957e5',
  'session.start':     '#39d2c0',
  'session.end':       '#6b7280',
  'file.read':         '#ffa657',
  'file.write':        '#f778ba',
  'file.create':       '#f778ba',
  'task.complete':     '#3fb950',
  'annotation.add':    '#e3b341',
  'default':           '#8b949e',
};

// AI 소스별 색상
const AI_COLORS = {
  claude:     '#3fb950',
  openai:     '#8b949e',
  n8n:        '#ea4b71',
  vscode:     '#f85149',
  perplexity: '#bc8cff',
  gemini:     '#4285f4',
};

function nodeColor(n) {
  // AI 소스 색상 우선 (서버에서 온 color 객체 처리)
  if (n.color && typeof n.color === 'object' && n.color.background) {
    return n.color.background;
  }
  if (n.aiSource && AI_COLORS[n.aiSource]) return AI_COLORS[n.aiSource];
  return TYPE_COLORS[n.type] || TYPE_COLORS.default;
}

// ── 노드 반지름 ──
function nodeRadius(n) {
  const base = n.level === 0 ? 18 :
               n.level === 1 ? 30 :
               n.level === 2 ? 50 : 70;
  return base * (n.weight || 1);
}

// ── 캔버스 리사이즈 ──
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── 월드 → 화면 변환 ──
function worldToScreen(wx, wy) {
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  return {
    x: (wx - world.x) * world.scale + cx,
    y: (wy - world.y) * world.scale + cy,
  };
}
function screenToWorld(sx, sy) {
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  return {
    x: (sx - cx) / world.scale + world.x,
    y: (sy - cy) / world.scale + world.y,
  };
}

// ── 배경 별 ──
const STARS = Array.from({length: 200}, () => ({
  x: (Math.random() - 0.5) * 8000,
  y: (Math.random() - 0.5) * 8000,
  r: Math.random() * 1.2 + 0.3,
  brightness: Math.random(),
}));

function drawStars() {
  for (const s of STARS) {
    const p = worldToScreen(s.x, s.y);
    // 별은 느리게 이동 (시차 효과)
    const px = p.x * 0.05 + canvas.width  * 0.475;
    const py = p.y * 0.05 + canvas.height * 0.475;
    const alpha = 0.3 + s.brightness * 0.5;
    ctx.beginPath();
    ctx.arc(px, py, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fill();
  }
}

// ── 궤도 링 그리기 ──
function drawOrbitRing(cx, cy, r, color, alpha = 0.15) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${hexToRgb(color)},${alpha})`;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── 노드 그리기 ──
function drawNode(n, isHover) {
  const p  = worldToScreen(n.x, n.y);
  const r  = nodeRadius(n) * world.scale;
  if (r < 1.5) return; // 너무 작으면 스킵

  const color = nodeColor(n);
  const glow  = isHover ? 0.8 : 0.4;

  // 글로우
  if (r > 4) {
    const grad = ctx.createRadialGradient(p.x, p.y, r * 0.5, p.x, p.y, r * 2.5);
    grad.addColorStop(0, `rgba(${hexToRgb(color)},${glow * 0.3})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // 본체
  const body = ctx.createRadialGradient(p.x - r*0.3, p.y - r*0.3, r*0.1, p.x, p.y, r);
  body.addColorStop(0, lighten(color, 40));
  body.addColorStop(0.6, color);
  body.addColorStop(1, darken(color, 30));
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = body;
  ctx.fill();

  // 테두리
  ctx.strokeStyle = isHover ? '#fff' : `rgba(${hexToRgb(color)},0.6)`;
  ctx.lineWidth   = isHover ? 2 : 1;
  ctx.stroke();

  // 라벨 (일정 크기 이상일 때만)
  if (r > 12) {
    ctx.fillStyle   = 'rgba(255,255,255,0.9)';
    ctx.font        = `${Math.min(r * 0.5, 13)}px Inter`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    const label = n.label || n.type || '';
    const maxLen = Math.floor(r / 4);
    ctx.fillText(label.slice(0, maxLen + 3) + (label.length > maxLen + 3 ? '…' : ''), p.x, p.y);
  }
}

// ── 엣지 그리기 ──
function drawEdge(from, to) {
  const fp = worldToScreen(from.x, from.y);
  const tp = worldToScreen(to.x,   to.y);
  const dist = Math.hypot(tp.x - fp.x, tp.y - fp.y);
  if (dist < 3) return;

  ctx.beginPath();
  ctx.moveTo(fp.x, fp.y);

  // 곡선
  const mx = (fp.x + tp.x) / 2 + (tp.y - fp.y) * 0.15;
  const my = (fp.y + tp.y) / 2 - (tp.x - fp.x) * 0.15;
  ctx.quadraticCurveTo(mx, my, tp.x, tp.y);

  ctx.strokeStyle = 'rgba(139,148,158,0.25)';
  ctx.lineWidth   = Math.max(0.5, world.scale * 0.8);
  ctx.stroke();
}

// ── 공전 위치 업데이트 ──
// center 노드는 고정이므로 먼저 처리, 그 다음 자식들 처리
function updateOrbits(dt) {
  if (!orbitOn) return;
  t += dt * 0.0003;

  // 레벨 순서대로 처리 (부모가 먼저 위치 확정돼야 자식이 정확)
  const sorted = [...nodes].sort((a, b) => (b.level || 0) - (a.level || 0));
  for (const n of sorted) {
    if (!n.orbitRadius || !n.orbitParent || n.orbitParent === 'center') {
      // center 기준 공전
      if (n.orbitRadius && n.orbitParent === 'center') {
        const angle = n.orbitAngle + t * n.orbitSpeed;
        n.x = Math.cos(angle) * n.orbitRadius;
        n.y = Math.sin(angle) * n.orbitRadius;
      }
      continue;
    }
    const parent = nodes.find(p => p.id === n.orbitParent);
    if (parent) {
      const angle = n.orbitAngle + t * n.orbitSpeed;
      n.x = parent.x + Math.cos(angle) * n.orbitRadius;
      n.y = parent.y + Math.sin(angle) * n.orbitRadius;
    }
  }
}

// ── 레벨 기반 가시성 ──
function isVisible(n) {
  const level = getCurrentLevel();
  // 현재 레벨 이하의 노드만 표시
  return (n.level === undefined || n.level <= level.id + 1);
}

// ── 메인 렌더 루프 ──
let lastTime = 0;
function frame(time) {
  const dt = time - lastTime;
  lastTime = time;

  // 부드러운 카메라 이동
  world.x     += (world.targetX     - world.x)     * 0.08;
  world.y     += (world.targetY     - world.y)     * 0.08;
  world.scale += (world.targetScale - world.scale) * 0.1;

  updateOrbits(dt);

  // 배경
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#060a10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  // 줌 레벨에 따른 성운 효과
  drawNebula();

  // 궤도 링 — 부모별로 중복 방지 (같은 반경의 링 한 번만)
  const drawnRings = new Set();
  for (const n of nodes) {
    if (!isVisible(n) || !n.orbitRadius || !n.orbitParent) continue;
    const ringKey = n.orbitParent + ':' + Math.round(n.orbitRadius);
    if (drawnRings.has(ringKey)) continue;
    drawnRings.add(ringKey);

    const parentNode = n.orbitParent === 'center'
      ? { x: 0, y: 0 }
      : nodes.find(p => p.id === n.orbitParent);
    if (parentNode) {
      const pp = worldToScreen(parentNode.x, parentNode.y);
      drawOrbitRing(pp.x, pp.y, n.orbitRadius * world.scale, nodeColor(n));
    }
  }

  // 엣지
  const edgeMap = buildEdgeMap();
  for (const [fromId, toId] of edgeMap) {
    const from = nodes.find(n => n.id === fromId);
    const to   = nodes.find(n => n.id === toId);
    if (from && to && isVisible(from) && isVisible(to)) {
      drawEdge(from, to);
    }
  }

  // 노드
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    drawNode(n, hoverId === n.id);
  }

  updateHUD();
  drawMinimap();

  raf = requestAnimationFrame(frame);
}

function drawNebula() {
  const level = getCurrentLevel();
  const alpha = Math.max(0, 0.04 - world.scale * 0.02);
  if (alpha < 0.001) return;

  const cx = canvas.width / 2, cy = canvas.height / 2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(canvas.width, canvas.height) * 0.8);
  grad.addColorStop(0, `rgba(${hexToRgb(level.color)},${alpha})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

let edgeList = [];
function buildEdgeMap() { return edgeList; }

// ── HUD 업데이트 ──
function updateHUD() {
  document.getElementById('scale-val').textContent = world.scale.toFixed(2) + 'x';

  const level = getCurrentLevel();
  const badge = document.getElementById('level-badge');
  badge.textContent = `${level.emoji} ${level.name}`;
  badge.style.color = level.color;
  badge.style.borderColor = level.color;

  // 줌 힌트 하이라이트
  for (const l of LEVELS) {
    const el = document.getElementById(`hint-${l.id}`);
    if (el) el.className = l.id === level.id ? 'active' : '';
  }

  // 뒤로가기 버튼
  document.getElementById('back-btn').style.display = world.scale < 0.5 ? 'block' : 'none';
}

// ── 미니맵 ──
function drawMinimap() {
  const mc  = document.getElementById('mini-canvas');
  const mctx = mc.getContext('2d');
  mc.width  = 140; mc.height = 90;

  mctx.fillStyle = '#060a10';
  mctx.fillRect(0, 0, 140, 90);

  // 모든 노드를 미니맵 좌표로
  if (nodes.length === 0) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;

  for (const n of nodes) {
    const mx = ((n.x - minX) / rangeX) * 130 + 5;
    const my = ((n.y - minY) / rangeY) * 80  + 5;
    mctx.beginPath();
    mctx.arc(mx, my, 1.5, 0, Math.PI * 2);
    mctx.fillStyle = nodeColor(n);
    mctx.fill();
  }

  // 뷰포트 사각형
  const vpW = (canvas.width  / world.scale / rangeX) * 130;
  const vpH = (canvas.height / world.scale / rangeY) * 80;
  const vpX = ((world.x - canvas.width  / 2 / world.scale - minX) / rangeX) * 130 + 5;
  const vpY = ((world.y - canvas.height / 2 / world.scale - minY) / rangeY) * 80  + 5;
  mctx.strokeStyle = 'rgba(137,87,229,0.7)';
  mctx.lineWidth = 1;
  mctx.strokeRect(vpX, vpY, vpW, vpH);
}

// ═══════════════════════════════════════════════════
// 데이터 로드 및 레이아웃
// ═══════════════════════════════════════════════════
function layoutPlanetSystem(graph) {
  nodes = [];
  edgeList = [];

  const sessionMap = {};
  // 세션별로 그룹화
  for (const e of graph.nodes) {
    const sid = e.sessionId || 'default';
    if (!sessionMap[sid]) sessionMap[sid] = [];
    sessionMap[sid].push(e);
  }

  const sessionIds = Object.keys(sessionMap);
  const SESSION_ORBIT_R = 300;

  sessionIds.forEach((sid, si) => {
    const sessionAngle = (si / sessionIds.length) * Math.PI * 2;
    const sx = Math.cos(sessionAngle) * SESSION_ORBIT_R;
    const sy = Math.sin(sessionAngle) * SESSION_ORBIT_R;

    // 세션 시작 이벤트에서 멤버명 추출
    const evts = sessionMap[sid];
    const sessionStartEvt = evts.find(e => e.type === 'session.start') || evts[0];
    const sessionLabel = sessionStartEvt
      ? (sessionStartEvt.label || `세션 ${si + 1}`)
      : `세션 ${si + 1}`;
    const sessionAiSrc = sessionStartEvt?.aiSource || null;

    const sessionNode = {
      id: 'session_' + sid,
      x: sx, y: sy,
      type: 'session.start',
      label: sessionLabel,
      aiSource: sessionAiSrc,
      level: 1,
      weight: 1.2,
      orbitRadius: SESSION_ORBIT_R,
      orbitAngle: sessionAngle,
      orbitParent: 'center',
      orbitSpeed: 0.05 + si * 0.01,
    };
    nodes.push(sessionNode);

    // 세션 내 이벤트들을 위성으로
    const CHILD_ORBIT_R = 80 + evts.length * 5;
    evts.forEach((evt, ei) => {
      const childAngle = (ei / evts.length) * Math.PI * 2;
      nodes.push({
        id: evt.id || evt.eventId || `node-${si}-${ei}`,
        x: sx + Math.cos(childAngle) * CHILD_ORBIT_R,
        y: sy + Math.sin(childAngle) * CHILD_ORBIT_R,
        type: evt.type,
        // 서버 레이블 우선, 없으면 자체 생성
        label: evt.label || getFallbackLabel(evt),
        aiSource: evt.aiSource || sessionAiSrc,
        color: evt.color || null,
        level: 0,
        weight: getWeight(evt),
        orbitRadius: CHILD_ORBIT_R,
        orbitAngle: childAngle,
        orbitParent: sessionNode.id,
        orbitSpeed: 0.1 + ei * 0.005,
        raw: evt,
      });
      edgeList.push([sessionNode.id, evt.id || `node-${si}-${ei}`]);
    });
  });

  // 중심 노드
  const channelName = new URLSearchParams(location.search).get('channel') || '전체';
  nodes.unshift({
    id: 'center',
    x: 0, y: 0,
    type: 'system',
    label: `🌌 ${channelName}`,
    level: 2,
    weight: 1.5,
  });
}

// 서버 레이블 없을 때 폴백
function getFallbackLabel(evt) {
  if (!evt.data) return evt.type;
  if (evt.data.toolName) return evt.data.toolName;
  if (evt.data.contentPreview) return evt.data.contentPreview.slice(0, 22);
  return evt.type.split('.').pop();
}

function getWeight(evt) {
  const weights = {
    'tool.end': 1.0, 'user.message': 0.8, 'assistant.message': 0.9,
    'session.start': 1.2, 'task.complete': 1.1, 'file.write': 0.85,
  };
  return weights[evt.type] || 0.6;
}

// ── 채널 관리 ─────────────────────────────────────
let currentChannel = new URLSearchParams(location.search).get('channel') || '';

async function loadChannels() {
  try {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    // 채널 목록 추출
    const channels = [...new Set(sessions.map(s => s.channelId).filter(Boolean))];
    const sel = document.getElementById('channel-select');
    channels.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch; opt.textContent = ch;
      if (ch === currentChannel) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {}
}

function changeChannel(ch) {
  currentChannel = ch;
  const url = new URL(location.href);
  if (ch) url.searchParams.set('channel', ch);
  else url.searchParams.delete('channel');
  history.replaceState(null, '', url);
  loadData();
}

async function loadData() {
  try {
    const url = currentChannel
      ? `/api/graph?channel=${encodeURIComponent(currentChannel)}`
      : '/api/graph';
    const res = await fetch(url);
    const graph = await res.json();
    layoutPlanetSystem(graph);
    document.getElementById('live-dot').style.background = 'var(--green)';
  } catch (e) {
    console.warn('API 연결 실패, 데모 데이터 사용:', e.message);
    loadDemoData();
  }
}

function loadDemoData() {
  const demoGraph = { nodes: [] };
  const sessions  = ['s1', 's2', 's3'];
  const types = ['user.message', 'assistant.message', 'tool.end', 'file.write', 'file.read'];
  let id = 1;
  for (const s of sessions) {
    const count = 5 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
      demoGraph.nodes.push({
        id: `node-${id++}`, sessionId: s,
        type: types[Math.floor(Math.random() * types.length)],
        label: ['파일 작성', '코드 검색', '답변 생성', 'API 호출'][Math.floor(Math.random() * 4)],
      });
    }
  }
  layoutPlanetSystem(demoGraph);
}

// ═══════════════════════════════════════════════════
// 인터랙션
// ═══════════════════════════════════════════════════
let isDragging = false, dragStart = { x: 0, y: 0 }, camStart = { x: 0, y: 0 };

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart  = { x: world.targetX, y: world.targetY };
});

canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / world.scale;
    const dy = (e.clientY - dragStart.y) / world.scale;
    world.targetX = camStart.x - dx;
    world.targetY = camStart.y - dy;
    return;
  }

  // 호버
  const wPos = screenToWorld(e.clientX, e.clientY);
  let found = null;
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    const r = nodeRadius(n);
    if (Math.hypot(n.x - wPos.x, n.y - wPos.y) < r) {
      found = n; break;
    }
  }

  if (found && found.id !== hoverId) {
    hoverId = found.id;
    showTooltip(found, e.clientX, e.clientY);
  } else if (!found) {
    hoverId = null;
    hideTooltip();
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; hideTooltip(); });

canvas.addEventListener('click', e => {
  if (Math.abs(e.clientX - dragStart.x) > 3 || Math.abs(e.clientY - dragStart.y) > 3) return;
  const wPos = screenToWorld(e.clientX, e.clientY);
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    if (Math.hypot(n.x - wPos.x, n.y - wPos.y) < nodeRadius(n)) {
      // 세션 노드 → 줌인, 이벤트 노드 → 사이드 패널
      if (n.level >= 1) {
        zoomIntoNode(n);
      } else {
        openSidePanel(n);
      }
      return;
    }
  }
  // 빈 공간 클릭 → 패널 닫기
  closeSidePanel();
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor  = e.deltaY < 0 ? 1.12 : 0.89;
  const wBefore = screenToWorld(e.clientX, e.clientY);
  world.targetScale = Math.max(0.003, Math.min(6, world.targetScale * factor));
  // 줌 포인트 유지
  world.targetX = wBefore.x - (e.clientX - canvas.width / 2)  / world.targetScale;
  world.targetY = wBefore.y - (e.clientY - canvas.height / 2) / world.targetScale;
}, { passive: false });

// 터치 지원
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else if (e.touches.length === 1) {
    isDragging = true;
    dragStart  = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camStart   = { x: world.targetX, y: world.targetY };
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    world.targetScale = Math.max(0.003, Math.min(6, world.targetScale * (d / lastTouchDist)));
    lastTouchDist = d;
  } else if (e.touches.length === 1 && isDragging) {
    const dx = (e.touches[0].clientX - dragStart.x) / world.scale;
    const dy = (e.touches[0].clientY - dragStart.y) / world.scale;
    world.targetX = camStart.x - dx;
    world.targetY = camStart.y - dy;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isDragging = false; });

// ─── 노드 줌인 ────────────────────────────────────
function zoomIntoNode(n) {
  world.targetX     = n.x;
  world.targetY     = n.y;
  world.targetScale = Math.min(world.scale * 3, 4);
}

function zoomOut() {
  world.targetScale = Math.max(0.2, world.scale * 0.35);
}

function autoFit() {
  if (nodes.length === 0) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  world.targetX = (minX + maxX) / 2;
  world.targetY = (minY + maxY) / 2;
  world.targetScale = Math.min(
    canvas.width  / (maxX - minX + 200),
    canvas.height / (maxY - minY + 200),
    1.5
  );
}

// ─── Orbit 토글 ────────────────────────────────────
function toggleOrbit() {
  orbitOn = !orbitOn;
  const btn = document.getElementById('orbit-toggle');
  btn.textContent = orbitOn ? '⏸ 정지' : '▶ 공전';
  btn.className   = orbitOn ? 'hud-btn active' : 'hud-btn';
}

// ─── 툴팁 ────────────────────────────────────────
function showTooltip(n, mx, my) {
  const tt = document.getElementById('tooltip');
  const aiTag = n.aiSource ? ` · ${n.aiSource}` : '';
  document.getElementById('tt-type').textContent  = (n.type || '') + aiTag;
  document.getElementById('tt-label').textContent = n.label || n.id;
  document.getElementById('tt-meta').textContent  = n.raw?.timestamp
    ? new Date(n.raw.timestamp).toLocaleString('ko-KR')
    : (n.orbitRadius ? `궤도 반경: ${Math.round(n.orbitRadius)}` : '');

  tt.style.left = (mx + 14) + 'px';
  tt.style.top  = (my - 10) + 'px';
  tt.className  = 'show';
}
function hideTooltip() {
  document.getElementById('tooltip').className = '';
}

// ─── 사이드 패널 ────────────────────────────────
const AI_SOURCE_LABELS = {
  claude: { label: 'Claude', color: '#3fb950' },
  openai: { label: 'GPT', color: '#8b949e' },
  n8n:    { label: 'n8n', color: '#ea4b71' },
  vscode: { label: 'VS Code', color: '#f85149' },
  perplexity: { label: 'Perplexity', color: '#bc8cff' },
  gemini: { label: 'Gemini', color: '#4285f4' },
};

function openSidePanel(n) {
  const panel = document.getElementById('side-panel');
  const raw   = n.raw || {};
  const data  = raw.data || raw.fullContent || {};

  document.getElementById('sp-type').textContent = n.type || '';
  document.getElementById('sp-label').textContent = n.label || n.id;

  // 배지 (AI 소스)
  const badgesEl = document.getElementById('sp-badges');
  badgesEl.innerHTML = '';
  if (n.aiSource && AI_SOURCE_LABELS[n.aiSource]) {
    const ai = AI_SOURCE_LABELS[n.aiSource];
    const badge = document.createElement('span');
    badge.className = 'sp-badge';
    badge.style.cssText = `background:${ai.color}22;color:${ai.color};border:1px solid ${ai.color}55`;
    badge.textContent = ai.label;
    badgesEl.appendChild(badge);
  }
  if (raw.sessionId) {
    const badge = document.createElement('span');
    badge.className = 'sp-badge';
    badge.style.cssText = 'background:rgba(88,166,255,0.1);color:#58a6ff;border:1px solid rgba(88,166,255,0.3)';
    badge.textContent = '세션';
    badgesEl.appendChild(badge);
  }

  // 메타 rows
  const rowsEl = document.getElementById('sp-rows');
  rowsEl.innerHTML = '';
  const addRow = (key, val) => {
    if (!val) return;
    const row = document.createElement('div');
    row.className = 'sp-row';
    row.innerHTML = `<span>${key}</span><span>${val}</span>`;
    rowsEl.appendChild(row);
  };
  if (raw.timestamp) addRow('시간', new Date(raw.timestamp).toLocaleString('ko-KR'));
  if (raw.aiSource)  addRow('AI 소스', raw.aiSource);
  if (typeof data.success === 'boolean') addRow('결과', data.success ? '✅ 성공' : '❌ 실패');
  if (data.toolName) addRow('도구', data.toolName);
  if (data.filePath || data.fileName) addRow('파일', data.fileName || data.filePath?.split('/').pop());

  // 내용
  const content = data.content || data.contentPreview || data.message || data.inputPreview || '';
  const divEl = document.getElementById('sp-div');
  const contEl = document.getElementById('sp-content');
  if (content) {
    divEl.style.display = '';
    contEl.style.display = '';
    contEl.textContent = content.slice(0, 500) + (content.length > 500 ? '…' : '');
  } else {
    divEl.style.display = 'none';
    contEl.style.display = 'none';
  }

  panel.classList.add('open');
}

function closeSidePanel() {
  document.getElementById('side-panel').classList.remove('open');
}

// ── WebSocket 실시간 업데이트 ──
let ws = null;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen  = () => console.log('[Orbit] WS 연결');
  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'graph_update' || msg.type === 'full_graph') {
      await loadData();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// ═══════════════════════════════════════════════════
// 유틸리티
// ═══════════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) + amt;
  let g = parseInt(hex.slice(3,5),16) + amt;
  let b = parseInt(hex.slice(5,7),16) + amt;
  return `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
}
function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  return `rgb(${Math.max(0,r)},${Math.max(0,g)},${Math.max(0,b)})`;
}

// ═══════════════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════════════
(async () => {
  await loadChannels();
  await loadData();
  autoFit();
  connectWS();
  raf = requestAnimationFrame(frame);
})();
