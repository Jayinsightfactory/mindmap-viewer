<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>차수 확정 관리 — nenovaweb</title>
  <meta name="theme-color" content="#020617">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0a1224; --surface:#111a30; --surface2:#18223d; --surface3:#1f2a47;
      --border:#25304d; --border2:#2f3c5c;
      --text:#e6ecff; --muted:#8b97b8; --dim:#5a6890;
      --blue:#5b8cff; --cyan:#38d4e8; --green:#3fd68b; --violet:#a98bff;
      --orange:#ff9966; --red:#ff6b6b; --yellow:#ffcc66;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      height: 100%;
    }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* 상단 툴바 */
    .toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar .brand {
      display:flex; align-items:center; gap:8px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--cyan);
    }
    .toolbar .brand .dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--cyan); box-shadow:0 0 8px var(--cyan);
    }
    .toolbar .divider { width:1px; height:20px; background:var(--border); }
    .toolbar h1 { font-size: 15px; font-weight: 700; }
    .toolbar .spacer { flex: 1; }
    .toolbar .form-group { display:flex; align-items:center; gap:8px; }
    .toolbar label { font-size: 12px; color: var(--muted); }
    .toolbar select, .toolbar input {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-size: 13px; font-family: inherit;
      padding: 6px 10px; border-radius: 6px;
      cursor: pointer; min-width: 80px;
    }
    .toolbar select:focus { outline: none; border-color: var(--cyan); }
    .toolbar .close-btn {
      width: 32px; height: 32px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 16px;
    }
    .toolbar .close-btn:hover { background: var(--surface2); color: var(--text); }

    /* 본문 — 좌(차수) / 우(카테고리) 분할 */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    /* 좌 패널 — 차수 리스트 */
    .left-pane {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .pane-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface);
      position: sticky; top: 0;
      z-index: 5;
    }
    .pane-head .title { font-size: 13px; font-weight: 700; }
    .pane-head .count { font-size: 12px; color: var(--muted); }
    .round-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .round-table th {
      text-align: left;
      padding: 8px 14px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 49px;
      z-index: 4;
    }
    .round-table th.num { text-align: right; }
    .round-table tr {
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .round-table tbody tr:hover { background: var(--surface2); }
    .round-table tr.active {
      background: rgba(91,140,255,0.12);
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .round-table td {
      padding: 10px 14px;
      vertical-align: middle;
    }
    .round-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .round-table .dot {
      display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      margin-right: 6px;
    }
    .round-table .week {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .status-confirmed { color: var(--green); }
    .status-partial   { color: var(--orange); }
    .status-pending   { color: var(--red); }
    .status-empty     { color: var(--dim); }
    .dot-confirmed { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-partial   { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .dot-pending   { background: var(--red); }
    .dot-empty     { background: var(--border); }
    .progress {
      display: inline-block;
      width: 80px; height: 6px; border-radius: 3px;
      background: var(--surface3); vertical-align: middle;
      overflow: hidden;
    }
    .progress > i {
      display: block; height: 100%;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      transition: width 0.2s ease;
    }
    .progress.partial > i { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
    .progress.pending > i { background: var(--red); }

    /* 우 패널 — 카테고리 디테일 */
    .right-pane {
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .detail-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface);
    }
    .detail-head .info h2 {
      font-size: 18px; font-weight: 700;
      margin-bottom: 4px;
    }
    .detail-head .info .sub {
      font-size: 12px; color: var(--muted);
    }
    .detail-head .stats {
      display: flex; gap: 18px;
    }
    .detail-head .stat .label {
      font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .detail-head .stat .value {
      font-size: 20px; font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stat.confirmed .value { color: var(--green); }
    .stat.pending .value   { color: var(--orange); }

    .cat-table-wrap { flex: 1; overflow-y: auto; }
    .cat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .cat-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      z-index: 5;
    }
    .cat-table th.num { text-align: right; }
    .cat-table th.action { text-align: center; }
    .cat-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .cat-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .cat-table tr:hover { background: var(--surface2); }
    .cat-table .check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 4px;
      background: var(--surface2); border: 1.5px solid var(--border2);
      cursor: pointer; color: var(--cyan); font-size: 12px;
      vertical-align: middle;
    }
    .cat-table .check.checked { background: var(--cyan); border-color: var(--cyan); color: #fff; }
    .cat-table .name { font-weight: 600; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      white-space: nowrap;
    }
    .badge.confirmed { background: rgba(63,214,139,0.13); color: var(--green); }
    .badge.partial   { background: rgba(255,153,102,0.15); color: var(--orange); }
    .badge.pending   { background: rgba(255,107,107,0.13); color: var(--red); }

    /* 하단 액션 바 */
    .action-bar {
      flex-shrink: 0;
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .action-bar .selection-info {
      flex: 1;
      font-size: 12px; color: var(--muted);
    }
    .action-bar .selection-info b { color: var(--cyan); font-weight: 700; }
    .action-bar button {
      padding: 9px 16px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--muted); font-size: 13px; font-weight: 600;
      border-radius: 6px; cursor: not-allowed;
      font-family: inherit;
      opacity: 0.65;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .action-bar .primary { color: var(--green); border-color: rgba(63,214,139,0.4); }
    .action-bar .danger { color: var(--red); border-color: rgba(255,107,107,0.35); }
    .phase-note {
      font-size: 11px; color: var(--orange);
      padding: 4px 10px; border-radius: 4px;
      background: rgba(255,153,102,0.1);
      border: 1px solid rgba(255,153,102,0.2);
    }

    .empty {
      padding: 60px 20px; text-align: center; color: var(--muted);
      font-size: 13px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
    .loading { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
    .err {
      margin: 16px 24px; padding: 14px 18px;
      background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3);
      border-radius: 8px; color: var(--red); font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="brand"><span class="dot"></span>nenovaweb</div>
    <div class="divider"></div>
    <h1>차수 확정 관리</h1>
    <div class="spacer"></div>
    <div class="form-group">
      <label for="yearPicker">연도</label>
      <select class="year-picker" id="yearPicker">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
    <a href="/select.html" class="close-btn" aria-label="닫기">&times;</a>
  </div>

  <div class="main">
    <!-- 좌 패널: 차수 리스트 -->
    <aside class="left-pane">
      <div class="pane-head">
        <span class="title">차수</span>
        <span class="count" id="roundCount">-</span>
      </div>
      <table class="round-table">
        <thead>
          <tr>
            <th>차수</th>
            <th class="num">확정/전체</th>
            <th class="num">진행</th>
          </tr>
        </thead>
        <tbody id="roundTbody">
          <tr><td colspan="3"><div class="loading">차수 로딩 중…</div></td></tr>
        </tbody>
      </table>
    </aside>

    <!-- 우 패널: 카테고리 디테일 -->
    <main class="right-pane">
      <div class="detail-head" id="detailHead" style="display:none;">
        <div class="info">
          <h2 id="selectedTitle">선택된 차수</h2>
          <div class="sub" id="selectedSub"></div>
        </div>
        <div class="stats">
          <div class="stat"><div class="label">전체</div><div class="value" id="sumTotal">-</div></div>
          <div class="stat confirmed"><div class="label">확정</div><div class="value" id="sumConfirmed">-</div></div>
          <div class="stat pending"><div class="label">미확정</div><div class="value" id="sumPending">-</div></div>
        </div>
      </div>
      <div class="cat-table-wrap" id="catWrap">
        <div class="empty"><div class="icon">📋</div>왼쪽에서 차수를 선택하세요</div>
      </div>
      <div class="action-bar">
        <span class="phase-note">읽기 전용 (Phase 1)</span>
        <div class="selection-info">선택 <b id="selCount">0</b>개 카테고리</div>
        <button disabled class="primary"><span>✓</span> 선택 일괄 확정</button>
        <button disabled class="danger"><span>✕</span> 선택 확정 취소</button>
        <button disabled class="primary">전체 확정</button>
        <button disabled class="danger">전체 확정 취소</button>
      </div>
    </main>
  </div>

  <script>
    'use strict';
    var API = '/api/nenova/rounds/confirmation-status';
    var token = localStorage.getItem('orbit_token') || '';
    var roundsCache = [];
    var selectedWeek = null;
    var selectedCats = new Set();

    function statusOf(r) {
      if (!r.totalShipments) return 'empty';
      if (r.confirmedShipments === r.totalShipments) return 'confirmed';
      if (r.confirmedShipments === 0) return 'pending';
      return 'partial';
    }

    function renderRounds() {
      var tbody = document.getElementById('roundTbody');
      document.getElementById('roundCount').textContent = roundsCache.length + '개';
      if (!roundsCache.length) {
        tbody.innerHTML = '<tr><td colspan="3"><div class="empty"><div class="icon">📭</div>출하 데이터가 없습니다.</div></td></tr>';
        return;
      }
      tbody.innerHTML = '';
      roundsCache.forEach(function (r) {
        var s = statusOf(r);
        var pct = r.totalShipments ? Math.round(r.confirmedShipments * 100 / r.totalShipments) : 0;
        var tr = document.createElement('tr');
        if (r.orderWeek === selectedWeek) tr.classList.add('active');
        tr.dataset.week = r.orderWeek;
        tr.innerHTML =
          '<td><span class="dot dot-' + s + '"></span><span class="week">' + r.orderWeek + '</span></td>' +
          '<td class="num status-' + s + '">' + r.confirmedShipments + '<span style="color:var(--dim);">/' + r.totalShipments + '</span></td>' +
          '<td class="num"><span class="progress ' + s + '"><i style="width:' + pct + '%;"></i></span></td>';
        tr.addEventListener('click', function () { selectRound(r); });
        tbody.appendChild(tr);
      });
    }

    function selectRound(r) {
      selectedWeek = r.orderWeek;
      selectedCats.clear();
      updateSelCount();
      // 좌 패널 활성화 갱신
      document.querySelectorAll('.round-table tr').forEach(function (el) {
        if (el.dataset.week) el.classList.toggle('active', el.dataset.week === r.orderWeek);
      });
      // 헤더
      document.getElementById('detailHead').style.display = 'flex';
      document.getElementById('selectedTitle').textContent = r.orderWeek + '차 카테고리';
      document.getElementById('selectedSub').textContent = (r.orderYearWeek || '') + '  ·  카테고리 ' + (r.categories?.length || 0) + '개';
      document.getElementById('sumTotal').textContent = r.totalShipments;
      document.getElementById('sumConfirmed').textContent = r.confirmedShipments;
      document.getElementById('sumPending').textContent = (r.totalShipments - r.confirmedShipments);
      // 카테고리 표
      var wrap = document.getElementById('catWrap');
      if (!r.categories || !r.categories.length) {
        wrap.innerHTML = '<div class="empty"><div class="icon">🌿</div>이 차수에 카테고리가 없습니다.</div>';
        return;
      }
      var rows = r.categories.map(function (c) {
        var badge = c.status === 'confirmed' ? '<span class="badge confirmed">✓ 확정</span>'
                  : c.status === 'partial'   ? '<span class="badge partial">⚠ 부분</span>'
                                              : '<span class="badge pending">○ 미확정</span>';
        return '<tr data-cat="' + escapeHtml(c.counName) + '">' +
          '<td><span class="check" data-cat="' + escapeHtml(c.counName) + '">+</span></td>' +
          '<td class="name">' + escapeHtml(c.counName) + '</td>' +
          '<td class="num">' + c.confirmedShipments + '<span style="color:var(--dim);">/' + c.totalShipments + '</span></td>' +
          '<td class="num">' + Math.round(c.confirmedBox) + '<span style="color:var(--dim);">/' + Math.round(c.totalBox) + '</span></td>' +
          '<td>' + badge + '</td>' +
          '</tr>';
      }).join('');
      wrap.innerHTML =
        '<table class="cat-table">' +
        '<thead><tr><th style="width:32px;"></th><th>카테고리</th><th class="num">확정/전체 출하</th><th class="num">확정/전체 박스</th><th>상태</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>';
      wrap.querySelectorAll('.check').forEach(function (el) {
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          var name = el.dataset.cat;
          if (selectedCats.has(name)) { selectedCats.delete(name); el.classList.remove('checked'); el.textContent = '+'; }
          else { selectedCats.add(name); el.classList.add('checked'); el.textContent = '✓'; }
          updateSelCount();
        });
      });
    }

    function updateSelCount() {
      document.getElementById('selCount').textContent = selectedCats.size;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, function (m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    function load(year) {
      var tbody = document.getElementById('roundTbody');
      tbody.innerHTML = '<tr><td colspan="3"><div class="loading">차수 로딩 중…</div></td></tr>';
      document.getElementById('detailHead').style.display = 'none';
      document.getElementById('catWrap').innerHTML = '<div class="empty"><div class="icon">📋</div>왼쪽에서 차수를 선택하세요</div>';
      fetch(API + '?year=' + encodeURIComponent(year), {
        headers: { 'Authorization': 'Bearer ' + token },
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.ok) throw new Error(data.error || '응답 오류');
          roundsCache = data.rounds || [];
          renderRounds();
          if (roundsCache.length) selectRound(roundsCache[roundsCache.length - 1]);
        })
        .catch(function (err) {
          tbody.innerHTML = '<tr><td colspan="3"><div class="err">로딩 실패: ' + escapeHtml(err.message) + '</div></td></tr>';
        });
    }

    var picker = document.getElementById('yearPicker');
    picker.value = String(new Date().getFullYear());
    picker.addEventListener('change', function () { load(this.value); });
    load(picker.value);
  </script>
</body>
</html>
