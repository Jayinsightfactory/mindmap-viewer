<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>차수 확정 관리 — nenova</title>
  <meta name="theme-color" content="#020617">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#020617; --bg2:#0a1224; --surface:#111a30; --surface2:#18223d;
      --border:#25304d; --text:#e6ecff; --muted:#8b97b8;
      --blue:#5b8cff; --cyan:#38d4e8; --green:#3fd68b; --violet:#a98bff;
      --orange:#ff9966; --red:#ff6b6b; --yellow:#ffcc66;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      min-height: 100vh;
      padding-bottom: 80px;
      font-size: 15px;
    }

    /* 상단바 */
    .app-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      background: rgba(2,6,23,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--text);
      font-size: 18px; cursor: pointer; text-decoration: none;
    }
    .icon-btn:active { background: var(--surface2); }
    .title {
      flex: 1;
      font-size: 16px; font-weight: 700;
    }
    .year-picker {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; font-family: inherit;
      padding: 8px 12px; border-radius: 10px;
      cursor: pointer;
    }
    .year-picker:focus { outline: none; border-color: var(--cyan); }

    /* 차수 칩 */
    .round-chips {
      display: flex; gap: 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 16px 16px 6px;
      scrollbar-width: none;
    }
    .round-chips::-webkit-scrollbar { display: none; }
    .round-chip {
      flex: 0 0 auto;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px; font-weight: 600;
      color: var(--text); cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s ease;
      min-height: 40px;
    }
    .round-chip .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .round-chip[data-status="all-confirmed"] .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .round-chip[data-status="partial"] .dot { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .round-chip[data-status="pending"] .dot { background: var(--muted); }
    .round-chip[data-status="none"] .dot { background: var(--border); }
    .round-chip:hover, .round-chip:active { background: var(--surface2); border-color: var(--blue); }
    .round-chip.active {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #fff; border-color: transparent;
      box-shadow: 0 4px 14px rgba(91,140,255,0.3);
    }
    .round-chip.active .dot { background: #fff; box-shadow: none; }

    .section-title {
      padding: 18px 20px 12px;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .section-title .sub {
      font-size: 11px; color: var(--muted); text-transform: none; letter-spacing: 0;
    }

    /* 요약 박스 */
    .summary {
      margin: 0 16px 6px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .summary .cell { text-align: center; }
    .summary .cell .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .summary .cell .value { font-size: 18px; font-weight: 700; }
    .summary .cell .value.c { color: var(--green); }
    .summary .cell .value.p { color: var(--orange); }

    /* 카테고리 리스트 */
    .cat-list { padding: 0 16px; }
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 8px;
    }
    .cat-row .check {
      width: 22px; height: 22px; border-radius: 6px;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      background: var(--surface2);
      font-size: 14px; color: var(--cyan);
    }
    .cat-row .check.checked {
      background: var(--cyan); border-color: var(--cyan); color: #fff;
    }
    .cat-row .body { flex: 1; min-width: 0; }
    .cat-row .name {
      font-size: 15px; font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cat-row .meta {
      font-size: 12px; color: var(--muted);
    }
    .cat-row .badge {
      padding: 5px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .cat-row .badge.confirmed { background: rgba(63,214,139,0.15); color: var(--green); }
    .cat-row .badge.partial   { background: rgba(255,153,102,0.18); color: var(--orange); }
    .cat-row .badge.pending   { background: rgba(255,107,107,0.15); color: var(--red); }

    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
      font-size: 14px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

    /* 하단 액션 바 (Phase 2 — 현재 disabled) */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: rgba(2,6,23,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .action-bar button {
      flex: 1; padding: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; font-weight: 600;
      border-radius: 12px; cursor: not-allowed;
      font-family: inherit;
      opacity: 0.6;
    }
    .action-bar .note {
      position: absolute; top: -22px; left: 16px;
      font-size: 10px; color: var(--orange);
    }

    /* 로딩 */
    .loading {
      padding: 20px; text-align: center; color: var(--muted);
      font-size: 13px;
    }
    .err {
      padding: 16px; margin: 16px;
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
      border-radius: 12px; color: var(--red);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header class="app-bar">
    <a href="/select.html" class="icon-btn" aria-label="닫기">&times;</a>
    <div class="title">차수 확정 관리</div>
    <select class="year-picker" id="yearPicker">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
  </header>

  <div class="section-title">
    <span>차수 선택</span>
    <span class="sub">●완료  ●부분  ○미확정</span>
  </div>
  <div class="round-chips" id="roundChips">
    <div class="loading">차수 로딩 중…</div>
  </div>

  <div id="detailWrap" style="display:none;">
    <div class="section-title">
      <span id="selectedLabel">선택된 차수</span>
      <span class="sub" id="selectedSub"></span>
    </div>
    <div class="summary" id="summaryBox" style="display:none;">
      <div class="cell"><div class="label">전체</div><div class="value" id="sumTotal">-</div></div>
      <div class="cell"><div class="label">확정</div><div class="value c" id="sumConfirmed">-</div></div>
      <div class="cell"><div class="label">미확정</div><div class="value p" id="sumPending">-</div></div>
    </div>
    <div class="section-title" style="padding-top:10px;">
      <span>카테고리</span>
      <span class="sub" id="catCount"></span>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>

  <div class="action-bar">
    <span class="note">읽기 전용 (Phase 1) — 쓰기는 검증 후 활성화</span>
    <button disabled>선택 일괄 확정</button>
    <button disabled>선택 확정 취소</button>
  </div>

  <script>
    'use strict';
    var API = '/api/nenova/rounds/confirmation-status';
    var token = localStorage.getItem('orbit_token') || '';
    var roundsCache = [];
    var selectedRound = null;
    var selectedCats = new Set();

    function roundStatus(r) {
      if (!r.totalShipments) return 'none';
      if (r.confirmedShipments === r.totalShipments) return 'all-confirmed';
      if (r.confirmedShipments === 0) return 'pending';
      return 'partial';
    }

    function renderChips() {
      var box = document.getElementById('roundChips');
      if (!roundsCache.length) {
        box.innerHTML = '<div class="empty"><div class="icon">📭</div>이 연도에 출하 데이터가 없습니다.</div>';
        return;
      }
      box.innerHTML = '';
      roundsCache.forEach(function (r) {
        var btn = document.createElement('button');
        btn.className = 'round-chip';
        btn.dataset.status = roundStatus(r);
        btn.dataset.week = r.orderWeek;
        btn.innerHTML = '<span class="dot"></span>' + r.orderWeek;
        if (selectedRound && selectedRound.orderWeek === r.orderWeek) btn.classList.add('active');
        btn.addEventListener('click', function () { selectRound(r); });
        box.appendChild(btn);
      });
    }

    function selectRound(r) {
      selectedRound = r;
      selectedCats.clear();
      // 칩 활성화 갱신
      document.querySelectorAll('.round-chip').forEach(function (el) {
        el.classList.toggle('active', el.dataset.week === r.orderWeek);
      });
      // 상세 영역
      document.getElementById('detailWrap').style.display = 'block';
      document.getElementById('selectedLabel').textContent = r.orderWeek + '차 카테고리';
      document.getElementById('selectedSub').textContent = r.orderYearWeek || '';
      // 요약
      document.getElementById('summaryBox').style.display = 'grid';
      document.getElementById('sumTotal').textContent = r.totalShipments + '건';
      document.getElementById('sumConfirmed').textContent = r.confirmedShipments + '건';
      document.getElementById('sumPending').textContent = (r.totalShipments - r.confirmedShipments) + '건';
      // 카테고리
      var list = document.getElementById('catList');
      list.innerHTML = '';
      document.getElementById('catCount').textContent = (r.categories.length || 0) + '개';
      if (!r.categories || !r.categories.length) {
        list.innerHTML = '<div class="empty"><div class="icon">🌿</div>이 차수에 카테고리가 없습니다.</div>';
        return;
      }
      r.categories.forEach(function (c) {
        var row = document.createElement('div');
        row.className = 'cat-row';
        var badgeCls = c.status; // 'confirmed' | 'partial' | 'pending'
        var badgeText = c.status === 'confirmed' ? '✓ 확정' : c.status === 'partial' ? '⚠ 부분' : '○ 미확정';
        row.innerHTML =
          '<div class="check" data-cat="' + c.counName + '">+</div>' +
          '<div class="body">' +
            '<div class="name">' + escapeHtml(c.counName) + '</div>' +
            '<div class="meta">' + c.confirmedShipments + '/' + c.totalShipments + ' 출하 · ' + Math.round(c.confirmedBox) + '/' + Math.round(c.totalBox) + ' 박스</div>' +
          '</div>' +
          '<div class="badge ' + badgeCls + '">' + badgeText + '</div>';
        row.querySelector('.check').addEventListener('click', function (e) {
          var el = e.currentTarget;
          var name = el.dataset.cat;
          if (selectedCats.has(name)) { selectedCats.delete(name); el.classList.remove('checked'); el.textContent = '+'; }
          else { selectedCats.add(name); el.classList.add('checked'); el.textContent = '✓'; }
        });
        list.appendChild(row);
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, function (m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
      });
    }

    function load(year) {
      var box = document.getElementById('roundChips');
      box.innerHTML = '<div class="loading">차수 로딩 중…</div>';
      document.getElementById('detailWrap').style.display = 'none';
      fetch(API + '?year=' + encodeURIComponent(year), {
        headers: { 'Authorization': 'Bearer ' + token },
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.ok) throw new Error(data.error || '응답 오류');
          roundsCache = data.rounds || [];
          renderChips();
          // 자동으로 최신 차수 선택
          if (roundsCache.length) {
            selectRound(roundsCache[roundsCache.length - 1]);
          }
        })
        .catch(function (err) {
          box.innerHTML = '<div class="err">로딩 실패: ' + escapeHtml(err.message) + '</div>';
        });
    }

    // 초기화
    var picker = document.getElementById('yearPicker');
    picker.value = String(new Date().getFullYear());
    picker.addEventListener('change', function () { load(this.value); });
    load(picker.value);
  </script>
</body>
</html>
