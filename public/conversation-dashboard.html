<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI — 작업 내역</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --green:   #3fb950;
  --blue:    #58a6ff;
  --red:     #f85149;
  --orange:  #ffa657;
  --purple:  #bc8cff;
  --cyan:    #39d2c0;
}
body {
  background: var(--bg); color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh; line-height: 1.5; font-size: 14px;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── 헤더 ───────────────────────────────────────────────── */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 200;
}
.logo { font-size: 17px; font-weight: 700; color: var(--green); white-space: nowrap; }
.logo span { color: var(--purple); font-weight: 400; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.header-back { color: var(--muted); font-size: 12px; white-space: nowrap; }
.header-back:hover { color: var(--blue); }

/* ── 검색/필터 바 ─────────────────────────────────────── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.search-box {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 260px;
  outline: none;
}
.search-box:focus { border-color: var(--blue); }
.search-box::placeholder { color: var(--muted); }
.filter-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  padding: 5px 12px; border-radius: 14px; cursor: pointer; font-size: 12px;
  transition: all .15s;
}
.filter-btn:hover { border-color: var(--blue); color: var(--text); }
.filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,0.1); }
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.refresh-label { color: var(--muted); font-size: 11px; }

/* ── 통계 카드 ────────────────────────────────────────── */
.stats-bar {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  padding: 16px 24px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
}
.stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.stat-card .value { font-size: 26px; font-weight: 700; }
.stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── 메인 레이아웃 ────────────────────────────────────── */
.main-layout {
  display: grid; grid-template-columns: 280px 1fr; gap: 0;
  height: calc(100vh - 200px); overflow: hidden;
}

/* ── 날짜 사이드바 ────────────────────────────────────── */
.date-sidebar {
  border-right: 1px solid var(--border); overflow-y: auto;
  padding: 12px 0;
}
.date-sidebar::-webkit-scrollbar { width: 4px; }
.date-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.date-item {
  padding: 10px 20px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  transition: background .1s; border-left: 3px solid transparent;
}
.date-item:hover { background: var(--surface); }
.date-item.active { background: var(--surface); border-left-color: var(--blue); }
.date-item .day { font-size: 13px; font-weight: 600; }
.date-item .weekday { font-size: 11px; color: var(--muted); margin-left: 6px; }
.date-item .count {
  background: var(--surface2); color: var(--muted); font-size: 11px;
  padding: 2px 8px; border-radius: 10px; min-width: 26px; text-align: center;
}
.date-item.active .count { background: var(--blue); color: #fff; }
.date-all {
  padding: 10px 20px; cursor: pointer; color: var(--muted); font-size: 12px;
  border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.date-all:hover { color: var(--blue); }
.date-all.active { color: var(--blue); font-weight: 600; }

/* ── 커밋 목록 ────────────────────────────────────────── */
.commit-panel {
  overflow-y: auto; padding: 16px 24px;
}
.commit-panel::-webkit-scrollbar { width: 6px; }
.commit-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.commit-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
  cursor: pointer; transition: border-color .15s;
}
.commit-card:hover { border-color: var(--muted); }
.commit-card.expanded { border-color: var(--blue); }

.commit-header {
  display: flex; align-items: flex-start; gap: 10px;
}
.commit-badge {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  line-height: 1.6;
}
.commit-subject {
  font-size: 14px; font-weight: 600; flex: 1;
  word-break: break-word;
}
.commit-time {
  font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
  margin-top: 2px;
}

.commit-meta {
  display: flex; align-items: center; gap: 12px;
  margin-top: 8px; font-size: 12px; color: var(--muted);
}
.commit-meta .additions { color: var(--green); }
.commit-meta .deletions { color: var(--red); }
.commit-meta .hash {
  font-family: 'SF Mono', Consolas, monospace;
  background: var(--surface2); padding: 1px 6px; border-radius: 4px;
  font-size: 11px;
}

.commit-files {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  display: none;
}
.commit-card.expanded .commit-files { display: block; }

.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; font-size: 12px;
  font-family: 'SF Mono', Consolas, monospace;
}
.file-status {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  font-weight: 600; min-width: 32px; text-align: center;
}
.file-status.A { background: rgba(63,185,80,0.15); color: var(--green); }
.file-status.M { background: rgba(88,166,255,0.15); color: var(--blue); }
.file-status.D { background: rgba(248,81,73,0.15); color: var(--red); }

.commit-body {
  margin-top: 8px; font-size: 12px; color: var(--muted);
  white-space: pre-wrap; line-height: 1.6;
}

/* ── 세션 요약 섹션 ───────────────────────────────────── */
.session-section {
  padding: 20px 24px; border-top: 1px solid var(--border);
}
.session-section h2 {
  font-size: 16px; font-weight: 700; margin-bottom: 14px;
  color: var(--purple);
}
.session-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 14px;
}
.session-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
}
.session-card .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--cyan); }
.session-card .desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.session-card .sections { font-size: 12px; line-height: 1.7; }
.session-card .sections li { color: var(--text); margin-left: 16px; }
.session-card .metrics {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted); white-space: pre-wrap;
}

/* ── 빈 상태 ──────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: .5; }
.empty-state .msg { font-size: 14px; }

/* ── 로딩 ─────────────────────────────────────────────── */
.loading {
  text-align: center; padding: 40px; color: var(--muted); font-size: 13px;
}
.loading::after {
  content: ''; display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-left: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 반응형 ───────────────────────────────────────────── */
@media (max-width: 900px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .main-layout { grid-template-columns: 1fr; height: auto; }
  .date-sidebar { display: none; }
  .session-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .stats-bar { grid-template-columns: 1fr; }
  header { padding: 10px 14px; }
  .toolbar { padding: 8px 14px; }
  .commit-panel { padding: 12px 14px; }
}
</style>
</head>
<body>

<!-- ── 헤더 ──────────────────────────────────────────── -->
<header>
  <div class="logo">Orbit AI <span>/ 작업 내역</span></div>
  <div class="header-right">
    <a class="header-back" href="/admin-analysis.html">Admin Dashboard</a>
    <a class="header-back" href="/orbit-os.html">Orbit OS</a>
  </div>
</header>

<!-- ── 검색/필터 바 ──────────────────────────────────── -->
<div class="toolbar">
  <input class="search-box" id="searchInput" type="text" placeholder="커밋 메시지 검색...">
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="feat">신규 기능</button>
  <button class="filter-btn" data-cat="fix">버그 수정</button>
  <button class="filter-btn" data-cat="refactor">리팩토링</button>
  <button class="filter-btn" data-cat="security">보안</button>
  <button class="filter-btn" data-cat="other">기타</button>
  <div class="toolbar-right">
    <span class="refresh-label" id="refreshLabel">자동 새로고침: 60초</span>
  </div>
</div>

<!-- ── 통계 카드 ─────────────────────────────────────── -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card">
    <div class="label">총 커밋</div>
    <div class="value" id="statTotal">-</div>
    <div class="sub" id="statCategories"></div>
  </div>
  <div class="stat-card">
    <div class="label">이번 주 커밋</div>
    <div class="value" id="statWeek">-</div>
    <div class="sub">이번 주 작업량</div>
  </div>
  <div class="stat-card">
    <div class="label">변경된 파일</div>
    <div class="value" id="statFiles">-</div>
    <div class="sub">고유 파일 수</div>
  </div>
  <div class="stat-card">
    <div class="label">추가된 줄</div>
    <div class="value" id="statInsertions">-</div>
    <div class="sub" id="statDeletions"></div>
  </div>
</div>

<!-- ── 메인 레이아웃 ─────────────────────────────────── -->
<div class="main-layout">
  <!-- 날짜 사이드바 -->
  <div class="date-sidebar" id="dateSidebar">
    <div class="date-all active" id="dateAll">전체 날짜</div>
    <div id="dateList"></div>
  </div>

  <!-- 커밋 타임라인 -->
  <div class="commit-panel" id="commitPanel">
    <div class="loading">커밋 이력 불러오는 중</div>
  </div>
</div>

<!-- ── 세션 요약 ─────────────────────────────────────── -->
<div class="session-section" id="sessionSection" style="display:none;">
  <h2>Claude 작업 세션 요약</h2>
  <div class="session-grid" id="sessionGrid"></div>
</div>

<script>
(function() {
  'use strict';

  // ── 인증 토큰 ──────────────────────────────────────────
  const TOKEN = localStorage.getItem('token') || new URLSearchParams(location.search).get('token') || '';

  function headers() {
    return TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {};
  }

  async function api(url) {
    const res = await fetch(url, { headers: headers() });
    if (!res.ok) throw new Error(res.statusText);
    return res.json();
  }

  // ── 상태 ───────────────────────────────────────────────
  let allCommits = [];
  let timeline = {};
  let dates = [];
  let activeDate = null;   // null = 전체
  let activeCategory = 'all';
  let searchTerm = '';

  // ── 시간 포맷 ──────────────────────────────────────────
  const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '방금';
    if (mins < 60) return mins + '분 전';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + '시간 전';
    const days = Math.floor(hours / 24);
    if (days < 7) return days + '일 전';
    return formatDate(dateStr);
  }
  function dayLabel(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    const diff = (today - d) / 86400000;
    if (diff === 0) return '오늘';
    if (diff === 1) return '어제';
    return (d.getMonth() + 1) + '/' + d.getDate() + ' (' + WEEKDAYS[d.getDay()] + ')';
  }

  // ── 숫자 포맷 ──────────────────────────────────────────
  function fmtNum(n) {
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  // ── 통계 로드 ──────────────────────────────────────────
  async function loadStats() {
    try {
      const data = await api('/api/sessions/stats');
      if (!data.ok) return;
      document.getElementById('statTotal').textContent = fmtNum(data.totalCommits);
      document.getElementById('statWeek').textContent = fmtNum(data.weekCommits);
      document.getElementById('statFiles').textContent = fmtNum(data.totalFiles);
      document.getElementById('statInsertions').textContent = '+' + fmtNum(data.totalInsertions);
      document.getElementById('statDeletions').textContent = '-' + fmtNum(data.totalDeletions) + ' 줄 삭제';

      // 카테고리 요약
      if (data.categories && data.categories.length) {
        const catText = data.categories
          .sort((a, b) => b.count - a.count)
          .slice(0, 4)
          .map(c => c.label + ' ' + c.count)
          .join(' / ');
        document.getElementById('statCategories').textContent = catText;
      }
    } catch (e) {
      console.warn('Stats load failed:', e);
    }
  }

  // ── 타임라인 로드 ──────────────────────────────────────
  async function loadTimeline() {
    try {
      const data = await api('/api/sessions/timeline?limit=200');
      if (!data.ok) return;
      timeline = data.timeline;
      dates = data.dates;

      // 모든 커밋 평탄화
      allCommits = [];
      for (const d of dates) {
        for (const c of timeline[d]) {
          allCommits.push(c);
        }
      }

      renderDateSidebar();
      renderCommits();
    } catch (e) {
      console.warn('Timeline load failed:', e);
      document.getElementById('commitPanel').innerHTML =
        '<div class="empty-state"><div class="icon">!</div><div class="msg">커밋 이력을 불러올 수 없습니다</div></div>';
    }
  }

  // ── 세션 요약 로드 ─────────────────────────────────────
  async function loadSessions() {
    try {
      const data = await api('/api/sessions/summary');
      if (!data.ok || !data.summaries || data.summaries.length === 0) return;

      const section = document.getElementById('sessionSection');
      const grid = document.getElementById('sessionGrid');
      section.style.display = '';

      grid.innerHTML = data.summaries.map(s => {
        const sectionsHtml = s.sections && s.sections.length
          ? '<ul class="sections">' + s.sections.map(sec => '<li>' + esc(sec) + '</li>').join('') + '</ul>'
          : '';
        const metricsHtml = s.metrics
          ? '<div class="metrics">' + esc(s.metrics) + '</div>'
          : '';
        return `
          <div class="session-card">
            <div class="title">${esc(s.name)}</div>
            <div class="desc">${esc(s.description)}</div>
            ${sectionsHtml}
            ${metricsHtml}
          </div>`;
      }).join('');
    } catch (e) {
      console.warn('Session summary load failed:', e);
    }
  }

  // ── 날짜 사이드바 렌더링 ───────────────────────────────
  function renderDateSidebar() {
    const list = document.getElementById('dateList');
    list.innerHTML = dates.map(d => {
      const count = timeline[d] ? timeline[d].length : 0;
      const label = dayLabel(d);
      const active = activeDate === d ? ' active' : '';
      return `<div class="date-item${active}" data-date="${d}">
        <div><span class="day">${label}</span></div>
        <span class="count">${count}</span>
      </div>`;
    }).join('');

    // "전체" 버튼 상태
    const allBtn = document.getElementById('dateAll');
    allBtn.className = 'date-all' + (activeDate === null ? ' active' : '');
  }

  // ── 커밋 렌더링 ────────────────────────────────────────
  function renderCommits() {
    const panel = document.getElementById('commitPanel');
    let filtered = activeDate && timeline[activeDate]
      ? timeline[activeDate]
      : allCommits;

    // 카테고리 필터
    if (activeCategory !== 'all') {
      filtered = filtered.filter(c => c.category.key === activeCategory);
    }

    // 검색 필터
    if (searchTerm) {
      const term = searchTerm.toLowerCase();
      filtered = filtered.filter(c =>
        c.subject.toLowerCase().includes(term) ||
        (c.body && c.body.toLowerCase().includes(term)) ||
        c.files.some(f => f.toLowerCase().includes(term))
      );
    }

    if (filtered.length === 0) {
      panel.innerHTML = '<div class="empty-state"><div class="icon">--</div><div class="msg">해당 조건의 커밋이 없습니다</div></div>';
      return;
    }

    panel.innerHTML = filtered.map(c => {
      const badgeStyle = `background:${c.category.color}22; color:${c.category.color}; border:1px solid ${c.category.color}44`;
      const filesHtml = c.fileDetails && c.fileDetails.length
        ? c.fileDetails.map(f =>
          `<div class="file-item">
            <span class="file-status ${f.status}">${f.statusLabel}</span>
            <span>${esc(f.file)}</span>
          </div>`
        ).join('')
        : c.files.map(f =>
          `<div class="file-item"><span>${esc(f)}</span></div>`
        ).join('');

      const bodyHtml = c.body
        ? `<div class="commit-body">${esc(c.body)}</div>`
        : '';

      return `
        <div class="commit-card" data-hash="${c.hash}">
          <div class="commit-header">
            <span class="commit-badge" style="${badgeStyle}">${esc(c.category.label)}</span>
            <span class="commit-subject">${esc(c.subject)}</span>
            <span class="commit-time">${timeAgo(c.date)}</span>
          </div>
          <div class="commit-meta">
            <span class="additions">+${fmtNum(c.insertions)}줄</span>
            <span class="deletions">-${fmtNum(c.deletions)}줄</span>
            <span>${c.filesChanged} files</span>
            <span class="hash">${c.hash}</span>
          </div>
          <div class="commit-files">
            ${filesHtml}
            ${bodyHtml}
          </div>
        </div>`;
    }).join('');
  }

  // ── 이벤트 바인딩 ──────────────────────────────────────

  // 날짜 선택
  document.getElementById('dateSidebar').addEventListener('click', e => {
    const item = e.target.closest('.date-item');
    const allBtn = e.target.closest('.date-all');
    if (item) {
      activeDate = item.dataset.date;
      renderDateSidebar();
      renderCommits();
    } else if (allBtn) {
      activeDate = null;
      renderDateSidebar();
      renderCommits();
    }
  });

  // 커밋 카드 확장/축소
  document.getElementById('commitPanel').addEventListener('click', e => {
    const card = e.target.closest('.commit-card');
    if (card) card.classList.toggle('expanded');
  });

  // 카테고리 필터
  document.querySelector('.toolbar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeCategory = btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCommits();
  });

  // 검색
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchTerm = e.target.value.trim();
      renderCommits();
    }, 250);
  });

  // ── HTML 이스케이프 ────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── 초기 로드 ──────────────────────────────────────────
  loadStats();
  loadTimeline();
  loadSessions();

  // ── 자동 새로고침 (60초) ───────────────────────────────
  setInterval(() => {
    loadStats();
    loadTimeline();
  }, 60000);

})();
</script>
</body>
</html>
