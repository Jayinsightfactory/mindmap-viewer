<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카톡 인텔리전스 · 네노바</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3240; --txt:#e6edf3; --dim:#8b949e; --accent:#4c9aff; --ok:#2ea043; --warn:#d29922; --bad:#f85149; --auto:#a371f7; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:'Segoe UI',-apple-system,'Malgun Gothic',sans-serif; font-size:14px; }
  header { padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:sticky; top:0; background:var(--bg); z-index:10; }
  header h1 { font-size:18px; margin:0; }
  header .sub { color:var(--dim); font-size:12px; }
  .ctrl { margin-left:auto; display:flex; gap:8px; align-items:center; }
  select, button { background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  .kpis { display:flex; gap:12px; padding:14px 22px; flex-wrap:wrap; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 16px; min-width:120px; }
  .kpi .n { font-size:22px; font-weight:700; }
  .kpi .l { color:var(--dim); font-size:12px; margin-top:2px; }
  .tabs { display:flex; gap:6px; padding:0 22px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tab { padding:10px 14px; border:none; background:none; color:var(--dim); border-bottom:2px solid transparent; border-radius:0; }
  .tab.active { color:var(--txt); border-bottom-color:var(--accent); }
  .view { padding:18px 22px; display:none; }
  .view.active { display:block; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--dim); font-weight:600; position:sticky; top:64px; background:var(--bg); }
  tr:hover td { background:var(--panel); }
  .badge { display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .b-ok { background:rgba(46,160,67,.16); color:#3fb950; }
  .b-bad { background:rgba(248,81,73,.16); color:#ff7b72; }
  .b-auto { background:rgba(163,113,247,.16); color:#b98eff; }
  .b-hum { background:rgba(210,153,34,.16); color:#e3b341; }
  .chip { display:inline-block; background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; margin:2px 3px 0 0; font-size:11px; color:var(--dim); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .card h3 { margin:0 0 10px; font-size:14px; }
  .card h3 .cnt { color:var(--dim); font-weight:400; font-size:12px; }
  .rule { padding:8px 0; border-bottom:1px solid var(--line); }
  .rule:last-child { border:none; }
  .rule .ev { color:var(--dim); font-size:11px; margin-top:3px; }
  .muted { color:var(--dim); }
  .empty { color:var(--dim); padding:40px; text-align:center; }
  @media(max-width:820px){ .grid2{grid-template-columns:1fr;} th{position:static;} }
</style>
</head>
<body>
<header>
  <div><h1>🗨️ 카톡 인텔리전스</h1><div class="sub">이슈·성향·역량·자동화후보 — 원문 딥분석(파생만 저장)</div></div>
  <div class="ctrl">
    <select id="hours">
      <option value="720">최근 30일</option>
      <option value="2160">최근 90일</option>
      <option value="8760" selected>전체</option>
    </select>
    <button id="refresh">새로고침</button>
  </div>
</header>
<div class="kpis" id="kpis"></div>
<div class="tabs" id="tabs">
  <button class="tab active" data-v="issues">이슈 트래킹보드</button>
  <button class="tab" data-v="playbook">해결 플레이북 · 자동화후보</button>
  <button class="tab" data-v="customers">거래처 성향지도</button>
  <button class="tab" data-v="employees">직원 역량매트릭스</button>
</div>
<div class="view active" id="v-issues"></div>
<div class="view" id="v-playbook"></div>
<div class="view" id="v-customers"></div>
<div class="view" id="v-employees"></div>

<script>
const TOKEN = localStorage.getItem('orbit_token') || new URLSearchParams(location.search).get('token') || '';
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const pct = v => v==null ? '—' : Math.round(v*100)+'%';
const chips = arr => (arr||[]).map(x=>`<span class="chip">${esc(x.k)} ${x.v}</span>`).join('') || '<span class="muted">—</span>';

async function load() {
  const hours = document.getElementById('hours').value;
  for (const id of ['v-issues','v-playbook','v-customers','v-employees']) document.getElementById(id).innerHTML = '<div class="empty">불러오는 중…</div>';
  let d;
  try {
    const res = await fetch('/api/admin/kakao-intel?hours='+hours, { headers: TOKEN ? { 'Authorization':'Bearer '+TOKEN } : {} });
    d = await res.json();
  } catch(e) { document.getElementById('v-issues').innerHTML = '<div class="empty">로드 실패: '+esc(e.message)+'</div>'; return; }
  if (d.error) { document.getElementById('v-issues').innerHTML = '<div class="empty">'+esc(d.error)+'</div>'; return; }
  renderKpis(d); renderIssues(d); renderPlaybook(d); renderCustomers(d); renderEmployees(d);
}

function renderKpis(d){
  const s = d.issueSummary||{};
  const k = [
    ['분석 윈도우', d.windowsAnalyzed||0],
    ['이슈(케이스)', s.total||0],
    ['미해결', s.unresolved||0, s.unresolved? 'var(--bad)':''],
    ['교차검증', pct(d.crossCheckAvg)],
    ['거래처', (d.customers||[]).length],
    ['직원', (d.employees||[]).length],
    ['자동화후보', (d.playbook&&d.playbook.automationCandidates||[]).length, 'var(--auto)'],
  ];
  document.getElementById('kpis').innerHTML = k.map(([l,n,c])=>`<div class="kpi"><div class="n" style="color:${c||'var(--txt)'}">${n}</div><div class="l">${l}</div></div>`).join('');
}

function renderIssues(d){
  const rows = (d.issues||[]);
  if(!rows.length){ document.getElementById('v-issues').innerHTML='<div class="empty">데이터 없음</div>'; return; }
  const byType = (d.issueSummary&&d.issueSummary.byType)||[];
  document.getElementById('v-issues').innerHTML =
    `<div style="margin-bottom:10px">유형 분포: ${chips(byType)}</div>`+
    `<table><thead><tr><th>케이스(품목·차수)</th><th>유형</th><th>담당</th><th>거래처</th><th>상태</th><th>근거</th><th>요약</th></tr></thead><tbody>`+
    rows.map(i=>`<tr>
      <td><b>${esc(i.key)}</b></td>
      <td>${esc(i.type)}</td>
      <td>${esc(i.raisedBy)||'<span class=muted>—</span>'}</td>
      <td>${(i.customers||[]).map(c=>`<span class="chip">${esc(c)}</span>`).join('')||'<span class=muted>—</span>'}</td>
      <td>${i.resolved?'<span class="badge b-ok">해결</span>':'<span class="badge b-bad">미해결</span>'}</td>
      <td class="muted">${esc(i.evidence)}</td>
      <td>${esc(i.summary)}</td></tr>`).join('')+`</tbody></table>`;
}

function renderPlaybook(d){
  const p = d.playbook||{};
  const auto = p.automationCandidates||[], jud = p.judgmentRules||[];
  const ruleRow = r => `<div class="rule"><div>${esc(r.rule)} <span class="muted">×${r.count}</span></div>${r.evidence?`<div class="ev">"${esc(r.evidence)}"</div>`:''}</div>`;
  document.getElementById('v-playbook').innerHTML = `<div class="grid2">
    <div class="card"><h3>🤖 자동화 후보 <span class="cnt">기계적 규칙 · ${auto.length}</span></h3>${auto.length?auto.map(ruleRow).join(''):'<div class="muted">—</div>'}</div>
    <div class="card"><h3>🧠 사람 판단 유지 <span class="cnt">judgment · ${jud.length}</span></h3>${jud.length?jud.map(ruleRow).join(''):'<div class="muted">—</div>'}</div>
    <div class="card"><h3>해결 절차(플레이북)</h3>${(p.steps||[]).map(s=>`<div class="rule">${esc(s.k)} <span class="muted">×${s.v}</span></div>`).join('')||'<div class="muted">—</div>'}</div>
    <div class="card"><h3>사람 판단이 필요했던 지점</h3>${(p.humanJudgment||[]).map(s=>`<div class="rule"><span class="badge b-hum">판단</span> ${esc(s.k)} <span class="muted">×${s.v}</span></div>`).join('')||'<div class="muted">—</div>'}</div>
  </div>`;
}

function renderCustomers(d){
  const rows = d.customers||[];
  if(!rows.length){ document.getElementById('v-customers').innerHTML='<div class="empty">데이터 없음</div>'; return; }
  document.getElementById('v-customers').innerHTML =
    `<table><thead><tr><th>거래처</th><th>언급</th><th>이슈수</th><th>해결률</th><th>유형</th><th>톤</th></tr></thead><tbody>`+
    rows.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td>${c.mentions}</td><td>${c.issues}</td><td>${pct(c.resolveRate)}</td><td>${chips(c.types)}</td><td>${chips(c.tones)}</td></tr>`).join('')+`</tbody></table>`;
}

function renderEmployees(d){
  const rows = d.employees||[];
  if(!rows.length){ document.getElementById('v-employees').innerHTML='<div class="empty">데이터 없음</div>'; return; }
  document.getElementById('v-employees').innerHTML =
    `<table><thead><tr><th>직원</th><th>표시명</th><th>처리(제기)</th><th>해결률</th><th>유형 분포</th></tr></thead><tbody>`+
    rows.map(e=>`<tr><td><b>${esc(e.name)}</b></td><td class="muted">${(e.aliases||[]).map(a=>esc(a)).join(', ')||'—'}</td><td>${e.handled}</td><td>${pct(e.resolveRate)}</td><td>${chips(e.types)}</td></tr>`).join('')+`</tbody></table>`;
}

document.getElementById('tabs').addEventListener('click', e=>{
  if(!e.target.dataset.v) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t===e.target));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='v-'+e.target.dataset.v));
});
document.getElementById('refresh').addEventListener('click', load);
document.getElementById('hours').addEventListener('change', load);
load();
</script>
</body>
</html>
