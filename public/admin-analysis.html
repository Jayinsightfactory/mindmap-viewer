<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI — 업무 분석 대시보드</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --surface2:#21262d;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --green:   #3fb950;
    --blue:    #58a6ff;
    --red:     #f85149;
    --orange:  #ffa657;
    --purple:  #bc8cff;
    --cyan:    #39d2c0;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; line-height: 1.5;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── 헤더 ───────────────────────────────────────────────── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 700; color: var(--green); }
  .logo span { color: var(--blue); font-weight: 400; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .header-back { color: var(--muted); font-size: 13px; }
  .header-back:hover { color: var(--blue); }
  .btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: all .15s;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--green); border-color: var(--green); color: #0d1117; font-weight: 600; }
  .btn-primary:hover { opacity: .85; }
  .btn-blue { background: var(--blue); border-color: var(--blue); color: #0d1117; font-weight: 600; }
  .btn-blue:hover { opacity: .85; }

  /* ── 메인 컨테이너 ──────────────────────────────────────── */
  main { max-width: 1440px; margin: 0 auto; padding: 28px 24px; }
  section { margin-bottom: 36px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .section-title {
    font-size: 16px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .icon { font-size: 18px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-green  { background: rgba(63,185,80,.15);  color: var(--green); }
  .badge-blue   { background: rgba(88,166,255,.15); color: var(--blue); }
  .badge-orange { background: rgba(255,166,87,.15); color: var(--orange); }
  .badge-red    { background: rgba(248,81,73,.15);  color: var(--red); }
  .badge-muted  { background: rgba(139,148,158,.15); color: var(--muted); }

  /* ── 카드 그리드 ────────────────────────────────────────── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; position: relative; overflow: hidden;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(48,54,61,.5);
  }
  .card-row:last-child { border-bottom: none; }
  .card-row .label { color: var(--muted); }
  .card-row .value { font-weight: 500; }

  /* ── 프로그레스 바 ──────────────────────────────────────── */
  .progress-bar {
    width: 100%; height: 8px; background: var(--surface2);
    border-radius: 4px; overflow: hidden; margin-top: 4px;
  }
  .progress-fill {
    height: 100%; border-radius: 4px; transition: width .6s ease;
  }
  .progress-label {
    display: flex; justify-content: space-between; font-size: 12px;
    color: var(--muted); margin-top: 4px;
  }

  /* ── 테이블 ─────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--surface2); color: var(--muted); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    vertical-align: middle; background: var(--surface);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(88,166,255,.04); }
  .cell-truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cell-time { white-space: nowrap; font-size: 12px; color: var(--muted); }

  /* ── 패턴 카드 ──────────────────────────────────────────── */
  .pattern-list { display: flex; flex-direction: column; gap: 10px; }
  .pattern-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
  }
  .pattern-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .pattern-count {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .pattern-name { font-size: 14px; font-weight: 500; }
  .pattern-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── 시간 차트 (CSS only) ───────────────────────────────── */
  .hour-chart {
    display: flex; align-items: flex-end; gap: 3px;
    height: 180px; padding: 12px 0 0; position: relative;
  }
  .hour-chart-bar-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    height: 100%;
  }
  .hour-chart-bar {
    width: 100%; max-width: 28px; border-radius: 3px 3px 0 0;
    transition: height .5s ease; min-height: 2px;
    cursor: pointer; position: relative;
  }
  .hour-chart-bar:hover { opacity: .8; }
  .hour-chart-bar-wrap .hour-label {
    font-size: 10px; color: var(--muted); text-align: center;
    flex-shrink: 0;
  }
  .hour-chart-bar-wrap .bar-area {
    flex: 1; display: flex; align-items: flex-end; justify-content: center; width: 100%;
  }
  .hour-chart-tooltip {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    white-space: nowrap; pointer-events: none; opacity: 0;
    transition: opacity .15s;
  }
  .hour-chart-bar:hover .hour-chart-tooltip { opacity: 1; }

  /* ── 리포트 섹션 ────────────────────────────────────────── */
  .report-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; text-align: center;
  }
  .report-url {
    margin-top: 12px; padding: 12px 16px; background: var(--surface2);
    border-radius: 8px; word-break: break-all; font-size: 13px;
  }

  /* ── 로딩 / 에러 ────────────────────────────────────────── */
  .loading-state {
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; color: var(--muted); font-size: 14px; gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px;
  }
  .error-msg {
    background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3);
    border-radius: 8px; padding: 12px 16px; color: var(--red); font-size: 13px;
    margin: 8px 0;
  }

  /* ── 필터 바 ─────────────────────────────────────────────── */
  .filter-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-bar input, .filter-bar select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 6px;
    font-size: 13px; outline: none;
  }
  .filter-bar input:focus, .filter-bar select:focus {
    border-color: var(--blue);
  }

  /* ── 반응형 ─────────────────────────────────────────────── */
  @media (max-width: 768px) {
    header { padding: 12px 16px; flex-wrap: wrap; }
    main { padding: 16px 12px; }
    .cards-grid { grid-template-columns: 1fr; }
    .hour-chart { height: 120px; }
    .section-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- ── 헤더 ───────────────────────────────────────────────────────── -->
<header>
  <div class="logo">Orbit AI <span>— 업무 분석 대시보드</span></div>
  <div class="header-right">
    <span id="user-info" style="font-size:12px;color:var(--muted);"></span>
    <button class="btn" onclick="loadAll()">새로고침</button>
    <a href="/orbit3d.html" class="header-back">3D 뷰로 돌아가기</a>
  </div>
</header>

<main>

  <!-- ══════ 섹션 1: 멤버별 분석 요약 ══════ -->
  <section id="sec-members">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f465;</span> 멤버별 분석 요약
      </div>
      <div class="filter-bar">
        <input type="text" id="member-search" placeholder="멤버 검색..." oninput="filterMembers()">
      </div>
    </div>
    <div id="members-grid" class="cards-grid">
      <div class="loading-state"><div class="spinner"></div> 멤버 데이터를 불러오는 중...</div>
    </div>
  </section>

  <!-- ══════ 섹션 2: 시간대별 활동 차트 ══════ -->
  <section id="sec-hours">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f552;</span> 시간대별 활동 분포
      </div>
    </div>
    <div class="card" style="padding:24px;">
      <div id="hour-chart" class="hour-chart">
        <div class="loading-state" style="width:100%;"><div class="spinner"></div> 로딩 중...</div>
      </div>
    </div>
  </section>

  <!-- ══════ 섹션 3: Vision 분석 결과 ══════ -->
  <section id="sec-vision">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f441;</span> Vision 분석 결과
      </div>
      <div class="filter-bar">
        <input type="text" id="vision-search" placeholder="앱, 화면, 호스트 검색..." oninput="filterVisionTable()">
        <select id="vision-auto-filter" onchange="filterVisionTable()">
          <option value="">전체</option>
          <option value="true">자동화 가능</option>
          <option value="false">수동 작업</option>
        </select>
      </div>
    </div>
    <div id="vision-content">
      <div class="loading-state"><div class="spinner"></div> Vision 데이터를 불러오는 중...</div>
    </div>
  </section>

  <!-- ══════ 섹션 4: 반복 패턴 & 자동화 후보 ══════ -->
  <section id="sec-patterns">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f504;</span> 반복 패턴 & 자동화 후보
      </div>
    </div>
    <div id="patterns-content">
      <div class="loading-state"><div class="spinner"></div> 패턴 분석 중...</div>
    </div>
  </section>

  <!-- ══════ 섹션 5: 정밀 분석 ══════ -->
  <section id="sec-deep">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f50d;</span> 정밀 업무 분석
      </div>
      <button class="btn btn-primary" id="deep-analyze-btn" onclick="runDeepAnalysis()" style="font-weight:700;padding:8px 20px">
        분석 시작
      </button>
    </div>
    <p style="color:var(--muted);font-size:12px;margin-bottom:16px">키로그 + 마우스좌표 + 캡처로그를 조합하여 각 멤버의 실제 업무를 정밀 분석합니다.</p>
    <div id="deep-result"></div>
  </section>

  <!-- ══════ 섹션 6: 실시간 로그 타임라인 ══════ -->
  <section id="sec-logs">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f4dd;</span> 실시간 활동 로그
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="log-user-filter" onchange="loadLogs()" style="font-size:12px;padding:4px 8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px">
          <option value="">전체 멤버</option>
        </select>
        <select id="log-type-filter" onchange="loadLogs()" style="font-size:12px;padding:4px 8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px">
          <option value="">전체 타입</option>
          <option value="keyboard.chunk">키보드</option>
          <option value="screen.capture">캡처</option>
          <option value="screen.analyzed">Vision 분석</option>
          <option value="idle">대기</option>
        </select>
        <button class="btn btn-primary" onclick="loadLogs()" style="font-size:11px;padding:4px 10px">새로고침</button>
      </div>
    </div>
    <div id="log-timeline" style="max-height:600px;overflow-y:auto">
      <div style="color:var(--muted);padding:20px;text-align:center">로딩 중...</div>
    </div>
  </section>

  <!-- ══════ 섹션 6: 리포트 생성 ══════ -->
  <section id="sec-report">
    <div class="section-header">
      <div class="section-title">
        <span class="icon">&#x1f4cb;</span> 리포트 생성
      </div>
    </div>
    <div class="report-section">
      <p style="color:var(--muted);margin-bottom:16px;">워크스페이스 전체 분석 결과를 Google Sheets 리포트로 생성합니다.</p>
      <button class="btn btn-primary" id="report-btn" onclick="generateReport()">리포트 생성</button>
      <div id="report-result"></div>
    </div>
  </section>

</main>

<script>
'use strict';

// ── 인증 ──────────────────────────────────────────────────────────
const TOKEN = localStorage.getItem('orbit_token');
if (!TOKEN) { location.href = '/orbit3d.html'; }

const AUTH_HEADERS = { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { headers: AUTH_HEADERS, ...opts });
  if (res.status === 401) { location.href = '/orbit3d.html'; return null; }
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── 전역 상태 ─────────────────────────────────────────────────────
let G = {
  workspace: null,
  members: [],
  analyses: {},       // userId -> analysis result
  graphNodes: [],     // screen.analyzed events
  allAnalyses: [],    // flat array of all analysis data
  hourlyData: new Array(24).fill(0),
};

// ── 초기 로드 ─────────────────────────────────────────────────────
async function loadAll() {
  try {
    // 1) 내 워크스페이스 조회
    const workspaces = await apiFetch('/api/workspace/my');
    if (!workspaces || workspaces.length === 0) {
      document.getElementById('members-grid').innerHTML =
        '<div class="empty-state">워크스페이스가 없습니다. 먼저 워크스페이스를 생성하세요.</div>';
      return;
    }
    G.workspace = workspaces[0]; // 첫 번째 워크스페이스 사용

    document.getElementById('user-info').textContent =
      G.workspace.name + ' (' + G.workspace.member_count + '명)';

    // 2) 멤버 목록 조회
    const members = await apiFetch('/api/workspace/' + G.workspace.id + '/members');
    G.members = Array.isArray(members) ? members.filter(m => m.status === 'active') : [];

    // 3) 병렬 로드
    await Promise.all([
      loadMemberAnalyses(),
      loadGraphData(),
    ]);

    // 4) 시간 차트 (분석 데이터 기반)
    renderHourChart();
  } catch (err) {
    console.error('[loadAll]', err);
    document.getElementById('members-grid').innerHTML =
      '<div class="error-msg">데이터 로드 실패: ' + escHtml(err.message) + '</div>';
  }
}

// ── 멤버별 분석 로드 ──────────────────────────────────────────────
async function loadMemberAnalyses() {
  if (G.members.length === 0) {
    document.getElementById('members-grid').innerHTML =
      '<div class="empty-state">활성 멤버가 없습니다.</div>';
    return;
  }

  // 워크스페이스 전체 분석도 시도
  let workspaceAnalysis = null;
  try {
    workspaceAnalysis = await apiFetch('/api/learning/workspace?wsId=' + G.workspace.id);
  } catch (e) { /* fallback to individual */ }

  // 개별 멤버 분석
  const results = await Promise.allSettled(
    G.members.map(m => apiFetch('/api/learning/analyze?userId=' + encodeURIComponent(m.userId)))
  );

  results.forEach((r, i) => {
    const uid = G.members[i].userId;
    if (r.status === 'fulfilled' && r.value && !r.value.error) {
      G.analyses[uid] = r.value;
    }
  });

  // 워크스페이스 분석에 멤버별 데이터가 있으면 병합
  if (workspaceAnalysis && workspaceAnalysis.members) {
    workspaceAnalysis.members.forEach(m => {
      if (m.userId && !G.analyses[m.userId]) {
        G.analyses[m.userId] = m;
      }
    });
  }

  renderMemberCards();
  aggregateHourlyData();
}

// ── 멤버 카드 렌더 ───────────────────────────────────────────────
function renderMemberCards() {
  const grid = document.getElementById('members-grid');
  if (G.members.length === 0) {
    grid.innerHTML = '<div class="empty-state">멤버 데이터가 없습니다.</div>';
    return;
  }

  grid.innerHTML = G.members.map(m => {
    const a = G.analyses[m.userId] || {};
    const name = m.name || m.email?.split('@')[0] || '사용자';
    const eventCount = a.eventCount || a.totalEvents || 0;
    const topApp = a.topApp || a.mostUsedApp || '-';
    const category = a.workCategory || a.category || '-';
    const autoScore = a.automationScore ?? a.autoScore ?? 0;
    const peakHour = a.peakHour != null ? (a.peakHour + '시') : '-';
    const workHours = a.workHours || a.activeHours || '-';
    const scoreColor = autoScore >= 70 ? 'var(--green)' : autoScore >= 40 ? 'var(--orange)' : 'var(--red)';
    const scorePercent = Math.min(100, Math.max(0, autoScore));

    return `
      <div class="card member-card" data-name="${escAttr(name)}" data-email="${escAttr(m.email || '')}">
        <div class="card-header">
          <div>
            <div class="card-name">${escHtml(name)}</div>
            <div class="card-subtitle">${escHtml(m.email || m.userId.substring(0, 12))}</div>
          </div>
          <span class="badge ${m.role === 'owner' ? 'badge-green' : m.role === 'admin' ? 'badge-blue' : 'badge-muted'}">${escHtml(m.role || 'member')}</span>
        </div>
        <div class="card-row"><span class="label">이벤트 수</span><span class="value">${eventCount.toLocaleString()}</span></div>
        <div class="card-row"><span class="label">주요 앱</span><span class="value">${escHtml(topApp)}</span></div>
        <div class="card-row"><span class="label">업무 분류</span><span class="value">${escHtml(category)}</span></div>
        <div class="card-row"><span class="label">피크 시간</span><span class="value">${escHtml(peakHour)}</span></div>
        <div class="card-row"><span class="label">활동 시간</span><span class="value">${escHtml(String(workHours))}</span></div>
        <div style="margin-top:10px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);">
            <span>자동화 점수</span>
            <span style="color:${scoreColor};font-weight:600;">${scorePercent}점</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${scorePercent}%;background:${scoreColor};"></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── 멤버 필터 ────────────────────────────────────────────────────
function filterMembers() {
  const q = document.getElementById('member-search').value.toLowerCase();
  document.querySelectorAll('.member-card').forEach(card => {

// ── 패턴 추출 ────────────────────────────────────────────────────
function extractPatterns() {
  const container = document.getElementById('patterns-content');

  // 분석 데이터에서 패턴 수집
  const patterns = [];
  const appCounts = {};
  const activityCounts = {};

  // Vision 노드 기반 패턴 검출
  G.graphNodes.forEach(n => {
    const meta = n.meta || n.metadata || {};
    const app = meta.app || meta.application || n.app || '';
    const activity = meta.activity || meta.action || '';
    if (app) appCounts[app] = (appCounts[app] || 0) + 1;
    if (activity) activityCounts[activity] = (activityCounts[activity] || 0) + 1;
  });

  // 멤버 분석 데이터에서 패턴 수집
  Object.values(G.analyses).forEach(a => {
    if (a.patterns && Array.isArray(a.patterns)) {
      a.patterns.forEach(p => patterns.push(p));
    }
    if (a.repetitivePatterns && Array.isArray(a.repetitivePatterns)) {
      a.repetitivePatterns.forEach(p => patterns.push(p));
    }
    if (a.automationCandidates && Array.isArray(a.automationCandidates)) {
      a.automationCandidates.forEach(p => patterns.push({ ...p, automatable: true }));
    }
  });

  // 반복 앱 패턴 (3회 이상)
  Object.entries(appCounts)
    .filter(([, c]) => c >= 3)
    .sort((a, b) => b[1] - a[1])
    .forEach(([app, count]) => {
      if (!patterns.find(p => p.name === app || p.app === app)) {
        patterns.push({ name: app + ' 반복 사용', count, automatable: false, type: 'app' });
      }
    });

  // 반복 활동 패턴 (2회 이상)
  Object.entries(activityCounts)
    .filter(([, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20)
    .forEach(([activity, count]) => {
      if (!patterns.find(p => p.name === activity)) {
        patterns.push({ name: activity, count, automatable: false, type: 'activity' });
      }
    });

  if (patterns.length === 0) {
    container.innerHTML = '<div class="empty-state">아직 감지된 반복 패턴이 없습니다. 더 많은 데이터가 수집되면 자동으로 패턴이 나타납니다.</div>';
    return;
  }

  // 자동화 가능 항목 먼저 정렬
  patterns.sort((a, b) => {
    if (a.automatable && !b.automatable) return -1;
    if (!a.automatable && b.automatable) return 1;
    return (b.count || 0) - (a.count || 0);
  });

  container.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:12px;">
      ${patterns.slice(0, 30).map(p => {
        const name = p.name || p.description || p.pattern || '알 수 없는 패턴';
        const count = p.count || p.frequency || 0;
        const hint = p.automationHint || p.suggestion || p.hint || '';
        return `
          <div class="pattern-item">
            <div class="pattern-item-header">
              ${p.automatable
                ? '<span class="badge badge-green">자동화 가능</span>'
                : '<span class="badge badge-muted">수동</span>'}
              <span class="pattern-count">${count}회</span>
              <span class="pattern-name">${escHtml(name)}</span>
            </div>
            ${hint ? '<div class="pattern-hint">' + escHtml(hint) + '</div>' : ''}
          </div>`;
      }).join('')}
    </div>`;
}

// ── 시간 집계 & 차트 ─────────────────────────────────────────────
function aggregateHourlyData() {
  const hourly = new Array(24).fill(0);

  // 분석 데이터에서 시간 분포 수집
  Object.values(G.analyses).forEach(a => {
    if (a.hourlyDistribution && Array.isArray(a.hourlyDistribution)) {
      a.hourlyDistribution.forEach((count, i) => {
        if (i < 24) hourly[i] += (count || 0);
      });
    }
    if (a.hourly && typeof a.hourly === 'object') {
      Object.entries(a.hourly).forEach(([h, count]) => {
        const hi = parseInt(h);
        if (hi >= 0 && hi < 24) hourly[hi] += (count || 0);
      });
    }
  });

  // 그래프 노드의 timestamp에서 시간대 집계
  G.graphNodes.forEach(n => {
    const ts = n.timestamp || n.ts;
    if (ts) {
      const d = new Date(ts);
      if (!isNaN(d.getTime())) {
        hourly[d.getHours()]++;
      }
    }
  });

  G.hourlyData = hourly;
}

function renderHourChart() {
  aggregateHourlyData();
  const container = document.getElementById('hour-chart');
  const hourly = G.hourlyData;
  const max = Math.max(...hourly, 1);

  container.innerHTML = hourly.map((count, i) => {
    const pct = Math.round((count / max) * 100);
    const h = Math.max(2, pct);
    // 업무 시간대(9-18) 강조
    const color = (i >= 9 && i < 18)
      ? 'var(--blue)'
      : (i >= 18 && i < 22) ? 'var(--orange)' : 'var(--surface2)';
    const activeColor = count > 0 ? color : 'var(--surface2)';

    return `
      <div class="hour-chart-bar-wrap">
        <div class="bar-area">
          <div class="hour-chart-bar" style="height:${h}%;background:${activeColor};">
            <div class="hour-chart-tooltip">${i}시: ${count}건</div>
          </div>
        </div>
        <span class="hour-label">${i}</span>
      </div>`;
  }).join('');
}

// ── 유틸리티 ─────────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  const div = document.createElement('div');
  div.textContent = String(s);
  return div.innerHTML;
}
function escAttr(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function formatTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return String(ts).substring(0, 19);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

    const members = data.members || [];

      // 앱 전환 시퀀스

      // 캡처 트리거 분석

        return `<span style="padding:3px 8px;background:var(--surface2);border-radius:4px;font-size:11px">${label}: <b>${n}</b></span>`;
      }).join(' ');

      // 마우스 지역 분석
      const regionHtml = Object.entries(m.mouseRegions || {}).length > 0
        ? Object.entries(m.mouseRegions).map(([r, n]) => `<span style="font-size:10px;color:var(--orange)">${r}: ${n}클릭</span>`).join(' · ')
        : '';

      // 타임라인 (최근 20건)

        const icon = e.type === 'keyboard' ? '⌨️' : '📸';
        const t = fmtDate(e.ts).split(' ')[1] || '';
        const info = e.type === 'keyboard'
          ? `${e.app} — ${e.summary || ''} ${e.mouseClicks ? '(🖱'+e.mouseClicks+')' : ''}`
          : `${e.app} [${e.trigger}] ${e.activityLevel}`;
        return `<div style="display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--surface2);font-size:11px">
          <span>${icon}</span><span style="color:var(--muted);min-width:40px">${t}</span><span>${info.substring(0, 60)}</span>
        </div>`;
      }).join('');

      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

          </div>
          <div style="font-size:11px;color:var(--muted)">${data.analyzedAt ? fmtDate(data.analyzedAt) : ''}</div>

        <div style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px">앱별 사용 분석</div>

          <div style="font-size:13px;font-weight:600;color:var(--orange);margin-bottom:8px">앱 전환 흐름 (최근)</div>

      <div style="padding:8px;text-align:center;color:var(--muted);font-size:11px">${logs.length}건 표시</div>`;
  } catch (e) {
    container.innerHTML = `<div style="color:var(--red);padding:20px;text-align:center">에러: ${e.message}</div>`;
  }
}

// 멤버 필터 드롭다운 채우기
async function populateLogFilters() {
  try {
    const ws = await apiFetch('/api/workspace/my');
    if (!ws?.length) return;
    const members = await apiFetch('/api/workspace/' + ws[0].id + '/members');
    const sel = document.getElementById('log-user-filter');
    (members || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.userId;
      opt.textContent = m.name || m.email?.split('@')[0];
      sel.appendChild(opt);
    });
  } catch {}
}

// ── 시작 ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadAll();
  populateLogFilters();
  loadLogs();
});
</script>
