<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI - 자동화 워크플로우</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d2c0;--topbar-h:48px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden;height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ── Top Bar ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;}
.topbar-brand span{color:var(--accent);}
.topbar-links{display:flex;gap:10px;}
.topbar-links a{color:var(--muted);font-size:11px;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid transparent;transition:all .15s;}
.topbar-links a:hover{color:var(--accent);border-color:var(--border);}

/* ── Workflow Tabs ── */
.tab-bar{position:fixed;top:var(--topbar-h);left:0;right:0;height:50px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:6px;z-index:90;overflow-x:auto;}
.tab-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--text);border-color:var(--muted);}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tab-btn .tab-icon{font-size:15px;}
.tab-savings{font-size:9px;opacity:.7;margin-left:2px;}

/* ── Main Layout ── */
.main-area{position:fixed;top:calc(var(--topbar-h) + 50px);left:0;right:0;bottom:40px;display:flex;}

/* ── Canvas ── */
.canvas-wrap{flex:1;overflow:auto;position:relative;background:var(--bg);}
.canvas{position:relative;min-height:100%;width:100%;padding:40px;}
.canvas-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(48,54,61,.3) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;}

/* ── SVG Connections ── */
.svg-connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}

/* ── Node ── */
.wf-node{position:absolute;width:220px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;z-index:2;user-select:none;}
.wf-node:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(88,166,255,.12);}
.wf-node.selected{border-color:var(--accent);box-shadow:0 0 24px rgba(88,166,255,.2);}
.wf-node-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;border-radius:10px 10px 0 0;}
.wf-node-icon{font-size:18px;flex-shrink:0;}
.wf-node-title{font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wf-node-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.wf-node-status.live{background:var(--green);box-shadow:0 0 6px var(--green);}
.wf-node-status.dev{background:var(--yellow);box-shadow:0 0 6px var(--yellow);}
.wf-node-status.plan{background:var(--muted);}
.wf-node-body{padding:10px 14px;font-size:10px;color:var(--muted);line-height:1.5;}
.wf-node-outputs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.wf-node-out-tag{background:rgba(88,166,255,.08);color:var(--accent);padding:1px 6px;border-radius:8px;font-size:9px;}
.wf-node-left-border{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}

/* Type colors */
.type-trigger .wf-node-left-border{background:var(--accent);}
.type-parser .wf-node-left-border{background:var(--purple);}
.type-database .wf-node-left-border{background:var(--green);}
.type-action .wf-node-left-border{background:var(--orange);}
.type-verify .wf-node-left-border{background:var(--cyan);}
.type-alert .wf-node-left-border{background:var(--red);}

.type-trigger .wf-node-header{background:rgba(88,166,255,.05);}
.type-parser .wf-node-header{background:rgba(188,140,255,.05);}
.type-database .wf-node-header{background:rgba(63,185,80,.05);}
.type-action .wf-node-header{background:rgba(255,166,87,.05);}
.type-verify .wf-node-header{background:rgba(57,210,192,.05);}
.type-alert .wf-node-header{background:rgba(248,81,73,.05);}

/* ── Right Panel ── */
.right-panel{width:380px;background:var(--card);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;transition:width .2s;}
.right-panel.collapsed{width:0;overflow:hidden;border-left:none;}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
.panel-close:hover{color:var(--text);}
.panel-body{padding:16px 20px;flex:1;overflow-y:auto;}
.panel-section{margin-bottom:18px;}
.panel-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.panel-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:11px;}
.panel-row-label{color:var(--muted);}
.panel-row-value{font-weight:600;}

/* ── Status tags ── */
.status-tag{padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;}
.status-tag.live{background:rgba(63,185,80,.15);color:var(--green);}
.status-tag.dev{background:rgba(210,153,34,.15);color:var(--yellow);}
.status-tag.plan{background:rgba(139,148,158,.15);color:var(--muted);}

/* ── Variable list ── */
.var-list{list-style:none;}
.var-item{padding:4px 0;font-size:11px;display:flex;gap:8px;align-items:flex-start;}
.var-name{color:var(--purple);font-family:'SF Mono',Consolas,monospace;font-size:11px;white-space:nowrap;}
.var-type{color:var(--muted);font-size:10px;font-family:'SF Mono',Consolas,monospace;}

/* ── Test Area ── */
.test-area{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px;}
.test-input-label{font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.test-textarea{width:100%;min-height:80px;background:rgba(13,17,23,.8);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:10px;resize:vertical;outline:none;line-height:1.5;}
.test-textarea:focus{border-color:var(--accent);}
.test-btn{width:100%;padding:8px;margin-top:10px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.test-btn:hover{background:#4493e6;}
.test-btn:disabled{opacity:.5;cursor:not-allowed;}
.test-result{margin-top:10px;padding:10px;background:rgba(13,17,23,.8);border:1px solid var(--border);border-radius:6px;font-family:'SF Mono',Consolas,monospace;font-size:11px;white-space:pre-wrap;line-height:1.6;max-height:240px;overflow-y:auto;display:none;}
.test-result.visible{display:block;}
.test-result.success{border-color:var(--green);}
.test-result.error{border-color:var(--red);}

/* ── Bottom Bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:40px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:11px;z-index:90;}
.bottom-stats{display:flex;gap:20px;align-items:center;}
.bottom-stat{display:flex;align-items:center;gap:5px;}
.bottom-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.bottom-right{display:flex;gap:16px;align-items:center;color:var(--muted);}

/* ── Legend ── */
.legend{display:flex;gap:14px;align-items:center;margin-left:auto;margin-right:20px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.legend-color{width:12px;height:3px;border-radius:2px;}

/* ── Tooltip ── */
.node-tooltip{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;z-index:200;pointer-events:none;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;}
.node-tooltip.visible{display:block;}
.node-tooltip-title{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.node-tooltip-desc{color:var(--muted);line-height:1.4;}

/* ── Screen Mockups ── */
.screen-mock {
  background: #1a1f27;
  border: 1px solid #30363d;
  border-radius: 8px;
  margin-top: 10px;
  overflow: hidden;
  font-size: 11px;
}
.screen-mock-title {
  background: #21262d;
  padding: 4px 10px;
  font-size: 10px;
  color: #8b949e;
  display: flex;
  align-items: center;
  gap: 6px;
}
.screen-mock-title .dots {
  display: flex;
  gap: 4px;
}
.screen-mock-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.screen-mock-body {
  padding: 10px;
  font-family: 'SF Mono', Consolas, monospace;
  line-height: 1.6;
  max-height: 200px;
  overflow-y: auto;
}
.mock-row {
  display: flex;
  gap: 8px;
  padding: 2px 0;
  border-bottom: 1px solid rgba(48,54,61,0.3);
}
.mock-label { color: #8b949e; min-width: 60px; }
.mock-value { color: #e6edf3; }
.mock-highlight { color: #3fb950; font-weight: 600; }
.mock-warn { color: #ffa657; }

@media(max-width:900px){
  .right-panel{position:fixed;right:0;top:calc(var(--topbar-h)+50px);bottom:40px;z-index:95;width:100%!important;}
  .right-panel.collapsed{width:0!important;}
  .legend{display:none;}
}
</style>
</head>
<body>

    <div class="topbar-brand">

  <div class="topbar-links">

      <div class="legend-item"><span class="legend-color" style="background:var(--orange);"></span>액션</div>
      <div class="legend-item"><span class="legend-color" style="background:var(--cyan);"></span>검증</div>
      <div class="legend-item"><span class="legend-color" style="background:var(--red);"></span>알림</div>
    </div>
    <span id="lastTestTime">마지막 테스트: -</span>
  </div>
</div>

<!-- ═══ TOOLTIP ═══ -->
<div class="node-tooltip" id="nodeTooltip">
  <div class="node-tooltip-title" id="tooltipTitle"></div>
  <div class="node-tooltip-desc" id="tooltipDesc"></div>
</div>

/* ════════════════════════════════════════════════════════════
   RENDERING ENGINE
   ════════════════════════════════════════════════════════════ */

let currentWorkflow = 'order';
let selectedNodeId = null;
let nodeElements = {};

// ── Build Tabs ──
function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  Object.keys(WORKFLOWS).forEach(key => {
    const wf = WORKFLOWS[key];
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === currentWorkflow ? ' active' : '');
    btn.innerHTML = `<span class="tab-icon">${wf.icon}</span>${wf.name}<span class="tab-savings">${wf.savings}</span>`;
    btn.onclick = () => switchWorkflow(key);
    bar.appendChild(btn);
  });
}

function switchWorkflow(key) {
  currentWorkflow = key;
  selectedNodeId = null;
  closePanel();
  buildTabs();
  renderWorkflow();
  updateStats();
}

// ── Layout Calculation ──
function calculateLayout(wf) {
  // Build adjacency and in-degree
  const adj = {};
  const inDeg = {};
  wf.nodes.forEach(n => { adj[n.id] = []; inDeg[n.id] = 0; });
  wf.edges.forEach(([from, to]) => {
    adj[from].push(to);
    inDeg[to] = (inDeg[to] || 0) + 1;
  });

  // Topological sort with levels (BFS)
  const levels = {};
  const queue = [];
  wf.nodes.forEach(n => { if (inDeg[n.id] === 0) { queue.push(n.id); levels[n.id] = 0; } });

  while (queue.length) {
    const cur = queue.shift();
    (adj[cur] || []).forEach(next => {
      levels[next] = Math.max(levels[next] || 0, levels[cur] + 1);
      inDeg[next]--;
      if (inDeg[next] === 0) queue.push(next);
    });
  }

  // Group by level
  const levelGroups = {};
  let maxLevel = 0;
  wf.nodes.forEach(n => {
    const lv = levels[n.id] || 0;
    if (!levelGroups[lv]) levelGroups[lv] = [];
    levelGroups[lv].push(n);
    if (lv > maxLevel) maxLevel = lv;
  });

  // Position nodes
  const nodeW = 220;
  const nodeH = 100;
  const gapX = 80;
  const gapY = 50;
  const positions = {};

  for (let lv = 0; lv <= maxLevel; lv++) {
    const group = levelGroups[lv] || [];
    const totalWidth = group.length * nodeW + (group.length - 1) * gapX;
    const startX = Math.max(60, (Math.max(3, Object.keys(levelGroups).reduce((m, k) => Math.max(m, levelGroups[k].length), 0)) * (nodeW + gapX)) / 2 - totalWidth / 2 + 60);
    group.forEach((n, i) => {
      positions[n.id] = {
        x: startX + i * (nodeW + gapX),
        y: 40 + lv * (nodeH + gapY)
      };
    });
  }

  return { positions, maxLevel };
}

// ── Render Workflow ──
function renderWorkflow() {
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('svgConnections');
  const wf = WORKFLOWS[currentWorkflow];

  // Clear existing nodes
  Object.values(nodeElements).forEach(el => el.remove());
  nodeElements = {};
  svg.innerHTML = '';

  const { positions, maxLevel } = calculateLayout(wf);

  // Set canvas height
  const canvasH = (maxLevel + 1) * 150 + 120;
  canvas.style.minHeight = canvasH + 'px';

  // Draw edges (SVG bezier curves)
  wf.edges.forEach(([fromId, toId]) => {
    const from = positions[fromId];
    const to = positions[toId];
    if (!from || !to) return;

    const x1 = from.x + 110; // center of node
    const y1 = from.y + 100; // bottom of node
    const x2 = to.x + 110;
    const y2 = to.y;          // top of node

    const midY = (y1 + y2) / 2;

    // Bezier path
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', 'rgba(88,166,255,0.3)');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-dasharray', '6,4');
    svg.appendChild(path);

    // Arrowhead
    const arrowSize = 6;
    const angle = Math.atan2(y2 - midY, x2 - x2) || Math.PI / 2;
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    const ax = x2;
    const ay = y2;
    arrow.setAttribute('points',
      `${ax},${ay} ${ax - arrowSize},${ay - arrowSize * 1.5} ${ax + arrowSize},${ay - arrowSize * 1.5}`);
    arrow.setAttribute('fill', 'rgba(88,166,255,0.5)');
    svg.appendChild(arrow);

    // Animated dot
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', '3');
    circle.setAttribute('fill', '#58a6ff');
    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
    anim.setAttribute('dur', '3s');
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('path', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
    circle.appendChild(anim);
    svg.appendChild(circle);
  });

  // Draw nodes
  wf.nodes.forEach(node => {
    const pos = positions[node.id];
    if (!pos) return;

    const el = document.createElement('div');
    el.className = `wf-node type-${node.type}` + (selectedNodeId === node.id ? ' selected' : '');
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    el.dataset.nodeId = node.id;

    const typeColor = TYPE_COLORS[node.type] || '#58a6ff';
    const typeIcon = TYPE_ICONS[node.type] || '&#x2B24;';

    el.innerHTML = `
      <div class="wf-node-left-border"></div>
      <div class="wf-node-header">
        <span class="wf-node-icon">${typeIcon}</span>
        <span class="wf-node-title">${node.label}</span>
        <span class="wf-node-status ${node.status}"></span>
      </div>
      <div class="wf-node-body">
        <div style="margin-bottom:4px;">${node.desc.substring(0, 50)}${node.desc.length > 50 ? '...' : ''}</div>
        <div class="wf-node-outputs">
          ${node.outputs.slice(0, 3).map(o => `<span class="wf-node-out-tag">${typeof o === 'string' ? o : o.name}</span>`).join('')}
          ${node.outputs.length > 3 ? `<span class="wf-node-out-tag">+${node.outputs.length - 3}</span>` : ''}
        </div>
      </div>
    `;

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(node.id);
    });

    el.addEventListener('mouseenter', (e) => showTooltip(e, node));
    el.addEventListener('mouseleave', hideTooltip);

    canvas.appendChild(el);
    nodeElements[node.id] = el;
  });
}

// ── Tooltip ──
function showTooltip(e, node) {
  if (selectedNodeId === node.id) return;
  const tt = document.getElementById('nodeTooltip');
  const typeIcon = TYPE_ICONS[node.type] || '';
  document.getElementById('tooltipTitle').innerHTML = `${typeIcon} ${node.label}`;
  document.getElementById('tooltipDesc').textContent = node.desc;
  tt.classList.add('visible');
  const rect = e.target.closest('.wf-node').getBoundingClientRect();
  tt.style.left = (rect.right + 10) + 'px';
  tt.style.top = rect.top + 'px';

  // Prevent overflow
  const ttRect = tt.getBoundingClientRect();
  if (ttRect.right > window.innerWidth - 20) {
    tt.style.left = (rect.left - ttRect.width - 10) + 'px';
  }
  if (ttRect.bottom > window.innerHeight - 60) {
    tt.style.top = (window.innerHeight - ttRect.height - 60) + 'px';
  }
}

function hideTooltip() {
  document.getElementById('nodeTooltip').classList.remove('visible');
}

// ── Select Node ──
function selectNode(nodeId) {
  const wf = WORKFLOWS[currentWorkflow];
  const node = wf.nodes.find(n => n.id === nodeId);
  if (!node) return;

  selectedNodeId = nodeId;
  hideTooltip();

  // Update visual selection
  Object.values(nodeElements).forEach(el => el.classList.remove('selected'));
  if (nodeElements[nodeId]) nodeElements[nodeId].classList.add('selected');

  // Open panel
  openPanel(node);
}

      <div class="panel-section-title">&#x2B05;&#xFE0F; 출력 변수</div>

        ${node.outputs.map(out => {

    html += `<div class="panel-section">
      <div class="panel-section-title">&#x1F9EA; 테스트</div>

        </div>`;

    if (node.test.method === 'POST' && node.test.defaultBody) {
      html += `<div class="test-input-label">테스트 입력:</div>
        <textarea class="test-textarea" id="${testId}_input">${node.test.defaultBody}</textarea>`;
    }

    html += `<button class="test-btn" id="${testId}_btn" onclick="runTest('${currentWorkflow}','${node.id}')">&#x25B6; 테스트 실행</button>
        <div class="test-result" id="${testId}_result"></div>
      </div>
    </div>`;
  } else {
    html += `<div class="panel-section">
      <div class="panel-section-title">&#x1F9EA; 테스트</div>
      <div style="font-size:11px;color:var(--muted);padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);text-align:center;">
        ${node.status === 'plan' ? '개발 예정 &mdash; 테스트 미지원' : '로컬 테스트 전용 (localhost:5050)'}
      </div>
    </div>`;
  }

  // Connection info
  const wf = WORKFLOWS[currentWorkflow];
  const incomingEdges = wf.edges.filter(([_, to]) => to === node.id);
  const outgoingEdges = wf.edges.filter(([from, _]) => from === node.id);

  html += `<div class="panel-section">
    <div class="panel-section-title">&#x1F517; 연결</div>`;

  if (incomingEdges.length > 0) {
    html += `<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">입력 연결:</div>`;
    incomingEdges.forEach(([from]) => {
      const fromNode = wf.nodes.find(n => n.id === from);
      if (fromNode) {
        html += `<div style="font-size:11px;padding:3px 0;cursor:pointer;color:var(--accent);" onclick="selectNode('${from}')">&larr; ${fromNode.label}</div>`;
      }
    });
  }

  if (outgoingEdges.length > 0) {
    html += `<div style="font-size:10px;color:var(--muted);margin:6px 0 4px;">출력 연결:</div>`;
    outgoingEdges.forEach(([_, to]) => {
      const toNode = wf.nodes.find(n => n.id === to);
      if (toNode) {
        html += `<div style="font-size:11px;padding:3px 0;cursor:pointer;color:var(--accent);" onclick="selectNode('${to}')">&rarr; ${toNode.label}</div>`;
      }
    });
  }

  html += `</div>`;

  body.innerHTML = html;

  // Re-render to update SVG (canvas might have changed size)
  setTimeout(() => {
    const canvasWrap = document.getElementById('canvasWrap');
    // Scroll to show selected node
    const nodeEl = nodeElements[node.id];
    if (nodeEl) {
      const nodeRect = nodeEl.getBoundingClientRect();
      const wrapRect = canvasWrap.getBoundingClientRect();
      if (nodeRect.top < wrapRect.top || nodeRect.bottom > wrapRect.bottom) {
        nodeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }, 50);
}

function closePanel() {
  document.getElementById('rightPanel').classList.add('collapsed');
  selectedNodeId = null;
  Object.values(nodeElements).forEach(el => el.classList.remove('selected'));
}

document.getElementById('panelClose').addEventListener('click', closePanel);

// Click on canvas background to deselect
document.getElementById('canvasWrap').addEventListener('click', (e) => {
  if (e.target.closest('.wf-node')) return;
  closePanel();
});

// ── Test Execution ──
async function runTest(workflowKey, nodeId) {
  const wf = WORKFLOWS[workflowKey];
  const node = wf.nodes.find(n => n.id === nodeId);
  if (!node || !node.test) return;

  const testId = `test_${nodeId}`;
  const btn = document.getElementById(`${testId}_btn`);
  const resultEl = document.getElementById(`${testId}_result`);

  btn.disabled = true;
  btn.textContent = '실행 중...';
  resultEl.className = 'test-result visible';
  resultEl.textContent = '요청 전송 중...';
  resultEl.style.color = 'var(--muted)';

  try {
    const opts = { method: node.test.method, headers: {} };

    if (node.test.method === 'POST') {
      opts.headers['Content-Type'] = 'application/json';
      const inputEl = document.getElementById(`${testId}_input`);
      if (inputEl) {
        opts.body = inputEl.value;
      } else if (node.test.body) {
        opts.body = JSON.stringify(node.test.body);
      } else if (node.test.defaultBody) {
        opts.body = node.test.defaultBody;
      }
    }

    const startTime = Date.now();
    const res = await fetch(node.test.api, opts);
    const elapsed = Date.now() - startTime;

    let data;
    const contentType = res.headers.get('content-type') || '';
    if (contentType.includes('json')) {
      data = await res.json();
    } else {
      data = { raw: await res.text() };
    }

    if (res.ok) {
      let formatted = '';
      try {
        formatted = node.test.formatResult(data);
      } catch (e) {
        formatted = JSON.stringify(data, null, 2);
      }
      resultEl.textContent = `${formatted}\n\n--- ${elapsed}ms ---`;
      resultEl.className = 'test-result visible success';
      resultEl.style.color = 'var(--green)';
    } else {
      resultEl.textContent = `HTTP ${res.status}\n${data.error || data.message || JSON.stringify(data, null, 2)}\n\n--- ${elapsed}ms ---`;
      resultEl.className = 'test-result visible error';
      resultEl.style.color = 'var(--red)';
    }

    // Update last test time
    const now = new Date();
    document.getElementById('lastTestTime').textContent =
      `마지막 테스트: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

  } catch (err) {
    resultEl.textContent = `연결 실패: ${err.message}\n\n서버가 실행 중인지 확인하세요.`;
    resultEl.className = 'test-result visible error';
    resultEl.style.color = 'var(--red)';
  }

  btn.disabled = false;
  btn.innerHTML = '&#x25B6; 테스트 실행';
}

// ── Stats ──
function updateStats() {
  const wf = WORKFLOWS[currentWorkflow];
  let total = 0, live = 0, dev = 0, plan = 0;

  // Count across ALL workflows
  Object.values(WORKFLOWS).forEach(w => {
    w.nodes.forEach(n => {
      total++;
      if (n.status === 'live') live++;
      else if (n.status === 'dev') dev++;
      else plan++;
    });
  });

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statLive').textContent = live;
  document.getElementById('statDev').textContent = dev;
  document.getElementById('statPlan').textContent = plan;
  document.getElementById('statSavings').textContent = wf.savings;
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePanel();
  }
  // Tab switching with number keys
  const keys = ['1','2','3','4','5','6'];
  const wfKeys = Object.keys(WORKFLOWS);
  const idx = keys.indexOf(e.key);
  if (idx >= 0 && idx < wfKeys.length && !e.target.closest('textarea, input')) {
    switchWorkflow(wfKeys[idx]);
  }
});

// ── Window resize ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderWorkflow(), 150);
});

// ── Initialize ──
buildTabs();
renderWorkflow();
updateStats();

</script>
</body>
</html>
