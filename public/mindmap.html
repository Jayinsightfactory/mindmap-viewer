<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI - Architecture Mindmap</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117;
  color:#e6edf3;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  overflow:hidden;
  height:100vh;
  cursor:grab;
  user-select:none;
}
body.grabbing { cursor:grabbing; }

/* Header */
.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(13,17,23,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #30363d;
  padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.header h1 {
  font-size:15px; font-weight:600; color:#e6edf3;
  display:flex; align-items:center; gap:8px;
}
.header h1 .logo { color:#58a6ff; font-size:18px; }
.header-controls { display:flex; gap:8px; align-items:center; }
.header-controls button {
  background:#21262d; border:1px solid #30363d; color:#8b949e;
  padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer;
  transition:all .15s;
}
.header-controls button:hover { background:#30363d; color:#e6edf3; }
.header-controls .zoom-label { color:#484f58; font-size:11px; min-width:40px; text-align:center; }

/* Legend */
.legend {
  position:fixed; bottom:16px; left:16px; z-index:100;
  background:rgba(22,27,34,0.95); border:1px solid #30363d; border-radius:10px;
  padding:12px 16px; font-size:11px;
}
.legend-title { font-weight:600; margin-bottom:8px; color:#8b949e; font-size:10px; text-transform:uppercase; letter-spacing:1px; }
.legend-item { display:flex; align-items:center; gap:8px; margin-bottom:4px; color:#8b949e; }
.legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

/* Canvas container */
#canvas-container {
  width:100vw; height:100vh;
  overflow:hidden;
  position:relative;
}
#world {
  position:absolute;
  transform-origin:0 0;
  will-change:transform;
}

/* SVG connections */
#connections {
  position:absolute;
  top:0; left:0;
  pointer-events:none;
  overflow:visible;
}
#connections path {
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
}
#connections .conn-line {
  opacity:0.5;
  transition:opacity .2s;
}
#connections .conn-line.highlight {
  opacity:1;
  stroke-width:2.5;
}

/* Animated dash */
@keyframes dashFlow {
  to { stroke-dashoffset: -20; }
}
#connections .conn-line {
  stroke-dasharray:6,4;
  animation:dashFlow 1.2s linear infinite;
}

/* Arrow markers */
.arrow-marker { fill:#8b949e; }

/* Node card */
.node {
  position:absolute;
  width:180px;
  background:#161b22;
  border:1.5px solid #30363d;
  border-radius:10px;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s, border-color .2s;
  overflow:visible;
}
.node:hover {
  transform:scale(1.06);
  z-index:50;
  border-color:#58a6ff;
  box-shadow:0 0 20px rgba(88,166,255,0.15), 0 8px 30px rgba(0,0,0,0.4);
}
.node.expanded {
  z-index:60;
  border-color:#58a6ff;
  box-shadow:0 0 20px rgba(88,166,255,0.2), 0 8px 30px rgba(0,0,0,0.5);
}

.node-header {
  display:flex; align-items:center; gap:8px;
  padding:10px 12px;
  border-bottom:1px solid transparent;
}
.node.expanded .node-header {
  border-bottom-color:#21262d;
}
.node-icon {
  width:28px; height:28px;
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
  flex-shrink:0;
}
.node-info { flex:1; min-width:0; }
.node-title {
  font-size:12px; font-weight:600; color:#e6edf3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.node-sub {
  font-size:10px; color:#8b949e; margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* Expanded file list */
.node-files {
  display:none;
  padding:6px 10px 10px;
  max-height:180px;
  overflow-y:auto;
}
.node.expanded .node-files { display:block; }
.node-file {
  font-size:10px; color:#8b949e;
  padding:3px 6px;
  border-radius:4px;
  margin-bottom:2px;
  font-family:'SF Mono',Menlo,monospace;
  transition:background .1s;
}
.node-file:hover { background:#21262d; color:#58a6ff; }

/* Tooltip */
.node-tooltip {
  display:none;
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  margin-top:8px;
  background:#1c2128;
  border:1px solid #30363d;
  border-radius:8px;
  padding:8px 12px;
  font-size:10px;
  color:#8b949e;
  white-space:nowrap;
  z-index:200;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.node:hover .node-tooltip { display:block; }
.node.expanded .node-tooltip { display:none; }

/* Layer labels */
.layer-label {
  position:absolute;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:2px;
  color:#21262d;
  pointer-events:none;
}
.layer-bg {
  position:absolute;
  border:1px dashed #1c2128;
  border-radius:16px;
  pointer-events:none;
}

/* Scrollbar */
.node-files::-webkit-scrollbar { width:4px; }
.node-files::-webkit-scrollbar-track { background:transparent; }
.node-files::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }

/* Minimap */
.minimap {
  position:fixed; bottom:16px; right:16px; z-index:100;
  width:180px; height:120px;
  background:rgba(22,27,34,0.9);
  border:1px solid #30363d; border-radius:8px;
  overflow:hidden; cursor:pointer;
}
.minimap-viewport {
  position:absolute;
  border:1.5px solid #58a6ff;
  background:rgba(88,166,255,0.08);
  border-radius:2px;
  pointer-events:none;
}
.minimap-dot {
  position:absolute;
  width:4px; height:3px;
  border-radius:1px;
}
</style>
</head>

const nodeElements = {};

NODES.forEach(node => {
  const el = document.createElement('div');

  el.style.left = node.x + 'px';

  `;

  el.addEventListener('mouseleave', () => highlightConnections(node.id, false));

  world.appendChild(el);
  nodeElements[node.id] = el;
});

function toggleNode(id, el) {
  if (expandedNode === id) {
    el.classList.remove('expanded');
    expandedNode = null;
  } else {
    if (expandedNode) {
      const prev = document.getElementById('node-' + expandedNode);
      if (prev) prev.classList.remove('expanded');
    }
    el.classList.add('expanded');
    expandedNode = id;
  }
  // Redraw connections after expand/collapse
  requestAnimationFrame(drawConnections);
}

// ══════════════════════════════════════════════════════════════
// DRAW SVG CONNECTIONS
// ══════════════════════════════════════════════════════════════
function getNodeCenter(id) {
  const el = nodeElements[id];
  if (!el) return { x:0, y:0 };
  const rect = el.getBoundingClientRect();
  const worldRect = world.getBoundingClientRect();
  return {
    x:(rect.left + rect.width/2 - worldRect.left) / zoom,
    y:(rect.top + rect.height/2 - worldRect.top) / zoom,
  };
}

function getNodePort(fromId, toId) {
  const fEl = nodeElements[fromId];
  const tEl = nodeElements[toId];
  if (!fEl || !tEl) return { fx:0, fy:0, tx:0, ty:0 };

  const fr = fEl.getBoundingClientRect();
  const tr = tEl.getBoundingClientRect();
  const wr = world.getBoundingClientRect();

  const fCx = (fr.left + fr.width/2 - wr.left) / zoom;
  const fCy = (fr.top + fr.height/2 - wr.top) / zoom;
  const tCx = (tr.left + tr.width/2 - wr.left) / zoom;
  const tCy = (tr.top + tr.height/2 - wr.top) / zoom;

  const fw = fr.width / zoom;
  const fh = fr.height / zoom;
  const tw = tr.width / zoom;
  const th = tr.height / zoom;

  // Determine exit/enter sides
  const dx = tCx - fCx;
  const dy = tCy - fCy;

  let fx, fy, tx, ty;

  if (Math.abs(dx) > Math.abs(dy)) {
    // Horizontal dominant
    if (dx > 0) {
      fx = fCx + fw/2; fy = fCy;
      tx = tCx - tw/2; ty = tCy;
    } else {
      fx = fCx - fw/2; fy = fCy;
      tx = tCx + tw/2; ty = tCy;
    }
  } else {
    // Vertical dominant
    if (dy > 0) {
      fx = fCx; fy = fCy + fh/2;
      tx = tCx; ty = tCy - th/2;
    } else {
      fx = fCx; fy = fCy - fh/2;
      tx = tCx; ty = tCy + th/2;
    }
  }

  return { fx, fy, tx, ty };
}

function drawConnections() {
  // Clear existing paths
  const existing = svg.querySelectorAll('.conn-line');
  existing.forEach(p => p.remove());

  CONNECTIONS.forEach(conn => {
    const { fx, fy, tx, ty } = getNodePort(conn.from, conn.to);

    // Bezier curve
    const dx = tx - fx;
    const dy = ty - fy;
    let cx1, cy1, cx2, cy2;

    if (Math.abs(dx) > Math.abs(dy)) {
      cx1 = fx + dx * 0.4; cy1 = fy;
      cx2 = fx + dx * 0.6; cy2 = ty;
    } else {
      cx1 = fx; cy1 = fy + dy * 0.4;
      cx2 = tx; cy2 = fy + dy * 0.6;
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${fx},${fy} C${cx1},${cy1} ${cx2},${cy2} ${tx},${ty}`);
    path.setAttribute('stroke', conn.color);
    path.setAttribute('marker-end', `url(#${conn.marker})`);
    path.setAttribute('class', 'conn-line');
    path.setAttribute('data-from', conn.from);
    path.setAttribute('data-to', conn.to);
    svg.appendChild(path);
  });
}

function highlightConnections(nodeId, highlight) {
  svg.querySelectorAll('.conn-line').forEach(p => {
    const from = p.getAttribute('data-from');
    const to = p.getAttribute('data-to');
    if (from === nodeId || to === nodeId) {
      p.classList.toggle('highlight', highlight);
    }
  });
}

// ══════════════════════════════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════════════════════════════
function applyTransform() {
  world.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  drawConnections();
  updateMinimap();
}

// Mouse drag to pan
container.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging = true;
  dragStart = { x:e.clientX, y:e.clientY };
  panStart = { x:pan.x, y:pan.y };
  document.body.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  pan.x = panStart.x + (e.clientX - dragStart.x);
  pan.y = panStart.y + (e.clientY - dragStart.y);
  applyTransform();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  document.body.classList.remove('grabbing');
});

// Wheel zoom
container.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const newZoom = Math.min(3, Math.max(0.2, zoom + delta));

  // Zoom toward cursor
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const ratio = newZoom / zoom;
  pan.x = mx - ratio * (mx - pan.x);
  pan.y = my - ratio * (my - pan.y);
  zoom = newZoom;

  applyTransform();
}, { passive:false });

// Touch support
let touchDist = 0;
let touchMid = { x:0, y:0 };

container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    panStart = { x:pan.x, y:pan.y };
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    touchDist = Math.sqrt(dx*dx + dy*dy);
    touchMid = { x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2 };
  }
}, { passive:false });

container.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    pan.x = panStart.x + (e.touches[0].clientX - dragStart.x);
    pan.y = panStart.y + (e.touches[0].clientY - dragStart.y);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const newDist = Math.sqrt(dx*dx + dy*dy);
    const scale = newDist / touchDist;
    const newZoom = Math.min(3, Math.max(0.2, zoom * scale));

    const rect = container.getBoundingClientRect();
    const mx = touchMid.x - rect.left;
    const my = touchMid.y - rect.top;
    const ratio = newZoom / zoom;
    pan.x = mx - ratio * (mx - pan.x);
    pan.y = my - ratio * (my - pan.y);
    zoom = newZoom;
    touchDist = newDist;
    applyTransform();
  }
}, { passive:false });

container.addEventListener('touchend', () => { dragging = false; });

// Buttons

  zoom = Math.min(3, zoom + 0.15);
  applyTransform();

document.getElementById('btn-fit').addEventListener('click', fitView);

    expandedNode = null;

});

// Click blank to close expanded
container.addEventListener('click', e => {
  if (!e.target.closest('.node') && expandedNode) {
    const prev = document.getElementById('node-' + expandedNode);

    expandedNode = null;
    drawConnections();

function fitView() {
  const cw = container.clientWidth;
  const ch = container.clientHeight;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  NODES.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.x + 180 > maxX) maxX = n.x + 180;
    if (n.y + 80 > maxY) maxY = n.y + 80;
  });

  const ww = maxX - minX + 100;
  const wh = maxY - minY + 100;
  zoom = Math.min(cw / ww, (ch - 50) / wh, 1.5);
  zoom = Math.max(0.3, zoom);
  pan.x = (cw - ww * zoom) / 2 - minX * zoom + 50 * zoom;
  pan.y = (ch - wh * zoom) / 2 - minY * zoom + 50 * zoom + 25;
  applyTransform();
}

// ══════════════════════════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════════════════════════
const minimap = document.getElementById('minimap');
const minimapVP = document.getElementById('minimap-vp');

function updateMinimap() {
  const mmW = 180, mmH = 120;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  NODES.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.x+180 > maxX) maxX = n.x+180;
    if (n.y+80 > maxY) maxY = n.y+80;
  });
  const pad = 40;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX;
  const wh = maxY - minY;
  const scale = Math.min(mmW/ww, mmH/wh);

  // Clear old dots
  minimap.querySelectorAll('.minimap-dot').forEach(d => d.remove());

  NODES.forEach(n => {
    const dot = document.createElement('div');
    dot.className = 'minimap-dot';
    dot.style.left = ((n.x - minX) * scale) + 'px';
    dot.style.top = ((n.y - minY) * scale) + 'px';
    dot.style.width = (180 * scale) + 'px';
    dot.style.height = (80 * scale) + 'px';
    dot.style.background = n.color;
    dot.style.borderRadius = (3*scale) + 'px';
    minimap.appendChild(dot);
  });

  // Viewport rect
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const vpX = (-pan.x / zoom - minX) * scale;
  const vpY = (-pan.y / zoom - minY) * scale;
  const vpW = (cw / zoom) * scale;
  const vpH = (ch / zoom) * scale;
  minimapVP.style.left = vpX + 'px';
  minimapVP.style.top = vpY + 'px';
  minimapVP.style.width = vpW + 'px';
  minimapVP.style.height = vpH + 'px';
}

// Click minimap to navigate
minimap.addEventListener('click', e => {
  const rect = minimap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const mmW = 180, mmH = 120;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  NODES.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.x+180 > maxX) maxX = n.x+180;
    if (n.y+80 > maxY) maxY = n.y+80;
  });
  const pad = 40;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX;
  const wh = maxY - minY;
  const scale = Math.min(mmW/ww, mmH/wh);

  const worldX = mx / scale + minX;
  const worldY = my / scale + minY;
  const cw = container.clientWidth;
  const ch = container.clientHeight;

  pan.x = cw/2 - worldX * zoom;
  pan.y = ch/2 - worldY * zoom;
  applyTransform();
});

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => { drawConnections(); updateMinimap(); });

// Initial fit
setTimeout(() => { fitView(); }, 50);
