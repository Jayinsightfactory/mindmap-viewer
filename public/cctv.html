<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOYI — 업무 관찰 · 본인 동의</title>
<style>
  :root{--bg:#0d0e10;--panel:#16181c;--panel2:#1e2127;--border:#2a2d34;--txt:#eceef1;--txt2:#aeb2b9;--muted:#767b83;--accent:#5b9dff;--green:#3fbf7f;--amber:#e0b23c;--live:#ff5a5a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,'Segoe UI','Malgun Gothic',sans-serif;line-height:1.5}
  nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;height:54px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{font-weight:800;font-size:17px}.logo b{color:var(--accent)}
  .logo .live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--live);margin-left:8px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .tab{background:none;border:1px solid var(--border);color:var(--txt2);padding:6px 13px;border-radius:8px;font-size:13px;cursor:pointer}
  .tab.on{background:var(--accent);color:#0b0d10;font-weight:700;border-color:var(--accent)}
  nav .right{margin-left:auto;display:flex;gap:8px;align-items:center}
  select,.ghost{background:var(--panel2);border:1px solid var(--border);color:var(--txt2);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer}
  .wrap{padding:16px}
  .muted{color:var(--muted);font-size:13px}
  /* ── 월(그리드) ── */
  .wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .tile{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .tile:hover{border-color:var(--accent)}
  .tile .shot{width:100%;aspect-ratio:16/9;object-fit:cover;object-position:top;background:#000;display:block}
  .tile .noshot{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;background:#101216}
  .tile .meta{padding:9px 12px}
  .tile .who{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
  .tile .ago{font-size:11px;color:var(--muted);font-weight:400}
  .tile .act{font-size:12px;color:var(--txt2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .app{font-size:11px;color:var(--accent);margin-top:2px}
  .dotlive{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
  /* ── 리플레이 ── */
  .replay{display:grid;grid-template-columns:230px 1fr;gap:14px}
  @media(max-width:820px){.replay{grid-template-columns:1fr}}
  .sesslist{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:8px;max-height:78vh;overflow:auto}
  .sess{padding:9px 10px;border-radius:8px;cursor:pointer;border-bottom:1px solid var(--border)}
  .sess:hover{background:var(--panel2)}.sess.on{background:#17233a;border-left:3px solid var(--accent)}
  .sess b{font-size:12.5px}.sess .s2{font-size:11px;color:var(--muted);margin-top:2px}
  .stage{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
  .viewer{position:relative;background:#000;border-radius:10px;overflow:hidden;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
  .viewer img{width:100%;height:100%;object-fit:contain}
  .viewer .empty{color:var(--muted)}
  .badge{position:absolute;left:10px;top:10px;background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:7px;padding:4px 9px;font-size:12px}
  .stepinfo{margin-top:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .stepinfo .big{font-size:15px;font-weight:700}
  .chip{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--txt2)}
  .chip.act{color:var(--green)}.chip.gap{color:var(--amber)}
  .controls{display:flex;align-items:center;gap:10px;margin-top:12px}
  .controls button{background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:9px;padding:8px 14px;font-size:14px;cursor:pointer}
  .controls button.play{background:var(--accent);color:#0b0d10;font-weight:700;border-color:var(--accent)}
  .track{flex:1;height:6px;background:var(--panel2);border-radius:4px;position:relative;cursor:pointer}
  .track .fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:4px}
  /* ── 흐름 스트립 ── */
  .flow{margin-top:16px;overflow-x:auto;padding-bottom:6px}
  .flowrow{display:flex;align-items:stretch;gap:0;min-width:min-content}
  .fstep{flex:none;width:120px}
  .fstep .th{width:120px;height:68px;object-fit:cover;object-position:top;border-radius:6px;background:#000;cursor:pointer;border:2px solid transparent}
  .fstep .th.cur{border-color:var(--accent)}
  .fstep .lb{font-size:10px;color:var(--txt2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .farrow{flex:none;align-self:center;color:var(--muted);padding:0 4px;font-size:14px}
  .farrow.slow{color:var(--amber)}
  .err{background:var(--panel);border:1px solid #4a2222;color:#e88;border-radius:10px;padding:14px}
  #tokbar{display:none;align-items:center;gap:8px;padding:10px 16px;background:var(--panel2);border-bottom:1px solid var(--border)}
  #tokbar input{flex:1;max-width:480px;background:#0d0e10;border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:13px}
</style>
</head>
<body>
<nav>
  <div class="logo">M<b>O</b>YI · 업무 관찰 · 본인 동의<span class="live"></span></div>
  <button class="tab on" id="mWall">월 (실시간)</button>
  <button class="tab" id="mReplay">리플레이</button>
  <div class="right">
    <select id="hours"><option value="8">최근 8시간</option><option value="24" selected>오늘(24h)</option><option value="72">3일</option></select>
    <button class="ghost" id="refresh">↻ 새로고침</button>
    <button class="ghost" id="tok">토큰</button>
  </div>
</nav>
<div id="tokbar">
  <a class="ghost" href="/api/auth/google?next=cctv.html">회사 계정 로그인</a>
  <span class="muted">또는 관리자 토큰</span>
  <input id="tokin" placeholder="orbit_...">
  <button class="ghost" id="toksave" style="background:var(--accent);color:#0b0d10;font-weight:700">저장</button>
</div>
<div class="wrap" id="view"></div>

<script>
'use strict';
const $=s=>document.querySelector(s);
const KEY='orbit_flow_token';
const token=()=>sessionStorage.getItem(KEY)||'';
async function api(p){const sep=p.includes('?')?'&':'?';const r=await fetch(p+sep+'token='+encodeURIComponent(token()));if(!r.ok){const b=await r.json().catch(()=>({}));const e=new Error(b.message||('HTTP '+r.status));e.code=b.error;throw e;}return r.json();}
const imgUrl=u=>u?(u+(u.includes('?')?'&':'?')+'token='+encodeURIComponent(token())):'';
const ago=iso=>{if(!iso)return '-';const m=Math.round((Date.now()-new Date(iso).getTime())/60000);return m<1?'방금':m<60?m+'분 전':m<1440?Math.round(m/60)+'시간 전':Math.round(m/1440)+'일 전';};
const liveColor=iso=>{const m=(Date.now()-new Date(iso).getTime())/60000;return m<10?'var(--live)':m<60?'var(--amber)':'var(--muted)';};
const clip=(s,n)=>{s=s||'';return s.length>n?s.slice(0,n)+'…':s;};

let state={mode:'wall',people:[],hours:24,cur:{sessions:[],si:-1,idx:0,playing:false,timer:null}};

function setMode(m){state.mode=m;$('#mWall').classList.toggle('on',m==='wall');$('#mReplay').classList.toggle('on',m==='replay');render();}
$('#mWall').onclick=()=>setMode('wall');
$('#mReplay').onclick=()=>setMode('replay');
$('#hours').onchange=e=>{state.hours=+e.target.value;render();};
$('#refresh').onclick=()=>render();
$('#tok').onclick=()=>{$('#tokbar').style.display='flex';$('#tokin').value=token();$('#tokin').focus();};
$('#toksave').onclick=()=>{const v=$('#tokin').value.trim();if(v){sessionStorage.setItem(KEY,v);$('#tokbar').style.display='none';render();}};

async function ensurePeople(){if(state.people.length)return;try{state.people=(await api('/api/flow/people')).people||[];}catch(e){throw e;}}

// ── 월(실시간 그리드) ──
async function renderWall(){
  $('#view').innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    await ensurePeople();
    if(!state.people.length){$('#view').innerHTML='<div class="muted">표시할 직원이 없습니다.</div>';return;}
    // 각 직원 최신 캡처 1장
    const tiles=await Promise.all(state.people.map(async p=>{
      try{const d=await api(`/api/vision/thumbnails?userId=${encodeURIComponent(p.userId)}&hours=${state.hours}&limit=1`);
        return {p,shot:(d.thumbnails||[])[0]||null};}catch{return {p,shot:null};}
    }));
    $('#view').innerHTML='<div class="wall">'+tiles.map(({p,shot})=>{
      if(!shot)return `<div class="tile" data-uid="${p.userId}"><div class="noshot">최근 화면 없음</div>
        <div class="meta"><div class="who">${p.label}<span class="ago">-</span></div><div class="act muted">활동 없음</div></div></div>`;
      return `<div class="tile" data-uid="${p.userId}">
        <img class="shot" src="${imgUrl(shot.thumbnailUrl)}" loading="lazy" onerror="this.outerHTML='<div class=noshot>이미지 로드 실패</div>'">
        <div class="meta">
          <div class="who"><span><span class="dotlive" style="background:${liveColor(shot.timestamp)}"></span>${p.label}</span><span class="ago">${ago(shot.timestamp)}</span></div>
          <div class="act">${clip(shot.activity||shot.screen||'',46)}</div>
          <div class="app">${clip(shot.app||'',30)}</div>
        </div></div>`;
    }).join('')+'</div>';
    document.querySelectorAll('.tile').forEach(el=>el.onclick=()=>openReplay(el.dataset.uid));
  }catch(e){$('#view').innerHTML=errBox(e);}
}

// ── 리플레이 ──
function openReplay(uid){state.replayUid=uid;setMode('replay');}
async function renderReplay(){
  const uid=state.replayUid||(state.people[0]&&state.people[0].userId);
  $('#view').innerHTML='<div class="muted">불러오는 중…</div>';
  try{
    await ensurePeople();
    const who=(state.people.find(p=>p.userId===uid)||{}).label||'직원';
    const d=await api(`/api/vision/task-sessions?userId=${encodeURIComponent(uid)}&hours=${state.hours}`);
    const sessions=(d.sessions||[]).filter(s=>(s.steps||[]).length);
    state.cur={sessions,si:sessions.length?0:-1,idx:0,playing:false,timer:null};
    $('#view').innerHTML=`
      <div style="margin-bottom:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select id="who">${state.people.map(p=>`<option value="${p.userId}" ${p.userId===uid?'selected':''}>${p.label}</option>`).join('')}</select>
        <span class="muted">${sessions.length}개 업무 세션 · 세션을 골라 화면처럼 되감아 보세요</span>
      </div>
      <div class="replay">
        <div class="sesslist" id="sesslist">${sessions.length?sessions.map((s,i)=>`
          <div class="sess ${i===0?'on':''}" data-i="${i}">
            <b>${(s.apps||[]).join(' → ')||'세션'}</b>
            <div class="s2">${new Date(s.startTs).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} · ${s.stepCount}컷 · ${s.durationMin}분${(s.nenovaActions||[]).length?' · '+s.nenovaActions[0]:''}</div>
          </div>`).join(''):'<div class="muted" style="padding:12px">이 기간에 3컷 이상 이어진 업무 세션이 없습니다.</div>'}</div>
        <div class="stage" id="stage"></div>
      </div>`;
    $('#who').onchange=e=>{state.replayUid=e.target.value;render();};
    document.querySelectorAll('.sess').forEach(el=>el.onclick=()=>selSession(+el.dataset.i));
    if(sessions.length)selSession(0); else $('#stage').innerHTML='<div class="muted">세션을 선택하세요.</div>';
  }catch(e){$('#view').innerHTML=errBox(e);}
}
function selSession(i){
  stopPlay();
  document.querySelectorAll('.sess').forEach((el,j)=>el.classList.toggle('on',j===i));
  state.cur.si=i;state.cur.idx=0;drawStage();
}
function curSession(){return state.cur.sessions[state.cur.si];}
function drawStage(){
  const s=curSession();if(!s)return;
  const steps=s.steps;const idx=Math.max(0,Math.min(state.cur.idx,steps.length-1));state.cur.idx=idx;
  const st=steps[idx];
  const act=st.nenovaAction?`<span class="chip act">⚡ ${st.nenovaAction}</span>`:'';
  const clk=(st.clickFields||[]).length?`<span class="chip">📍 클릭 ${st.clickFields.length}</span>`:'';
  const gap=st.gapSec>60?`<span class="chip gap">+${Math.round(st.gapSec/60)}분 후</span>`:'';
  $('#stage').innerHTML=`
    <div class="viewer">
      ${st.thumbnailUrl?`<img src="${imgUrl(st.thumbnailUrl)}" onerror="this.outerHTML='<div class=empty>이미지 없음</div>'">`:'<div class="empty">이미지 없음</div>'}
      <div class="badge">${idx+1} / ${steps.length} · ${new Date(st.t).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
    </div>
    <div class="stepinfo">
      <div style="flex:1;min-width:0"><div class="big">${clip(st.activity||st.screen||'',70)}</div>
        <div class="muted" style="margin-top:3px">${clip(st.app||'',30)}${st.screen?' · '+clip(st.screen,30):''}</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${act}${clk}${gap}</div>
    </div>
    <div class="controls">
      <button id="prev">◀ 이전</button>
      <button class="play" id="play">${state.cur.playing?'❚❚ 정지':'▶ 재생'}</button>
      <button id="next">다음 ▶</button>
      <div class="track" id="track"><div class="fill" style="width:${(idx/Math.max(1,steps.length-1))*100}%"></div></div>
    </div>
    <div class="flow"><div class="flowrow">${steps.map((x,j)=>`
      ${j>0?`<div class="farrow ${x.gapSec>120?'slow':''}">${x.gapSec>120?'⏱':'→'}</div>`:''}
      <div class="fstep"><img class="th ${j===idx?'cur':''}" data-j="${j}" src="${imgUrl(x.thumbnailUrl)}" loading="lazy">
        <div class="lb">${clip(x.nenovaAction||x.screen||x.app||'',16)}</div></div>`).join('')}</div></div>`;
  $('#prev').onclick=()=>{stopPlay();step(-1);};
  $('#next').onclick=()=>{stopPlay();step(1);};
  $('#play').onclick=togglePlay;
  $('#track').onclick=e=>{const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;state.cur.idx=Math.round(p*(steps.length-1));drawStage();};
  document.querySelectorAll('.fstep .th').forEach(el=>el.onclick=()=>{stopPlay();state.cur.idx=+el.dataset.j;drawStage();
    el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});});
}
function step(d){const s=curSession();if(!s)return;const n=s.steps.length;state.cur.idx=(state.cur.idx+d+n)%n;drawStage();}
function togglePlay(){state.cur.playing?stopPlay():startPlay();}
function startPlay(){const s=curSession();if(!s)return;state.cur.playing=true;drawStage();
  state.cur.timer=setInterval(()=>{const n=curSession().steps.length;if(state.cur.idx>=n-1){stopPlay();drawStage();return;}state.cur.idx++;drawStage();},1400);}
function stopPlay(){if(state.cur.timer){clearInterval(state.cur.timer);state.cur.timer=null;}state.cur.playing=false;}

function errBox(e){
  if(e.code==='not_onboarded')return `<div class="err">${e.message||'접근 권한이 없습니다.'}</div>`;
  return `<div class="err">불러오기 실패: ${e.message}<div class="muted" style="margin-top:8px">우상단 "토큰"으로 관리자 토큰을 입력하거나 회사 계정으로 로그인하세요.</div></div>`;}

function render(){ state.mode==='wall'?renderWall():renderReplay(); }
render();
</script>
</body>
</html>
