<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI — Workflow Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0e14;color:#e0e6ed;font-family:'JetBrains Mono',Consolas,monospace;overflow:hidden;height:100vh;user-select:none}

#toolbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(12,14,20,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;padding:8px 16px;height:42px}
.logo{font-size:12px;font-weight:700;color:#00ddb8;letter-spacing:2px;text-transform:uppercase}
.logo span{color:#5a6a7e;font-weight:400;letter-spacing:0;text-transform:none}
.spacer{flex:1}
#toolbar input,#toolbar select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#e0e6ed;padding:3px 8px;border-radius:4px;font-size:11px;font-family:inherit}
.tb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#e0e6ed;padding:4px 12px;border-radius:4px;font-size:11px;font-family:inherit;cursor:pointer}
.tb:hover{background:#00ddb8;color:#0c0e14;border-color:#00ddb8}
.tb-go{background:#00ddb8;color:#0c0e14;border-color:#00ddb8;font-weight:700}
#zoom-lbl{font-size:10px;color:#5a6a7e}

#map{position:absolute;top:42px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;
  background:radial-gradient(ellipse at center,rgba(0,221,184,.012) 0%,transparent 70%),
  linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:100% 100%,50px 50px,50px 50px}
#map.grabbing{cursor:grabbing}
#world{position:absolute;top:0;left:0;transform-origin:0 0}

/* ── Nodes ── */
.nd{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .12s;z-index:10}
.nd:hover{transform:scale(1.12);z-index:50}
.nd-circ{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid;position:relative;box-shadow:0 0 16px rgba(0,0,0,.5)}
.nd-lbl{margin-top:4px;font-size:9px;font-weight:600;text-align:center;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.nd-sub{font-size:7px;color:#5a6a7e;margin-top:1px}

/* Type-specific shapes */
.nd[data-type="user"] .nd-circ{border-radius:50%}
.nd[data-type="app"] .nd-circ{border-radius:12px}
.nd[data-type="kakao"] .nd-circ{border-radius:50%;border-style:dashed}
.nd[data-type="nenova_screen"] .nd-circ{border-radius:4px}
.nd[data-type="excel_file"] .nd-circ{border-radius:4px;transform:rotate(0deg)}
.nd[data-type="customer"] .nd-circ{border-radius:50%;border-width:2.5px}

/* ── Side panel ── */
#panel{position:fixed;top:42px;right:0;bottom:0;width:320px;z-index:150;background:rgba(12,14,20,.95);border-left:1px solid rgba(255,255,255,.06);backdrop-filter:blur(12px);transform:translateX(100%);transition:transform .2s ease;overflow-y:auto;padding:16px;font-size:11px}
#panel.open{transform:translateX(0)}
#panel .x{position:absolute;top:6px;right:10px;background:none;border:none;color:#5a6a7e;font-size:16px;cursor:pointer;font-family:inherit}
.ph{font-size:12px;font-weight:700;color:#00ddb8;margin-bottom:10px}
.pl{font-size:8px;color:#5a6a7e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;margin-top:10px}
.pbar{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.pbar-fill{height:8px;border-radius:3px;min-width:3px}
.pbar-name{width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.pbar-val{font-size:9px;color:#5a6a7e;width:36px;text-align:right}

/* ── Legend ── */
#legend{position:fixed;bottom:12px;left:12px;z-index:100;background:rgba(12,14,20,.92);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:10px 14px;font-size:9px;backdrop-filter:blur(8px)}
#legend h4{color:#00ddb8;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.lr{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.lr-d{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}

/* ── Loading ── */
.ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:#5a6a7e}
.ld::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid #00ddb8;border-top-color:transparent;border-radius:50%;animation:sp .5s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="toolbar">
  <div class="logo">ORBIT <span>// full map</span></div>
  <div class="spacer"></div>
  <input type="date" id="dt" value="2026-04-01">
  <select id="dy"><option value="3">3일</option><option value="7" selected>7일</option><option value="14">14일</option></select>
  <button class="tb tb-go" onclick="go()">MAP</button>
  <button class="tb" onclick="runAI()">AI</button>
  <span id="zoom-lbl">100%</span>
</div>
<div id="map"><div id="world"></div><div class="ld" id="loader">맵 생성 중</div></div>

<div id="legend">
  <h4>Legend</h4>
  <div class="lr"><div class="lr-d" style="background:#00ddb8;border-radius:50%">👤</div> 직원</div>
  <div class="lr"><div class="lr-d" style="background:rgba(255,255,255,.08);border:1.5px solid #5b9aff;border-radius:5px"></div> 앱 (프로그램)</div>
  <div class="lr"><div class="lr-d" style="background:rgba(255,224,102,.1);border:1.5px dashed #ffe066;border-radius:50%"></div> 카톡방</div>
  <div class="lr"><div class="lr-d" style="background:rgba(129,140,248,.1);border:1.5px solid #818cf8;border-radius:2px"></div> 전산화면</div>
  <div class="lr"><div class="lr-d" style="background:rgba(52,211,153,.1);border:1.5px solid #34d399;border-radius:2px"></div> 엑셀 파일</div>
  <div class="lr"><div class="lr-d" style="background:rgba(255,162,62,.1);border:2px solid #ffa23e;border-radius:50%"></div> 거래처</div>
  <div class="lr"><div class="lr-d" style="background:rgba(244,114,182,.1);border:1.5px solid #f472b6;border-radius:50%"></div> 상품 (꽃)</div>
</div>

<div id="panel"><button class="x" onclick="closeP()">×</button><div id="pc"></div></div>

<script>
const API=location.origin;
const TYPE_STYLE={
  user:          {color:'#00ddb8',bg:'#00ddb815',icon:'👤',baseSize:52,shape:'circle'},
  app:           {color:'#5b9aff',bg:'#5b9aff10',icon:'',baseSize:56,shape:'roundrect'},
  kakao:         {color:'#ffe066',bg:'#ffe06608',icon:'💬',baseSize:36,shape:'circle-dash'},
  nenova_screen: {color:'#818cf8',bg:'#818cf808',icon:'🖥',baseSize:32,shape:'rect'},
  excel_file:    {color:'#34d399',bg:'#34d39908',icon:'📊',baseSize:30,shape:'rect'},
  customer:      {color:'#ffa23e',bg:'#ffa23e0a',icon:'🏢',baseSize:34,shape:'circle'},
  product:       {color:'#f472b6',bg:'#f472b608',icon:'🌸',baseSize:28,shape:'circle'},
};
const APP_ICON={'KakaoTalk':'💬','Excel':'📊','Nenova ERP':'🏭','Browser':'🌐','Explorer':'📁','PowerPoint':'📝','Word':'📄','주문감지':'🔔','발주감지':'📦'};

// pan/zoom
let px=0,py=0,zm=1,drag=false,dsx,dsy,psx,psy;
const W=document.getElementById('world'),M=document.getElementById('map');
function aT(){W.style.transform=`translate(${px}px,${py}px) scale(${zm})`;document.getElementById('zoom-lbl').textContent=Math.round(zm*100)+'%'}
M.onmousedown=e=>{if(e.target.closest('.nd'))return;drag=true;M.classList.add('grabbing');dsx=e.clientX;dsy=e.clientY;psx=px;psy=py};
window.onmousemove=e=>{if(!drag)return;px=psx+(e.clientX-dsx);py=psy+(e.clientY-dsy);aT()};
window.onmouseup=()=>{drag=false;M.classList.remove('grabbing')};
M.onwheel=e=>{e.preventDefault();const r=M.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,oz=zm;zm*=e.deltaY<0?1.1:.9;zm=Math.max(.15,Math.min(4,zm));px=mx-(mx-px)*(zm/oz);py=my-(my-py)*(zm/oz);aT()};

let mapData=null;

async function go(){
  const d=document.getElementById('dt').value,dy=document.getElementById('dy').value;
  document.getElementById('loader').style.display='';
  const r=await fetch(`${API}/api/mining/full-map?date=${d}&days=${dy}`);
  mapData=await r.json();
  document.getElementById('loader').style.display='none';
  render(mapData);
}

function render(data){
  const {nodes,links}=data;
  if(!nodes.length){W.innerHTML='<div style="color:#5a6a7e;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">데이터 없음</div>';return}

  // layout: group-based force-like positioning
  const groups={user:[],app:[],kakao:[],nenova:[],excel:[],customer:[],product:[]};
  for(const n of nodes){
    const g=n.group||n.type;
    if(g==='user')groups.user.push(n);
    else if(g==='app')groups.app.push(n);
    else if(g==='kakao')groups.kakao.push(n);
    else if(g==='nenova')groups.nenova.push(n);
    else if(g==='excel')groups.excel.push(n);
    else if(g==='customer')groups.customer.push(n);
    else if(g==='product')groups.product.push(n);
  }

  const pos={};
  const CX=800,CY=500;

  // Users: left column
  groups.user.forEach((n,i)=>{
    pos[n.id]={x:120,y:180+i*100};
  });

  // Apps: center ring
  const appR=250;
  groups.app.forEach((n,i)=>{
    const a=(i/Math.max(groups.app.length,1))*Math.PI*2-Math.PI/2;
    pos[n.id]={x:CX+Math.cos(a)*appR,y:CY+Math.sin(a)*appR};
  });

  // Kakao rooms: cluster near KakaoTalk
  const ktPos=pos['app:KakaoTalk']||{x:CX,y:CY-appR};
  groups.kakao.forEach((n,i)=>{
    const a=(i/Math.max(groups.kakao.length,1))*Math.PI*2;
    const r=140+Math.random()*40;
    pos[n.id]={x:ktPos.x+Math.cos(a)*r,y:ktPos.y+Math.sin(a)*r};
  });

  // Nenova screens: cluster near Nenova ERP
  const nvPos=pos['app:Nenova ERP']||{x:CX+appR,y:CY};
  groups.nenova.forEach((n,i)=>{
    const a=(i/Math.max(groups.nenova.length,1))*Math.PI*2+0.3;
    const r=120+Math.random()*30;
    pos[n.id]={x:nvPos.x+Math.cos(a)*r,y:nvPos.y+Math.sin(a)*r};
  });

  // Excel files: cluster near Excel
  const xlPos=pos['app:Excel']||{x:CX-appR,y:CY};
  groups.excel.forEach((n,i)=>{
    const a=(i/Math.max(groups.excel.length,1))*Math.PI*2+1;
    const r=120+Math.random()*30;
    pos[n.id]={x:xlPos.x+Math.cos(a)*r,y:xlPos.y+Math.sin(a)*r};
  });

  // Customers: right side
  groups.customer.forEach((n,i)=>{
    const col = Math.floor(i / 12);
    const row = i % 12;
    pos[n.id]={x:CX+appR+250+col*120,y:80+row*65};
  });

  // Products: far right, below customers
  groups.product.forEach((n,i)=>{
    const col = Math.floor(i / 10);
    const row = i % 10;
    pos[n.id]={x:CX+appR+180+col*100,y:CY+200+row*50};
  });

  // Build SVG edges
  const maxVal=Math.max(...links.map(l=>l.value),1);
  let svg=`<svg width="1800" height="1200" style="position:absolute;top:0;left:0;pointer-events:none">
    <defs><marker id="ar" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4" fill="rgba(255,255,255,.12)"/></marker></defs>`;

  for(const l of links){
    const p1=pos[l.source],p2=pos[l.target];
    if(!p1||!p2)continue;
    const thick=1+(l.value/maxVal)*5;
    const op=0.06+(l.value/maxVal)*0.2;
    const dx=p2.x-p1.x,dy=p2.y-p1.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/dist*(dist*0.12),ny=dx/dist*(dist*0.12);
    const cpx=(p1.x+p2.x)/2+nx,cpy=(p1.y+p2.y)/2+ny;
    // color from source type
    const sn=nodes.find(n=>n.id===l.source);
    const st=TYPE_STYLE[sn?.type]||TYPE_STYLE.app;
    const isTransition=l.type==='transition';
    svg+=`<path d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}" fill="none" stroke="${st.color}" stroke-width="${thick}" stroke-opacity="${op}" marker-end="url(#ar)" ${isTransition?'stroke-dasharray="6,4"':''}/>`;
  }
  svg+='</svg>';

  // Build node HTML
  let nh='';
  for(const n of nodes){
    const p=pos[n.id];
    if(!p)continue;
    const st=TYPE_STYLE[n.type]||TYPE_STYLE.app;
    // size based on connected links
    const linkVal=links.filter(l=>l.source===n.id||l.target===n.id).reduce((s,l)=>s+l.value,0);
    const sz=st.baseSize+Math.min(linkVal/20,24);
    const icon=n.type==='app'?(APP_ICON[n.label]||'⚙'):st.icon;

    nh+=`<div class="nd" data-type="${n.type}" data-id="${n.id}" style="left:${p.x-sz/2}px;top:${p.y-sz/2}px" onclick="showDetail('${n.id}')">
      <div class="nd-circ" style="width:${sz}px;height:${sz}px;border-color:${st.color};background:${st.bg};color:${st.color};font-size:${sz*0.35}px">${icon}</div>
      <div class="nd-lbl" style="color:${st.color}">${n.label}</div>
    </div>`;
  }

  W.innerHTML=svg+nh;

  // Center
  px=(M.clientWidth/2)-CX*zm;
  py=(M.clientHeight/2)-CY*zm;
  aT();
}

function showDetail(id){
  if(!mapData)return;
  const node=mapData.nodes.find(n=>n.id===id);
  if(!node)return;
  const st=TYPE_STYLE[node.type]||TYPE_STYLE.app;
  const inLinks=mapData.links.filter(l=>l.target===id);
  const outLinks=mapData.links.filter(l=>l.source===id);
  const maxV=Math.max(...[...inLinks,...outLinks].map(l=>l.value),1);

  function linkBar(links,dir){
    return links.sort((a,b)=>b.value-a.value).slice(0,15).map(l=>{
      const otherId=dir==='in'?l.source:l.target;
      const other=mapData.nodes.find(n=>n.id===otherId);
      const ost=TYPE_STYLE[other?.type]||TYPE_STYLE.app;
      const w=Math.round(l.value/maxV*100);
      return `<div class="pbar">
        <div class="pbar-name" style="color:${ost.color}">${other?.label||otherId}</div>
        <div style="flex:1;height:8px;background:rgba(255,255,255,.04);border-radius:3px"><div class="pbar-fill" style="width:${w}%;background:${ost.color};opacity:.5"></div></div>
        <div class="pbar-val">${l.value}</div>
      </div>`;
    }).join('');
  }

  let html=`<div class="ph" style="color:${st.color}">${st.icon} ${node.label}</div>`;
  html+=`<div style="font-size:10px;color:#5a6a7e;margin-bottom:8px">타입: ${node.type} | 연결: ${inLinks.length+outLinks.length}개</div>`;

  if(inLinks.length){
    html+=`<div class="pl">← 들어오는 연결 (${inLinks.length})</div>${linkBar(inLinks,'in')}`;
  }
  if(outLinks.length){
    html+=`<div class="pl">→ 나가는 연결 (${outLinks.length})</div>${linkBar(outLinks,'out')}`;
  }

  document.getElementById('pc').innerHTML=html;
  document.getElementById('panel').classList.add('open');
}

function closeP(){document.getElementById('panel').classList.remove('open')}

async function runAI(){
  const d=document.getElementById('dt').value,dy=document.getElementById('dy').value;
  const pc=document.getElementById('pc');
  pc.innerHTML='<div class="ph" style="color:#b96fff">AI 심층 분석</div><div class="ld" style="position:static;padding:16px">Claude 분석 중</div>';
  document.getElementById('panel').classList.add('open');
  try{
    const r=await fetch(API+'/api/mining/deep-analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:d,days:parseInt(dy)})});
    const data=await r.json(),ins=data.insights||{};
    let h='<div class="ph" style="color:#b96fff">AI 심층 분석 결과</div>';
    if(ins.fullText)h+=`<div style="white-space:pre-wrap;font-size:10px;line-height:1.7;max-height:80vh;overflow-y:auto">${esc(ins.fullText)}</div>`;
    pc.innerHTML=h;
  }catch(e){pc.innerHTML=`<div style="color:#ff5252">실패: ${e.message}</div>`}
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeP()});
go();
</script>
</body>
</html>
