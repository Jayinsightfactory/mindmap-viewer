<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AI — Workflow Blueprint</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0e14;
  --grid: rgba(255,255,255,.03);
  --surface: rgba(255,255,255,.04);
  --surface2: rgba(255,255,255,.07);
  --border: rgba(255,255,255,.08);
  --text: #e8ecf1;
  --muted: #6b7a8d;
  --accent: #00ddb8;
  --accent2: #b96fff;
  --warn: #ffa23e;
  --danger: #ff5252;
  --info: #5b9aff;
  --node-kakao: #ffe066;
  --node-excel: #34d399;
  --node-nenova: #818cf8;
  --node-browser: #5b9aff;
  --node-explorer: #f97316;
  --node-other: #8b949e;
}
body {
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  color: var(--text);
  font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Header ── */
header {
  background: rgba(12,14,20,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 28px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 15px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
.logo span { color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none; }
.controls { margin-left: auto; display: flex; align-items: center; gap: 8px; }
input[type="date"], select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 10px; border-radius: 4px; font-size: 12px;
  font-family: inherit;
}
.btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 14px; border-radius: 4px;
  cursor: pointer; font-size: 12px; font-family: inherit; transition: all .15s;
}
.btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-run { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

/* ── Layout ── */
main { max-width: 1600px; margin: 0 auto; padding: 24px; }
.section-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; padding-left: 2px;
}
.section-title {
  font-size: 16px; font-weight: 700; color: var(--accent);
  margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}

/* ── Stat strip ── */
.stat-strip {
  display: flex; gap: 2px; margin-bottom: 28px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden;
}
.stat-cell {
  flex: 1; padding: 16px 12px; text-align: center;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-val { font-size: 26px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

/* ── Flow canvas ── */
.flow-canvas {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  overflow-x: auto;
}
.flow-canvas svg { display: block; margin: 0 auto; }

/* ── Grids ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 800px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px;
}
.panel-head {
  font-size: 12px; font-weight: 600; color: var(--accent);
  margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase;
}

/* ── Flow nodes ── */
.flow-node {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid; white-space: nowrap;
}
.flow-arrow { color: var(--muted); font-size: 16px; margin: 0 4px; }

/* ── Pattern cards ── */
.pattern-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 10px;
  transition: border-color .15s;
}
.pattern-card:hover { border-color: var(--accent); }
.pattern-flow { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.pattern-meta { display: flex; gap: 16px; font-size: 11px; color: var(--muted); }
.pattern-meta b { color: var(--text); }

/* ── Decision tree ── */
.decision-node {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 12px;
}
.decision-from {
  font-weight: 700; color: var(--warn); font-size: 13px;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px dashed rgba(255,255,255,.06);
}
.decision-branch {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 12px;
}
.branch-bar {
  height: 6px; border-radius: 3px; min-width: 4px;
  transition: width .3s;
}

/* ── User compare ── */
.user-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.user-bar:last-child { border-bottom: none; }
.user-name { width: 80px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-bar-fill { height: 18px; border-radius: 3px; display: flex; overflow: hidden; flex: 1; }
.user-bar-seg { height: 100%; min-width: 2px; position: relative; }
.user-bar-seg:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: #1a1e28; color: #fff; padding: 3px 8px; border-radius: 4px;
  font-size: 10px; white-space: nowrap; z-index: 10;
}
.user-time { width: 50px; text-align: right; color: var(--muted); font-size: 11px; }

/* ── ROI ── */
.roi-box {
  background: linear-gradient(135deg, rgba(0,221,184,.08), rgba(185,111,255,.08));
  border: 1px solid rgba(0,221,184,.2);
  border-radius: 8px;
  padding: 24px;
  text-align: center;
}
.roi-big { font-size: 42px; font-weight: 800; color: var(--accent); }
.roi-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
.roi-row { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
.roi-item { text-align: center; }
.roi-item-val { font-size: 20px; font-weight: 700; }
.roi-item-lbl { font-size: 10px; color: var(--muted); }

/* ── Bottleneck ── */
.bottleneck-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 12px;
}
.bottleneck-item:last-child { border-bottom: none; }
.bn-app { font-weight: 700; width: 100px; }
.bn-bar-wrap { flex: 1; position: relative; height: 20px; background: rgba(255,255,255,.03); border-radius: 3px; }
.bn-bar-avg { position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px; background: var(--info); opacity: .5; }
.bn-bar-worst { position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px; background: var(--danger); opacity: .6; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: var(--muted); }
.loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Chart container ── */
.chart-wrap { position: relative; height: 260px; }

/* ── Automation step ── */
.auto-step {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 14px; margin-bottom: 10px;
}
.auto-step-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.auto-step-flow { font-weight: 600; font-size: 13px; }
.auto-step-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.auto-step-steps { font-size: 11px; color: var(--muted); line-height: 1.8; }
.auto-step-steps li { padding-left: 4px; }
.feasibility-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,.06); margin-top: 8px; }
.feasibility-fill { height: 100%; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">ORBIT <span>// workflow blueprint</span></div>
  <div class="controls">
    <input type="date" id="startDate" value="2026-04-01">
    <select id="days">
      <option value="1">1일</option>
      <option value="3">3일</option>
      <option value="7" selected>7일</option>
      <option value="14">14일</option>
      <option value="30">30일</option>
    </select>
    <button class="btn btn-run" onclick="loadAll()">ANALYZE</button>
    <button class="btn" onclick="runDeepAnalysis()">AI 심층분석</button>
  </div>
</header>

<main>
  <div id="content" class="loading">데이터 로딩 중</div>
</main>

<script>
const API = location.origin;
const APP_COLORS = {
  'KakaoTalk': '#ffe066', 'Excel': '#34d399', 'Nenova ERP': '#818cf8',
  'Browser': '#5b9aff', 'Explorer': '#f97316', 'PowerPoint': '#f472b6',
  'Word': '#60a5fa', 'HWP': '#a78bfa', 'Email': '#fbbf24',
  'Notepad': '#94a3b8', 'Teams': '#7c3aed', 'Discord': '#8b5cf6',
  '주문감지': '#ff5252', '발주감지': '#ff8a65',
};
function appColor(name) { return APP_COLORS[name] || '#6b7a8d'; }

async function api(path) {
  const r = await fetch(API + path);
  return r.json();
}

async function loadAll() {
  const d = document.getElementById('startDate').value;
  const days = document.getElementById('days').value;
  document.getElementById('content').innerHTML = '<div class="loading">분석 중</div>';

  const [summary, infographic, workflows, blueprint, decisions] = await Promise.all([
    api(`/api/mining/summary?date=${d}&days=${days}`),
    api(`/api/mining/infographic?date=${d}&days=${days}`),
    api(`/api/mining/workflows?userId=MNH03H73690BB2CD82&date=${d}&days=${days}`),
    api(`/api/mining/automation-blueprint?date=${d}&days=${days}`),
    api(`/api/mining/decisions?date=${d}&days=${days}`),
  ]);

  render(summary, infographic, workflows, blueprint, decisions);
}

function render(summary, info, workflows, blueprint, decisions) {
  const s = summary.stats || {};
  const roi = info.roi || {};
  const charts = info.charts || {};

  document.getElementById('content').innerHTML = `
    <!-- STAT STRIP -->
    <div class="stat-strip">
      <div class="stat-cell"><div class="stat-val" style="color:var(--accent)">${s.totalEvents?.toLocaleString() || 0}</div><div class="stat-lbl">Total Events</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:var(--info)">${s.activeUsers || 0}</div><div class="stat-lbl">Active Users</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:var(--accent2)">${s.visionAnalyzed || 0}</div><div class="stat-lbl">Vision Analyzed</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:var(--warn)">${s.ordersDetected || 0}</div><div class="stat-lbl">Orders Detected</div></div>
      <div class="stat-cell"><div class="stat-val" style="color:var(--node-excel)">${s.keyboardEvents?.toLocaleString() || 0}</div><div class="stat-lbl">Keyboard Events</div></div>
    </div>

    <!-- WORKFLOW PATTERNS (main flow canvas) -->
    <div class="section-label">process flow</div>
    <div class="section-title">워크플로우 패턴</div>
    <div id="patterns-area"></div>

    <!-- 2-col: heatmap + app distribution -->
    <div class="grid-2">
      <div class="panel">
        <div class="panel-head">시간대별 활동량</div>
        <div class="chart-wrap"><canvas id="chartHeatmap"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-head">앱 사용 분포</div>
        <div class="chart-wrap"><canvas id="chartApps"></canvas></div>
      </div>
    </div>

    <!-- EMPLOYEE COMPARISON -->
    <div class="section-label">employee comparison</div>
    <div class="section-title">직원별 업무 시간 비교</div>
    <div class="panel" id="user-compare" style="margin-bottom:24px"></div>

    <!-- 2-col: decisions + bottlenecks -->
    <div class="grid-2">
      <div>
        <div class="section-label">decision points</div>
        <div class="section-title">의사결정 분기점</div>
        <div id="decisions-area"></div>
      </div>
      <div>
        <div class="section-label">bottlenecks</div>
        <div class="section-title">자동화 블루프린트</div>
        <div id="blueprint-area"></div>
      </div>
    </div>

    <!-- ROI -->
    <div class="section-label">automation roi</div>
    <div class="section-title">자동화 ROI 예측</div>
    <div class="roi-box" style="margin-bottom:24px">
      <div class="roi-big">${roi.roiYearlyKRW ? (roi.roiYearlyKRW/10000).toFixed(0) + '만원' : '-'}</div>
      <div class="roi-sub">연간 예상 절감액</div>
      <div class="roi-row">
        <div class="roi-item"><div class="roi-item-val" style="color:var(--accent)">${roi.autoSavingsMinPerDay || 0}분</div><div class="roi-item-lbl">일 절감</div></div>
        <div class="roi-item"><div class="roi-item-val" style="color:var(--info)">${roi.autoSavingsHoursMonthly || 0}시간</div><div class="roi-item-lbl">월 절감</div></div>
        <div class="roi-item"><div class="roi-item-val" style="color:var(--accent2)">${roi.automatableBlockCount || 0}건</div><div class="roi-item-lbl">자동화 가능 블록</div></div>
        <div class="roi-item"><div class="roi-item-val" style="color:var(--warn)">${roi.roiMonthlyKRW ? (roi.roiMonthlyKRW/10000).toFixed(1)+'만원' : '-'}</div><div class="roi-item-lbl">월 절감액</div></div>
      </div>
    </div>

    <!-- DEEP ANALYSIS -->
    <div class="section-label">ai analysis</div>
    <div class="section-title">AI 심층 분석 결과</div>
    <div class="panel" id="deep-analysis" style="margin-bottom:24px">
      <div style="color:var(--muted); font-size:12px">상단 [AI 심층분석] 버튼을 눌러 실행하세요</div>
    </div>
  `;

  // -- Render patterns
  renderPatterns(workflows.patterns || workflows.processMap || []);

  // -- Render charts
  renderHeatmap(charts.hourlyHeatmap || []);
  renderAppPie(charts.appDistribution || []);

  // -- Render user comparison
  renderUserCompare(charts.userAppBreakdown || []);

  // -- Render decisions
  renderDecisions(decisions.decisionPoints || []);

  // -- Render blueprint
  renderBlueprint(blueprint.candidates || [], blueprint.implementationPlan || []);
}

function makeFlowNode(app) {
  const c = appColor(app);
  return `<span class="flow-node" style="border-color:${c}; color:${c}; background:${c}15">${app}</span>`;
}

function renderPatterns(patterns) {
  const area = document.getElementById('patterns-area');
  if (!patterns.length) { area.innerHTML = '<div class="panel" style="color:var(--muted)">패턴 데이터 없음</div>'; return; }

  area.innerHTML = patterns.slice(0, 10).map(p => {
    const steps = p.steps || p.flow?.split(' → ') || [];
    const flowHtml = steps.map(s => makeFlowNode(s)).join('<span class="flow-arrow">→</span>');
    return `<div class="pattern-card">
      <div class="pattern-flow">${flowHtml}</div>
      <div class="pattern-meta">
        <span>반복 <b>${p.count}회</b></span>
        <span>평균 <b>${p.avgDurationMin || p.avgMin || '?'}분</b></span>
        ${p.interpretation ? `<span style="color:var(--accent)">${p.interpretation}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderHeatmap(data) {
  const ctx = document.getElementById('chartHeatmap');
  if (!ctx) return;
  const labels = Array.from({length: 24}, (_, i) => `${i}시`);
  const values = labels.map((_, i) => {
    const found = data.find(d => d.hour === i);
    return found ? found.events : 0;
  });
  new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: values.map(v => {
      const max = Math.max(...values, 1);
      const ratio = v / max;
      return `rgba(0,221,184,${0.15 + ratio * 0.7})`;
    }), borderRadius: 3 }] },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6b7a8d', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#6b7a8d', font: { size: 10 } } },
      },
    },
  });
}

function renderAppPie(data) {
  const ctx = document.getElementById('chartApps');
  if (!ctx) return;
  const labels = data.map(d => d.name);
  const values = data.map(d => d.minutes);
  const colors = labels.map(n => appColor(n));
  new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      cutout: '55%',
      plugins: {
        legend: { position: 'right', labels: { color: '#e8ecf1', font: { size: 11, family: 'monospace' }, padding: 10 } },
      },
    },
  });
}

function renderUserCompare(users) {
  const el = document.getElementById('user-compare');
  if (!users.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">데이터 없음</div>'; return; }
  const maxMin = Math.max(...users.map(u => u.apps.reduce((s, a) => s + a.minutes, 0)), 1);

  el.innerHTML = users.map(u => {
    const total = u.apps.reduce((s, a) => s + a.minutes, 0);
    const segs = u.apps.map(a => {
      const w = (a.minutes / maxMin * 100).toFixed(1);
      return `<div class="user-bar-seg" style="width:${w}%; background:${appColor(a.name)}" data-tip="${a.name} ${a.minutes}분"></div>`;
    }).join('');
    return `<div class="user-bar">
      <div class="user-name">${u.name}</div>
      <div class="user-bar-fill">${segs}</div>
      <div class="user-time">${total}분</div>
    </div>`;
  }).join('');
}

function renderDecisions(points) {
  const el = document.getElementById('decisions-area');
  if (!points.length) { el.innerHTML = '<div class="panel" style="color:var(--muted);font-size:12px">분기 데이터 부족</div>'; return; }

  el.innerHTML = points.slice(0, 8).map(dp => {
    const maxT = Math.max(...dp.choices.map(c => c.totalTransitions), 1);
    const branches = dp.choices.slice(0, 5).map(c => {
      const w = (c.totalTransitions / maxT * 100).toFixed(0);
      const col = appColor(c.nextApp);
      const users = c.users.map(u => u.user).join(', ');
      return `<div class="decision-branch">
        <span style="width:80px; color:${col}; font-weight:600">${c.nextApp}</span>
        <div style="flex:1; position:relative; height:6px; background:rgba(255,255,255,.04); border-radius:3px">
          <div class="branch-bar" style="width:${w}%; background:${col}; border-radius:3px"></div>
        </div>
        <span style="width:30px; text-align:right; color:var(--muted)">${c.totalTransitions}</span>
        <span style="color:var(--muted); font-size:10px; width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${users}</span>
      </div>`;
    }).join('');
    return `<div class="decision-node">
      <div class="decision-from">${dp.fromApp} 이후 → ${dp.choiceCount}가지 경로</div>
      ${branches}
      ${dp.insight ? `<div style="margin-top:6px; font-size:11px; color:var(--accent)">${dp.insight}</div>` : ''}
    </div>`;
  }).join('');
}

function renderBlueprint(candidates, plan) {
  const el = document.getElementById('blueprint-area');
  const items = (plan.length ? plan : candidates.slice(0, 5));
  if (!items.length) { el.innerHTML = '<div class="panel" style="color:var(--muted);font-size:12px">자동화 후보 없음</div>'; return; }

  el.innerHTML = items.map((c, i) => {
    const feasibility = c.automationFeasibility || c.feasibility || 0;
    const fColor = feasibility >= 0.7 ? 'var(--accent)' : feasibility >= 0.4 ? 'var(--warn)' : 'var(--danger)';
    const fLabel = feasibility >= 0.7 ? 'HIGH' : feasibility >= 0.4 ? 'MED' : 'LOW';
    const steps = c.implementationSteps || c.steps || [];
    const flow = c.flow || c.pattern || '';
    const flowNodes = flow.split(' → ').map(s => makeFlowNode(s.trim())).join('<span class="flow-arrow">→</span>');
    const method = c.automationMethod || c.method || '';
    const savings = c.savingsPerMonth || '';

    return `<div class="auto-step">
      <div class="auto-step-head">
        <div class="auto-step-flow">${flowNodes}</div>
        <span class="auto-step-badge" style="background:${fColor}20; color:${fColor}">${fLabel} ${(feasibility*100).toFixed(0)}%</span>
      </div>
      <div style="font-size:11px; color:var(--muted); margin-bottom:6px">
        ${method} ${savings ? `· 월 <b style="color:var(--accent)">${savings}분</b> 절감` : ''}
      </div>
      ${steps.length ? `<ol class="auto-step-steps">${steps.map(s => `<li>${typeof s === 'string' ? s.replace(/^\d+\.\s*/, '') : ''}</li>`).join('')}</ol>` : ''}
      <div class="feasibility-bar"><div class="feasibility-fill" style="width:${feasibility*100}%; background:${fColor}"></div></div>
    </div>`;
  }).join('');
}

async function runDeepAnalysis() {
  const d = document.getElementById('startDate').value;
  const days = document.getElementById('days').value;
  const el = document.getElementById('deep-analysis');
  if (!el) return alert('먼저 ANALYZE를 실행하세요');
  el.innerHTML = '<div class="loading">Claude AI 분석 중 (30~60초)</div>';

  try {
    const r = await fetch(API + '/api/mining/deep-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: d, days: parseInt(days) }),
    });
    const data = await r.json();
    const insights = data.insights || {};

    let html = '';

    if (insights.fullText) {
      html += `<div style="white-space:pre-wrap; font-size:12px; line-height:1.8; color:var(--text); max-height:600px; overflow-y:auto; padding:12px; background:var(--surface2); border-radius:6px">${escHtml(insights.fullText)}</div>`;
    }

    if (insights.decisions?.length) {
      html += '<div style="margin-top:16px"><div class="panel-head">의사결정 분석</div>';
      for (const dec of insights.decisions) {
        html += `<div class="pattern-card">
          <div style="font-weight:600; color:var(--warn); margin-bottom:4px">${escHtml(dec.situation || '')}</div>
          <div style="font-size:12px; margin-bottom:4px"><b>패턴:</b> ${escHtml(dec.pattern || '')}</div>
          <div style="font-size:12px; margin-bottom:4px"><b>이유:</b> ${escHtml(dec.reasoning || '')}</div>
          ${dec.betterAlternative ? `<div style="font-size:12px; color:var(--accent)"><b>대안:</b> ${escHtml(dec.betterAlternative)}</div>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    if (insights.recommendations?.length) {
      html += '<div style="margin-top:16px"><div class="panel-head">개선 제안</div>';
      for (const rec of insights.recommendations) {
        html += `<div class="pattern-card">
          <div style="font-weight:600; color:var(--accent); margin-bottom:4px">P${rec.priority || '?'}: ${escHtml(rec.title || '')}</div>
          <div style="font-size:12px">${escHtml(rec.description || '')}</div>
          ${rec.expectedSavings ? `<div style="font-size:11px; color:var(--warn); margin-top:4px">절감: ${escHtml(rec.expectedSavings)}</div>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    el.innerHTML = html || '<div style="color:var(--muted)">분석 결과 없음</div>';
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger)">분석 실패: ${e.message}</div>`;
  }
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Auto-load on page open
loadAll();
</script>
