<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOYI вҖ” м—…л¬ҙ мқён…”лҰ¬м „мҠӨ мҪҳмҶ”</title>
<style>
  :root{--bg:#161719;--panel:#1e2024;--panel2:#26282e;--border:#2c2f36;--txt:#eceef1;--txt2:#b9bcc2;--muted:#7e828a;--accent:#5b9dff;--green:#2e9e6b;--amber:#d9a630}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;line-height:1.55}
  a{color:inherit;text-decoration:none}
  nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:6px;height:56px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--border)}
  .logo{font-weight:800;font-size:19px;margin-right:16px}.logo b{color:var(--accent)}
  .tab{background:none;border:none;color:var(--txt2);padding:8px 14px;border-radius:8px;font-size:14px;cursor:pointer}
  .tab.on{background:var(--panel2);color:var(--txt);font-weight:700}
  nav .right{margin-left:auto;display:flex;gap:8px;align-items:center}
  .ghost{background:none;border:1px solid var(--border);color:var(--txt2);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 20px}
  h2{font-size:22px;font-weight:800;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
  .kpi .n{font-size:26px;font-weight:800}.kpi .l{color:var(--muted);font-size:12px;margin-top:3px}
  .kpi.a .n{color:var(--accent)}.kpi.g .n{color:#5fd39b}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:900px){.row2{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
  .panel h3{font-size:15px;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.r,th.r{text-align:right}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
  .verdict{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:700}
  .v-PASS{background:#1e4632;color:#5fd39b}.v-WARN{background:#4a3c16;color:#e6c25a}.v-FAIL{background:#4a1e1e;color:#e88}
  .sec{margin-top:16px}.sec b{display:block;color:var(--txt2);font-size:13px;margin-bottom:6px}
  .item{font-size:13px;color:var(--txt2);padding:6px 0;border-bottom:1px dashed var(--border)}
  .tag{font-size:10px;padding:1px 7px;border-radius:5px;background:var(--panel2);margin-right:6px;color:var(--accent)}
  .btn{background:var(--accent);color:#0f1115;font-weight:700;border:none;border-radius:9px;padding:10px 16px;font-size:14px;cursor:pointer}
  iframe{width:100%;height:calc(100vh - 120px);border:1px solid var(--border);border-radius:12px;background:#191a1d}
  .muted{color:var(--muted);font-size:13px}
  /* лӘЁмһҗмқҙнҒ¬ лӘЁл“ң (?mask=1): мӢӨм ң нҺҳмқҙм§ҖлҘј мғҳн”ҢлЎң м“°лҗҳ лҜјк°җм •ліҙл§Ң лё”лҹ¬ */
  body.mask .pii{filter:blur(5px);user-select:none}
  body.mask #ins .item,body.mask #ins>.panel>.muted{filter:blur(4px)}
  body.mask #tokbar,body.mask #tok{display:none!important}
  body.mask::after{content:'мғҳн”Ң В· к°ңмқём •ліҙ лӘЁмһҗмқҙнҒ¬';position:fixed;bottom:14px;right:16px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 11px;border-radius:20px;z-index:99}
  /* лқјмқҙлёҢ мғҳн”Ң(?demo=1): мӢӨм ң мҪҳмҶ” UI + мқөлӘ… мғҳн”Ң лҚ°мқҙн„° (нҶ нҒ°В·PII м—ҶмқҢ, кіөк°ң мһ„лІ л“ңмҡ©) */
  body.demo #tokbar,body.demo #tok{display:none!important}
  body.demo::after{content:'мғҳн”Ң лҚ°мқҙн„° В· лқјмқҙлёҢ мҪҳмҶ”';position:fixed;bottom:14px;right:16px;background:var(--panel2);border:1px solid var(--border);color:var(--accent);font-size:11px;padding:5px 11px;border-radius:20px;z-index:99}
  .copybox{display:flex;gap:8px;margin-top:10px}
  .copybox input{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:9px 11px;font-size:13px}
</style>
</head>
<body>
  <nav>
    <div class="logo">M<b>O</b>YI</div>
    <button class="tab on" data-v="home">нҡҢмӮ¬ нҳ„нҷ©</button>
    <button class="tab" data-v="flow">м—…л¬ҙ нқҗлҰ„</button>
    <button class="tab" data-v="insight">мҡҙмҳҒ мқёмӮ¬мқҙнҠё</button>
    <button class="tab" data-v="duty">м§Ғл¬ҙ л§Өлүҙм–ј</button>
    <button class="tab" data-v="screens">нҷ”л©ҙ нғҖмһ„лқјмқё</button>
    <button class="tab" data-v="staff">м§Ғмӣҗ В· м„Өм№ҳ</button>
    <div class="right">
      <span class="muted" id="tenant">nenova</span>
      <button class="ghost" id="tok">нҶ нҒ°</button>

  </nav>
  <div id="tokbar" style="display:none;align-items:center;gap:8px;padding:10px 18px;background:var(--panel2);border-bottom:1px solid var(--border)">

    <input id="tokin" placeholder="orbit_..." style="flex:1;max-width:520px;background:#191a1d;border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:13px">
    <button class="btn" id="toksave" style="padding:8px 14px">м ҖмһҘ</button>
  </div>
  <div class="wrap" id="view"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const KEY = 'orbit_flow_token';
const token = () => sessionStorage.getItem(KEY) || '';
function showTok(){ $('#tokbar').style.display='flex'; $('#tokin').value=token(); $('#tokin').focus(); }
function saveTok(){ const v=$('#tokin').value.trim(); if(v){ sessionStorage.setItem(KEY,v); $('#tokbar').style.display='none'; render(state.v); } }
async function api(p){ const sep=p.includes('?')?'&':'?'; const r=await fetch(p+sep+'token='+encodeURIComponent(token())); if(!r.ok){ const b=await r.json().catch(()=>({})); const e=new Error(b.message||('HTTP '+r.status)); e.status=r.status; e.code=b.error; throw e; } return r.json(); }
const num = n => (n==null?'-':Number(n).toLocaleString());
const confDot = c => c>=1?'#2e9e6b':c>=0.67?'#d9a630':'#7e828a';
const ago = iso => { if(!iso) return '-'; const m=Math.round((Date.now()-new Date(iso).getTime())/60000); return m<60?m+'л¶„ м „':m<1440?Math.round(m/60)+'мӢңк°„ м „':Math.round(m/1440)+'мқј м „'; };

const state = { v:'home' };
const DEMO = new URLSearchParams(location.search).has('demo'); // лқјмқҙлёҢ мғҳн”Ң(мқөлӘ… лҚ°мқҙн„°)
const _t = m => new Date(Date.now()-m*60000).toISOString();
const SAMPLE = {
  stats:{actions:38940,verified:11080,automatable:305,relations:[{type:'action_in_app',count:40180},{type:'person_performed_action',count:38940},{type:'action_in_room',count:7540},{type:'talk_triggered_action',count:4760},{type:'screen_observed_action',count:1068},{type:'automation_candidate_for_process',count:597},{type:'action_mentions_customer',count:592},{type:'action_handoff',count:121}],goldenEntities:[{type:'person',count:12},{type:'customer',count:101}]},
  people:[{label:'м§Ғмӣҗ A',count:8463,last:_t(13)},{label:'м§Ғмӣҗ B',count:7425,last:_t(3)},{label:'м§Ғмӣҗ C',count:5902,last:_t(3)},{label:'м§Ғмӣҗ D',count:3669,last:_t(3)},{label:'м§Ғмӣҗ E',count:3058,last:_t(31)},{label:'м§Ғмӣҗ F',count:2789,last:_t(25)},{label:'м§Ғмӣҗ G',count:2449,last:_t(27)},{label:'м§Ғмӣҗ H',count:2394,last:_t(360)}],
  report:{ts:_t(12),report:{verdict:'WARN',confidence:0.6,summary:'нҷңлҸҷлҹүмқҙ мқјл¶Җ лӢҙлӢ№мһҗм—җ м§‘мӨ‘лҸј мһҲмңјлӮҳ лқјлІЁ/мӢ лў°лҸ„к°Җ лӮ®м•„ м—…л¬ҙ нҷ•м •мқҖ л¶Җл¶„м ҒмңјлЎңл§Ң к°ҖлҠҘ(WARN).',forecast:[{horizon:'15л¶„',work:'ERP мӢңнҠё к°’ мһ…л ҘВ·м „мҶЎ м§ҖмҶҚ',owner:'м§Ғмӣҗ A',etaMin:15,basis:'лӢӨмӨ‘мҶҢмҠӨ к·јкұ°'},{horizon:'60л¶„',work:'кұ°лһҳмІҳ нҶЎл°© л¬ёмқҳ мқ‘лҢҖВ·лӢҙлӢ№ мқёкі„',owner:'м§Ғмӣҗ D',etaMin:45,basis:'мқёкі„ мҷ•ліө нҢЁн„ҙ'},{horizon:'240л¶„',work:'ERP мұ„к¶Ң/лҜёмҲҳкёҲ мЎ°нҡҢ л°ҳліө',owner:'м§Ғмӣҗ E',etaMin:180,basis:'ERP мЎ°нҡҢ'}],bottlenecks:[{work:'кұ°лһҳмІҳ мқ‘лҢҖ мқёкі„',cause:'лӢҙлӢ№ к°„ мқёкі„ мҲҳмӢӯ нҡҢ мҷ•ліө',action:'1м°Ё лӢҙлӢ№ кі м •В·к·ңм№ҷ лӘ…л¬ёнҷ”'},{work:'мӢңнҠё мһ…л Ҙ',cause:'1мқё м§‘мӨ‘',action:'л°ұм—… лӢҙлӢ№ м§Җм •'}],loads:[{person:'м§Ғмӣҗ A',level:'лҶ’мқҢ',basis:'лӢЁмқј м„ём…ҳ л°ҳліө м§‘мӨ‘'},{person:'м§Ғмӣҗ D',level:'лҶ’мқҢ',basis:'нҶЎл°© мқ‘лҢҖ лӢӨмҲҳ'},{person:'м§Ғмӣҗ E',level:'ліҙнҶө',basis:'ERP мЎ°нҡҢ мң„мЈј'}],automation:[{method:'API',unit:'мұ„к¶ҢВ·мһ…м¶ңкёҲ л§Өм№ӯ мЎ°нҡҢ л°ҳліө',basis:'3нҡҢ+В·м •нҳ•'},{method:'PAD',unit:'мЈјл¬ё мӢңнҠё мһ…л Ҙ',basis:'м•Ҳм •м Ғ мһ…л Ҙ нҢЁн„ҙ'}],validations:[{verdict:'PASS',item:'мӢңк°„м¶• мқјм№ҳ',basis:'м№ҙнҶЎвҶ’мһ‘м—… м •н•©'},{verdict:'WARN',item:'кұ°лһҳмІҳ л§Өм№ӯ',basis:'лқјлІЁ мқјл¶Җ кіөл°ұ'}],disagreements:[{unit:'ERP мЎ°нҡҢ л°ҳліө',sources:'ERPл§Ң',note:'PC мһ‘м—… к·јкұ° л¶ҖмЎұ'}]}},
  pcs:[{hostname:'нҡҢмӮ¬ PC-1',user_id:'********',event_count:32000,last_seen:_t(3)},{hostname:'нҡҢмӮ¬ PC-2',user_id:'********',event_count:30000,last_seen:_t(4)},{hostname:'нҡҢмӮ¬ PC-3',user_id:'********',event_count:16000,last_seen:_t(8)},{hostname:'нҡҢмӮ¬ PC-4',user_id:'********',event_count:10000,last_seen:_t(360)}]
};

async function viewHome(){
  $('#view').innerHTML = '<h2>нҡҢмӮ¬ нҳ„нҷ©</h2><div class="sub">мӢӨмӢңк°„ м—…л¬ҙ лҚ°мқҙн„° мҡ”м•Ҫ (н…Ңл„ҢнҠё: nenova)</div><div id="k" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
  try{
    const [st, ppl] = DEMO ? [SAMPLE.stats, {people:SAMPLE.people}] : await Promise.all([ api('/api/ops-ontology/stats'), api('/api/flow/people') ]);
    const relTotal = (st.relations||[]).reduce((s,r)=>s+r.count,0);
    const cust = (st.goldenEntities||[]).find(g=>g.type==='customer')?.count||0;
    const people = (ppl.people||[]);
    const kpi = (n,l,cls='')=>`<div class="kpi ${cls}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
    $('#view').innerHTML = `<h2>нҡҢмӮ¬ нҳ„нҷ©</h2><div class="sub">мӢӨмӢңк°„ м—…л¬ҙ лҚ°мқҙн„° мҡ”м•Ҫ В· н…Ңл„ҢнҠё кІ©лҰ¬лҗЁ</div>
      <div class="kpis">
        ${kpi(num(st.actions),'мһ‘м—… м•Ўм…ҳ','a')}${kpi(num(st.verified),'кІҖмҰқлҗЁ(3мҶҢмҠӨ)','g')}${kpi(num(st.automatable),'мһҗлҸҷнҷ” нӣ„ліҙ','a')}
        ${kpi(num(relTotal),'кҙҖкі„')}${kpi(num(people.length),'нҷңлҸҷ м§Ғмӣҗ')}${kpi(num(cust),'кұ°лһҳмІҳ')}
      </div>
      <div class="row2">
        <div class="panel"><h3>нҷңлҸҷ мғҒмң„ м§Ғмӣҗ</h3><table><thead><tr><th>м§Ғмӣҗ</th><th class="r">мһ‘м—…</th><th class="r">мөңк·ј</th></tr></thead><tbody>
          ${people.slice(0,8).map(p=>`<tr><td class="pii">${p.label}</td><td class="r">${num(p.count)}</td><td class="r muted">${ago(p.last)}</td></tr>`).join('')}
        </tbody></table></div>
        <div class="panel"><h3>кҙҖкі„ мў…лҘҳлі„</h3><table><thead><tr><th>кҙҖкі„</th><th class="r">кұҙмҲҳ</th></tr></thead><tbody>
          ${(st.relations||[]).map(r=>`<tr><td>${r.type}</td><td class="r">${num(r.count)}</td></tr>`).join('')}
        </tbody></table></div>
      </div>`;
  }catch(e){ $('#view').innerHTML = errBox(e); }
}

function viewFlow(){
  const q = DEMO ? '?demo=1' : (document.body.classList.contains('mask') ? '?mask=1' : '');
  $('#view').innerHTML = `<h2>м—…л¬ҙ нқҗлҰ„ мІӯмӮ¬м§„</h2><div class="sub">м§ҒмӣҗВ·кұ°лһҳмІҳВ·мқёкі„лҘј к·ёлһҳн”„лЎң. л…ёл“ң нҒҙлҰӯ вҶ’ мҰқкұ° нҢЁнӮ·.</div><iframe src="/graph.html${q}"></iframe>`;
}

async function viewInsight(){
  $('#view').innerHTML = '<h2>мҡҙмҳҒ мқёмӮ¬мқҙнҠё</h2><div class="sub">AI м—җмқҙм „нҠё мӮ°м¶ң (4мӢңк°„ мЈјкё°, л¬ҙкіјкёҲ CLI)</div><div id="ins" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
  try{
    const d = DEMO ? {latest:SAMPLE.report} : await api('/api/flow/ops-report'); const L = d.latest;
    if(!L){ $('#ins').innerHTML = '<div class="panel muted">м•„м§Ғ лҰ¬нҸ¬нҠёк°Җ м—ҶмҠөлӢҲлӢӨ. owner PC м—җмқҙм „нҠё мӣҢм»Өк°Җ мғқм„ұн•ҳл©ҙ н‘ңмӢңлҗ©лӢҲлӢӨ.</div>'; return; }
    const r = L.report||{};
    const sec = (t,rows)=> rows&&rows.length?`<div class="sec"><b>${t}</b>${rows.join('')}</div>`:'';
    $('#ins').innerHTML = `<div class="panel">
      <h3>мў…н•© нҢҗм • <span class="verdict v-${r.verdict||'WARN'}">${r.verdict||'-'} ${r.confidence||0}</span> <span class="muted" style="font-weight:400">В· ${ago(L.ts)} к°ұмӢ </span></h3>
      <div class="muted">${r.summary||''}</div>
      ${sec('рҹ”® мҳҲмёЎВ·лӢӨмқҢ м•Ўм…ҳ',(r.forecast||[]).map(f=>`<div class="item"><span class="tag">${f.horizon||''}</span>${f.work||''} В· ${f.owner||''} ${f.etaMin?'('+f.etaMin+'л¶„)':''}<br><span class="muted">${f.basis||''}</span></div>`))}
      ${sec('рҹҡ§ лі‘лӘ©',(r.bottlenecks||[]).map(b=>`<div class="item">${b.work||''} вҖ” ${b.cause||''}<br><span class="muted">мЎ°м№ҳ: ${b.action||''}</span></div>`))}
      ${sec('рҹ‘Ҙ лӢҙлӢ№мһҗ л¶Җн•ҳ',(r.loads||[]).map(l=>`<div class="item">${l.person||''} В· <b style="color:${l.level==='лҶ’мқҢ'?'#e88':l.level==='ліҙнҶө'?'#e6c25a':'#5fd39b'}">${l.level||''}</b> <span class="muted">${l.basis||''}</span></div>`))}
      ${sec('вҡЎ мһҗлҸҷнҷ” нӣ„ліҙ',(r.automation||[]).map(a=>`<div class="item"><span class="tag">${a.method||''}</span>${a.unit||''} <span class="muted">${a.basis||''}</span></div>`))}
      ${sec('вң“ көҗм°ЁкІҖмҰқ',(r.validations||[]).map(v=>`<div class="item"><span class="verdict v-${v.verdict}">${v.verdict}</span> ${v.item||''} <span class="muted">${v.basis||''}</span></div>`))}
      ${sec('вҡ  мӣҗмІң л¶Ҳмқјм№ҳ',(r.disagreements||[]).map(x=>`<div class="item">${x.unit||''} <span class="muted">(${x.sources||''}) ${x.note||''}</span></div>`))}
    </div>`;
  }catch(e){ $('#ins').innerHTML = errBox(e); }
}

// в”Җв”Җ м§Ғл¬ҙ л§Өлүҙм–ј: мӮ¬лһҢлі„ н”„лЎңнҢҢмқј(м—җмқҙм „нҠё мӮ°м¶ң, 4h лЎңн…Ңмқҙм…ҳ) вҖ” мӢ мһ… мқёмҲҳмқёкі„ л¬ём„ң в”Җв”Җ
function mdLite(md){ // manualDraft л§ҲнҒ¬лӢӨмҡҙ к°„мқҙ л ҢлҚ” (мҷёл¶Җ лқјмқҙлёҢлҹ¬лҰ¬ м—Ҷмқҙ)
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc(md||'')
    .replace(/^### (.*)$/gm,'<h5 style="margin:12px 0 4px">$1</h5>')
    .replace(/^## (.*)$/gm,'<h4 style="margin:16px 0 6px">$1</h4>')
    .replace(/^# (.*)$/gm,'<h3 style="margin:16px 0 8px">$1</h3>')
    .replace(/^&gt; (.*)$/gm,'<div style="border-left:3px solid var(--amber);padding:4px 10px;color:var(--txt2);margin:6px 0">$1</div>')
    .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
    .replace(/^[-*] (.*)$/gm,'<div style="padding-left:14px">вҖў $1</div>')
    .replace(/^(\d+)\. (.*)$/gm,'<div style="padding-left:14px">$1. $2</div>')
    .replace(/\n{2,}/g,'<br>');
}
async function viewDuty(){
  $('#view').innerHTML = '<h2>м§Ғл¬ҙ л§Өлүҙм–ј</h2><div class="sub">кҙҖм°° лҚ°мқҙн„°лЎң мһ¬кө¬м„ұн•ң мӮ¬лһҢлі„ мӢӨл¬ҙ н”„лЎңнҢҢмқј вҖ” мӢ мһ… мқёмҲҳмқёкі„ мҙҲм•Ҳ (4мӢңк°„л§ҲлӢӨ 1лӘ…м”© мһҗлҸҷ к°ұмӢ )</div><div id="dt" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
  if(DEMO){ $('#dt').innerHTML = '<div class="panel muted">мғҳн”Ң лӘЁл“ңм—җм„ңлҠ” м§Ғл¬ҙ л§Өлүҙм–јмқҙ л№„кіөк°ңмһ…лӢҲлӢӨ(к°ңмқё м—…л¬ҙ м •ліҙ).</div>'; return; }
  try{
    const d = await api('/api/flow/duty-profiles');
    const ps = d.profiles||[];
    if(!ps.length){ $('#dt').innerHTML='<div class="panel muted">м•„м§Ғ мғқм„ұлҗң н”„лЎңнҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ. м—җмқҙм „нҠё мӣҢм»Өк°Җ 4мӢңк°„л§ҲлӢӨ 1лӘ…м”© мғқм„ұн•©лӢҲлӢӨ.</div>'; return; }
    $('#dt').innerHTML = `<div class="row2"><div class="panel"><h3>м§Ғмӣҗ м„ нғқ</h3><div id="dlist"></div></div>
      <div class="panel" style="grid-column:span 1" id="dbody"><div class="muted">мҷјмӘҪм—җм„ң м§Ғмӣҗмқ„ м„ нғқн•ҳм„ёмҡ”.</div></div></div>
      <style>@media(min-width:901px){#dt .row2{grid-template-columns:280px 1fr}}</style>`;
    $('#dlist').innerHTML = ps.map(p=>`<div class="item" style="cursor:pointer" data-k="${p.kind}">
      <b class="pii">${p.person||p.kind.slice(5,15)}</b> <span class="tag">м—…л¬ҙ ${p.duties}к°ң</span><br>
      <span class="muted">${(p.roleSummary||'').slice(0,60)}вҖҰ</span><br><span class="muted">${ago(p.ts)} к°ұмӢ </span></div>`).join('');
    document.querySelectorAll('#dlist .item').forEach(el=> el.onclick=()=>loadDuty(el.dataset.k));
    loadDuty(ps[0].kind);
  }catch(e){ $('#dt').innerHTML = errBox(e); }
}
async function loadDuty(kind){
  $('#dbody').innerHTML = '<div class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
  try{
    const d = await api('/api/flow/ops-report?kind='+encodeURIComponent(kind));
    const r = (d.latest||{}).report; if(!r){ $('#dbody').innerHTML='<div class="muted">м—ҶмқҢ</div>'; return; }
    const fp = r.flowPosition||{};
    $('#dbody').innerHTML = `
      <h3 class="pii">${r.person||''} <span class="muted" style="font-weight:400">мӢ лў°лҸ„ ${r.confidence??'-'} В· ${ago((d.latest||{}).ts)} к°ұмӢ  В· кҙҖм°° ${r.days||14}мқј</span></h3>
      <div class="muted" style="margin-bottom:10px">${r.roleSummary||''}</div>
      <div class="sec"><b>м—…л¬ҙ нқҗлҰ„ мң„м№ҳ</b>
        <div class="item">л°ӣмқҢ вҶҗ <span class="pii">${(fp.receivesFrom||[]).join(' В· ')||'-'}</span></div>
        <div class="item">л„ҳк№Җ вҶ’ <span class="pii">${(fp.handsTo||[]).join(' В· ')||'-'}</span></div></div>
      <div class="sec"><b>м—…л¬ҙ лӘ©лЎқ (${(r.duties||[]).length})</b>
        ${(r.duties||[]).map((du,i)=>`<div class="item"><b>${i+1}. ${du.name||''}</b> <span class="tag">${du.frequency||''}</span>
          ${du.when?`<br><span class="muted">мӢңмһ‘ мӢ нҳё: ${du.when}</span>`:''}
          <br>${(du.procedure||[]).map((s,j)=>`<span class="muted">${j+1})</span> ${s}`).join('<br>')}
          ${du.inputsFrom||du.outputsTo?`<br><span class="muted">мһ…л Ҙ: ${du.inputsFrom||'-'} вҶ’ мӮ°м¶ң: ${du.outputsTo||'-'}</span>`:''}
          ${du.evidence?`<br><span class="muted" style="font-size:11px">к·јкұ°: ${du.evidence}</span>`:''}</div>`).join('')}</div>
      <div class="sec"><b>рҹ“– мқёмҲҳмқёкі„ л¬ём„ң мҙҲм•Ҳ</b><div class="panel" style="background:var(--panel2);font-size:13px" class="pii">${mdLite(r.manualDraft)}</div></div>
      ${(r.gaps||[]).length?`<div class="sec"><b>вҡ  лҚ” кҙҖм°°мқҙ н•„мҡ”н•ң кІғ</b>${r.gaps.map(g=>`<div class="item muted">${g}</div>`).join('')}</div>`:''}`;
  }catch(e){ $('#dbody').innerHTML = errBox(e); }
}

async function viewStaff(){
  const base = location.origin;
  $('#view').innerHTML = `<h2>м§Ғмӣҗ В· м„Өм№ҳ кҙҖлҰ¬</h2><div class="sub">м§Ғмӣҗ лӘ©лЎқ В· PC/лҚ°лӘ¬ мғҒнғң В· м„Өм№ҳ л§ҒнҒ¬</div>
    <div class="panel"><h3>м§Ғмӣҗ м„Өм№ҳ л§ҒнҒ¬</h3><div class="muted">м§Ғмӣҗм—җкІҢ мқҙ л§ҒнҒ¬лҘј м „лӢ¬ вҶ’ мӢӨн–ү вҶ’ мқҙлҰ„ мһ…л Ҙ вҶ’ мһҗлҸҷ м„Өм№ҳ</div>
      <div class="copybox"><input id="inslink" value="${base}/install" readonly><button class="btn" onclick="navigator.clipboard.writeText('${base}/install');this.textContent='ліөмӮ¬лҗЁ'">ліөмӮ¬</button>
      <a class="btn" href="/install" style="text-decoration:none">м„Өм№ҳ нҢҢмқј л°ӣкё°</a></div></div>
    <div class="row2" style="margin-top:16px">
      <div class="panel"><h3>нҷңлҸҷ м§Ғмӣҗ</h3><div id="ppl" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div></div>
      <div class="panel"><h3>PC В· лҚ°лӘ¬ мғҒнғң</h3><div id="pcs" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div></div>
    </div>`;
  try{
    const ppl = DEMO ? {people:SAMPLE.people} : await api('/api/flow/people');
    $('#ppl').innerHTML = `<table><thead><tr><th>м§Ғмӣҗ</th><th class="r">мһ‘м—…</th><th class="r">мөңк·ј</th></tr></thead><tbody>
      ${(ppl.people||[]).map(p=>`<tr><td class="pii">${p.label}</td><td class="r">${num(p.count)}</td><td class="r muted">${ago(p.last)}</td></tr>`).join('')}</tbody></table>`;
  }catch(e){ $('#ppl').innerHTML = errBox(e); }
  try{
    const pc = DEMO ? {pcs:SAMPLE.pcs} : await api('/api/admin/pc-list');
    const rows = (pc.pcs||[]).slice(0,14).map(p=>{
      const live = p.last_seen && (Date.now()-new Date(p.last_seen).getTime()) < 20*60000;
      return `<tr><td><span class="dot" style="background:${live?'#2e9e6b':'#7e828a'}"></span><span class="pii">${p.hostname||'-'}</span></td><td class="muted pii">${(p.user_id||'').slice(0,10)}</td><td class="r">${num(p.event_count)}</td><td class="r muted">${ago(p.last_seen)}</td></tr>`;
    }).join('');
    $('#pcs').innerHTML = `<table><thead><tr><th>PC</th><th>кі„м •</th><th class="r">мқҙлІӨнҠё</th><th class="r">мөңк·ј</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){ $('#pcs').innerHTML = errBox(e); }
}

// в”Җв”Җ нҷ”л©ҙ нғҖмһ„лқјмқё: мӢӨм ң мәЎмІҳ мҚёл„Өмқјмқ„ мӢңк°„мҲңмңјлЎң вҖ” "мқҙ мӮ¬лһҢмқҙ л¬ҙмҠЁ нҷ”л©ҙм—җм„ң лӯҳ н–ҲлӮҳ"лҘј лҲҲмңјлЎң в”Җв”Җ
let _screenPeople = null;
async function viewScreens(){
  $('#view').innerHTML = `<h2>нҷ”л©ҙ нғҖмһ„лқјмқё</h2><div class="sub">мӢӨм ң мәЎмІҳ нҷ”л©ҙмқ„ мӢңк°„мҲңмңјлЎң вҖ” м–ҙл–Ө нҷ”л©ҙм—җм„ң л¬ҙмҠЁ мһ‘м—…мқ„ н–ҲлҠ”м§Җ лҲҲмңјлЎң нҷ•мқё. нҷ”л©ҙ нҒҙлҰӯ вҶ’ мғҒм„ё(мһ…л Ҙн•„л“ңВ·мһҗлҸҷнҷ” нҢҗлӢЁ).</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <span class="muted">м§Ғмӣҗ</span><select id="scUser" style="min-height:32px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:0 10px;font-size:13px"><option value="">м „мІҙ</option></select>
      <span class="muted">кё°к°„</span><select id="scHours" style="min-height:32px;background:var(--panel2);border:1px solid var(--border);color:var(--txt);border-radius:8px;padding:0 10px;font-size:13px"><option value="8">мөңк·ј 8мӢңк°„</option><option value="24" selected>мҳӨлҠҳ(24h)</option><option value="72">3мқј</option><option value="168">1мЈј</option></select>
      <button class="btn" id="scGo" style="padding:8px 14px">мЎ°нҡҢ</button>
    </div>
    <div id="scGrid" class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>`;
  const load = async () => {
    $('#scGrid').innerHTML = '<div class="muted">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div>';
    try{
      const uid = $('#scUser').value, hrs = $('#scHours').value;
      const d = await api(`/api/vision/thumbnails?hours=${hrs}&limit=90${uid?'&userId='+encodeURIComponent(uid):''}`);
      const ts = d.thumbnails||[];
      if(!ts.length){ $('#scGrid').innerHTML='<div class="panel muted">мқҙ мЎ°кұҙм—җ мәЎмІҳк°Җ м—ҶмҠөлӢҲлӢӨ. (м§Ғмӣҗ PCк°Җ мјңм ё нҷңлҸҷ мӨ‘мқј л•Ң нҷ”л©ҙмқҙ мҢ“мһ…лӢҲлӢӨ)</div>'; return; }
      // мӢңк°„лҢҖлі„ к·ёлЈ№(HHмӢң)лЎң л¬¶м–ҙ нқҗлҰ„мқҙ ліҙмқҙкІҢ
      const groups = {};
      for(const t of ts){ const h=new Date(t.timestamp).toLocaleString('sv-SE',{hour12:false}).slice(0,13); (groups[h]=groups[h]||[]).push(t); }
      $('#scGrid').innerHTML = Object.entries(groups).map(([h,items])=>`
        <div style="margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:700">${h.replace('T',' ')}мӢң В· ${items.length}мһҘ</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:18px">
          ${items.map(t=>{
            const auto = Number(t.automationScore)||0;
            const badge = auto>=0.6?'<span class="tag" style="color:#5fd39b">вҡЎмһҗлҸҷнҷ” нӣ„ліҙ</span>':'';
            return `<div class="scard" data-id="${t.id}" style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer">
              <img src="${t.thumbnailUrl}" loading="lazy" style="width:100%;height:124px;object-fit:cover;object-position:top;background:#0d0e10;display:block">
              <div style="padding:8px 10px">
                <div style="font-size:11px;color:var(--muted)">${new Date(t.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} В· ${(t.app||'').slice(0,18)} ${badge}</div>
                <div class="pii" style="font-size:12px;color:var(--txt2);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${t.activity||t.screen||''}</div>
              </div></div>`;
          }).join('')}
        </div>`).join('');
      // м№ҙл“ң нҒҙлҰӯ вҶ’ мғҒм„ё лӘЁлӢ¬
      const byId = Object.fromEntries(ts.map(t=>[t.id,t]));
      document.querySelectorAll('#scGrid .scard').forEach(el=> el.onclick=()=> openScreen(byId[el.dataset.id]));
    }catch(e){ $('#scGrid').innerHTML = errBox(e); }
  };
  // м§Ғмӣҗ л“ңлЎӯлӢӨмҡҙ мұ„мҡ°кё°(1нҡҢ)
  try{
    if(!_screenPeople) _screenPeople = (await api('/api/flow/people')).people||[];
    $('#scUser').innerHTML = '<option value="">м „мІҙ</option>' + _screenPeople.map(p=>`<option value="${p.userId}">${p.label}</option>`).join('');
  }catch{}
  $('#scGo').onclick = load;
  $('#scHours').onchange = load; $('#scUser').onchange = load;
  load();
}
function openScreen(t){
  if(!t) return;
  const fields = (t.fields||[]);
  const fieldRows = fields.map(f=>{
    const xy = Array.isArray(f.clickXY)?` <span style="color:#5b9dff">рҹ“Қ${f.clickXY[0]},${f.clickXY[1]}</span>`:'';
    const hr = f.humanRequired?'<span style="color:#e6c25a">мӮ¬лһҢ</span>':'<span style="color:#5fd39b">мһҗлҸҷк°ҖлҠҘ</span>';
    return `<div class="item" style="font-size:12px">${f.name||''} <span class="muted">(${f.type||''}, ${f.dataSource||''})</span> В· ${hr}${xy}${f.currentValue?` <span class="muted">= ${String(f.currentValue).slice(0,40)}</span>`:''}</div>`;
  }).join('');
  const m = document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px';
  m.innerHTML = `<div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;max-width:1100px;width:100%;max-height:92vh;overflow:auto;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:10px">
      <div><h3 style="margin:0" class="pii">${t.app||''}</h3><div class="muted" style="font-size:12px">${new Date(t.timestamp).toLocaleString('ko-KR')} В· ${t.screen||''}</div></div>
      <button class="ghost" id="scClose">лӢ«кё° вң•</button></div>
    <img src="${t.thumbnailUrl}" style="width:100%;border-radius:8px;border:1px solid var(--border);background:#0d0e10">
    <div class="sec" style="margin-top:12px"><b>л¬ҙмҠЁ мһ‘м—…</b><div class="muted pii" style="font-size:13px">${t.activity||''}</div></div>
    ${fields.length?`<div class="sec"><b>мһ…л Ҙ н•„л“ң (${fields.length}) В· рҹ“Қ=нҒҙлҰӯмўҢн‘ң</b>${fieldRows}</div>`:''}
    ${t.hint?`<div class="sec"><b>вҡЎ мһҗлҸҷнҷ” л°©лІ•</b><div class="muted" style="font-size:12px">${t.hint}</div></div>`:''}</div>`;
  m.onclick = e=>{ if(e.target===m || e.target.id==='scClose') m.remove(); };
  document.body.appendChild(m);
}

function errBox(e){
  if (e.code === 'not_onboarded') return `<div class="panel"><div style="color:#e6c25a">${e.message}</div></div>`;
  return `<div class="panel"><div style="color:#e88">л¶Ҳлҹ¬мҳӨкё° мӢӨнҢЁ: ${e.message}</div><div class="muted" style="margin-top:8px">кҙҖлҰ¬мһҗ нҶ нҒ°мқҙ н•„мҡ”н•©лӢҲлӢӨ. мҡ°мғҒлӢЁ "нҶ нҒ°"мқ„ лҲҢлҹ¬ мһ…л Ҙн•ҳкұ°лӮҳ нҡҢмӮ¬ кі„м •мңјлЎң лЎңк·ёмқён•ҳм„ёмҡ”.</div></div>`;
}

function render(v){
  state.v = v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.v===v));
  ({home:viewHome, flow:viewFlow, insight:viewInsight, duty:viewDuty, screens:viewScreens, staff:viewStaff}[v]||viewHome)();
}
// нҡҢмӮ¬ кі„м • лЎңк·ёмқё мҪңл°ұ(oauth-google.js) ліөк·Җ: ?oauth_token=... вҶ’ м„ём…ҳм—җ м ҖмһҘ нӣ„ URL м •лҰ¬
(function captureOAuthToken(){
  const qs = new URLSearchParams(location.search);
  const t = qs.get('oauth_token');
  if (t) {
    sessionStorage.setItem(KEY, t);
    qs.delete('oauth_token'); qs.delete('provider');
    const rest = qs.toString();
    history.replaceState(null, '', location.pathname + (rest ? '?'+rest : ''));
  }
})();
if(new URLSearchParams(location.search).has('mask')) document.body.classList.add('mask');
if(DEMO) document.body.classList.add('demo');
document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>render(t.dataset.v));
$('#tok').onclick = showTok;
$('#toksave').onclick = saveTok;
$('#tokin').addEventListener('keydown', e=>{ if(e.key==='Enter') saveTok(); });
if(DEMO){ render('home'); }
else if(!token()){ showTok(); $('#view').innerHTML = '<div class="panel muted">мғҒлӢЁм—җ кҙҖлҰ¬мһҗ нҶ нҒ°мқ„ мһ…л Ҙн•ҳкұ°лӮҳ нҡҢмӮ¬ кі„м •мңјлЎң лЎңк·ёмқён•ҳл©ҙ мӢӨм ң лҚ°мқҙн„°к°Җ н‘ңмӢңлҗ©лӢҲлӢӨ.</div>'; }
else render('home');
</script>
</body>
