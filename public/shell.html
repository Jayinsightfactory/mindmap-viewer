<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MOYI</title>
  <meta name="theme-color" content="#0c0e18">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0c0e18;--surface:#151827;--surface2:#1c2033;--border:#282d44;
      --text:#e9ebf6;--muted:#9aa0bd;--faint:#6b7196;
      --violet:#8b72ee;--indigo:#5f63ee;--sky:#54c6f2;--lav:#cdb4f2;
      --grad:linear-gradient(135deg,#cdb4f2,#8b72ee 38%,#5f63ee 66%,#54c6f2);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;overflow:hidden}
    .app{display:grid;grid-template-columns:76px 1fr;grid-template-rows:52px 1fr;height:100%}

    /* top bar */
    .top{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);z-index:5}
    .brand{display:flex;align-items:center;gap:9px;text-decoration:none}
    .brand img{width:26px;height:26px;display:block}
    .brand .wm{font-size:16px;font-weight:800;letter-spacing:.16em;padding-left:.16em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .vtitle{font-size:14px;font-weight:600;color:var(--muted);border-left:1px solid var(--border);padding-left:12px}
    .spring{flex:1}
    .scopes{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
    .scopes button{border:0;background:transparent;color:var(--muted);font:inherit;font-size:12px;font-weight:600;padding:5px 11px;border-radius:6px;cursor:pointer}
    .scopes button.on{background:var(--surface2);color:var(--text)}
    .tbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--muted);display:grid;place-items:center;cursor:pointer;font-size:15px;text-decoration:none}

    /* left rail */
    .rail{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;overflow-y:auto}
    .nav{width:60px;padding:9px 0;border:0;background:transparent;color:var(--muted);cursor:pointer;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;font:inherit}
    .nav .ic{font-size:19px}
    .nav .lb{font-size:10px;font-weight:600;letter-spacing:-.02em}
    .nav:hover{background:var(--surface2);color:var(--text)}
    .nav.on{background:var(--surface2);color:var(--text)}
    .nav.on .ic{filter:drop-shadow(0 0 8px rgba(139,114,238,.6))}

    /* main frame */
    .main{position:relative;background:var(--bg)}
    #frame{width:100%;height:100%;border:0;display:block;background:var(--bg)}
    .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--faint);font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s}
    .loading.on{opacity:1}

    @media(max-width:720px){
      .app{grid-template-columns:1fr;grid-template-rows:52px 1fr 62px}
      .rail{grid-row:3;grid-column:1;flex-direction:row;justify-content:space-around;border-right:0;border-top:1px solid var(--border);padding:6px 4px;gap:0}
      .nav{width:auto;flex:1;padding:5px 0}.nav .lb{font-size:9px}
      .vtitle,.scopes{display:none}
      .main{grid-row:2}
    }

    /* login */
    .authbtn{height:34px;padding:0 14px;border-radius:9px;border:0;background:var(--grad);color:#0c0e18;font:inherit;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap}
    .authbtn.in{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .modal{position:fixed;inset:0;background:rgba(6,8,16,.74);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;place-items:center;z-index:50;padding:20px}
    .modal.on{display:grid}
    .lcard{position:relative;width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 24px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
    .lb{display:flex;align-items:center;gap:9px;margin-bottom:7px}
    .lb img{width:30px;height:30px}
    .lb b{font-size:18px;font-weight:800;letter-spacing:.14em;padding-left:.14em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .lcard>p{color:var(--muted);font-size:12.5px;margin-bottom:18px}
    .oauth{display:flex;flex-direction:column;gap:9px}
    .ob{display:flex;align-items:center;justify-content:center;gap:9px;height:44px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
    .ob:hover{border-color:var(--violet)}
    .ordiv{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:11px;margin:15px 0 11px}
    .ordiv::before,.ordiv::after{content:"";height:1px;background:var(--border);flex:1}
    .lform{display:flex;flex-direction:column;gap:9px}
    .lform input{height:44px;border-radius:11px;border:1px solid var(--border);background:var(--bg);color:var(--text);padding:0 14px;font:inherit;font-size:14px}
    .lform input:focus{outline:none;border-color:var(--violet)}
    .lform button{height:44px;border-radius:11px;border:0;background:var(--grad);color:#0c0e18;font:inherit;font-size:14px;font-weight:800;cursor:pointer;margin-top:2px}
    .lerr{color:#fca5a5;font-size:12px;min-height:15px}
    .lclose{position:absolute;top:12px;right:14px;background:none;border:0;color:var(--faint);font-size:20px;cursor:pointer;line-height:1}
    .lhint{margin-top:12px;font-size:11px;color:var(--faint);text-align:center}
    .lhint a{color:var(--sky)}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <a class="brand" href="/viewer"><img src="/moyi.svg" alt="MOYI"><span class="wm">MOYI</span></a>
      <span class="vtitle" id="vtitle">내 워크스페이스</span>
      <div class="spring"></div>
      <div class="scopes" id="scopes">
        <button data-scope="me" class="on">내</button>
        <button data-scope="team">팀</button>
        <button data-scope="org">전사</button>
        <button data-scope="partner">협업사</button>
      </div>
      <a class="tbtn" href="/chat.html" title="MOYI AI">💬</a>
      <button class="authbtn" id="authBtn">로그인</button>
      <a class="tbtn" href="/settings.html" title="설정">⚙</a>
    </div>

    <nav class="rail" id="rail"></nav>

    <div class="main">
      <div class="loading" id="loading">불러오는 중…</div>
      <iframe id="frame" title="MOYI 뷰" referrerpolicy="same-origin"></iframe>
    </div>
  </div>

  <div class="modal" id="loginModal">
    <div class="lcard">
      <button class="lclose" id="lClose" aria-label="닫기">✕</button>
      <div class="lb"><img src="/moyi.svg" alt=""><b>MOYI</b></div>
      <p>로그인하면 내 작업이 자동으로 저장·정리됩니다.</p>
      <div class="oauth">
        <a class="ob" href="/api/auth/google">Google로 계속</a>
        <a class="ob" href="/api/auth/github">GitHub로 계속</a>
      </div>
      <div class="ordiv">또는 이메일</div>
      <form class="lform" id="lForm">
        <input type="email" id="lEmail" placeholder="이메일" autocomplete="email" required>
        <input type="password" id="lPw" placeholder="비밀번호" autocomplete="current-password" required>
        <div class="lerr" id="lErr"></div>
        <button type="submit">로그인</button>
      </form>
      <div class="lhint">계정이 없으신가요? PC에 설치하면 자동 등록됩니다 · <a href="/setup.html">설치</a></div>
    </div>
  </div>

  <script>
    var VIEWS = [
      {id:'home',    ic:'🏠', lb:'홈',    title:'내 워크스페이스',   url:'/app.html'},
      {id:'graph',   ic:'🕸️', lb:'그래프', title:'그래프 · 맵',       url:'/orbit3d.html'},
      {id:'status',  ic:'📊', lb:'현황',   title:'현황 · 분석',       url:'/admin-analysis.html'},
      {id:'auto',    ic:'⚡', lb:'자동화', title:'자동화 · 솔루션',    url:'/automation-flow.html'},
      {id:'comm',    ic:'💬', lb:'소통',   title:'커뮤니케이션',       url:'/chat.html'},
      {id:'market',  ic:'🛒', lb:'마켓',   title:'마켓',              url:'/solution-market.html'},
      {id:'settings',ic:'⚙️', lb:'설정',   title:'설정 · 계정',        url:'/settings.html'},
      {id:'setup',   ic:'🚀', lb:'설치',   title:'설치 · 가이드',      url:'/setup.html'}
    ];
    var rail = document.getElementById('rail');
    var frame = document.getElementById('frame');
    var vtitle = document.getElementById('vtitle');
    var loading = document.getElementById('loading');
    var scope = 'me';

    VIEWS.forEach(function(v){
      var a = document.createElement('a');
      a.className = 'nav'; a.href = '#' + v.id; a.dataset.id = v.id;
      a.innerHTML = '<span class="ic">'+v.ic+'</span><span class="lb">'+v.lb+'</span>';
      rail.appendChild(a);
    });

    function viewById(id){ for (var i=0;i<VIEWS.length;i++) if (VIEWS[i].id===id) return VIEWS[i]; return VIEWS[0]; }
    function srcFor(v){ return v.url + (v.url.indexOf('?')<0?'?':'&') + 'scope=' + scope + '&embed=1'; }

    function go(id){
      var v = viewById(id);
      vtitle.textContent = v.title;
      loading.classList.add('on');
      frame.src = srcFor(v);
      document.querySelectorAll('.nav').forEach(function(n){ n.classList.toggle('on', n.dataset.id===v.id); });
      if (location.hash.slice(1)!==v.id) history.replaceState(null,'','#'+v.id);
      document.title = 'MOYI · ' + v.title;
    }
    frame.addEventListener('load', function(){ loading.classList.remove('on'); });

    document.getElementById('scopes').addEventListener('click', function(e){
      var b = e.target.closest('button'); if(!b) return;
      scope = b.dataset.scope;
      document.querySelectorAll('#scopes button').forEach(function(x){ x.classList.toggle('on', x===b); });
      go(location.hash.slice(1) || 'home'); // reload current view with new scope
    });
    window.addEventListener('hashchange', function(){ go(location.hash.slice(1) || 'home'); });

    go(location.hash.slice(1) || 'home');

    /* ── 로그인 ── */
    var authBtn = document.getElementById('authBtn');
    var modal = document.getElementById('loginModal');
    function token(){ return localStorage.getItem('orbit_token') || localStorage.getItem('orbitToken') || ''; }
    function openLogin(){ modal.classList.add('on'); var e=document.getElementById('lEmail'); if(e) setTimeout(function(){e.focus();},50); }
    function closeLogin(){ modal.classList.remove('on'); }
    document.getElementById('lClose').addEventListener('click', closeLogin);
    modal.addEventListener('click', function(e){ if(e.target===modal) closeLogin(); });
    authBtn.addEventListener('click', function(){
      if (authBtn.dataset.in==='1'){
        if (confirm('로그아웃 할까요?')){ localStorage.removeItem('orbit_token'); localStorage.removeItem('orbitToken'); document.cookie='orbit_token=;path=/;max-age=0'; location.reload(); }
      } else openLogin();
    });
    document.getElementById('lForm').addEventListener('submit', function(e){
      e.preventDefault();
      var err=document.getElementById('lErr'); err.textContent='';
      var btn=this.querySelector('button'); btn.disabled=true; btn.textContent='확인 중…';
      fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: document.getElementById('lEmail').value.trim(), password: document.getElementById('lPw').value }) })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (d && d.token){
            localStorage.setItem('orbit_token', d.token);
            document.cookie='orbit_token='+d.token+';path=/;max-age='+(60*60*24*30)+';samesite=lax';
            location.reload();
          } else { err.textContent=(d && d.error) || '이메일 또는 비밀번호를 확인하세요.'; btn.disabled=false; btn.textContent='로그인'; }
        })
        .catch(function(){ err.textContent='로그인 실패 — 다시 시도하세요.'; btn.disabled=false; btn.textContent='로그인'; });
    });
    // 로그인 상태 반영 (미로그인 시 안내 자동 오픈)
    (function(){
      var t = token();
      if (!t){ authBtn.textContent='로그인'; setTimeout(openLogin, 350); return; }
      fetch('/api/me', { headers:{'Authorization':'Bearer '+t} })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(u){
          if (u && (u.name || u.email)){ authBtn.textContent = u.name || u.email; authBtn.classList.add('in'); authBtn.dataset.in='1'; authBtn.title='로그아웃'; }
          else { authBtn.textContent='로그인'; setTimeout(openLogin, 350); }
        })
        .catch(function(){ authBtn.textContent='로그인'; });
    })();
  </script>
</body>
</html>
