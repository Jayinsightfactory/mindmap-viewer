<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Health Dashboard</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111a2e;
    --panel-hi: #18263f;
    --border: #22304b;
    --text: #e8ecf5;
    --muted: #8899b3;
    --ok: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    --dead: #6b7280;
    --accent: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); padding: 24px; font-size: 14px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 600; }
  .controls { display: flex; gap: 8px; align-items: center; }
  button { background: var(--panel-hi); color: var(--text); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: #0b1220; border-color: var(--accent); }
  .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 32px; font-weight: 600; margin-top: 4px; }
  .stat.ok .value { color: var(--ok); }
  .stat.degraded .value { color: var(--warn); }
  .stat.silent .value { color: var(--bad); }
  .stat.dead .value { color: var(--dead); }
  .stat.total .value { color: var(--accent); }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th { background: var(--panel-hi); color: var(--muted); text-align: left; padding: 10px 12px; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .b-ok { background: rgba(52, 211, 153, 0.15); color: var(--ok); }
  .b-degraded { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .b-silent { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
  .b-dead { background: rgba(107, 114, 128, 0.2); color: var(--dead); }
  .modules { display: flex; gap: 6px; flex-wrap: wrap; }
  .mod { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
  .mod.ok { background: rgba(52, 211, 153, 0.15); color: var(--ok); }
  .mod.degraded { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .mod.paused { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
  .mod.dead, .mod.error, .mod.unloaded { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
  .actions { display: flex; gap: 4px; }
  .actions button { padding: 4px 10px; font-size: 12px; }
  .muted { color: var(--muted); font-size: 12px; }
  #status { color: var(--muted); font-size: 12px; margin-left: 8px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Orbit Health — Daemon Status</h1>
    <div class="controls">
      <span id="status">Loading...</span>
      <label><input type="checkbox" id="auto" checked> Auto-refresh 30s</label>
      <button onclick="refresh()">Refresh</button>
    </div>
  </header>

  <div class="summary" id="summary"></div>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Hostname</th>
        <th>Status</th>
        <th>Heartbeat</th>
        <th>Uptime</th>
        <th>Mem</th>
        <th>Modules</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="daemons"></tbody>
  </table>

<script>
const API_BASE = '';
let refreshTimer = null;

function fmtUptime(s) {
  if (s == null) return '-';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtAge(s) {
  if (s == null) return '-';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  return `${m}m ago`;
}
function badge(state) {
  return `<span class="badge b-${state}">${state}</span>`;
}
function moduleChip(name, mod) {
  if (!mod) return `<span class="mod unloaded">${name}:?</span>`;
  const st = mod.state || 'unknown';
  const extra = mod.secondsSinceFlush != null ? `(${mod.secondsSinceFlush}s)` : mod.secondsSinceCapture != null ? `(${mod.secondsSinceCapture}s)` : '';
  return `<span class="mod ${st}" title="${mod.lastErrorMsg || ''}">${name}:${st}${extra}</span>`;
}

async function refresh() {
  const stat = document.getElementById('status');
  stat.textContent = 'Fetching...';
  try {
    const r = await fetch(API_BASE + '/api/admin/daemon-health');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'fetch failed');

    // summary
    const sums = d.summary || { ok: 0, degraded: 0, silent: 0, dead: 0, unknown: 0 };
    document.getElementById('summary').innerHTML = `
      <div class="stat total"><div class="label">Total</div><div class="value">${d.total || 0}</div></div>
      <div class="stat ok"><div class="label">OK</div><div class="value">${sums.ok || 0}</div></div>
      <div class="stat degraded"><div class="label">Degraded</div><div class="value">${sums.degraded || 0}</div></div>
      <div class="stat silent"><div class="label">Silent</div><div class="value">${sums.silent || 0}</div></div>
      <div class="stat dead"><div class="label">Dead</div><div class="value">${sums.dead || 0}</div></div>
    `;

    // table
    const tbody = document.getElementById('daemons');
    if (!d.daemons || d.daemons.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">No daemon heartbeats received in the last hour.</td></tr>';
    } else {
      tbody.innerHTML = d.daemons.map(dm => `
        <tr>
          <td><strong>${dm.userName || dm.userId?.slice(0, 14) || '?'}</strong><br><span class="muted">${dm.email || ''}</span></td>
          <td>${dm.hostname || '?'}</td>
          <td>${badge(dm.state || 'unknown')}</td>
          <td>${fmtAge(dm.secondsSinceHeartbeat)}</td>
          <td>${fmtUptime(dm.uptime)}</td>
          <td>${dm.memMB ? dm.memMB + ' MB' : '-'}</td>
          <td class="modules">
            ${moduleChip('mouse', dm.modules?.mouse)}
            ${moduleChip('kb', dm.modules?.keyboard)}
            ${moduleChip('screen', dm.modules?.screen)}
          </td>
          <td class="actions">
            <button onclick="forceRestart('${dm.hostname}')">Restart</button>
            <button onclick="fetchLog('${dm.hostname}')">Log</button>
          </td>
        </tr>
      `).join('');
    }
    stat.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    stat.textContent = 'Error: ' + e.message;
  }
}

async function forceRestart(hostname) {
  if (!confirm(`Force restart daemon on ${hostname}?`)) return;
  try {
    const r = await fetch(API_BASE + '/api/daemon/force-restart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer orbit_admin_token_2026' },
      body: JSON.stringify({ hostname }),
    });
    const d = await r.json();
    alert(d.ok ? `Queued restart for ${hostname}` : 'Failed: ' + (d.error || 'unknown'));
    setTimeout(refresh, 2000);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function fetchLog(hostname) {
  try {
    const r = await fetch(API_BASE + '/api/admin/daemon-log?hostname=' + encodeURIComponent(hostname) + '&type=daemon');
    const d = await r.json();
    const w = window.open('', '_blank', 'width=900,height=700');
    w.document.write('<pre style="font-family:monospace;font-size:12px;padding:16px;background:#111;color:#eee;white-space:pre-wrap;">' + (d.lines || d.error || '(empty)').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) + '</pre>');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

document.getElementById('auto').addEventListener('change', e => {
  if (e.target.checked) {
    refreshTimer = setInterval(refresh, 30000);
  } else if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
});
refresh();
refreshTimer = setInterval(refresh, 30000);
</script>
</body>
</html>
