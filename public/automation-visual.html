<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orbit AI — 자동화 시각화</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --purple:#bc8cff;--red:#f85149;--orange:#ffa657;
  --cyan:#79c0ff;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',monospace,sans-serif;font-size:13px;line-height:1.5}
a{color:var(--blue);text-decoration:none}

/* ── 레이아웃 ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:24px}
.hdr h1{font-size:18px;font-weight:700;color:var(--text)}
.hdr .sub{color:var(--muted);font-size:12px}
.hdr-stats{margin-left:auto;display:flex;gap:20px}
.hdr-stat{text-align:center}
.hdr-stat .v{font-size:22px;font-weight:700;color:var(--blue)}
.hdr-stat .l{font-size:11px;color:var(--muted)}
.hdr-stat .v.green{color:var(--green)}
.hdr-stat .v.yellow{color:var(--yellow)}

.layout{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 73px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.sb-hdr{padding:8px 14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.wf-item{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px}
.wf-item:hover{background:var(--bg3)}
.wf-item.active{background:rgba(88,166,255,.08);border-left-color:var(--blue)}
.wf-item .wi-icon{width:20px;text-align:center;font-size:14px}
.wf-item .wi-name{flex:1;font-size:12px}
.wf-item .wi-badge{font-size:10px;padding:1px 6px;border-radius:10px}
.badge-live{background:rgba(63,185,80,.15);color:var(--green)}
.badge-plan{background:rgba(210,153,34,.12);color:var(--yellow)}
.sb-save{padding:12px 14px;border-top:1px solid var(--border);margin-top:8px}
.sb-save .total{font-size:11px;color:var(--muted)}
.sb-save .mins{font-size:20px;font-weight:700;color:var(--green)}

.main{overflow-y:auto;background:var(--bg)}
.main-inner{padding:20px 24px;max-width:960px}

/* ── 탭 ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:8px 16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── 워크플로우 헤더 ── */
.wf-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.wf-icon-big{font-size:32px;width:48px;text-align:center}
.wf-hdr-info h2{font-size:16px;font-weight:700;margin-bottom:4px}
.wf-hdr-info .desc{color:var(--muted);font-size:12px;margin-bottom:8px}
.wf-hdr-info .tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--muted)}
.tag.blue{border-color:rgba(88,166,255,.4);color:var(--blue);background:rgba(88,166,255,.08)}
.tag.green{border-color:rgba(63,185,80,.4);color:var(--green);background:rgba(63,185,80,.08)}
.tag.yellow{border-color:rgba(210,153,34,.4);color:var(--yellow);background:rgba(210,153,34,.08)}
.tag.purple{border-color:rgba(188,140,255,.4);color:var(--purple);background:rgba(188,140,255,.08)}
.wf-hdr-meta{margin-left:auto;text-align:right;min-width:120px}
.meta-saving{font-size:22px;font-weight:700;color:var(--green)}
.meta-label{font-size:11px;color:var(--muted)}

/* ── 플로우 다이어그램 ── */
.flow-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px}
.flow-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.flow-steps{display:flex;flex-direction:column;gap:0}
.flow-step{position:relative;display:flex;align-items:flex-start;gap:16px;padding:14px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);transition:all .3s}
.flow-step+.flow-step{margin-top:0;border-top:none;border-radius:0}
.flow-step:first-child{border-radius:6px 6px 0 0}
.flow-step:last-child{border-radius:0 0 6px 6px}
.flow-step.running{background:rgba(210,153,34,.1);border-color:var(--yellow) !important}
.flow-step.done{background:rgba(63,185,80,.07);border-color:rgba(63,185,80,.3) !important}
.flow-step.error{background:rgba(248,81,73,.08);border-color:var(--red) !important}
.fs-num{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);flex-shrink:0;margin-top:2px}
.flow-step.done .fs-num{background:rgba(63,185,80,.15);border-color:var(--green);color:var(--green)}
.flow-step.running .fs-num{background:rgba(210,153,34,.15);border-color:var(--yellow);color:var(--yellow)}
.fs-body{flex:1}
.fs-name{font-weight:600;font-size:13px;margin-bottom:2px}
.fs-tool{font-size:11px;color:var(--purple);margin-bottom:4px}
.fs-detail{font-size:12px;color:var(--muted);margin-bottom:6px}
.fs-io{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px}
.fs-in,.fs-out{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px}
.fs-in-lbl,.fs-out-lbl{color:var(--muted);margin-bottom:2px}
.fs-in code,.fs-out code{color:var(--cyan);font-family:monospace;word-break:break-all}
.fs-status{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0}
.fs-status.pending{background:rgba(139,148,158,.1);color:var(--muted)}
.fs-status.running{background:rgba(210,153,34,.15);color:var(--yellow)}
.fs-status.done{background:rgba(63,185,80,.15);color:var(--green)}
.fs-arrow{text-align:center;padding:2px 0;color:var(--border);font-size:16px;background:var(--bg2)}
.btn-run{margin-top:12px;padding:8px 18px;background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.4);color:var(--blue);border-radius:5px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-run:hover{background:rgba(88,166,255,.2)}

/* ── 예시 탭 ── */
.ex-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.ex-block h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ex-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ex-raw{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:monospace;font-size:12px;color:var(--yellow);white-space:pre-wrap;word-break:break-all}
.ex-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.ex-table th{background:var(--bg3);padding:6px 10px;text-align:left;color:var(--muted);font-weight:600;border:1px solid var(--border)}
.ex-table td{padding:6px 10px;border:1px solid var(--border);color:var(--text)}
.ex-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.ex-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.result-box{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.3);border-radius:5px;padding:10px 12px;font-size:12px;color:var(--green);margin-top:8px}

/* ── UI 미리보기 탭 ── */
.win-wrap{background:#e0e0e0;border-radius:3px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:680px}
.win-tb{background:linear-gradient(#0a246a,#3a6ea5);padding:3px 6px;display:flex;align-items:center;gap:4px}
.win-tb-title{color:#fff;font-size:11px;font-family:'Tahoma',sans-serif;flex:1;text-align:center}
.win-tb-btns{display:flex;gap:2px}
.win-tb-btn{width:16px;height:14px;border-radius:2px;border:1px solid rgba(0,0,0,.4);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000}
.win-tb-btn.min{background:linear-gradient(#d7d5cc,#c1bfb5)}
.win-tb-btn.max{background:linear-gradient(#d7d5cc,#c1bfb5)}
.win-tb-btn.cls{background:linear-gradient(#e8534a,#c4332b);color:#fff}
.win-menu{background:#f0f0f0;border-bottom:1px solid #999;padding:2px 4px;display:flex;gap:1px;font-family:Tahoma,sans-serif;font-size:11px}
.win-menu-item{padding:2px 8px;cursor:pointer;border:1px solid transparent}
.win-menu-item:hover{background:#316ac5;color:#fff;border-color:#316ac5}
.win-tb2{background:#f0f0f0;border-bottom:1px solid #999;padding:3px 6px;display:flex;align-items:center;gap:4px}
.win-btn{padding:3px 10px;background:linear-gradient(#f0f0f0,#d8d8d8);border:1px solid #999;border-radius:2px;font-family:Tahoma,sans-serif;font-size:11px;cursor:pointer;color:#000}
.win-btn:hover{background:linear-gradient(#e0e8ff,#b8d0f8);border-color:#316ac5}
.win-btn.primary{background:linear-gradient(#316ac5,#254f9c);color:#fff;border-color:#1a3a80}
.win-btn.primary:hover{background:linear-gradient(#4880d5,#316ac5)}
.win-body{background:#fff;padding:8px}
.win-form-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-family:Tahoma,sans-serif;font-size:11px}
.win-label{width:80px;text-align:right;color:#000;flex-shrink:0}
.win-input{flex:1;border:1px inset #999;padding:2px 4px;font-family:Tahoma,sans-serif;font-size:11px;background:#fff}
.win-input:focus{outline:1px solid #316ac5}
.win-select{flex:1;border:1px solid #999;padding:2px;font-family:Tahoma,sans-serif;font-size:11px}
.win-grid{border:1px solid #808080;width:100%;border-collapse:collapse;font-family:Tahoma,sans-serif;font-size:11px;margin-top:4px}
.win-grid th{background:linear-gradient(#dce3ec,#c5cfe0);padding:3px 6px;border:1px solid #808080;text-align:left;color:#000}
.win-grid td{padding:3px 6px;border:1px solid #ddd;background:#fff}
.win-grid tr.sel td{background:#316ac5;color:#fff}
.win-status{background:#f0f0f0;border-top:1px solid #999;padding:2px 6px;font-family:Tahoma,sans-serif;font-size:11px;display:flex;gap:12px}
.mock-result{margin-top:10px;font-size:11px;padding:6px 10px;border-radius:3px;display:none}
.mock-result.show{display:block}
.mock-result.ok{background:#e8ffe8;border:1px solid #5a5;color:#060}
.mock-result.err{background:#ffe8e8;border:1px solid #a55;color:#600}

/* ── 비교 탭 ── */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.cmp-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.cmp-card h4{font-size:12px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cmp-card.before h4{color:var(--red)}
.cmp-card.after h4{color:var(--green)}
.cmp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cmp-metric{font-size:12px;color:var(--muted)}
.cmp-val{font-size:15px;font-weight:700}
.cmp-bar-wrap{margin-top:16px}
.cmp-bar-row{margin-bottom:12px}
.cmp-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.cmp-bar-bg{height:16px;background:var(--bg3);border-radius:8px;overflow:hidden}
.cmp-bar-fill{height:100%;border-radius:8px;transition:width 1s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;color:#fff;font-weight:600}
.cmp-saving-box{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:16px;text-align:center}
.cmp-saving-num{font-size:28px;font-weight:700;color:var(--green)}
.cmp-saving-detail{font-size:12px;color:var(--muted);margin-top:4px}

/* ── SQL 탭 ── */
.sql-block{background:#0a0e14;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;font-family:monospace;font-size:12px}
.sql-block h4{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text);font-family:inherit}
.sql-table-deps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sql-dep{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(188,140,255,.12);border:1px solid rgba(188,140,255,.3);color:var(--purple)}
.sql-code{line-height:1.7}
.kw{color:#ff7b72}
.tbl{color:#ffa657}
.col{color:#79c0ff}
.str{color:#a5d6ff}
.cmt{color:#8b949e;font-style:italic}
.num{color:#79c0ff}
.fn{color:#d2a8ff}

/* ── 에이전트 탭 ── */
.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ag-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
.ag-card.active-agent{border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.04)}
.ag-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ag-icon{font-size:18px;width:28px;text-align:center}
.ag-name{font-size:12px;font-weight:600}
.ag-type{font-size:10px;color:var(--muted)}
.ag-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.ag-role{font-size:11px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);border-radius:4px;padding:4px 8px;color:var(--blue)}
.ag-dimmed{opacity:.3}

/* ── 반응형 ── */
@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .cmp-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>⚡ Orbit AI — 자동화 시각화</h1>
    <div class="sub">nenova 업무 자동화 파이프라인 · 전체 흐름 + 예시 + UI + SQL + 에이전트</div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><div class="v">15</div><div class="l">워크플로우</div></div>
    <div class="hdr-stat"><div class="v green" id="live-count">11</div><div class="l">LIVE</div></div>
    <div class="hdr-stat"><div class="v yellow" id="save-total">1,025</div><div class="l">분/일 절감</div></div>
    <div class="hdr-stat"><div class="v" style="color:var(--purple)" id="agent-count">15</div><div class="l">에이전트</div></div>
  </div>
</div>

<div class="layout">

<!-- ── 사이드바 ── -->
<div class="sidebar">
  <div class="sb-hdr">LIVE</div>
  <div id="wf-list-live"></div>
  <div class="sb-hdr" style="margin-top:8px">PLAN</div>
  <div id="wf-list-plan"></div>
  <div class="sb-save">
    <div class="total">총 절감 (예상)</div>
    <div class="mins">1,025분/일</div>
    <div class="total" style="margin-top:2px">≈ 17시간/일</div>
  </div>
</div>

<!-- ── 메인 ── -->
<div class="main">
<div class="main-inner" id="main-inner">
  <div style="color:var(--muted);font-size:13px;padding:40px 20px;text-align:center">
    ← 좌측에서 워크플로우를 선택하세요
  </div>
</div>
</div>

</div><!-- layout -->

<script>
// ══════════════════════════════════════════════════════════════
// 워크플로우 데이터
// ══════════════════════════════════════════════════════════════
const WF = [
  {
    id:'order', icon:'📋', name:'주문 자동입력', status:'live',
    desc:'카카오톡 단톡방 메시지 → 넷노바 주문서 자동 입력',
    tags:['카카오→DB','MEL포맷','93%정확도'],
    saving:'91', savingDetail:'8분/건 × 12건/일',
    trigger:'카카오톡 호남소재 단톡방',
    triggerIcon:'📱',
    steps:[
      {name:'클립보드 감지',tool:'clipboard-watcher.js',
       detail:'2초 간격 폴링 · [MEL] 패턴 감지 시 트리거',
       input:'클립보드 텍스트',output:'formatType: mel_order',
       color:'blue'},
      {name:'포맷 분류',tool:'automation-engine.js /parse',
       detail:'master_formats 테이블에서 패턴 매칭',
       input:'rawText 전체',output:'formatType + confidence',
       color:'purple'},
      {name:'품목 추출',tool:'_matchProduct()',
       detail:'master_products name/name_en/alias 대조',
       input:'Catherine : 30, Pride : 20',output:'ProdKey + 수량 배열',
       color:'green'},
      {name:'거래처 매핑',tool:'master_customers',
       detail:'kakao_room 필드로 거래처 자동 특정',
       input:'단톡방 이름',output:'CustKey: C-0045',
       color:'green'},
      {name:'DB 저장',tool:'parsed_orders INSERT',
       detail:'중복 체크 후 신규 주문만 INSERT',
       input:'품목배열 + 거래처',output:'ORD-2026-0325-XXXX',
       color:'orange'},
      {name:'결과 알림',tool:'slack / orbit-event',
       detail:'저장 완료 → 담당자 알림 전송',
       input:'ORD번호 + 건수',output:'알림 전송 완료',
       color:'cyan'},
    ],
    example:{
      raw:'[MEL] ROSE CHINA / Catherine : 30, Pride : 20, Doncel : 15, Novia : 25, Blossom : 10',
      table:[
        {순번:1,품목:'캐더린',영문:'Catherine',코드:'P-2851',수량:'30단',원산지:'중국',단가:'₩4,200'},
        {순번:2,품목:'프라이드',영문:'Pride',코드:'P-1944',수량:'20단',원산지:'중국',단가:'₩3,800'},
        {순번:3,품목:'돈셀',영문:'Doncel',코드:'P-3012',수량:'15단',원산지:'중국',단가:'₩5,100'},
        {순번:4,품목:'노비아',영문:'Novia',코드:'P-2233',수량:'25단',원산지:'에콰도르',단가:'₩6,500'},
        {순번:5,품목:'블라썸',영문:'Blossom',코드:'P-1780',수량:'10단',원산지:'중국',단가:'₩3,600'},
      ],
      customer:{거래처코드:'C-0045',거래처명:'호남소재',담당자:'박지수',입력일시:'2026-03-26 09:15'},
      result:'5건 주문 완료 · ORD-2026-0325-0001 ~ 0005 · 합계 ₩437,500'
    },
    compare:{
      before:{time:'8분/건',clicks:35,error:'5%',method:'넷노바 수동 입력'},
      after:{time:'0.4분/건',clicks:0,error:'0.2%',method:'자동 파싱+저장'},
      saving:'91분/일',savingPct:95,
      metrics:[
        {label:'처리시간',before:100,after:5,unit:'min/건'},
        {label:'클릭 횟수',before:100,after:0,unit:'clicks'},
        {label:'오류율',before:100,after:4,unit:'%'},
      ]
    },
    sql:{

let _cur = null;

function init() {
  const liveDiv = document.getElementById('wf-list-live');
  const planDiv = document.getElementById('wf-list-plan');
  WF.forEach(wf => {
    const el = document.createElement('div');
    el.className = 'wf-item';
    el.id = 'sb-' + wf.id;
    el.onclick = () => selectWf(wf.id);
    el.innerHTML = `<span class="wi-icon">${wf.icon}</span>
      <span class="wi-name">${wf.name}</span>
      <span class="wi-badge badge-${wf.status}">${wf.status === 'live' ? 'LIVE' : 'PLAN'}</span>`;
    (wf.status === 'live' ? liveDiv : planDiv).appendChild(el);
  });
  selectWf('order');
}

function selectWf(id) {
  _cur = WF.find(w => w.id === id);
  if (!_cur) return;
  document.querySelectorAll('.wf-item').forEach(el => el.classList.remove('active'));
  const sb = document.getElementById('sb-' + id);
  if (sb) sb.classList.add('active');
  renderMain(_cur);
}

// 탭 전환
// ══════════════════════════════════════════════════════════════
function showTab(btn, panelId) {
  const wrap = btn.closest('.tabs').parentElement;
  wrap.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  wrap.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const pane = document.getElementById(panelId);
  if (pane) pane.classList.add('active');
}

// 플로우 시뮬레이션
// ══════════════════════════════════════════════════════════════
async function runFlow(wfId) {
  const wf = WF.find(w=>w.id===wfId);
  if (!wf) return;
  // reset
  wf.steps.forEach((_,i) => {
    const el = document.getElementById(`fs-${wfId}-${i}`);
    const st = document.getElementById(`fss-${wfId}-${i}`);
    if (el) { el.className='flow-step pending'; }
    if (st) { st.className='fs-status pending'; st.textContent='대기'; }
  });
  for (let i=0; i<wf.steps.length; i++) {
    const el = document.getElementById(`fs-${wfId}-${i}`);
    const st = document.getElementById(`fss-${wfId}-${i}`);
    if (el) { el.className='flow-step running'; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    if (st) { st.className='fs-status running'; st.textContent='실행 중...'; }
    await sleep(700 + Math.random()*400);
    if (el) el.className='flow-step done';
    if (st) { st.className='fs-status done'; st.textContent='✓ 완료'; }
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Mock UI 버튼 핸들러
// ══════════════════════════════════════════════════════════════
async function mockSave(wfId, btn) {
  const wf = WF.find(w=>w.id===wfId);
  const res = document.getElementById('mock-result-'+wfId);
  const st = document.getElementById('mock-status-'+wfId);
  btn.disabled = true; btn.textContent = '💾 저장 중...';
  if (st) st.textContent = '서버로 전송 중...';
  try {
    const r = await fetch('/api/automation/master');
    const data = await r.json();
    const cnt = (data.products?.count||0) + (data.customers?.count||0);
    if (res) {
      res.className = 'mock-result show ok';
      res.innerHTML = `✅ 저장 완료 · 마스터DB ${cnt}건 확인 · ${wf?.example?.result||'처리 완료'}`;
    }
    if (st) st.textContent = `저장됨 (${new Date().toLocaleTimeString('ko')})`;
  } catch(e) {
    if (res) { res.className='mock-result show ok'; res.innerHTML=`✅ 저장 완료 (오프라인 모드) · ${wf?.example?.result||'처리 완료'}`; }
    if (st) st.textContent = '저장됨';
  }
  btn.disabled = false; btn.textContent = '💾 저장(S)';
}

function mockKakao(wfId, btn) {
  const wf = WF.find(w=>w.id===wfId);
  const res = document.getElementById('mock-result-'+wfId);
  btn.textContent = '💬 전송 중...';
  setTimeout(() => {
    btn.textContent = '💬 카카오전송';
    if (res) { res.className='mock-result show ok'; res.innerHTML=`✅ 카카오톡 전송 완료 · 호남소재 단톡방 · ${(wf?.example?.table||[]).length}건 주문 내용`; }
  }, 800);
}

async function mockExcel(wfId, btn) {
  const wf = WF.find(w=>w.id===wfId);
  const res = document.getElementById('mock-result-'+wfId);
  btn.textContent = '📊 생성 중...';
  try {
    const r = await fetch('/api/automation/master');
    const data = await r.json();
    btn.textContent = '📊 Excel출력';
    if (res) {
      res.className='mock-result show ok';
      const rows = (wf?.example?.table||[]).length;
      res.innerHTML = `✅ Excel 파일 생성 완료 · ${rows}행 · 마스터상품 ${data.products?.count||0}건 참조`;
    }
  } catch(e) {
    btn.textContent = '📊 Excel출력';
    if (res) { res.className='mock-result show ok'; res.innerHTML=`✅ Excel 파일 생성 완료 (시뮬레이션)`; }
  }
}

async function mockAutoFill(wfId, btn) {
  const wf = WF.find(w=>w.id===wfId);
  const res = document.getElementById('mock-result-'+wfId);
  const st = document.getElementById('mock-status-'+wfId);
  btn.disabled=true; btn.textContent='⚡ 처리 중...';
  if (st) st.textContent='자동 처리 중...';
  try {
    const r = await fetch(`/api/automation/workflows/${wfId}/test`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw:wf?.example?.raw})});
    const data = await r.json();
    if (res) {
      res.className='mock-result show ok';
      res.innerHTML = `⚡ 자동처리 완료 · ${data.message||wf?.example?.result||'처리 완료'}`;
    }
  } catch(e) {
    if (res) { res.className='mock-result show ok'; res.innerHTML=`⚡ 자동처리 시뮬레이션 완료 · ${wf?.example?.result||'처리 완료'}`; }
  }
  if (st) st.textContent=`자동처리 완료 (${new Date().toLocaleTimeString('ko')})`;
  btn.disabled=false; btn.textContent='⚡ 자동입력';
}
