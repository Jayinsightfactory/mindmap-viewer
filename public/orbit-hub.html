<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Orbit AI — Company OS</title>
<style>
:root{--bg:#0d1117;--s:#161b22;--s2:#1c2128;--bd:#30363d;--t:#e6edf3;--m:#8b949e;--g:#3fb950;--b:#58a6ff;--r:#f85149;--y:#d2a205;--p:#bc8cff;--o:#ffa657}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.5}
a{color:var(--b);text-decoration:none}
h2{font-size:16px;font-weight:700;color:var(--t);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
h3{font-size:13px;font-weight:600;color:var(--m);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}

#header{position:sticky;top:0;z-index:9;background:var(--s);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;align-items:center;gap:16px}
#header .title{font-weight:700;font-size:15px}
#header .links{display:flex;gap:10px;margin-left:auto}
#header .links a{font-size:12px;padding:4px 10px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--t)}
#updated{font-size:11px;color:var(--m)}

#wrap{max-width:1200px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){#wrap{grid-template-columns:1fr}}
.full{grid-column:1/-1}

/* 블록 */
.block{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:16px}

/* 테이블 */
table{width:100%;border-collapse:collapse}
th{color:var(--m);font-weight:500;padding:4px 8px;text-align:left;font-size:11px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--t)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* 바 */
.bar{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:2px}
.bar div{height:100%;border-radius:3px;transition:width .4s}

/* 인사이트 */
.insight{display:flex;gap:10px;padding:9px 12px;border-radius:6px;margin-bottom:6px;border-left:3px solid var(--bd)}
.insight.critical{background:rgba(248,81,73,.07);border-color:var(--r)}
.insight.warning{background:rgba(210,153,34,.07);border-color:var(--y)}
.insight.success{background:rgba(63,185,80,.07);border-color:var(--g)}
.insight.opportunity{background:rgba(88,166,255,.07);border-color:var(--b)}
.insight.info{background:rgba(139,148,158,.06);border-color:var(--m)}
.it{font-weight:600;color:var(--t)}
.id{color:var(--m);font-size:11px;margin-top:1px}
.ia{color:var(--b);font-size:11px;margin-top:2px}

/* 뱃지 */
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
.ok{background:rgba(63,185,80,.2);color:var(--g)}
.no{background:rgba(248,81,73,.15);color:var(--r)}
.warn{background:rgba(210,153,34,.15);color:var(--y)}

/* KPI 줄 */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.kpi{flex:1;min-width:100px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;text-align:center}
.kn{font-size:22px;font-weight:700}
.kl{font-size:10px;color:var(--m);margin-top:2px}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--bd);border-top-color:var(--b);border-radius:50%;animation:s .6s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.loading{color:var(--m);font-size:12px;padding:12px 0}
</style>
</head>
<body>

<div id="header">
  <div class="title">Orbit AI — Company OS</div>
  <div id="updated">로딩 중...</div>
  <div class="links">
    <a href="/nenova-dashboard.html">🌸 전산DB</a>
    <a href="/admin-analysis.html">📊 분석</a>
    <a href="/orbit3d.html">🌌 3D뷰</a>
  </div>
</div>

<div id="wrap">

  <!-- ① KPI -->
  <div class="block full">
    <h2>📊 전체 현황</h2>
    <div class="kpi-row" id="kpi"></div>
  </div>

  <!-- ② AI 인사이트 -->
  <div class="block">
    <h2>🧠 AI 인사이트</h2>
    <div id="insights"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ③ 의사결정 미해결 -->
  <div class="block">
    <h2>⏱ 의사결정 미해결</h2>
    <div id="decisions"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ④ 카톡 파이프라인 -->
  <div class="block full">
    <h2>💬 카톡 파이프라인 — 방별 현황</h2>
    <div id="pipeline"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑤ 이벤트타입 -->
  <div class="block">
    <h2>📋 비즈니스이벤트 타입별</h2>
    <div id="event-types"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑥ 품목 불량 -->
  <div class="block">
    <h2>⚠️ 품목별 불량 위험도</h2>
    <div id="prod-risk"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑦ 거래처 -->
  <div class="block full">
    <h2>🏢 거래처별 이벤트 × 불량 × 전산연결</h2>
    <div id="cust-risk"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑧ 네노바 품목 물량 -->
  <div class="block">
    <h2>🌸 네노바 품목별 물량</h2>
    <div id="nenova-flower"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑨ 카톡↔전산 매칭 -->
  <div class="block">
    <h2>🔗 카톡↔전산 거래처 매칭</h2>
    <div id="cross"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑩ 자동화 패턴 -->
  <div class="block full">
    <h2>⚡ 자동화 패턴 라이브러리</h2>
    <div id="patterns"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <!-- ⑪ 에이전트 상태 -->
  <div class="block full">
    <h2>🤖 에이전트 팀 — 실시간 상태</h2>
    <div id="agents"><div class="loading"><span class="spinner"></span></div></div>
  </div>

</div>

<script>
const H={'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('orbit_token')||'')};

async function load() {
  const [ta, nv, think, vision] = await Promise.all([
    fetch('/api/mining/total-analysis',{headers:H}).then(r=>r.json()).catch(()=>({})),
    fetch('/api/nenova/dashboard',{headers:H}).then(r=>r.json()).catch(()=>({})),
    fetch('/api/think/status',{headers:H}).then(r=>r.json()).catch(()=>({})),
    fetch('/api/vision/learning-status',{headers:H}).then(r=>r.json()).catch(()=>({})),
  ]);

  document.getElementById('updated').textContent = '업데이트: '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  const s=ta.summary||{};
  const cm=ta.crossMatch||{};

  // ① KPI
  const kpis=[
    {n:s.kakaoBizEvents||0,l:'비즈니스이벤트',c:'var(--b)'},
    {n:s.kakaoMessages||0,l:'카톡 메시지',c:'var(--t)'},
    {n:s.decisions||0,l:'의사결정 전체',c:'var(--t)'},
    {n:s.unresolvedDecisions||0,l:'미해결 의사결정',c:'var(--r)'},
    {n:s.defects||0,l:'불량/클레임',c:'var(--r)'},
    {n:s.nenovaOrders||0,l:'네노바 주문',c:'var(--g)'},
    {n:s.nenovaShipments||0,l:'네노바 출하',c:'var(--g)'},
    {n:s.nenovaCustomers||0,l:'거래처',c:'var(--p)'},
    {n:s.productMatches||0,l:'품목매칭',c:'var(--o)'},
    {n:(cm.matchRate||0)+'%',l:'카톡↔전산 연결율',c:cm.matchRate>60?'var(--g)':'var(--y)'},
  ];
  document.getElementById('kpi').innerHTML=kpis.map(k=>`
    <div class="kpi"><div class="kn" style="color:${k.c}">${typeof k.n==='number'?k.n.toLocaleString():k.n}</div><div class="kl">${k.l}</div></div>`).join('');

  // ② 인사이트
  document.getElementById('insights').innerHTML=(ta.insights||[]).map(i=>`
    <div class="insight ${i.level}">
      <div style="font-size:17px;line-height:1.2">${i.icon||'•'}</div>
      <div><div class="it">${i.title}</div><div class="id">${i.detail}</div><div class="ia">→ ${i.action}</div></div>
    </div>`).join('')||'<div class="loading">인사이트 없음</div>';

  // ③ 의사결정
  const ds=ta.decisionStats||{};
  document.getElementById('decisions').innerHTML=`
    <div style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap">
      <span>전체 <strong style="color:var(--t)">${ds.total||0}건</strong></span>
      <span>미해결 <strong style="color:var(--r)">${ds.unresolved||0}건</strong></span>
      <span>미해결율 <strong style="color:${(ds.unresolvedRate||0)>50?'var(--r)':'var(--y)'}">${ds.unresolvedRate||0}%</strong></span>
      <span>평균처리 <strong style="color:var(--b)">${ds.avgResponseMin||0}분</strong></span>
    </div>
    <table><thead><tr><th>발생방</th><th>전체</th><th>미해결</th><th>해결율</th></tr></thead>
    <tbody>${(ds.byRoom||[]).map(r=>`<tr>
      <td>${r.room}</td><td>${r.count}</td>
      <td style="color:${r.unresolved>0?'var(--r)':'var(--g)'}"><strong>${r.unresolved}</strong></td>
      <td>${r.count?Math.round((r.count-r.unresolved)/r.count*100):0}%</td>
    </tr>`).join('')}</tbody></table>`;

  // ④ 파이프라인
  const pipes=ta.pipelineRooms||[];
  const pMax=Math.max(...pipes.map(r=>Math.max(r.msgCount||0,r.bizEventCount||0)),1);
  document.getElementById('pipeline').innerHTML=`
    <table><thead><tr><th>방이름</th><th>목적</th><th>주요유형</th><th>메시지</th><th>비즈이벤트</th><th>불량</th><th>이슈</th><th>미해결</th><th>자동화기회</th></tr></thead>
    <tbody>${pipes.map(r=>`<tr>
      <td><strong>${r.name}</strong></td>
      <td style="color:var(--m);font-size:12px;max-width:160px">${r.purpose||''}</td>
      <td><span class="badge" style="background:rgba(88,166,255,.12);color:var(--b)">${r.mainType||'-'}</span></td>
      <td>${(r.msgCount||0).toLocaleString()}</td>
      <td style="color:var(--g)">${r.bizEventCount||0}</td>
      <td style="color:${r.defectCount>0?'var(--r)':'var(--m)'}">${r.defectCount||0}</td>
      <td>${r.issueCount||0}</td>
      <td style="color:${r.unresolvedIssues>0?'var(--r)':'var(--m)'}"><strong>${r.unresolvedIssues||0}</strong></td>
      <td style="color:var(--b);font-size:11px;max-width:140px">${r.automation||'-'}</td>
    </tr>`).join('')}</tbody></table>`;

  // ⑤ 이벤트타입
  const et=ta.eventTypes||[];
  const eMax=et[0]?.count||1;
  document.getElementById('event-types').innerHTML=et.slice(0,12).map(e=>`
    <div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:12px">
        <span>${e.type||'(없음)'}</span>
        <strong style="color:var(--b)">${e.count.toLocaleString()}</strong>
      </div>
      <div class="bar"><div style="width:${Math.round(e.count/eMax*100)}%;background:var(--b)"></div></div>
    </div>`).join('');

  // ⑥ 품목 불량
  const pr=ta.productRisk||[];
  document.getElementById('prod-risk').innerHTML=`
    <table><thead><tr><th>품목</th><th>꽃종류</th><th>국가</th><th>이벤트</th><th>불량건</th><th>불량율</th><th>전산매칭</th></tr></thead>
    <tbody>${pr.slice(0,12).map(p=>`<tr>
      <td><strong>${p.name}</strong></td>
      <td style="color:var(--m)">${p.flower||'-'}</td>
      <td style="color:var(--m)">${p.country||'-'}</td>
      <td>${p.total}</td>
      <td style="color:${p.defects>0?'var(--r)':'var(--m)'}">${p.defects}</td>
      <td><span class="badge ${p.defectRate>20?'no':p.defectRate>10?'warn':'ok'}">${p.defectRate}%</span></td>
      <td>${p.matched?'<span class="badge ok">✓</span>':'<span class="badge no">미연결</span>'}</td>
    </tr>`).join('')}</tbody></table>`;

  // ⑦ 거래처
  const cr=ta.customerRisk||[];
  document.getElementById('cust-risk').innerHTML=`
    <table><thead><tr><th>거래처</th><th>이벤트</th><th>불량</th><th>위험율</th><th>전산CustKey</th><th>그룹</th></tr></thead>
    <tbody>${cr.slice(0,15).map(c=>`<tr>
      <td><strong>${c.name}</strong></td>
      <td style="color:var(--b)">${c.total}</td>
      <td style="color:${c.defects>0?'var(--r)':'var(--m)'}">${c.defects}</td>
      <td><span class="badge ${c.riskScore>20?'no':c.riskScore>5?'warn':'ok'}">${c.riskScore}%</span></td>
      <td>${c.matched?`<span class="badge ok">${c.custKey}</span>`:'<span class="badge no">미연결</span>'}</td>
      <td style="color:var(--m)">${c.group||'-'}</td>
    </tr>`).join('')}</tbody></table>`;

  // ⑧ 네노바 품목
  const nf=nv.byFlower||[];
  const nMax=nf[0]?.total||1;
  document.getElementById('nenova-flower').innerHTML=nf.map(f=>`
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px">
        <span>${f.flower}</span>
        <strong style="color:var(--g)">${Math.round(f.total).toLocaleString()}</strong>
      </div>
      <div class="bar"><div style="width:${Math.round(f.total/nMax*100)}%;background:var(--g)"></div></div>
    </div>`).join('');

  // ⑨ 교차매칭
  const kn=cm.kakaoToNenova||[];
  const cw=cm.commonWeeks||[];
  document.getElementById('cross').innerHTML=`
    <div style="margin-bottom:12px">
      <span style="color:var(--m);font-size:11px">공통 차수(주차) </span>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">
        ${cw.slice(0,20).map(w=>`<span class="badge ok">${w}</span>`).join('')||'<span style="color:var(--m)">없음</span>'}
      </div>
    </div>
    <table><thead><tr><th>카톡 거래처</th><th>→ 네노바</th><th>이벤트수</th></tr></thead>
    <tbody>${kn.slice(0,12).map(m=>`<tr>
      <td>${m.kakao}</td>
      <td style="color:var(--g)">${m.nenova}</td>
      <td style="color:var(--b)">${m.events}</td>
    </tr>`).join('')}</tbody></table>`;

  // ⑩ 패턴
  const ao=ta.automationOpps||[];
  document.getElementById('patterns').innerHTML=`
    <table><thead><tr><th>패턴이름</th><th>분류</th><th>정확도</th><th>상태</th><th>예시</th></tr></thead>
    <tbody>${ao.map(p=>`<tr>
      <td><strong>${p.name}</strong></td>
      <td style="color:var(--m)">${p.type}</td>
      <td><span class="badge ${p.accuracy>0.8?'ok':p.accuracy>0.6?'warn':'no'}">${Math.round(p.accuracy*100)}%</span></td>
      <td><span class="badge ${p.status==='활성'||p.status==='active'?'ok':'warn'}">${p.status}</span></td>
      <td style="color:var(--m);font-size:11px;max-width:200px">${(p.example||'').substring(0,60)}</td>
    </tr>`).join('')}</tbody></table>`;

  // ⑪ 에이전트
  const agentData=[
    {ico:'🧠',name:'사고 엔진',status:think?.engine?'LIVE':'N/A',detail:think?.engine?`전이규칙 ${think.transitionModel?.rules||0}건 · 사용자 ${think.transitionModel?.users||0}명`:'응답없음'},
    {ico:'🔍',name:'Vision 학습',status:vision?.ok?'LIVE':'N/A',detail:vision?.ok?`UI요소 ${vision.elements||0}개 · 화면 ${vision.screens||0}개`:'응답없음'},
    {ico:'🔬',name:'토탈 분석',status:ta.generatedAt?'LIVE':'N/A',detail:ta.generatedAt?`이벤트 ${(s.kakaoBizEvents||0).toLocaleString()}건 · 인사이트 ${(ta.insights||[]).length}개`:'응답없음'},
    {ico:'🌸',name:'네노바 ERP',status:nv.totalOrders?'LIVE':'N/A',detail:nv.totalOrders?`주문 ${(nv.totalOrders||0).toLocaleString()}건 · 출하 ${(nv.totalShipments||0).toLocaleString()}건`:'응답없음'},
    {ico:'⚡',name:'자동화 엔진',status:ao.length?'LIVE':'N/A',detail:`패턴 ${s.patterns||0}개 감지 · 자동화기회 ${ao.length}개`},
    {ico:'💬',name:'카톡 분석',status:s.kakaoBizEvents?'LIVE':'N/A',detail:`비즈이벤트 ${(s.kakaoBizEvents||0).toLocaleString()}건 · 방 ${(ta.pipelineRooms||[]).length}개`},
  ];
  document.getElementById('agents').innerHTML=`
    <table><thead><tr><th>에이전트</th><th>상태</th><th>데이터 요약</th></tr></thead>
    <tbody>${agentData.map(a=>`<tr>
      <td><span style="font-size:16px">${a.ico}</span> <strong>${a.name}</strong></td>
      <td><span class="badge ${a.status==='LIVE'?'ok':'no'}">${a.status}</span></td>
      <td style="color:var(--m)">${a.detail}</td>
    </tr>`).join('')}</tbody></table>`;
}

load();
</script>
</body>
</html>
