<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MOYI 실시간 업무 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b22;--bg3:#1f2733;--border:#30363d;
  --text:#e6edf3;--dim:#8b949e;
  --green:#3fb950;--yellow:#e3b341;--red:#f85149;--blue:#58a6ff;
  --purple:#bc8cff;--orange:#f0883e;--teal:#39d353;--pink:#f778ba;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px;min-height:100vh}

/* ── TOPBAR ── */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
#topbar h1{font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap}
#tinput{flex:1;max-width:400px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--dim);padding:5px 9px;font-size:11px;font-family:monospace}
#tinput:focus{outline:none;border-color:var(--blue);color:var(--text)}
#rbtn{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 11px;cursor:pointer;font-size:12px}
#rbtn:hover{border-color:var(--blue);color:var(--blue)}
#sline{font-size:11px;color:var(--dim);margin-left:auto}
#sline .ok{color:var(--green)} #sline .er{color:var(--red)}

/* ── KPI ── */
#krow{display:flex;gap:10px;padding:12px 18px 0}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1;min-width:100px}
.kv{font-size:22px;font-weight:700;line-height:1.1}
.kl{font-size:10px;color:var(--dim);margin-top:3px}
.kv.g{color:var(--green)}.kv.y{color:var(--yellow)}.kv.b{color:var(--blue)}.kv.p{color:var(--purple)}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;padding:12px 18px 24px}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card.on{border-color:#26522e}.card.bk{border-color:#5a4a0a}.card.of{opacity:.65}

/* card header */
.ch{padding:11px 14px 9px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.cn{font-size:15px;font-weight:700}.chost{font-size:10px;color:var(--dim);font-family:monospace;margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;flex-shrink:0}
.bon{background:#1a3a22;color:var(--green)}.bbk{background:#3a2c08;color:var(--yellow)}.bof{background:#252525;color:var(--dim)}.bps{background:#2a2010;color:var(--orange)}

/* module row */
.mrow{display:flex;gap:4px;padding:8px 14px 6px;border-bottom:1px solid var(--border)}
.mc{flex:1;text-align:center;font-size:10px;font-weight:600;padding:3px;border-radius:4px}
.mc.ok{background:#162a1e;color:var(--green)}.mc.ps{background:#2e2208;color:var(--yellow)}.mc.no{background:#1a1a1a;color:#3a3a3a}

/* NOW section */
.sec{padding:9px 14px;border-bottom:1px solid var(--border)}
.slabel{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.now-box{background:var(--bg3);border-radius:6px;padding:8px 11px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green);animation:pulse 2s infinite}.dot.y{background:var(--yellow)}.dot.d{background:#444}
.napp{font-weight:700;color:var(--blue);font-size:13px}
.nwin{color:var(--dim);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.nstats{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--dim)}
.nstats span{display:flex;align-items:center;gap:3px}
.nstats b{color:var(--text)}

/* TIMELINE */
.tl{list-style:none;display:flex;flex-direction:column;gap:4px}
.tl-item{display:grid;grid-template-columns:40px 18px 1fr;gap:5px;align-items:baseline;font-size:11px}
.tl-time{color:var(--dim);font-family:monospace;font-size:10px}
.tl-icon{text-align:center;font-size:12px}
.tl-body{overflow:hidden}
.tl-app{font-weight:600;color:var(--blue)}
.tl-win{color:var(--dim);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-sum{color:var(--text);font-size:11px}
.tl-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.tag-key{background:#1a2a1a;color:var(--teal)}.tag-scr{background:#1a1a2e;color:var(--purple)}.tag-clp{background:#1a2a1a;color:var(--green)}.tag-etc{background:#222;color:var(--dim)}

/* STATS BAR */
.sbar{display:flex;gap:0;padding:8px 14px}
.sb{flex:1;text-align:center}
.sbv{font-size:13px;font-weight:700}.sbl{font-size:9px;color:var(--dim);margin-top:1px}

/* PEAK mini bars */
.pbar-row{display:flex;align-items:flex-end;gap:2px;height:28px;padding:4px 14px 0}
.pb{flex:1;background:#1e2430;border-radius:2px 2px 0 0;min-height:2px;cursor:default}
.pb.top{background:var(--blue)}
.ph-labels{display:flex;justify-content:space-between;padding:2px 14px 8px;font-size:9px;color:var(--dim);border-bottom:1px solid var(--border)}

/* AUTO CHIPS */
.asec{padding:9px 14px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:14px;font-size:11px;margin:2px;cursor:default}
.chip.h{background:#0d2e1a;border:1px solid #1e5e30;color:var(--green)}
.chip.m{background:#2e1e08;border:1px solid #5e3e10;color:var(--orange)}
.chip.i{background:#0d1e2e;border:1px solid #1e3e5e;color:var(--blue)}

/* loading */
#loading{text-align:center;padding:60px;color:var(--dim)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="topbar">
  <h1>⚡ MOYI 실시간 업무</h1>
  <input id="tinput" type="password" placeholder="orbit_... 토큰 입력 → Enter">
  <button id="rbtn" onclick="loadAll()">↻ 새로고침</button>
  <div id="sline">대기 중</div>
</div>

<div id="krow">
  <div class="kpi"><div class="kv g" id="k-on">-</div><div class="kl">온라인 데몬</div></div>
  <div class="kpi"><div class="kv y" id="k-bk">-</div><div class="kl">은행보안 모드</div></div>
  <div class="kpi"><div class="kv b" id="k-ev">-</div><div class="kl">오늘 이벤트</div></div>
  <div class="kpi"><div class="kv p" id="k-au">-</div><div class="kl">자동화 후보</div></div>
</div>

<div id="grid"><div id="loading"><div class="spin"></div><div>데이터 로딩 중...</div></div></div>

<script>
const BASE = location.origin;
let TOKEN = localStorage.getItem('orbit_token') || '';
let timer;

const $id = id => document.getElementById(id);
$id('tinput').value = TOKEN;
$id('tinput').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  TOKEN = e.target.value.trim();
  localStorage.setItem('orbit_token', TOKEN);
  loadAll();
});

async function api(path) {
  const r = await fetch(BASE + path, { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (!r.ok) throw new Error(r.status + ' ' + path);
  return r.json();
}

/* ── KST 시각 포맷 ── */
function kstHHMM(iso) {
  if (!iso) return '--:--';
  return new Date(iso).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Seoul' });
}
function sinceMin(iso) {
  if (!iso) return null;
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return `${s}초 전`;
  if (s < 3600) return `${Math.floor(s/60)}분 전`;
  return `${Math.floor(s/3600)}시간 전`;
}
function fmtUptime(sec) {
  if (!sec && sec !== 0) return '-';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

/* ── 이벤트 파싱 ── */
function eventIcon(type) {
  if (type === 'keyboard.chunk') return '⌨️';
  if (type === 'screen.capture' || type === 'screen.analyzed') return '📸';
  if (type === 'clipboard.change') return '📋';
  if (type === 'idle') return '💤';
  if (type === 'bank.safe' || type?.startsWith('secure')) return '🏦';
  if (type === 'daemon.crash') return '⚠️';
  if (type === 'daemon.update') return '🔄';
  return '•';
}
function eventTagClass(type) {
  if (type === 'keyboard.chunk') return 'tag-key';
  if (type?.startsWith('screen')) return 'tag-scr';
  if (type === 'clipboard.change') return 'tag-clp';
  return 'tag-etc';
}
function eventTag(type) {
  const m = { 'keyboard.chunk':'키보드', 'screen.capture':'화면캡처', 'screen.analyzed':'Vision분석', 'clipboard.change':'클립보드', 'idle':'유휴', 'bank.safe':'은행안전', 'daemon.crash':'크래시', 'daemon.update':'업데이트' };
  return m[type] || type;
}

/* ── 자동화 제안 ── */
function suggestAuto(logs, pcData) {
  const sugs = [];
  const allWin = logs.map(l => (l.windowTitle || l.window || '')).join(' ').toLowerCase();
  const allApp = logs.map(l => (l.app || '')).join(' ').toLowerCase();
  const allSum = logs.map(l => (l.summary || '')).join(' ').toLowerCase();
  const topApps = (pcData?.top_apps || []).map(a => a.app?.toLowerCase() || '');
  const allApps = (allApp + ' ' + topApps.join(' ')).toLowerCase();

  if (allWin.includes('화훼') || allApp.includes('nenova')) {
    sugs.push({ label: '🌸 nenova 반복입력 자동화', level: 'h', desc: '화훼 관리 프로그램 반복 작업 자동화' });
  }
  if (allApps.includes('kakaotalk') || allApps.includes('kakao')) {
    if (allApps.includes('nenova')) {
      sugs.push({ label: '🤖 카카오→nenova 주문 자동 입력', level: 'h', desc: '카카오톡 주문 파싱 후 자동 입력' });
    } else {
      sugs.push({ label: '💬 카카오 메시지 자동 분류', level: 'm', desc: '주문/문의/일반 메시지 자동 분류' });
    }
  }
  if (allWin.includes('excel') || allWin.includes('xlsx') || allWin.includes('매출') || allWin.includes('원가') || allWin.includes('재고')) {
    sugs.push({ label: '📊 Excel 보고서 자동 취합', level: 'h', desc: '매출/원가/재고 데이터 자동 집계' });
  }
  if (allWin.includes('외화') || allWin.includes('송금') || allWin.includes('fx') || allWin.includes('하나은행') || allWin.includes('기업뱅킹')) {
    sugs.push({ label: '💸 외화송금 결의서 자동화', level: 'h', desc: '외화송금 서류 템플릿 자동 생성' });
    sugs.push({ label: '🏦 이체내역 자동 저장', level: 'm', desc: '은행 이체 완료 후 결과 자동 문서화' });
  }
  if (allWin.includes('발주') || allSum.includes('발주')) {
    sugs.push({ label: '📦 발주서 자동 처리', level: 'h', desc: '발주서 파싱 → 재고 자동 업데이트' });
  }
  if (allSum.includes('복사/붙여넣기') || logs.some(l => (l.typingPatterns?.copyPasteRatio || 0) > 0.3)) {
    sugs.push({ label: '📋 반복 복사/붙여넣기 자동화', level: 'm', desc: '복사-붙여넣기 패턴 자동화' });
  }
  const autoOpps = logs.flatMap(l => l.patterns?.detected?.automationOpportunities || []).filter(Boolean);
  if (autoOpps.length > 0) {
    sugs.push({ label: `✨ AI 감지 패턴 ${autoOpps.length}건`, level: 'i', desc: autoOpps.slice(0,2).join(', ') });
  }
  if (sugs.length === 0) {
    sugs.push({ label: 'ℹ️ 패턴 수집 중', level: 'i', desc: '더 많은 데이터 필요' });
  }
  return sugs;
}

/* ── 이벤트 집계 ── */
function aggregateLogs(logs) {
  let totalClicks = 0, totalChars = 0, totalWords = 0, charsPerMin = 0, cpCount = 0;
  let lastApp = '', lastWindow = '', lastTime = null, activityLevel = '';
  let bankMode = false;
  let cpRatio = 0;

  const events = [];
  for (const l of logs) {
    const t = l.timestamp;
    const app = l.app || '';
    const win = l.windowTitle || '';

    if (app) { lastApp = app; }
    if (win) { lastWindow = win; }
    if (t && (!lastTime || new Date(t) > new Date(lastTime))) lastTime = t;
    if (l.activityLevel) activityLevel = l.activityLevel;

    const d = l.data || {};
    totalClicks += (l.mouseClicks || d.mouseClicks || 0);
    totalChars += (d.metrics?.totalChars || d.rawStats?.totalChars || 0);
    totalWords += (d.metrics?.wordCount || d.rawStats?.wordCount || 0);
    if (d.metrics?.accuracy) charsPerMin = Math.max(charsPerMin, d.typingPatterns?.charsPerMin || 0);
    if ((d.typingPatterns?.copyPasteRatio || 0) > 0) cpCount++;

    const typeStr = l.type || '';
    if (typeStr === 'bank.safe' || typeStr.includes('bank')) bankMode = true;

    // build timeline item
    let summary = l.summary || '';
    if (!summary && typeStr === 'screen.capture') {
      summary = `화면 캡처 — ${l.trigger || ''}${l.activityLevel ? ' / ' + l.activityLevel : ''}`;
    }
    if (!summary && typeStr === 'clipboard.change') summary = '클립보드 변경';
    if (!summary && typeStr === 'idle') summary = '유휴 상태';
    if (!summary) summary = typeStr;

    if (app && win) {
      events.push({ time: kstHHMM(t), icon: eventIcon(typeStr), type: typeStr, app, win, summary });
    } else if (summary) {
      events.push({ time: kstHHMM(t), icon: eventIcon(typeStr), type: typeStr, app: app || '-', win, summary });
    }
  }
  cpRatio = cpCount > 0 ? Math.round((cpCount / logs.length) * 100) : 0;
  return { totalClicks, totalChars, totalWords, charsPerMin, cpRatio, lastApp, lastWindow, lastTime, activityLevel, bankMode, events };
}

/* ── peak bars HTML ── */
function peakBarsHtml(peaks) {
  const maxV = Math.max(...(peaks || []).map(p => p.count), 1);
  let html = '';
  for (let h = 0; h < 24; h++) {
    const p = (peaks || []).find(x => parseInt(x.hour) === h);
    const pct = p ? Math.max(4, Math.round((p.count / maxV) * 100)) : 3;
    html += `<div class="pb${pct > 55 ? ' top' : ''}" style="height:${pct}%" title="${h}시 ${p?.count||0}건"></div>`;
  }
  return html;
}

/* ── CARD BUILDER ── */
function buildCard(daemon, logs, pcData) {
  const agg = aggregateLogs(logs);
  const sugs = suggestAuto(logs, pcData);
  const isBankMode = agg.bankMode || daemon.modules?.keyboard?.state === 'paused';
  const isOnline = daemon.state === 'ok' || daemon.state === 'paused';

  const cardClass = !isOnline ? 'of' : isBankMode ? 'bk' : 'on';
  const dotClass = !isOnline ? 'd' : isBankMode ? 'y' : 'g';
  const badge = isBankMode
    ? '<span class="badge bbk">🏦 은행보안</span>'
    : isOnline ? '<span class="badge bon">● 온라인</span>'
    : '<span class="badge bof">○ 오프라인</span>';

  const mods = daemon.modules || {};
  const modRow = ['mouse','screen','keyboard'].map(k => {
    const s = (mods[k]?.state || (isOnline ? 'ok' : 'no'));
    const lbl = k === 'mouse' ? '🖱 마우스' : k === 'screen' ? '📸 화면' : '⌨️ 키보드';
    const cls = s === 'ok' ? 'ok' : (s === 'paused' ? 'ps' : 'no');
    return `<div class="mc ${cls}">${lbl}</div>`;
  }).join('');

  const nowApp = agg.lastApp || '-';
  const nowWin = agg.lastWindow || '-';
  const lastSince = sinceMin(agg.lastTime || daemon.heartbeatAt) || '-';

  const timelineHtml = agg.events.slice(0, 8).map(e =>
    `<li class="tl-item">
      <span class="tl-time">${e.time}</span>
      <span class="tl-icon">${e.icon}</span>
      <span class="tl-body">
        ${e.app && e.app !== '-' ? `<span class="tl-app">${e.app}</span>` : ''}
        <span class="tl-tag ${eventTagClass(e.type)}">${eventTag(e.type)}</span>
        ${e.win ? `<div class="tl-win">${e.win}</div>` : ''}
        ${e.summary ? `<div class="tl-sum">${e.summary}</div>` : ''}
      </span>
    </li>`
  ).join('') || '<li style="color:var(--dim);font-size:11px">이벤트 없음</li>';

  const autoHtml = sugs.map(s =>
    `<span class="chip ${s.level}" title="${s.desc}">${s.label}</span>`
  ).join('');

  const peakHtml = peakBarsHtml(pcData?.peak_hours_kst);
  const totalEv = (pcData?.total_events || 0).toLocaleString();

  return `
<div class="card ${cardClass}">
  <div class="ch">
    <div>
      <div class="cn">${daemon.userName || pcData?.mapped?.name || '미등록'}</div>
      <div class="chost">${daemon.hostname}</div>
    </div>
    ${badge}
  </div>

  <div class="mrow">${modRow}</div>

  <div class="sbar">
    <div class="sb"><div class="sbv" style="color:var(--dim)">${totalEv}</div><div class="sbl">총 이벤트</div></div>
    <div class="sb"><div class="sbv" style="color:var(--blue)">${fmtUptime(daemon.uptime)}</div><div class="sbl">업타임</div></div>
    <div class="sb"><div class="sbv" style="color:var(--dim)">${lastSince}</div><div class="sbl">마지막 활동</div></div>
    <div class="sb"><div class="sbv" style="color:var(--orange)">${agg.totalClicks}</div><div class="sbl">클릭 수</div></div>
  </div>

  <div class="sec">
    <div class="slabel">지금 하는 일</div>
    <div class="now-box">
      <div class="dot ${dotClass}"></div>
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="napp">${nowApp}</span>
          <span class="nwin">${nowWin}</span>
        </div>
        <div class="nstats">
          ${agg.totalChars ? `<span>⌨️ <b>${agg.totalChars.toLocaleString()}</b>자 입력</span>` : ''}
          ${agg.totalWords ? `<span>📝 <b>${agg.totalWords}</b>단어</span>` : ''}
          ${agg.cpRatio ? `<span>📋 복붙 <b>${agg.cpRatio}%</b></span>` : ''}
          ${isBankMode ? '<span style="color:var(--yellow)">🏦 은행보안 모드 — 최소수집</span>' : ''}
        </div>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="slabel">최근 작업 이력</div>
    <ul class="tl">${timelineHtml}</ul>
  </div>

  <div class="sec" style="padding-bottom:4px">
    <div class="slabel">업무 시간대 (KST 24h)</div>
    <div class="pbar-row">${peakHtml}</div>
    <div class="ph-labels"><span>0시</span><span>6시</span><span>12시</span><span>18시</span><span>23시</span></div>
  </div>

  <div class="asec">
    <div class="slabel" style="margin-bottom:6px">자동화 가능</div>
    ${autoHtml}
  </div>
</div>`;
}

/* ── MAIN LOAD ── */
async function loadAll() {
  if (!TOKEN) { $id('sline').innerHTML = '<span class="er">토큰 입력 필요</span>'; return; }
  $id('sline').innerHTML = '로딩 중...';

  try {
    const [dhRes, piRes] = await Promise.all([
      api('/api/admin/daemon-health'),
      api('/api/admin/pc-inference?days=7'),
    ]);

    const daemons = dhRes.daemons || [];
    const pcMap = {};
    for (const pc of (piRes.data || [])) {
      const k = pc.user_id_raw;
      if (!pcMap[k] || (pcMap[k].total_events || 0) < (pc.total_events || 0)) pcMap[k] = pc;
    }

    // 각 데몬에 대해 학습 로그 조회 (병렬)
    const logsMap = {};
    await Promise.all(daemons.map(async d => {
      try {
        const r = await api(`/api/learning/logs?userId=${d.userId}&limit=30`);
        logsMap[d.userId] = r.logs || [];
      } catch { logsMap[d.userId] = []; }
    }));

    // KPI
    const online = daemons.filter(d => d.state === 'ok').length;
    const bankM  = daemons.filter(d => d.modules?.keyboard?.state === 'paused').length;
    const totalEv = daemons.reduce((s, d) => s + (pcMap[d.userId]?.total_events || 0), 0);
    let autoCount = 0;

    const cards = daemons.map(d => {
      const logs = logsMap[d.userId] || [];
      const pc = pcMap[d.userId] || {};
      // count high-priority automation suggestions
      const sugs = suggestAuto(logs, pc);
      autoCount += sugs.filter(s => s.level === 'h').length;
      return buildCard(d, logs, pc);
    });

    // 오프라인 직원 (강현우 등)
    const onIds = new Set(daemons.map(d => d.userId));
    for (const [uid, nm] of [['MNMRX6SR07F5FF7C0C', '강현우']]) {
      if (!onIds.has(uid)) {
        const pc = pcMap[uid] || {};
        const logsOff = await api(`/api/learning/logs?userId=${uid}&limit=15`).catch(() => ({ logs: [] }));
        const agg = aggregateLogs(logsOff.logs || []);
        const peakHtml = peakBarsHtml(pc.peak_hours_kst);
        const sugs = suggestAuto(logsOff.logs || [], pc);
        autoCount += sugs.filter(s => s.level === 'h').length;
        const autoHtml = sugs.map(s => `<span class="chip ${s.level}" title="${s.desc}">${s.label}</span>`).join('');
        cards.push(`
<div class="card of">
  <div class="ch">
    <div><div class="cn">${nm}</div><div class="chost">${pc.hostname || uid.slice(0,8)}</div></div>
    <span class="badge bof">○ 오프라인</span>
  </div>
  <div class="sbar">
    <div class="sb"><div class="sbv" style="color:var(--dim)">${(pc.total_events||0).toLocaleString()}</div><div class="sbl">총 이벤트</div></div>
    <div class="sb"><div class="sbv" style="color:var(--dim)">-</div><div class="sbl">업타임</div></div>
    <div class="sb"><div class="sbv" style="color:var(--dim)">${sinceMin(pc.last_seen)||'-'}</div><div class="sbl">마지막</div></div>
  </div>
  <div class="sec">
    <div class="slabel">마지막 활동</div>
    <ul class="tl">${agg.events.slice(0,5).map(e=>`<li class="tl-item"><span class="tl-time">${e.time}</span><span class="tl-icon">${e.icon}</span><span class="tl-body"><span class="tl-app">${e.app}</span><span class="tl-tag ${eventTagClass(e.type)}">${eventTag(e.type)}</span>${e.win?`<div class="tl-win">${e.win}</div>`:''}</span></li>`).join('') || '<li style="color:var(--dim);font-size:11px">데이터 없음</li>'}</ul>
  </div>
  <div class="sec" style="padding-bottom:4px">
    <div class="slabel">업무 시간대 (KST 24h)</div>
    <div class="pbar-row">${peakHtml}</div>
    <div class="ph-labels"><span>0시</span><span>6시</span><span>12시</span><span>18시</span><span>23시</span></div>
  </div>
  <div class="asec"><div class="slabel" style="margin-bottom:6px">자동화 가능</div>${autoHtml}</div>
</div>`);
      }
    }

    $id('k-on').textContent = online;
    $id('k-bk').textContent = bankM;
    $id('k-ev').textContent = (totalEv / 1000).toFixed(0) + 'K';
    $id('k-au').textContent = autoCount;
    $id('grid').innerHTML = cards.join('');

    const now = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    $id('sline').innerHTML = `<span class="ok">✓ ${now}</span>`;
  } catch (e) {
    $id('sline').innerHTML = `<span class="er">오류: ${e.message}</span>`;
    $id('grid').innerHTML = `<div style="padding:24px;color:var(--red)">❌ ${e.message}</div>`;
  }

  clearTimeout(timer);
  timer = setTimeout(loadAll, 20000);
}

if (TOKEN) loadAll();
else $id('sline').innerHTML = '토큰을 입력하고 Enter';
</script>
</body>
</html>
