<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⬡ Orbit Marketplace — 비즈니스 솔루션</title>
  <style>
    :root {
      --bg: #060a10; --bg2: #0d1117; --bg3: #161b22;
      --text: #f0f6fc; --text2: #c9d1d9; --text3: #8b949e;
      --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
      --orange: #ffa657; --cyan: #39d2c0; --accent: #8957e5;
      --border: #30363d; --font: 'Inter', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    .app { display: flex; flex-direction: column; height: 100vh; }
    .header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
      color: white; padding: 40px 20px; text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { font-size: 14px; opacity: 0.9; }

    .nav {
      display: flex; align-items: center; gap: 20px;
      padding: 16px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .nav-tabs { display: flex; gap: 8px; }
    .nav-tab {
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      transition: all 0.2s; font-size: 13px;
    }
    .nav-tab:hover { background: var(--bg3); }
    .nav-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    .nav-right { margin-left: auto; display: flex; gap: 12px; }
    .search-box {
      padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; width: 200px;
    }

    .main { flex: 1; overflow-y: auto; padding: 24px; display: grid; grid-template-columns: 1fr 4fr; gap: 24px; }

    /* 사이드바 */
    .sidebar { background: var(--bg2); border-radius: 8px; padding: 16px; height: fit-content; }
    .sidebar h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
    .filter-group { margin-bottom: 20px; }
    .filter-item {
      display: block; padding: 8px 0; cursor: pointer; color: var(--text3);
      font-size: 13px; transition: color 0.2s;
    }
    .filter-item:hover { color: var(--text); }
    .filter-item.active { color: var(--accent); font-weight: 600; }

    /* 솔루션 그리드 */
    .solutions { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    /* 솔루션 카드 */
    .solution-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; transition: all 0.3s; cursor: pointer; position: relative;
    }
    .solution-card:hover {
      border-color: var(--accent); box-shadow: 0 8px 24px rgba(137, 87, 229, 0.15);
      transform: translateY(-4px);
    }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-icon { font-size: 24px; }
    .card-title { flex: 1; margin: 0 12px; }
    .card-title h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text3); }

    .card-provider {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
      text-transform: uppercase;
    }
    .provider-official { background: var(--accent); color: white; }
    .provider-verified { background: var(--green); color: white; }
    .provider-community { background: var(--orange); color: white; }

    .card-rating { font-weight: 600; color: var(--orange); }

    .card-desc { font-size: 12px; color: var(--text3); margin-bottom: 12px; line-height: 1.4; }

    .card-features { margin-bottom: 12px; }
    .feature-tag {
      display: inline-block; padding: 4px 8px; background: var(--bg3);
      border-radius: 4px; font-size: 11px; color: var(--text3); margin-right: 6px; margin-bottom: 4px;
    }

    .card-roi { background: var(--bg3); padding: 12px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }
    .roi-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .roi-row:last-child { margin-bottom: 0; }
    .roi-label { color: var(--text3); }
    .roi-value { font-weight: 600; color: var(--green); }

    .card-actions {
      display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border);
    }
    .btn {
      flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      font-size: 12px; font-weight: 600; transition: all 0.2s;
    }
    .btn:hover { background: var(--bg3); }
    .btn-install { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-install:hover { background: var(--blue); }

    /* 로딩 및 상태 */
    .loading { text-align: center; padding: 40px; color: var(--text3); }
    .stats-bar { display: flex; gap: 20px; margin-bottom: 16px; padding: 16px; background: var(--bg2); border-radius: 8px; }
    .stat { flex: 1; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }

    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .solutions { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <h1>🚀 Orbit Marketplace</h1>
    <p>기업 성장을 위한 비즈니스 솔루션 카탈로그</p>
  </div>

  <!-- 네비게이션 -->
  <div class="nav">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="all">모든 솔루션</button>
      <button class="nav-tab" data-tab="featured">추천 솔루션</button>
      <button class="nav-tab" data-tab="analysis">분석 & 추천</button>
    </div>
    <div class="nav-right">
      <input type="text" class="search-box" id="searchBox" placeholder="솔루션 검색...">
    </div>
  </div>

  <!-- 메인 영역 -->
  <div class="main">
    <!-- 사이드바 -->
    <div class="sidebar">
      <h3>카테고리</h3>
      <div id="categories" class="filter-group"></div>

      <h3>공급자</h3>
      <div class="filter-group">
        <a class="filter-item active" data-provider="all">모든 공급자</a>
        <a class="filter-item" data-provider="official">공식 솔루션</a>
        <a class="filter-item" data-provider="verified">검증된 솔루션</a>
        <a class="filter-item" data-provider="community">커뮤니티 솔루션</a>
      </div>

      <h3>구현 단계</h3>
      <div class="filter-group">
        <a class="filter-item" data-phase="1">Phase 1 (즉시)</a>
        <a class="filter-item" data-phase="2">Phase 2 (3개월)</a>
        <a class="filter-item" data-phase="3">Phase 3 (장기)</a>
      </div>
    </div>

    <!-- 콘텐츠 -->
    <div>
      <div id="statsBar" class="stats-bar"></div>
      <div id="solutions" class="solutions">
        <div class="loading">로딩 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api/marketplace';
let allSolutions = [];
let currentFilter = { provider: 'all', category: null, phase: null, search: '' };

// 솔루션 로드
async function loadSolutions() {
  try {
    const res = await fetch(`${API_BASE}/solutions`);
    const data = await res.json();
    allSolutions = data.solutions;

    // 카테고리 목록 생성
    const categories = new Set(allSolutions.map(s => s.category)).sort();
    const categoriesHtml = `<a class="filter-item active" data-category="all">모든 카테고리</a>` +
      Array.from(categories).map(cat => `<a class="filter-item" data-category="${cat}">${cat}</a>`).join('');
    document.getElementById('categories').innerHTML = categoriesHtml;

    // 필터 이벤트 리스너
    document.querySelectorAll('[data-provider]').forEach(el => {
      el.addEventListener('click', (e) => {
        document.querySelectorAll('[data-provider]').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter.provider = e.target.dataset.provider;
        renderSolutions();
      });
    });

    document.querySelectorAll('[data-category]').forEach(el => {
      el.addEventListener('click', (e) => {
        document.querySelectorAll('[data-category]').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter.category = e.target.dataset.category === 'all' ? null : e.target.dataset.category;
        renderSolutions();
      });
    });

    document.querySelectorAll('[data-phase]').forEach(el => {
      el.addEventListener('click', (e) => {
        document.querySelectorAll('[data-phase]').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter.phase = parseInt(e.target.dataset.phase);
        renderSolutions();
      });
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
      currentFilter.search = e.target.value.toLowerCase();
      renderSolutions();
    });

    // 탭 전환
    document.querySelectorAll('[data-tab]').forEach(el => {
      el.addEventListener('click', (e) => {
        document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        const tab = e.target.dataset.tab;
        if (tab === 'analysis') {
          showAnalysisTab();
        } else if (tab === 'featured') {
          showFeaturedTab();
        } else {
          renderSolutions();
        }
      });
    });

    renderSolutions();
  } catch (e) {
    console.error('Failed to load solutions:', e);
    document.getElementById('solutions').innerHTML = '<div class="loading">솔루션을 로드할 수 없습니다.</div>';
  }
}

function renderSolutions() {
  let filtered = allSolutions;

  // 필터 적용
  if (currentFilter.provider !== 'all') {
    filtered = filtered.filter(s => s.provider === currentFilter.provider);
  }
  if (currentFilter.category) {
    filtered = filtered.filter(s => s.category === currentFilter.category);
  }
  if (currentFilter.phase) {
    filtered = filtered.filter(s => s.phase === currentFilter.phase);
  }
  if (currentFilter.search) {
    filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(currentFilter.search) ||
      s.description.toLowerCase().includes(currentFilter.search)
    );
  }

  // 통계 표시
  updateStats(filtered);

  // 솔루션 카드 렌더링
  const html = filtered.map(solution => `
    <div class="solution-card">
      <div class="card-header">
        <div class="card-icon">${solution.icon}</div>
        <div class="card-title">
          <h3>${solution.name}</h3>
          <div class="card-meta">
            <span class="card-provider provider-${solution.provider}">${solution.provider}</span>
            <span class="card-rating">⭐ ${solution.rating} (${solution.reviews})</span>
          </div>
        </div>
      </div>
      <p class="card-desc">${solution.description}</p>
      <div class="card-roi">
        <div class="roi-row">
          <span class="roi-label">예상 비용</span>
          <span class="roi-value">$${solution.estimatedCost}</span>
        </div>
        <div class="roi-row">
          <span class="roi-label">월 절감</span>
          <span class="roi-value">$${solution.estimatedSavings}</span>
        </div>
        <div class="roi-row">
          <span class="roi-label">구현 기간</span>
          <span class="roi-value">${solution.duration}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn" onclick="viewDetails('${solution.id}')">자세히</button>
        <button class="btn btn-install" onclick="installSolution('${solution.id}')">설치하기</button>
      </div>
    </div>
  `).join('');

  document.getElementById('solutions').innerHTML = html || '<div class="loading">검색 결과가 없습니다.</div>';
}

function updateStats(filtered) {
  const stats = {
    solutions: filtered.length,
    investment: filtered.reduce((s, x) => s + x.estimatedCost, 0),
    monthly: filtered.reduce((s, x) => s + x.estimatedSavings, 0),
    avgRating: (filtered.reduce((s, x) => s + x.rating, 0) / filtered.length).toFixed(1)
  };

  document.getElementById('statsBar').innerHTML = `
    <div class="stat">
      <div class="stat-value">${stats.solutions}</div>
      <div class="stat-label">솔루션</div>
    </div>
    <div class="stat">
      <div class="stat-value">$${stats.investment}</div>
      <div class="stat-label">전체 비용</div>
    </div>
    <div class="stat">
      <div class="stat-value">$${stats.monthly}</div>
      <div class="stat-label">월 절감</div>
    </div>
    <div class="stat">
      <div class="stat-value">${stats.avgRating}⭐</div>
      <div class="stat-label">평균 평점</div>
    </div>
  `;
}

async function showFeaturedTab() {
  try {
    const res = await fetch(`${API_BASE}/featured`);
    const data = await res.json();

    const html = data.featured.map(solution => `
      <div class="solution-card">
        <div class="card-header">
          <div class="card-icon">${solution.icon}</div>
          <div class="card-title">
            <h3>${solution.name}</h3>
            <div class="card-meta">
              <span class="card-provider provider-${solution.provider}">${solution.provider}</span>
              <span class="card-rating">⭐ ${solution.rating}</span>
            </div>
          </div>
        </div>
        <p class="card-desc">${solution.description}</p>
        <div class="card-actions">
          <button class="btn btn-install" onclick="installSolution('${solution.id}')">설치하기</button>
        </div>
      </div>
    `).join('');

    document.getElementById('solutions').innerHTML = html;
  } catch (e) {
    console.error('Failed to load featured:', e);
  }
}

function showAnalysisTab() {
  document.getElementById('solutions').innerHTML = `
    <div style="background: var(--bg2); padding: 24px; border-radius: 8px; max-width: 800px;">
      <h2 style="margin-bottom: 16px;">회사 분석 및 솔루션 추천</h2>
      <form id="analysisForm">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-weight: 600;">회사명</label>
          <input type="text" name="name" required style="width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px;">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-weight: 600;">회사 규모</label>
          <select name="size" required style="width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px;">
            <option value="">선택</option>
            <option value="10">10명</option>
            <option value="20">20명</option>
            <option value="50">50명</option>
            <option value="100">100명+</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-weight: 600;">산업</label>
          <select name="industry" required style="width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px;">
            <option value="">선택</option>
            <option value="manufacturing">제조업</option>
            <option value="sales">영업/판매</option>
            <option value="distribution">유통</option>
            <option value="services">서비스</option>
          </select>
        </div>
        <button type="submit" class="btn btn-install" style="width: 100%; padding: 12px;">분석 및 추천 받기</button>
      </form>
      <div id="analysisResult" style="margin-top: 24px;"></div>
    </div>
  `;

  document.getElementById('analysisForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const data = {
      name: form.get('name'),
      size: parseInt(form.get('size')),
      industry: form.get('industry'),
      programs: [],
      activities: {},
      recentProjects: []
    };

    try {
      const res = await fetch('/api/recommendations/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();

      if (result.ok) {
        displayAnalysisResult(result);
      }
    } catch (e) {
      console.error('Analysis failed:', e);
    }
  });
}

function displayAnalysisResult(result) {
  const html = `
    <div style="background: var(--bg3); padding: 16px; border-radius: 8px; margin-top: 16px;">
      <h3 style="margin-bottom: 12px;">📊 분석 결과</h3>
      <p style="color: var(--text3); margin-bottom: 16px;">
        총 투자비: <strong>$${result.summary.estimatedTotalInvestment}</strong> |
        월 절감: <strong>$${result.summary.estimatedMonthlyBenefit}</strong>
      </p>
      <h4 style="margin-top: 16px; margin-bottom: 8px;">추천 솔루션 (Phase 1)</h4>
      ${result.recommendations.phase1.map(r => `
        <div style="background: var(--bg2); padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid var(--accent);">
          <strong>${r.name}</strong> - $${r.estimatedCost}
          <p style="font-size: 12px; color: var(--text3); margin-top: 4px;">${r.reason}</p>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('analysisResult').innerHTML = html;
}

function viewDetails(id) {
  const solution = allSolutions.find(s => s.id === id);
  alert(`${solution.name}\n\n${solution.description}\n\nFeatures: ${solution.features.join(', ')}`);
}

function installSolution(id) {
  // 설치 로직 - 실제 구현은 사용자 인증 필요
  alert(`${allSolutions.find(s => s.id === id).name} 설치 시작!\n\n다음 단계에서 로그인이 필요합니다.`);
}

// 초기화
loadSolutions();
</script>
</body>
</html>
