<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ Orbit — 솔루션 마켓</title>
<style>
:root {
  --bg: #060a10; --bg2: #0d1117; --bg3: #161b22;
  --text: #f0f6fc; --text2: #c9d1d9; --text3: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --purple: #bc8cff;
  --orange: #ffa657; --cyan: #39d2c0; --pink: #f778ba;
  --accent: #8957e5; --red: #f85149;
  --border: #30363d;
  --font: 'Inter', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ─── 레이아웃 ─── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 52px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.tabs { display: flex; gap: 2px; }
.tab {
  padding: 6px 14px; border-radius: 6px; cursor: pointer;
  font-size: 13px; color: var(--text3); transition: all .15s;
  border: none; background: none;
}
.tab:hover { background: var(--bg3); color: var(--text2); }
.tab.active { background: var(--bg3); color: var(--text); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.btn {
  padding: 6px 14px; border-radius: 6px; font-size: 13px;
  cursor: pointer; border: 1px solid var(--border); transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.2); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { background: var(--bg3); }

.main { flex: 1; overflow-y: auto; padding: 24px; }

/* ─── 검색/필터 바 ─── */
.filter-bar {
  display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;
}
.search-box {
  flex: 1; min-width: 200px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; color: var(--text); font-size: 13px; outline: none;
  transition: border-color .15s;
}
.search-box:focus { border-color: var(--accent); }
.tag-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-btn {
  padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text3);
  transition: all .15s;
}
.tag-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(137,87,229,0.1); }

/* ─── 카드 그리드 ─── */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;
}

.solution-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.solution-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(137,87,229,0.15);
}
.solution-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--card-accent, var(--accent)); opacity: 0;
  transition: opacity .2s;
}
.solution-card:hover::before { opacity: 1; }

.card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  background: rgba(137,87,229,0.15);
}
.card-meta { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.card-author { font-size: 11px; color: var(--text3); }
.card-badge {
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
  white-space: nowrap;
}
.badge-free   { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-pro    { background: rgba(137,87,229,0.15); color: var(--purple); }
.badge-ai     { background: rgba(255,166,87,0.15); color: var(--orange); }
.badge-new    { background: rgba(88,166,255,0.15); color: var(--blue); }

.card-desc { font-size: 12px; color: var(--text3); line-height: 1.6; margin-bottom: 12px; }

.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.card-tag {
  padding: 2px 8px; border-radius: 4px; font-size: 11px;
  background: var(--bg3); color: var(--text3);
}

.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-stats { display: flex; gap: 10px; font-size: 11px; color: var(--text3); }
.card-stat { display: flex; align-items: center; gap: 3px; }
.card-actions { display: flex; gap: 6px; }
.card-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); transition: all .15s;
}
.card-btn-install { background: var(--accent); color: #fff; border-color: var(--accent); }
.card-btn-install:hover { filter: brightness(1.2); }
.card-btn-preview { background: transparent; color: var(--text2); }
.card-btn-preview:hover { background: var(--bg3); }

/* ─── 제안 섹션 (성장 엔진) ─── */
.section-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.section-title { font-size: 16px; font-weight: 600; }
.section-badge {
  padding: 2px 8px; border-radius: 20px; font-size: 11px;
  background: rgba(255,166,87,0.15); color: var(--orange);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.suggestion-card {
  background: var(--bg2); border: 1px solid var(--orange);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
  position: relative;
}
.suggestion-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--orange), var(--pink));
  border-radius: 12px 12px 0 0;
}
.sugg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sugg-icon { font-size: 20px; }
.sugg-title { font-size: 14px; font-weight: 600; flex: 1; }
.conf-bar {
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3);
}
.conf-fill {
  width: 60px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden;
}
.conf-inner { height: 100%; border-radius: 2px; transition: width .3s; }

.sugg-desc { font-size: 12px; color: var(--text3); margin-bottom: 12px; line-height: 1.6; }

.sugg-code {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; font-family: 'Courier New', monospace;
  font-size: 11px; color: var(--cyan); margin-bottom: 12px;
  max-height: 100px; overflow-y: auto; white-space: pre-wrap;
}

.sugg-actions { display: flex; align-items: center; gap: 8px; }
.vote-btn {
  display: flex; align-items: center; gap: 4px; padding: 5px 10px;
  border-radius: 6px; cursor: pointer; font-size: 12px;
  border: 1px solid var(--border); background: transparent; color: var(--text2);
  transition: all .15s;
}
.vote-btn:hover.up   { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.1); }
.vote-btn:hover.down { border-color: var(--red); color: var(--red); background: rgba(248,81,73,.1); }
.vote-btn.voted-up   { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.1); }
.vote-btn.voted-down { border-color: var(--red); color: var(--red); background: rgba(248,81,73,.1); }
.install-sugg-btn {
  margin-left: auto; padding: 5px 14px; border-radius: 6px;
  background: var(--orange); color: #000; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: filter .15s;
}
.install-sugg-btn:hover { filter: brightness(1.2); }

/* ─── 피드백 모달 ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; width: 480px; max-width: 90vw;
  transform: translateY(10px); transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.modal-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.modal-textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; color: var(--text); font-size: 13px;
  resize: vertical; min-height: 80px; outline: none; font-family: var(--font);
  transition: border-color .15s; margin-bottom: 12px;
}
.modal-textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ─── 패턴 현황 ─── */
.pattern-list { display: flex; flex-direction: column; gap: 8px; }
.pattern-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
}
.pattern-freq {
  font-size: 18px; font-weight: 700; color: var(--accent); min-width: 32px;
}
.pattern-info { flex: 1; }
.pattern-type { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
.pattern-desc { font-size: 13px; }
.pattern-sugg-count {
  font-size: 11px; color: var(--text3); white-space: nowrap;
}

/* ─── 빈 상태 ─── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; color: var(--text2); margin-bottom: 6px; }
.empty-desc { font-size: 13px; line-height: 1.6; }

/* ─── 스크롤바 ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444c56; }
</style>
</head>
<body>
<div class="app">

<!-- 탑바 -->
<div class="topbar">
  <div class="logo">⬡ Orbit</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('market')">솔루션 마켓</button>
    <button class="tab" onclick="switchTab('suggestions')">AI 제안 <span id="sugg-count-badge"></span></button>
    <button class="tab" onclick="switchTab('patterns')">패턴 현황</button>
    <button class="tab" onclick="switchTab('upload')">제출하기</button>
  </div>
  <div class="topbar-right">
    <a href="/orbit3d.html" style="color:var(--text3);font-size:12px;text-decoration:none">← Orbit</a>
    <a href="/theme-market.html" style="color:var(--text3);font-size:12px;text-decoration:none">테마 마켓</a>
  </div>
</div>

<!-- 메인 -->
<div class="main" id="main-content">

  <!-- 마켓 탭 -->
  <div id="tab-market">
    <div class="filter-bar">
      <input class="search-box" id="search-input" placeholder="스킬, 에이전트, 워크플로우 검색..."
        oninput="filterCards()">
      <div class="tag-filters" id="tag-filters"></div>
    </div>
    <div class="card-grid" id="solution-grid"></div>
  </div>

  <!-- AI 제안 탭 -->
  <div id="tab-suggestions" style="display:none">
    <div class="section-header">
      <div class="live-dot"></div>
      <span class="section-title">내 작업 패턴 기반 AI 제안</span>
      <span class="section-badge" id="sugg-total">분석 중...</span>
    </div>
    <div id="sugg-list"></div>
  </div>

  <!-- 패턴 탭 -->
  <div id="tab-patterns" style="display:none">
    <div class="section-header">
      <span class="section-title">감지된 반복 패턴</span>
    </div>
    <div class="pattern-list" id="pattern-list"></div>
  </div>

  <!-- 제출 탭 -->
  <div id="tab-upload" style="display:none">
    <div style="max-width:540px">
      <div class="section-header">
        <span class="section-title">솔루션 제출</span>
      </div>
      <form id="upload-form" style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label class="modal-label">솔루션 이름 *</label>
          <input class="search-box" id="up-name" placeholder="예: 엑셀 자동화 스크립트" style="width:100%">
        </div>
        <div>
          <label class="modal-label">설명 *</label>
          <textarea class="modal-textarea" id="up-desc" placeholder="어떤 문제를 해결하나요?"></textarea>
        </div>
        <div>
          <label class="modal-label">유형</label>
          <select class="search-box" id="up-type" style="width:100%">
            <option value="automation_script">자동화 스크립트</option>
            <option value="workflow_recipe">워크플로우 레시피</option>
            <option value="ai_agent">AI 에이전트</option>
            <option value="alias_shortcut">단축키/Alias</option>
            <option value="checklist">체크리스트</option>
            <option value="refactor_hint">리팩토링 가이드</option>
          </select>
        </div>
        <div>
          <label class="modal-label">코드/스크립트</label>
          <textarea class="modal-textarea" id="up-code" placeholder="스크립트 또는 설정 코드" style="min-height:120px;font-family:monospace"></textarea>
        </div>
        <div>
          <label class="modal-label">태그 (쉼표 구분)</label>
          <input class="search-box" id="up-tags" placeholder="python, excel, automation" style="width:100%">
        </div>
        <div>
          <label class="modal-label">가격 (0 = 무료)</label>
          <input class="search-box" id="up-price" type="number" value="0" min="0" style="width:100%">
        </div>
        <button type="button" class="btn btn-primary" onclick="submitSolution()" style="align-self:flex-start">제출하기</button>
      </form>
    </div>
  </div>

</div><!-- /main -->
</div><!-- /app -->

<!-- 피드백 모달 -->
<div class="modal-overlay" id="feedback-modal">
  <div class="modal">
    <div class="modal-title">👎 개선 제안</div>
    <div class="modal-sub">이 제안이 왜 도움이 안 됐나요? 대안을 제시해주시면 Orbit이 학습합니다.</div>
    <div class="modal-label">이유 (선택)</div>
    <textarea class="modal-textarea" id="fb-reason" placeholder="예: 이미 자동화했어요, 다른 방식을 쓰고 있어요..."></textarea>
    <div class="modal-label">더 나은 방법 제안 (선택 — 여기서 학습합니다!)</div>
    <textarea class="modal-textarea" id="fb-alternative" placeholder="예: Makefile을 쓰는게 더 낫다, n8n 워크플로우로 처리한다..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeFeedback()">취소</button>
      <button class="btn btn-primary" onclick="submitFeedback()">제출</button>
    </div>
  </div>
</div>

<!-- 설치 모달 -->
<div class="modal-overlay" id="install-modal">
  <div class="modal">
    <div class="modal-title" id="install-title">솔루션 설치</div>
    <div class="modal-sub" id="install-sub"></div>
    <pre id="install-code" class="sugg-code" style="max-height:200px"></pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInstall()">닫기</button>
      <button class="btn btn-primary" onclick="copyInstallCode()">복사</button>
    </div>
  </div>
</div>

<script>
// ─── 상태 ─────────────────────────────────────
let currentTab = 'market';
let suggestions = [];
let patterns = [];
let pendingFeedback = null;
let allSolutions = [];

const SOLUTION_TYPES = {
  automation_script: { icon: '⚙️', label: '자동화', color: '#ffa657' },
  workflow_recipe:   { icon: '🔄', label: '워크플로우', color: '#58a6ff' },
  ai_agent:          { icon: '🤖', label: 'AI 에이전트', color: '#bc8cff' },
  alias_shortcut:    { icon: '⚡', label: '단축키', color: '#39d2c0' },
  checklist:         { icon: '✅', label: '체크리스트', color: '#3fb950' },
  refactor_hint:     { icon: '🔧', label: '리팩토링', color: '#f778ba' },
  error_prevention:  { icon: '🛡️', label: '오류 예방', color: '#f85149' },
};

// ─── 탭 전환 ──────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['market','suggestions','patterns','upload'][i] === tab);
  });
  ['market','suggestions','patterns','upload'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  if (tab === 'suggestions') loadSuggestions();
  if (tab === 'patterns')    loadPatterns();
}

// ─── 마켓 데이터 ──────────────────────────────
const BUILTIN_SOLUTIONS = [

    id: 'excel-auto-py',

    type: 'automation_script',
    author: 'Orbit',
    authorId: 'orbit',
    tags: ['python', 'excel', 'automation', 'daily'],
    price: 0,
    downloads: 128,
    rating: 4.8,
    confidence: 0.92,
    featured: true,
    code: `import pandas as pd\nimport openpyxl\nfrom pathlib import Path\n\n# 사용법: python excel_auto.py input.xlsx output.xlsx\nimport sys\n\ndef process(input_file, output_file):\n    df = pd.read_excel(input_file)\n    \n    # 여기에 반복 작업 로직 추가\n    # 예: 컬럼 재배치\n    # df = df[['컬럼A', '컬럼B', '컬럼C']]\n    \n    # 예: 빈 행 제거\n    df.dropna(how='all', inplace=True)\n    \n    df.to_excel(output_file, index=False)\n    print(f"완료: {output_file}")\n\nif __name__ == '__main__':\n    process(sys.argv[1], sys.argv[2])`,
  },
  {
    id: 'git-daily-report',
    title: '일일 Git 작업 리포트',
    description: 'git log를 분석해 오늘 작업한 내용을 Slack/카카오워크 형식으로 자동 요약. Orbit과 연동하면 AI 활동도 포함.',
    type: 'automation_script',
    author: 'Orbit',
    authorId: 'orbit',
    tags: ['git', 'report', 'slack', 'daily'],
    price: 0,
    downloads: 89,
    rating: 4.6,
    code: `#!/bin/bash\n# 오늘의 Git 작업 요약\nDATE=$(date +%Y-%m-%d)\necho "=== $DATE 작업 요약 ==="\ngit log --since="$DATE 00:00" --until="$DATE 23:59" \\\n  --pretty=format:"%h %s (%an)" --no-merges\necho ""\necho "변경된 파일:"\ngit diff --stat HEAD~5..HEAD 2>/dev/null | tail -5`,
  },
  {
    id: 'orbit-claude-hook',
    title: 'Claude Code 완전 통합 훅',
    description: 'orbit init으로 자동 설치되는 훅 외에, 추가 컨텍스트(파일 내용, 에러 상세)를 Orbit에 전송하는 고급 훅 설정.',
    type: 'ai_agent',
    author: 'Orbit',
    authorId: 'orbit',
    tags: ['claude-code', 'hooks', 'orbit', 'integration'],
    price: 0,
    downloads: 203,
    rating: 4.9,
    featured: true,
    code: `// ~/.claude/settings.json 고급 훅 설정\n{\n  "hooks": {\n    "PostToolUse": [{\n      "matcher": "Write|Edit|Bash",\n      "command": "orbit hook posttooluse"\n    }],\n    "PreToolUse": [{\n      "matcher": "Bash",\n      "command": "orbit hook pretooluse"\n    }]\n  }\n}`,
  },

function renderSolutionGrid(solutions) {
  const grid = document.getElementById('solution-grid');
  if (!solutions.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">검색 결과 없음</div>
      <div class="empty-desc">다른 키워드로 검색해보세요</div>
    </div>`;
    return;
  }

  grid.innerHTML = solutions.map(s => {
    const typeInfo = SOLUTION_TYPES[s.type] || SOLUTION_TYPES.automation_script;
    const stars    = '★'.repeat(Math.floor(s.rating || 0)) + '☆'.repeat(5 - Math.floor(s.rating || 0));
    const price    = s.price === 0 ? '<span class="card-badge badge-free">무료</span>'
                   : `<span class="card-badge badge-pro">₩${s.price?.toLocaleString()}</span>`;
    const featured = s.featured ? '<span class="card-badge badge-new">추천</span>' : '';
    return `
    <div class="solution-card" style="--card-accent:${typeInfo.color}" onclick="showInstall('${s.id}')">
      <div class="card-header">
        <div class="card-icon" style="background:${typeInfo.color}22">${typeInfo.icon}</div>
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="card-author">by ${s.author} · ${typeInfo.label}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${price} ${featured}
        </div>
      </div>
      <div class="card-desc">${s.description}</div>
      <div class="card-tags">${(s.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
      <div class="card-footer">
        <div class="card-stats">
          <span class="card-stat">⬇ ${s.downloads||0}</span>
          <span class="card-stat" style="color:#ffa657">${stars.slice(0,5)}</span>
        </div>
        <div class="card-actions">
          <button class="card-btn card-btn-preview" onclick="event.stopPropagation();showInstall('${s.id}')">코드 보기</button>
          <button class="card-btn card-btn-install" onclick="event.stopPropagation();showInstall('${s.id}')">설치</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const activeTag = document.querySelector('.tag-btn.active')?.dataset.tag || '';
  const filtered = allSolutions.filter(s => {
    const matchQ   = !q || s.title.toLowerCase().includes(q) || s.description.toLowerCase().includes(q)
                      || (s.tags||[]).some(t => t.toLowerCase().includes(q));
    const matchTag = !activeTag || (s.tags||[]).includes(activeTag) || s.type === activeTag;
    return matchQ && matchTag;
  });
  renderSolutionGrid(filtered);
}

function setupTagFilters() {
  const tags = ['all', ...new Set(allSolutions.flatMap(s => s.tags || []).concat(
    Object.keys(SOLUTION_TYPES)
  ))].slice(0, 10);
  const container = document.getElementById('tag-filters');
  container.innerHTML = ['all', 'automation_script', 'workflow_recipe', 'ai_agent', 'alias_shortcut', 'excel', 'python', 'claude-code', 'orbit'].map((tag, i) => {
    const label = SOLUTION_TYPES[tag]?.label || tag === 'all' ? '전체' : tag;
    return `<button class="tag-btn ${i===0?'active':''}" data-tag="${tag==='all'?'':tag}"
      onclick="selectTag(this,'${tag==='all'?'':tag}')">${SOLUTION_TYPES[tag]?.icon||''} ${SOLUTION_TYPES[tag]?.label||tag==='all'?'전체':tag}</button>`;
  }).join('');
}

function selectTag(btn, tag) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

// ─── AI 제안 로드 ────────────────────────────────
async function loadSuggestions() {
  const list = document.getElementById('sugg-list');
  try {
    const res  = await fetch('/api/growth/suggestions?limit=10');
    suggestions = res.ok ? await res.json() : [];
  } catch { suggestions = []; }

  document.getElementById('sugg-total').textContent = suggestions.length + '개';
  document.getElementById('sugg-count-badge').textContent =
    suggestions.length ? ` (${suggestions.length})` : '';

  if (!suggestions.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔭</div>
      <div class="empty-title">아직 패턴이 없습니다</div>
      <div class="empty-desc">작업을 계속하면 Orbit이 반복 패턴을 감지하고<br>자동화 제안을 드립니다.</div>
    </div>`;
    return;
  }

  list.innerHTML = suggestions.map(s => {
    const typeInfo = SOLUTION_TYPES[s.type] || SOLUTION_TYPES.automation_script;
    const confPct  = Math.round((s.confidence || 0.5) * 100);
    const confColor = confPct >= 80 ? '#3fb950' : confPct >= 60 ? '#ffa657' : '#f85149';
    return `
    <div class="suggestion-card" id="sugg-${s.id}">
      <div class="sugg-header">
        <span class="sugg-icon">${typeInfo.icon}</span>
        <span class="sugg-title">${s.title}</span>
        <div class="conf-bar">
          <span>${confPct}%</span>
          <div class="conf-fill">
            <div class="conf-inner" style="width:${confPct}%;background:${confColor}"></div>
          </div>
        </div>
      </div>
      <div class="sugg-desc">${s.description}</div>
      ${s.code ? `<div class="sugg-code">${escHtml(s.code)}</div>` : ''}
      <div class="sugg-actions">
        <button class="vote-btn up ${s._voted==='up'?'voted-up':''}"
          onclick="vote('${s.id}','up',this)">👍 ${s.upvotes||0}</button>
        <button class="vote-btn down ${s._voted==='down'?'voted-down':''}"
          onclick="vote('${s.id}','down',this)">👎 ${s.downvotes||0}</button>
        <button class="install-sugg-btn" onclick="showInstallSugg('${s.id}')">적용하기</button>
      </div>
    </div>`;
  }).join('');
}

// ─── 패턴 로드 ──────────────────────────────────
async function loadPatterns() {
  const list = document.getElementById('pattern-list');
  try {
    const res = await fetch('/api/growth/patterns');
    patterns  = res.ok ? await res.json() : [];
  } catch { patterns = []; }

  if (!patterns.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📊</div>
      <div class="empty-title">감지된 패턴 없음</div>
      <div class="empty-desc">작업 데이터가 쌓이면 반복 패턴이 여기에 표시됩니다.</div>
    </div>`;
    return;
  }

  list.innerHTML = patterns.map(p => `
    <div class="pattern-item">
      <div class="pattern-freq">${p.frequency || 1}×</div>
      <div class="pattern-info">
        <div class="pattern-type">${p.type}</div>
        <div class="pattern-desc">${p.description}</div>
      </div>
      <div class="pattern-sugg-count">${p.suggestionCount||0}개 제안</div>
    </div>
  `).join('');
}

// ─── 투표/피드백 ─────────────────────────────────
function vote(suggestionId, direction, btn) {
  if (direction === 'down') {
    pendingFeedback = { suggestionId };
    document.getElementById('fb-reason').value = '';
    document.getElementById('fb-alternative').value = '';
    document.getElementById('feedback-modal').classList.add('open');
    return;
  }
  // 👍 즉시 전송
  fetch('/api/growth/feedback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ suggestionId, vote: 'up' }),
  }).then(() => {
    btn.classList.add('voted-up');
    const numEl = btn.querySelector('span') || btn;
    // 숫자 업데이트
    loadSuggestions();
  });
}

function closeFeedback() {
  document.getElementById('feedback-modal').classList.remove('open');
  pendingFeedback = null;
}

function submitFeedback() {
  if (!pendingFeedback) return;
  const reason = document.getElementById('fb-reason').value;
  const alt    = document.getElementById('fb-alternative').value;
  fetch('/api/growth/feedback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      suggestionId: pendingFeedback.suggestionId,
      vote: 'down',
      reason,
      alternativeIdea: alt,
    }),
  }).then(() => {
    closeFeedback();
    loadSuggestions();
  });
}

// ─── 설치/코드 보기 ───────────────────────────────
function showInstall(solutionId) {
  const sol = allSolutions.find(s => s.id === solutionId);
  if (!sol) return;
  document.getElementById('install-title').textContent = sol.title;
  document.getElementById('install-sub').textContent   = sol.description;
  document.getElementById('install-code').textContent  = sol.code || '(코드 없음)';
  document.getElementById('install-modal').classList.add('open');
}
function showInstallSugg(suggId) {
  const sugg = suggestions.find(s => s.id === suggId);
  if (!sugg) return;
  document.getElementById('install-title').textContent = sugg.title;
  document.getElementById('install-sub').textContent   = sugg.description;
  document.getElementById('install-code').textContent  = sugg.code || '(코드 없음)';
  document.getElementById('install-modal').classList.add('open');
}
function closeInstall() {
  document.getElementById('install-modal').classList.remove('open');
}
function copyInstallCode() {
  const code = document.getElementById('install-code').textContent;
  navigator.clipboard?.writeText(code).then(() => {
    document.querySelector('#install-modal .btn-primary').textContent = '복사됨 ✓';
    setTimeout(() => {
      document.querySelector('#install-modal .btn-primary').textContent = '복사';
    }, 1500);
  });
}

// ─── 제출 ────────────────────────────────────────
async function submitSolution() {
  const name  = document.getElementById('up-name').value.trim();
  const desc  = document.getElementById('up-desc').value.trim();
  const type  = document.getElementById('up-type').value;
  const code  = document.getElementById('up-code').value.trim();
  const tags  = document.getElementById('up-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const price = parseInt(document.getElementById('up-price').value) || 0;

  if (!name || !desc) { alert('이름과 설명은 필수입니다'); return; }

  try {
    const res = await fetch('/api/growth/solutions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: name, description: desc, type, code, tags, price,
        author: 'User', toolType: type }),
    });
    if (res.ok) {
      alert('제출 완료! 검토 후 마켓에 등록됩니다.');
      document.getElementById('upload-form').reset();
      switchTab('market');
      await loadMarket();
    }
  } catch (e) {
    // 서버 없어도 로컬에 추가
    allSolutions.unshift({ id: 'user-'+Date.now(), title: name, description: desc,
      type, code, tags, price, author: 'Me', downloads: 0, rating: 0 });
    renderSolutionGrid(allSolutions);
    switchTab('market');
  }
}

// ─── 마켓 로드 ──────────────────────────────────
async function loadMarket() {
  let server = [];
  try {
    const res = await fetch('/api/growth/solutions');
    if (res.ok) server = await res.json();
  } catch {}
  allSolutions = [...BUILTIN_SOLUTIONS, ...server];
  setupTagFilters();
  renderSolutionGrid(allSolutions);
}

// ─── 유틸 ────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 모달 외부 클릭 닫기
document.getElementById('feedback-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeFeedback();
});
document.getElementById('install-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeInstall();
});

// 초기 로드
loadMarket();
</script>
