<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워크스페이스 다계층 드릴다운 - 데모</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #58a6ff; margin-bottom: 20px; }
    .status { background: #161b22; padding: 15px; border-radius: 6px; margin: 15px 0; }
    .status.success { border-left: 4px solid #3fb950; }
    .status.error { border-left: 4px solid #f85149; }
    .controls {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 15px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2ea043; }
    button:disabled {
      background: #444;
      cursor: not-allowed;
      opacity: 0.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 20px 0;
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px;
    }
    .nodes-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .node-item {
      padding: 10px;
      margin: 5px 0;
      background: #0d1117;
      border-left: 3px solid #58a6ff;
      border-radius: 4px;
      cursor: pointer;
    }
    .node-item:hover { background: #1c2128; }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      font-size: 14px;
    }
    .breadcrumb-item {
      padding: 5px 10px;
      background: #0d1117;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .breadcrumb-separator { color: #6e7681; }
    pre {
      background: #0d1117;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 워크스페이스 다계층 드릴다운 데모</h1>
    
    <div id="status" class="status">
      <strong>상태:</strong> 초기화 중...
    </div>

    <div class="breadcrumb" id="breadcrumb">
      <span class="breadcrumb-item">📍 Level 0: Compact</span>
    </div>

    <div class="controls">
      <button id="drillDownBtn" disabled>📍 드릴다운</button>
      <button id="drillUpBtn" disabled>⬆️ 드릴업</button>
      <button id="analyzeBtn">📊 협업 분석</button>
      <button id="resetBtn">🔄 초기화</button>
    </div>

    <div class="grid">
      <div class="panel">
        <h3>📊 노드 목록 (현재 레벨)</h3>
        <div class="nodes-list" id="nodesList"></div>
      </div>

      <div class="panel">
        <h3>🔐 권한 정보</h3>
        <pre id="permissionsInfo"></pre>
      </div>
    </div>

    <div class="panel">
      <h3>📋 상세 응답 데이터</h3>
      <pre id="responseData"></pre>
    </div>
  </div>

  <script src="js/orbit3d-workspace-drilldown.js"></script>
  <script>
    const WORKSPACE_ID = '01KK6W188XJBNK0HJBZPRH4WXK';
    const TOKEN = 'orbit_test_owner_token_1234567890abcdefghijklmnop';

    let manager = null;
    let selectedNodeId = null;

    const LEVEL_NAMES = ['Compact', 'Personal', 'Team', 'Collaboration', 'Department', 'Universe'];

    async function initialize() {
      try {
        updateStatus('초기화 중...', false);
        manager = new WorkspaceDrilldownManager(WORKSPACE_ID, TOKEN);
        const data = await manager.initializeWorkspace();
        
        updateStatus('✓ 워크스페이스 로드 완료', true);
        renderUI(data);
      } catch (e) {
        updateStatus('✗ 초기화 실패: ' + e.message, false);
      }
    }

    function updateStatus(message, success = true) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + (success ? 'success' : 'error');
    }

    function renderUI(data) {
      const state = manager.getState();
      
      // 브레드크럼
      const breadcrumb = document.getElementById('breadcrumb');
      breadcrumb.innerHTML = `
        <span class="breadcrumb-item">📍 Level ${state.level}: ${LEVEL_NAMES[state.level]}</span>
        ${state.level > 0 ? '<span class="breadcrumb-separator">→</span><span class="breadcrumb-item">...(위로 돌아가기 가능)</span>' : ''}
      `;

      // 노드 목록
      const nodesList = document.getElementById('nodesList');
      nodesList.innerHTML = state.nodes.map((node, idx) => `
        <div class="node-item" data-node-id="${node.id}" onclick="selectNode('${node.id}', ${state.level})">
          <strong>${node.name}</strong>
          <div style="font-size: 12px; color: #6e7681;">
            ID: ${node.id} | Type: ${node.type}
          </div>
        </div>
      `).join('');

      // 권한 정보
      const permInfo = document.getElementById('permissionsInfo');
      permInfo.textContent = JSON.stringify({
        role: data.role,
        canViewLevels: state.permissions.canViewLevels,
        canModifyLevels: state.permissions.canModifyLevels,
        description: state.permissions.description,
        navigation: state.navigation
      }, null, 2);

      // 응답 데이터
      document.getElementById('responseData').textContent = JSON.stringify(data, null, 2);

      // 버튼 상태 업데이트
      document.getElementById('drillDownBtn').disabled = !state.navigation.canDrillDown;
      document.getElementById('drillUpBtn').disabled = !state.navigation.canDrillUp;
    }

    function selectNode(nodeId, level) {
      selectedNodeId = nodeId;
      document.querySelectorAll('.node-item').forEach(el => {
        el.style.borderLeftColor = el.dataset.nodeId === nodeId ? '#58a6ff' : '#6e7681';
      });
    }

    async function drillDown() {
      if (!selectedNodeId) {
        updateStatus('노드를 선택하세요', false);
        return;
      }
      try {
        updateStatus('드릴다운 중...', false);
        const nextLevel = manager.currentLevel + 1;
        const data = await manager.drillDown(selectedNodeId, nextLevel);
        updateStatus(`✓ Level ${nextLevel}로 이동 완료`, true);
        renderUI(data);
        selectedNodeId = null;
      } catch (e) {
        updateStatus('✗ 드릴다운 실패: ' + e.message, false);
      }
    }

    async function drillUp() {
      try {
        updateStatus('드릴업 중...', false);
        const data = await manager.drillUp();
        updateStatus(`✓ Level ${data.level}로 돌아갔습니다`, true);
        renderUI(data);
      } catch (e) {
        updateStatus('✗ 드릴업 실패: ' + e.message, false);
      }
    }

    async function analyzeCollaboration() {
      try {
        updateStatus('협업 신호 분석 중...', false);
        const result = await manager.analyzeCollaborationSignals(24);
        updateStatus(`✓ 분석 완료: ${result.result.saved}개 관계 저장됨`, true);
        
        const network = await manager.getCollaborationNetwork();
        console.log('[협업 네트워크]', network);
      } catch (e) {
        updateStatus('✗ 분석 실패: ' + e.message, false);
      }
    }

    function reset() {
      selectedNodeId = null;
      manager = null;
      initialize();
    }

    // 이벤트 리스너
    document.getElementById('drillDownBtn').addEventListener('click', drillDown);
    document.getElementById('drillUpBtn').addEventListener('click', drillUp);
    document.getElementById('analyzeBtn').addEventListener('click', analyzeCollaboration);
    document.getElementById('resetBtn').addEventListener('click', reset);

    // 초기화
    initialize();
  </script>
</body>
</html>
