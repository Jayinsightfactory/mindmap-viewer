<meta charset="UTF-8">

<title>Orbit AI - Project Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:system-ui,-apple-system,sans-serif; font-size:13px; overflow:hidden; height:100vh; }

/* Tab bar */
.tab-bar { display:flex; background:#161b22; border-bottom:1px solid #30363d; }
.tab { padding:10px 20px; cursor:pointer; border-bottom:2px solid transparent; color:#8b949e; transition:all .2s; font-size:13px; }
.tab:hover { color:#e6edf3; background:#1c2128; }
.tab.active { color:#58a6ff; border-bottom-color:#58a6ff; }
.tab .badge { background:#30363d; color:#8b949e; padding:1px 6px; border-radius:10px; font-size:11px; margin-left:6px; }
.tab.active .badge { background:#1f6feb; color:#fff; }

/* Search */
.search-bar { padding:8px 12px; background:#161b22; border-bottom:1px solid #30363d; }
.search-bar input { width:100%; background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:6px 10px; border-radius:6px; font-size:13px; outline:none; }
.search-bar input:focus { border-color:#58a6ff; }
.search-bar input::placeholder { color:#484f58; }

/* Stats bar */
.stats-bar { padding:6px 12px; background:#161b22; border-bottom:1px solid #30363d; display:flex; gap:16px; font-size:11px; color:#8b949e; }
.stat-item { display:flex; align-items:center; gap:4px; }
.stat-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

/* Content panels */
.panel { display:none; overflow-y:auto; height:calc(100vh - 105px); }
.panel.active { display:block; }

/* File tree */
.folder { margin:0; }
.folder-header { display:flex; align-items:center; padding:6px 12px; cursor:pointer; user-select:none; border-bottom:1px solid #21262d; }
.folder-header:hover { background:#161b22; }
.folder-icon { margin-right:6px; font-size:12px; color:#8b949e; width:14px; text-align:center; transition:transform .15s; }
.folder-header.collapsed .folder-icon { transform:rotate(-90deg); }
.folder-name { font-weight:600; font-size:13px; }
.folder-count { color:#484f58; font-size:11px; margin-left:6px; }
.folder-tag { font-size:10px; padding:1px 6px; border-radius:3px; margin-left:auto; font-weight:500; }

.file-list { border-bottom:1px solid #21262d; }
.folder-header.collapsed + .file-list { display:none; }

.file-item { display:flex; align-items:center; padding:4px 12px 4px 34px; border-bottom:1px solid #161b22; font-size:12px; }
.file-item:hover { background:#161b22; }
.file-item.hidden { display:none; }
.file-name { color:#58a6ff; min-width:200px; white-space:nowrap; font-family:'SF Mono',Menlo,monospace; font-size:11px; }
.file-desc { color:#8b949e; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Color coding */
.tag-backend { background:#1f3d5c; color:#58a6ff; }
.tag-frontend { background:#1a3a2a; color:#3fb950; }
.tag-daemon { background:#3d2e1a; color:#d29922; }
.tag-setup { background:#3d1a1a; color:#f85149; }
.tag-adapter { background:#2d1a3d; color:#bc8cff; }
.tag-cli { background:#1a3d3d; color:#39d3d3; }
.tag-config { background:#2d2d1a; color:#d2d222; }
.tag-test { background:#1a2d2d; color:#56d4dd; }

.c-backend .file-name { color:#58a6ff; }
.c-frontend .file-name { color:#3fb950; }
.c-daemon .file-name { color:#d29922; }
.c-setup .file-name { color:#f85149; }
.c-adapter .file-name { color:#bc8cff; }
.c-cli .file-name { color:#39d3d3; }
.c-config .file-name { color:#d2d222; }
.c-test .file-name { color:#56d4dd; }

/* Timeline */
.timeline-container { padding:12px; }
.timeline-day { margin-bottom:16px; }
.timeline-date { font-size:14px; font-weight:600; color:#58a6ff; padding:6px 0; border-bottom:1px solid #21262d; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.timeline-date .day-count { font-size:11px; color:#8b949e; font-weight:400; }
.timeline-entry { display:flex; padding:6px 8px; border-radius:6px; margin-bottom:4px; font-size:12px; }
.timeline-entry:hover { background:#161b22; }
.timeline-time { color:#484f58; min-width:48px; font-family:'SF Mono',Menlo,monospace; font-size:11px; }
.timeline-badge { padding:1px 6px; border-radius:3px; font-size:10px; margin-right:8px; white-space:nowrap; }
.badge-dev { background:#1f3d5c; color:#58a6ff; }
.badge-vision { background:#3d2e1a; color:#d29922; }
.timeline-msg { color:#e6edf3; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Summary panel */
.summary-panel { padding:16px; }
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.summary-card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:14px; }
.summary-card h3 { font-size:14px; margin-bottom:8px; color:#e6edf3; }
.summary-card .num { font-size:28px; font-weight:700; }
.summary-card .label { font-size:11px; color:#8b949e; }
.summary-section { margin-bottom:20px; }
.summary-section h3 { font-size:14px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #21262d; }
.arch-row { display:flex; align-items:center; padding:4px 0; font-size:12px; }
.arch-dot { width:10px; height:10px; border-radius:50%; margin-right:8px; flex-shrink:0; }
.arch-label { color:#8b949e; min-width:100px; }
.arch-desc { color:#e6edf3; }
</style>

let totalFiles = 0;
const panel = document.getElementById('panel-files');
fileData.forEach((group, gi) => {
  totalFiles += group.files.length;
  const div = document.createElement('div');
  div.className = 'folder';
  div.innerHTML = `
    <div class="folder-header" data-folder="${gi}">
      <span class="folder-icon">&#9660;</span>
      <span class="folder-name">${group.folder}</span>
      <span class="folder-count">(${group.files.length})</span>
      <span class="folder-tag tag-${group.tag}">${group.tagLabel}</span>
    </div>
    <div class="file-list">
      ${group.files.map(f => `
        <div class="file-item c-${group.tag}" data-search="${f.name.toLowerCase()} ${f.desc.toLowerCase()}">
          <span class="file-name">${f.name}</span>
          <span class="file-desc">${f.desc}</span>
        </div>
      `).join('')}
    </div>
  `;
  panel.appendChild(div);
});
document.getElementById('file-count').textContent = totalFiles;

// Folder toggle
panel.addEventListener('click', e => {
  const hdr = e.target.closest('.folder-header');
  if (hdr) hdr.classList.toggle('collapsed');
});

// ═══════════════════════════════════════════════════════════════
// RENDER TIMELINE
// ═══════════════════════════════════════════════════════════════
const tlPanel = document.getElementById('panel-timeline');
document.getElementById('timeline-count').textContent = conversations.length;

const grouped = {};
conversations.forEach(c => {
  const day = c.date.substring(0, 10);
  if (!grouped[day]) grouped[day] = [];
  grouped[day].push(c);
});

Object.keys(grouped).sort().reverse().forEach(day => {
  const entries = grouped[day];
  const dayDiv = document.createElement('div');
  dayDiv.className = 'timeline-day';

  const weekday = new Date(day + 'T12:00:00').toLocaleDateString('ko-KR', { weekday:'short' });
  dayDiv.innerHTML = `
    <div class="timeline-date">
      ${day} (${weekday})
      <span class="day-count">${entries.length}건</span>
    </div>
  `;

  entries.forEach(c => {
    const time = c.date.length > 10 ? c.date.substring(11, 16) : '--:--';
    const badge = c.src === 'vision' ? 'badge-vision' : 'badge-dev';
    const label = c.src === 'vision' ? 'Vision' : 'Dev';
    const entryDiv = document.createElement('div');
    entryDiv.className = 'timeline-entry';
    entryDiv.innerHTML = `
      <span class="timeline-time">${time}</span>
      <span class="timeline-badge ${badge}">${label}</span>
      <span class="timeline-msg">${c.msg}</span>
    `;
    dayDiv.appendChild(entryDiv);
  });

  tlPanel.appendChild(dayDiv);
});

// TAB SWITCHING
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

    const isFiles = tab.dataset.tab === 'files';
    document.getElementById('search-bar').style.display = isFiles ? '' : 'none';
    document.getElementById('stats-bar').style.display = isFiles ? '' : 'none';
  });
});

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.file-item').forEach(item => {
    if (!q) { item.classList.remove('hidden'); return; }
    const match = item.dataset.search.includes(q);
    item.classList.toggle('hidden', !match);
  });
  // Auto-expand folders with matches, collapse empty ones
  document.querySelectorAll('.folder').forEach(folder => {
    const hdr = folder.querySelector('.folder-header');
    const visible = folder.querySelectorAll('.file-item:not(.hidden)').length;
    if (q) {
      hdr.classList.toggle('collapsed', visible === 0);
    }
  });
});
