<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MOYI AI</title>
  <meta name="theme-color" content="#020617">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#020617; --surface:#111a30; --surface2:#18223d;
      --border:#25304d; --text:#e6ecff; --muted:#8b97b8;
      --blue:#5b8cff; --cyan:#38d4e8; --green:#3fd68b; --violet:#a98bff;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      font-size: 15px;
      overscroll-behavior: contain;
    }

    /* 상단 헤더 */
    .chat-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 8px;
      background: rgba(2,6,23,0.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding-top: calc(10px + env(safe-area-inset-top));
    }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--text);
      font-size: 20px; cursor: pointer; text-decoration: none;
      flex-shrink: 0;
    }
    .icon-btn:active { background: var(--surface2); }
    .chat-title {
      flex: 1;
      display: flex; align-items: center; gap: 10px;
    }
    .chat-title .av {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-title .meta { display:flex; flex-direction:column; }
    .chat-title .meta .name { font-weight: 700; font-size: 15px; }
    .chat-title .meta .status {
      font-size: 11px; color: var(--green); margin-top: 1px;
      display: flex; align-items: center; gap: 4px;
    }
    .chat-title .meta .status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
    }

    /* 메시지 영역 */
    .scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 16px 14px 12px;
    }
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .intro {
      text-align: center; padding: 20px 16px 28px;
    }
    .intro .av {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(56,212,232,0.3);
    }
    .intro h1 { font-size: 18px; color: var(--text); font-weight: 700; margin-bottom: 6px; }
    .intro p { font-size: 13px; color: var(--muted); line-height: 1.5; }

    .msg { margin-bottom: 12px; display: flex; gap: 6px; max-width: 88%; }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg.bot { margin-right: auto; }
    .bubble {
      padding: 11px 14px; border-radius: 18px;
      font-size: 14.5px; line-height: 1.55;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, var(--blue), #4a7af7);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .msg.bot .bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border);
    }
    .msg .time {
      font-size: 10px; color: var(--muted);
      align-self: flex-end; padding: 0 4px 2px;
    }

    /* 에러 메시지 */
    .msg.error .bubble {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.4);
      color: #fca5a5;
    }

    /* Tool 호출 표시 */
    .tool {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 8px 0 4px;
      padding: 5px 10px; border-radius: 8px;
      background: rgba(56,212,232,0.08); border: 1px solid rgba(56,212,232,0.3);
      font-size: 11px; color: var(--cyan); font-family: 'SF Mono', Menlo, monospace;
    }
    .tool .spinner {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid var(--cyan); border-top-color: transparent;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 옵션 버튼 */
    .options {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .option {
      padding: 7px 12px; border-radius: 999px;
      background: transparent; border: 1px solid var(--cyan);
      color: var(--cyan); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .option:active { background: rgba(56,212,232,0.1); }

    /* 데이터 카드 */
    .data-card {
      background: rgba(2,6,23,0.5); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px;
      margin-top: 8px; font-size: 13px;
    }
    .data-card .head {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom: 6px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .data-card .head .label {
      font-size: 10.5px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .data-card .head .badge { font-size: 11px; color: var(--cyan); font-weight: 600; }
    .data-card ul { list-style: none; }
    .data-card li {
      display: flex; justify-content: space-between;
      padding: 5px 0; font-size: 13px;
    }
    .data-card li:not(:last-child) {
      border-bottom: 1px dashed rgba(37,48,77,0.6);
    }
    .data-card li.sum {
      padding-top: 8px; margin-top: 4px;
      border-top: 1px solid var(--border);
      border-bottom: none;
      font-weight: 700; color: var(--cyan);
    }

    /* 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 14px;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* 빠른 질문 칩 */
    .quick-chips {
      flex-shrink: 0;
      padding: 8px 14px 4px;
      display: flex; gap: 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .quick-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      padding: 8px 13px; border-radius: 999px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 12.5px; font-weight: 500;
      cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .chip:active { background: var(--surface2); border-color: var(--cyan); }

    /* 입력 바 */
    .input-bar {
      flex-shrink: 0;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(2,6,23,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-bar .mic, .input-bar .send {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer;
      flex-shrink: 0;
    }
    .input-bar .mic { background: var(--surface2); color: var(--muted); font-size: 18px; }
    .input-bar .mic:active { background: var(--border); }
    .input-bar .mic.listening { background: rgba(56,212,232,0.2); color: var(--cyan); }
    .input-bar .send {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #fff; font-size: 16px;
      box-shadow: 0 4px 12px rgba(91,140,255,0.3);
    }
    .input-bar .send:active { transform: scale(0.94); }
    .input-bar .send:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none;
    }
    .input-bar textarea {
      flex: 1; min-height: 44px; max-height: 120px;
      padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text); font-size: 16px; font-family: inherit;
      resize: none; outline: none;
      line-height: 1.4;
    }
    .input-bar textarea:focus { border-color: var(--cyan); }
  </style>
</head>
<body>
  <header class="chat-bar">
    <a href="/select.html" class="icon-btn" aria-label="뒤로">&larr;</a>
    <div class="chat-title">
      <div class="av">&#129302;</div>
      <div class="meta">
        <span class="name">MOYI AI</span>
        <span class="status" id="statusText">답변 준비됨</span>
      </div>
    </div>
    <button class="icon-btn" id="btnNew" title="새 대화" aria-label="새 대화">&#9998;</button>
  </header>

  <div class="scroll" id="scroll">
    <div class="intro" id="intro">
      <div class="av">&#129302;</div>
      <h1>무엇을 도와드릴까요?</h1>
      <p>출고·주문·재고·거래처를 자연어로 물어보세요</p>
    </div>
  </div>

  <div class="quick-chips" id="quickChips">
    <button class="chip">20차 출고 확인</button>
    <button class="chip">네덜란드 20-1 주문량</button>
    <button class="chip">임재용 담당 업체</button>
    <button class="chip">재고 부족 품목</button>
    <button class="chip">이번 차수 매출</button>
  </div>

  <form class="input-bar" id="inputForm">
    <button type="button" class="mic" id="btnMic" title="음성 입력" aria-label="음성 입력">&#127908;</button>
    <textarea id="msgInput" placeholder="궁금한 걸 물어보세요…" rows="1"></textarea>
    <button type="submit" class="send" id="btnSend" title="보내기" aria-label="보내기">&#10148;</button>
  </form>

  <script>
    (function () {
      var STORAGE_KEY = 'nenova_chat_history';
      var MAX_TURNS = 20;
      var API_URL = '/api/nenova/ai/chat';

      var scroll = document.getElementById('scroll');
      var intro = document.getElementById('intro');
      var msgInput = document.getElementById('msgInput');
      var btnSend = document.getElementById('btnSend');
      var btnNew = document.getElementById('btnNew');
      var btnMic = document.getElementById('btnMic');
      var statusText = document.getElementById('statusText');
      var inputForm = document.getElementById('inputForm');

      // 메시지 히스토리 (Anthropic messages 배열 형식)
      var messages = [];
      var isLoading = false;
      var recognition = null;

      // ── 유틸: 시간 포맷 ──
      function nowTime() {
        var d = new Date();
        return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
      }

      // ── 유틸: 스크롤 하단 ──
      function scrollBottom() {
        setTimeout(function () {
          scroll.scrollTop = scroll.scrollHeight;
        }, 30);
      }

      // ── 인트로 숨기기 ──
      function hideIntro() {
        if (intro) { intro.style.display = 'none'; }
      }

      // ── 사용자 메시지 렌더 ──
      function renderUser(text) {
        hideIntro();
        var div = document.createElement('div');
        div.className = 'msg user';
        div.innerHTML = '<div class="bubble">' + escHtml(text) + '</div><div class="time">' + nowTime() + '</div>';
        scroll.appendChild(div);
        scrollBottom();
        return div;
      }

      // ── 봇 메시지 렌더 ──
      function renderBot(contentBlocks) {
        hideIntro();
        var div = document.createElement('div');
        div.className = 'msg bot';
        var bubble = document.createElement('div');
        bubble.className = 'bubble';

        var fullText = '';
        var toolNames = [];

        contentBlocks.forEach(function (block) {
          if (block.type === 'text') {
            fullText += block.text;
          } else if (block.type === 'tool_use') {
            toolNames.push(block.name);
          }
        });

        // tool_use 표시 (완료된 것은 정적으로 표시)
        toolNames.forEach(function (name) {
          var toolEl = document.createElement('div');
          toolEl.className = 'tool';
          toolEl.innerHTML = '<span>' + escHtml(name) + '</span>';
          bubble.appendChild(toolEl);
        });

        // 텍스트 처리: [옵션] 파싱
        if (fullText) {
          var parsed = parseOptions(fullText);
          var textNode = document.createElement('span');
          textNode.textContent = parsed.text;
          bubble.appendChild(textNode);

          if (parsed.options.length > 0) {
            var optDiv = document.createElement('div');
            optDiv.className = 'options';
            parsed.options.forEach(function (opt) {
              var btn = document.createElement('button');
              btn.className = 'option';
              btn.textContent = opt;
              btn.addEventListener('click', function () {
                sendMessage(opt);
              });
              optDiv.appendChild(btn);
            });
            bubble.appendChild(optDiv);
          }
        }

        div.appendChild(bubble);
        scroll.appendChild(div);
        scrollBottom();
        return div;
      }

      // ── 에러 메시지 렌더 ──
      function renderError(text) {
        hideIntro();
        var div = document.createElement('div');
        div.className = 'msg bot error';
        div.innerHTML = '<div class="bubble">' + escHtml(text) + '</div>';
        scroll.appendChild(div);
        scrollBottom();
      }

      // ── 타이핑 인디케이터 ──
      function showTyping() {
        var div = document.createElement('div');
        div.className = 'msg bot';
        div.id = 'typingMsg';
        div.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
        scroll.appendChild(div);
        scrollBottom();
        return div;
      }

      function removeTyping() {
        var el = document.getElementById('typingMsg');
        if (el) { el.remove(); }
      }

      // ── 진행중 tool 표시 ──
      function showToolRunning(name) {
        var div = document.createElement('div');
        div.className = 'msg bot';
        div.id = 'toolRunningMsg';
        div.innerHTML = '<div class="bubble"><div class="tool"><span class="spinner"></span> 도구 실행 중: <code>' + escHtml(name) + '</code></div></div>';
        scroll.appendChild(div);
        scrollBottom();
        return div;
      }

      function removeToolRunning() {
        var el = document.getElementById('toolRunningMsg');
        if (el) { el.remove(); }
      }

      // ── HTML 이스케이프 ──
      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── 옵션 파싱: [옵션1][옵션2] ──
      function parseOptions(text) {
        var opts = [];
        var clean = text.replace(/\[([^\]]{1,40})\]/g, function (_, opt) {
          opts.push(opt.trim());
          return '';
        });
        return { text: clean.trim(), options: opts };
      }

      // ── localStorage 저장 ──
      function saveHistory() {
        var turns = messages.slice(-MAX_TURNS * 2);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(turns));
        } catch (e) {}
      }

      // ── localStorage 복원 ──
      function loadHistory() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) { return; }
          var saved = JSON.parse(raw);
          if (!Array.isArray(saved) || saved.length === 0) { return; }
          messages = saved;
          hideIntro();
          // 저장된 메시지 화면에 복원
          saved.forEach(function (msg) {
            if (msg.role === 'user') {
              var text = '';
              if (typeof msg.content === 'string') {
                text = msg.content;
              } else if (Array.isArray(msg.content)) {
                msg.content.forEach(function (b) {
                  if (b.type === 'text') { text += b.text; }
                });
              }
              if (text) { renderUser(text); }
            } else if (msg.role === 'assistant') {
              var blocks = [];
              if (typeof msg.content === 'string') {
                blocks = [{ type: 'text', text: msg.content }];
              } else if (Array.isArray(msg.content)) {
                blocks = msg.content;
              }
              renderBot(blocks);
            }
          });
        } catch (e) {}
      }

      // ── 새 대화 리셋 ──
      function resetChat() {
        messages = [];
        localStorage.removeItem(STORAGE_KEY);
        scroll.innerHTML = '';
        // 인트로 재생성
        var introEl = document.createElement('div');
        introEl.className = 'intro';
        introEl.id = 'intro';
        introEl.innerHTML = '<div class="av">&#129302;</div><h1>무엇을 도와드릴까요?</h1><p>출고·주문·재고·거래처를 자연어로 물어보세요</p>';
        scroll.appendChild(introEl);
        intro = introEl;
      }

      // ── 메시지 전송 ──
      function sendMessage(text) {
        if (isLoading) { return; }
        text = text.trim();
        if (!text) { return; }

        // UI 업데이트
        msgInput.value = '';
        msgInput.style.height = 'auto';
        renderUser(text);
        setLoading(true);

        // 메시지 배열에 추가
        messages.push({ role: 'user', content: text });

        var token = localStorage.getItem('orbit_token') || '';
        var body = { messages: messages };

        var typingEl = showTyping();

        fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(body)
        })
        .then(function (res) {
          if (!res.ok) {
            return res.json().catch(function () { return {}; }).then(function (data) {
              throw new Error(data.error || ('HTTP ' + res.status));
            });
          }
          return res.json();
        })
        .then(function (data) {
          removeTyping();
          removeToolRunning();

          // 응답에서 messages 배열 갱신
          if (data.messages && Array.isArray(data.messages)) {
            messages = data.messages;
          }

          // 마지막 assistant 메시지 렌더
          var lastAssistant = null;
          for (var i = messages.length - 1; i >= 0; i--) {
            if (messages[i].role === 'assistant') {
              lastAssistant = messages[i];
              break;
            }
          }

          if (lastAssistant) {
            var blocks = [];
            if (typeof lastAssistant.content === 'string') {
              blocks = [{ type: 'text', text: lastAssistant.content }];
            } else if (Array.isArray(lastAssistant.content)) {
              blocks = lastAssistant.content;
            }
            renderBot(blocks);
          }

          saveHistory();
        })
        .catch(function (err) {
          removeTyping();
          removeToolRunning();
          // 실패한 user 메시지 제거
          if (messages.length > 0 && messages[messages.length - 1].role === 'user') {
            messages.pop();
          }
          renderError('연결 오류, 잠시 후 다시 시도해주세요.');
          console.error('chat error:', err);
        })
        .finally(function () {
          setLoading(false);
        });
      }

      // ── 로딩 상태 ──
      function setLoading(on) {
        isLoading = on;
        btnSend.disabled = on;
        statusText.textContent = on ? '생각 중…' : '답변 준비됨';
      }

      // ── 입력창 자동 높이 ──
      msgInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      // ── 엔터 전송 (Shift+Enter = 줄바꿈) ──
      msgInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(msgInput.value);
        }
      });

      // ── 폼 submit ──
      inputForm.addEventListener('submit', function (e) {
        e.preventDefault();
        sendMessage(msgInput.value);
      });

      // ── 새 대화 버튼 ──
      btnNew.addEventListener('click', function () {
        resetChat();
      });

      // ── 빠른 칩 클릭 ──
      document.getElementById('quickChips').addEventListener('click', function (e) {
        var chip = e.target.closest('.chip');
        if (!chip) { return; }
        msgInput.value = chip.textContent;
        sendMessage(chip.textContent);
      });

      // ── 음성 입력 ──
      btnMic.addEventListener('click', function () {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('이 브라우저는 음성 입력을 지원하지 않습니다.');
          return;
        }

        if (recognition) {
          recognition.stop();
          recognition = null;
          btnMic.classList.remove('listening');
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = function () {
          btnMic.classList.add('listening');
        };

        recognition.onresult = function (e) {
          var transcript = e.results[0][0].transcript;
          msgInput.value = transcript;
          msgInput.style.height = 'auto';
          msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
          sendMessage(transcript);
        };

        recognition.onerror = function () {
          btnMic.classList.remove('listening');
          recognition = null;
        };

        recognition.onend = function () {
          btnMic.classList.remove('listening');
          recognition = null;
        };

        recognition.start();
      });

      // ── 초기화: 히스토리 복원 ──
      loadHistory();
    })();
  </script>
</body>
</html>
