<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit — 히스토리 & 롤백</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#060a10; --bg2:#0d1117; --bg3:#161b22;
      --border:rgba(48,54,61,0.7);
      --text:#f0f6fc; --text2:#c9d1d9; --text3:#8b949e;
      --green:#3fb950; --blue:#58a6ff; --purple:#bc8cff;
      --orange:#ffa657; --pink:#f778ba; --red:#f85149;
      --accent:#8957e5;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

    /* TOPBAR */
    #topbar {
      display:flex; align-items:center; gap:12px; padding:0 20px; height:52px;
      background:var(--bg2); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:50;
    }
    .logo { font-size:14px; font-weight:700; }
    .logo span { color:var(--accent); }
    .topbar-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .tb-btn {
      padding:5px 12px; border-radius:6px; border:1px solid var(--border);
      background:var(--bg3); color:var(--text2); font-size:12px; cursor:pointer;
      font-family:inherit; text-decoration:none; transition:border-color 0.15s;
    }
    .tb-btn:hover { border-color:var(--accent); color:var(--text); }
    .tb-btn.danger { border-color:rgba(248,81,73,0.4); color:var(--red); }
    .tb-btn.danger:hover { border-color:var(--red); background:rgba(248,81,73,0.1); }

    /* LAYOUT */
    #main { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 52px); }

    /* SESSION LIST */
    #session-panel {
      background:var(--bg2); border-right:1px solid var(--border);
      overflow-y:auto; padding:12px;
    }
    .panel-title { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; padding:0 4px; }

    .session-card {
      padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:4px;
      border:1px solid transparent; transition:all 0.15s;
    }
    .session-card:hover { background:var(--bg3); border-color:var(--border); }
    .session-card.active { background:rgba(137,87,229,0.12); border-color:rgba(137,87,229,0.4); }
    .sc-name { font-size:13px; font-weight:600; color:var(--text); }
    .sc-meta { font-size:11px; color:var(--text3); margin-top:3px; display:flex; gap:8px; }
    .sc-badge {
      font-size:10px; font-weight:600; padding:1px 6px; border-radius:8px;
    }

    /* TIMELINE */
    #timeline-panel { overflow-y:auto; padding:20px; }
    .tl-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px;
    }
    .tl-title { font-size:15px; font-weight:600; }
    .tl-actions { display:flex; gap:8px; }

    /* TIMELINE ITEMS */
    .tl-group { margin-bottom:8px; }
    .tl-item {
      display:flex; gap:12px; padding:10px 0;
      border-bottom:1px solid rgba(48,54,61,0.3); align-items:flex-start;
      transition:background 0.1s; border-radius:6px; padding:8px;
    }
    .tl-item:hover { background:rgba(33,38,45,0.6); }
    .tl-item:hover .tl-rollback { opacity:1; }
    .tl-dot-wrap { display:flex; flex-direction:column; align-items:center; gap:0; padding-top:3px; }
    .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .tl-line { width:1px; background:rgba(48,54,61,0.5); flex:1; min-height:20px; margin-top:4px; }
    .tl-body { flex:1; min-width:0; }
    .tl-label { font-size:13px; font-weight:500; color:var(--text); }
    .tl-type { font-size:10px; color:var(--text3); margin-top:2px; }
    .tl-content {
      font-size:11px; color:var(--text2); margin-top:6px;
      background:rgba(22,27,34,0.6); padding:6px 8px; border-radius:4px;
      white-space:pre-wrap; word-break:break-word; max-height:80px; overflow:hidden;
    }
    .tl-time { font-size:10px; color:var(--text3); white-space:nowrap; }
    .tl-rollback {
      opacity:0; padding:3px 8px; border-radius:5px; font-size:11px;
      border:1px solid rgba(248,81,73,0.4); background:rgba(248,81,73,0.1);
      color:var(--red); cursor:pointer; font-family:inherit; white-space:nowrap;
      transition:opacity 0.15s;
    }
    .tl-rollback:hover { background:rgba(248,81,73,0.2); }

    /* ROLLBACK CONFIRM */
    #rollback-modal {
      display:none; position:fixed; inset:0; background:rgba(6,10,16,0.85);
      z-index:200; align-items:center; justify-content:center;
    }
    #rollback-modal.show { display:flex; }
    .modal-box {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      padding:24px; max-width:400px; width:100%;
    }
    .modal-title { font-size:15px; font-weight:700; margin-bottom:8px; color:var(--red); }
    .modal-desc { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.6; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
    .modal-cancel { padding:7px 16px; border-radius:6px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; }
    .modal-confirm { padding:7px 16px; border-radius:6px; border:1px solid var(--red); background:rgba(248,81,73,0.15); color:var(--red); font-size:13px; cursor:pointer; font-family:inherit; font-weight:600; }

    .empty { text-align:center; color:var(--text3); font-size:13px; padding:40px 0; }

    /* AI COLORS */
    .ai-claude { color:#3fb950; } .ai-n8n { color:#ea4b71; }
    .ai-openai { color:#8b949e; } .ai-cursor { color:#58a6ff; }
    .ai-vscode { color:#f85149; } .ai-perplexity { color:#bc8cff; }
  </style>
</head>
<body>

<div id="topbar">
  <span class="logo">🌌 <span>Orbit</span> — 히스토리</span>
  <div class="topbar-right">
    <button class="tb-btn danger" onclick="confirmClearAll()">🗑 전체 초기화</button>
    <a href="/dashboard.html" class="tb-btn">📊 대시보드</a>
    <a href="/orbit3d.html" class="tb-btn">🪐 행성계</a>
    <a href="/" class="tb-btn">← 맵</a>
  </div>
</div>

<div id="main">
  <!-- 세션 목록 -->
  <div id="session-panel">
    <div class="panel-title">세션 목록</div>
    <div id="session-list"></div>
  </div>

  <!-- 타임라인 -->
  <div id="timeline-panel">
    <div class="tl-header">
      <div class="tl-title" id="tl-title">세션을 선택하세요</div>
      <div class="tl-actions" id="tl-actions"></div>
    </div>
    <div id="timeline"></div>
  </div>
</div>

<!-- 롤백 확인 모달 -->
<div id="rollback-modal">
  <div class="modal-box">
    <div class="modal-title">⚠️ 이 시점으로 롤백</div>
    <div class="modal-desc" id="modal-desc">이 이벤트 이후의 모든 데이터가 삭제됩니다. 되돌릴 수 없습니다.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-confirm" onclick="executeRollback()">롤백 실행</button>
    </div>
  </div>
</div>

<script>
const AI_COLORS = {
  claude:'#3fb950', n8n:'#ea4b71', openai:'#8b949e',
  cursor:'#58a6ff', vscode:'#f85149', perplexity:'#bc8cff', default:'#6b7280'
};
const TYPE_COLORS = {
  'user.message':'#58a6ff','assistant.message':'#3fb950',
  'tool.end':'#bc8cff','tool.start':'#8957e5',
  'session.start':'#39d2c0','task.complete':'#3fb950',
  'file.write':'#f778ba','file.read':'#ffa657',
};
function nodeColor(n) {
  if (n.aiSource && AI_COLORS[n.aiSource]) return AI_COLORS[n.aiSource];
  return TYPE_COLORS[n.type] || '#6b7280';
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let allNodes = [];
let currentSessionId = null;
let pendingRollbackId = null;

// ── 세션 목록 로드 ──
async function loadSessions() {
  const [sessRes, graphRes] = await Promise.all([
    fetch('/api/sessions'), fetch('/api/graph')
  ]);
  const sessions = await sessRes.json();
  const graph    = await graphRes.json();
  allNodes = graph.nodes || [];

  const el = document.getElementById('session-list');
  if (!sessions.length) {
    el.innerHTML = '<div class="empty">세션 없음</div>';
    return;
  }

  // 세션별 이벤트 수 계산
  const nodeCountBySession = {};
  for (const n of allNodes) {
    if (n.sessionId) nodeCountBySession[n.sessionId] = (nodeCountBySession[n.sessionId]||0)+1;
  }

  el.innerHTML = sessions.map(s => {
    const cnt  = nodeCountBySession[s.id] || 0;
    const name = s.memberName || s.userId || s.id?.slice(0,16) || '알 수 없음';
    const time = s.startTime
      ? new Date(s.startTime).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '';
    const ch   = s.channelId || 'default';
    const aiColor = s.source && AI_COLORS[s.source] ? AI_COLORS[s.source] : '#6b7280';
    return `
      <div class="session-card" onclick="selectSession('${escHtml(s.id)}')" id="sc-${escHtml(s.id)}">
        <div class="sc-name">${escHtml(name)}</div>
        <div class="sc-meta">
          <span>${time || s.id?.slice(0,12)}</span>
          <span style="color:${aiColor}">${s.source||'?'}</span>
        </div>
        <div class="sc-meta">
          <span style="color:var(--text2)">${ch}</span>
          <span class="sc-badge" style="background:rgba(137,87,229,0.15);color:var(--accent)">${cnt}건</span>
        </div>
      </div>`;
  }).join('');
}

// ── 세션 선택 → 타임라인 표시 ──
function selectSession(sessionId) {
  currentSessionId = sessionId;
  document.querySelectorAll('.session-card').forEach(el => el.classList.remove('active'));
  const card = document.getElementById('sc-' + sessionId);
  if (card) card.classList.add('active');

  const nodes = allNodes
    .filter(n => n.sessionId === sessionId)
    .sort((a,b) => (a.timestamp||'').localeCompare(b.timestamp||''));

  document.getElementById('tl-title').textContent = `타임라인 — ${nodes.length}개 이벤트`;
  document.getElementById('tl-actions').innerHTML =
    `<button class="tb-btn danger" onclick="confirmRollbackSession()">↩ 세션 전체 롤백</button>`;

  renderTimeline(nodes);
}

function renderTimeline(nodes) {
  const el = document.getElementById('timeline');
  if (!nodes.length) {
    el.innerHTML = '<div class="empty">이벤트 없음</div>';
    return;
  }

  el.innerHTML = nodes.map((n, i) => {
    const color   = nodeColor(n);
    const time    = n.timestamp ? new Date(n.timestamp).toLocaleTimeString('ko-KR') : '';
    const content = n.fullContent || '';
    const showContent = content && content.length > 3 && !content.startsWith('{');
    const isLast  = i === nodes.length - 1;
    return `
      <div class="tl-item" id="tli-${escHtml(n.id||'')}">
        <div class="tl-dot-wrap">
          <div class="tl-dot" style="background:${color}"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-body">
          <div class="tl-label">${escHtml(n.label||n.type||'')}</div>
          <div class="tl-type">${n.type}${n.aiSource?' · '+n.aiSource:''}</div>
          ${showContent ? `<div class="tl-content">${escHtml(content.slice(0,200))}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <div class="tl-time">${time}</div>
          <button class="tl-rollback" onclick="confirmRollback('${escHtml(n.id||'')}','${escHtml(n.label||n.type||'')}')">↩ 여기로 롤백</button>
        </div>
      </div>`;
  }).join('');
}

// ── 롤백 확인 ──
function confirmRollback(eventId, label) {
  pendingRollbackId = eventId;
  document.getElementById('modal-desc').innerHTML =
    `<b>"${escHtml(label)}"</b> 이후의 모든 이벤트가 삭제됩니다.<br>이 작업은 되돌릴 수 없습니다.`;
  document.getElementById('rollback-modal').classList.add('show');
}

function confirmRollbackSession() {
  const nodes = allNodes
    .filter(n => n.sessionId === currentSessionId)
    .sort((a,b) => (a.timestamp||'').localeCompare(b.timestamp||''));
  if (!nodes.length) return;
  // 세션 첫 이벤트 직전으로 롤백
  confirmRollback(nodes[0].id, `세션 전체 (${nodes.length}개 이벤트)`);
}

function closeModal() {
  document.getElementById('rollback-modal').classList.remove('show');
  pendingRollbackId = null;
}

async function executeRollback() {
  if (!pendingRollbackId) return;
  try {
    const res = await fetch(`/api/rollback/${pendingRollbackId}`, { method:'POST' });
    if (res.ok) {
      closeModal();
      await loadSessions();
      if (currentSessionId) selectSession(currentSessionId);
      alert('롤백 완료');
    } else {
      alert('롤백 실패: ' + res.status);
    }
  } catch(e) { alert('오류: ' + e.message); }
}

function confirmClearAll() {
  if (!confirm('전체 데이터를 초기화합니다. 복구 불가능합니다. 진행할까요?')) return;
  fetch('/api/clear', { method:'DELETE' })
    .then(() => { loadSessions(); document.getElementById('timeline').innerHTML=''; })
    .catch(e => alert('오류: ' + e.message));
}

// ── 초기화 ──
loadSessions();
</script>
</body>
</html>
